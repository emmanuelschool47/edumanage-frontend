name: Build EduManage APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: false

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project Files
        run: |
          mkdir -p twa/app/src/main/res/values
          mkdir -p twa/app/src/main/res/xml
          mkdir -p twa/app/src/main/res/drawable
          mkdir -p twa/app/src/main/res/mipmap-mdpi
          mkdir -p twa/app/src/main/res/mipmap-hdpi
          mkdir -p twa/app/src/main/res/mipmap-xhdpi
          mkdir -p twa/app/src/main/res/mipmap-xxhdpi
          mkdir -p twa/app/src/main/res/mipmap-xxxhdpi
          mkdir -p twa/gradle/wrapper

          cat > twa/settings.gradle << 'GRADLE'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "EduManage"
          include ':app'
          GRADLE

          cat > twa/build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          GRADLE

          cat > twa/app/build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.emmanuelschool.edumanage'
              compileSdk 34
              defaultConfig {
                  applicationId "com.emmanuelschool.edumanage"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  debug {
                      debuggable true
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          GRADLE

          cat > twa/gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS

          cat > twa/app/src/main/AndroidManifest.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="EduManage"
                  android:theme="@style/AppTheme"
                  android:allowBackup="true">
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:label="EduManage"
                      android:exported="true">
                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="https://emmanuel-school.vercel.app/student.html" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                          android:resource="@color/colorPrimary" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.NAVIGATION_BAR_COLOR"
                          android:resource="@color/colorPrimary" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.SPLASH_SCREEN_BACKGROUND_COLOR"
                          android:resource="@color/colorPrimary" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.FILE_PROVIDER_AUTHORITY"
                          android:value="com.emmanuelschool.edumanage.fileprovider" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW"/>
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE"/>
                          <data android:scheme="https"
                                android:host="emmanuel-school.vercel.app"/>
                      </intent-filter>
                  </activity>
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.FocusActivity"
                      android:exported="true"/>
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.WebViewFallbackActivity"
                      android:exported="true"/>
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="com.emmanuelschool.edumanage.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/filepaths" />
                  </provider>
                  <service
                      android:name="com.google.androidbrowserhelper.trusted.DelegationService"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.support.customtabs.trusted.TRUSTED_WEB_ACTIVITY_SERVICE"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                      </intent-filter>
                  </service>
              </application>
          </manifest>
          XML

          cat > twa/app/src/main/res/values/colors.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#800020</color>
              <color name="colorPrimaryDark">#3d0010</color>
          </resources>
          XML

          cat > twa/app/src/main/res/values/strings.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">EduManage</string>
          </resources>
          XML

          cat > twa/app/src/main/res/values/styles.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">@color/colorPrimary</item>
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
              </style>
          </resources>
          XML

          cat > twa/app/src/main/res/xml/filepaths.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <external-path name="downloads" path="Download/" />
          </paths>
          XML

          cat > twa/app/src/main/res/drawable/splash.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#800020"/>
          </shape>
          XML

          # Icons
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp icons/icon-192x192.png twa/app/src/main/res/mipmap-$d/ic_launcher.png 2>/dev/null || \
            curl -s "https://emmanuel-school.vercel.app/icons/icon-192x192.png" \
              -o twa/app/src/main/res/mipmap-$d/ic_launcher.png
          done

          echo "✅ All files created"

      - name: Setup Gradle Wrapper
        run: |
          cd twa
          gradle wrapper --gradle-version=8.2 || true
          if [ ! -f gradlew ]; then
            wget -q https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew -O gradlew
          fi
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd twa
          ./gradlew assembleDebug \
            --no-daemon \
            --warning-mode=all \
            -Dorg.gradle.jvmargs="-Xmx2048m"

      - name: Show APK location
        run: find twa -name "*.apk" -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EduManage-APK
          path: twa/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
