name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Download Bubblewrap
      run: npm install -g @bubblewrap/cli

    - name: Init TWA Project
      run: |
        mkdir twa_build && cd twa_build
        bubblewrap init \
          --manifest "https://emmanuel-school.vercel.app/manifest.json" \
          --directory .

    - name: Build APK
      run: |
        cd twa_build
        bubblewrap build

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: EduManage-APK
        path: twa_build/app-release-signed.apk
