<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#800020">
<title>Admin Panel — Emmanuel School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --p:#800020;--dk:#5c0018;--dp:#3d0010;--ac:#a30027;
  --w:#fff;--bg:#fafafa;
  --b1:#f5f5f5;--b2:#eeeeee;--b3:#e0e0e0;--b4:#bdbdbd;--b5:#9e9e9e;--b6:#757575;--b7:#616161;
  --green:#1a7a4a;--gl:#e8f5ee;
  --red:#c0392b;--rl:#fdf0ef;
  --gold:#b8860b;--goldl:#fdf8e8;
  --ff:'Playfair Display',serif;--fb:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
  --r:12px;--sh:0 4px 16px rgba(128,0,32,.1);--tr:all .22s ease;
}
html{height:100%}
body{display:flex;min-height:100vh;background:var(--bg);font-family:var(--fb);color:var(--b7)}
.sidebar{width:240px;background:var(--dp);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:300;overflow-y:auto;overflow-x:hidden;transition:transform .3s ease}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
.sb-head{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;flex-shrink:0;min-height:60px}
.sb-logo{width:36px;height:36px;flex-shrink:0;border-radius:9px;overflow:hidden;border:1.5px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center}
.sb-logo img{width:100%;height:100%;object-fit:cover;display:block}
.sb-logo-fb{font-family:var(--ff);font-size:15px;font-weight:700;color:var(--w);display:none}
.sb-info{flex:1;min-width:0}
.sb-name{font-family:var(--ff);font-size:14px;font-weight:700;color:var(--w);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-role{font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px}
.live-chip{display:flex;align-items:center;gap:4px;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.22);border-radius:20px;padding:3px 7px;font-size:10px;color:#4ade80;font-weight:700;white-space:nowrap;flex-shrink:0}
.live-dot{width:5px;height:5px;background:#4ade80;border-radius:50%;animation:pulse 1.6s infinite}
.sb-nav{flex:1;padding:8px}
.nav-grp{font-size:10px;font-weight:700;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:1.5px;padding:10px 8px 3px}
.ni{display:flex;align-items:center;gap:10px;width:100%;padding:9px 11px;border-radius:8px;border:none;background:transparent;color:rgba(255,255,255,.5);font-size:13px;font-weight:500;cursor:pointer;text-align:left;transition:var(--tr);margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,.07);color:var(--w)}
.ni.active{background:var(--w);color:var(--p);font-weight:700}
.ni svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.sb-foot{padding:12px 14px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0}
.sb-admin-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sb-av{width:34px;height:34px;flex-shrink:0;background:rgba(255,255,255,.12);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--ff);font-size:14px;font-weight:700;color:var(--w)}
.sb-aname{font-size:13px;font-weight:700;color:var(--w);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-acode{font-size:10px;color:rgba(255,255,255,.3);font-family:var(--fm)}
.logout-btn{width:100%;padding:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:rgba(255,255,255,.45);font-size:12px;font-weight:600;cursor:pointer;transition:var(--tr)}
.logout-btn:hover{background:var(--red);border-color:var(--red);color:var(--w)}
.main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-width:0;min-height:100vh}
.topbar{position:sticky;top:0;z-index:100;background:var(--w);border-bottom:1px solid var(--b2);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-title{font-family:var(--ff);font-size:20px;font-weight:600;color:var(--dp)}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;color:var(--b7)}
.hamburger svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:299}
.pg{padding:24px;flex:1}
.panel{display:none}.panel.active{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.sc{background:var(--w);border:1px solid var(--b2);border-radius:14px;padding:18px;transition:var(--tr)}
.sc:hover{border-color:var(--p);transform:translateY(-2px);box-shadow:var(--sh)}
.sc-ic{width:36px;height:36px;background:rgba(128,0,32,.07);border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.sc-ic svg{width:18px;height:18px;stroke:var(--p);fill:none;stroke-width:2;stroke-linecap:round}
.sc-num{font-family:var(--ff);font-size:28px;font-weight:700;line-height:1;margin-bottom:4px;color:var(--dp)}
.sc-lbl{font-size:11px;color:var(--b4);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.card{background:var(--w);border:1px solid var(--b2);border-radius:14px;padding:20px;margin-bottom:20px}
.card-title{font-family:var(--ff);font-size:17px;font-weight:700;color:var(--dp);margin-bottom:16px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead{background:var(--b1)}
th{padding:10px 14px;text-align:left;font-size:11px;color:var(--b4);text-transform:uppercase;letter-spacing:.8px;font-weight:600;white-space:nowrap;border-bottom:1px solid var(--b2)}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--b1);vertical-align:middle;color:var(--b7)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fdf5f7}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:600}
.bg{background:var(--gl);color:var(--green)}
.br{background:var(--rl);color:var(--red)}
.bo{background:var(--goldl);color:var(--gold)}
.code-tag{font-family:var(--fm);font-size:11px;background:rgba(128,0,32,.07);color:var(--p);padding:2px 7px;border-radius:5px;font-weight:500}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:9px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:var(--tr);font-family:var(--fb)}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--p);color:var(--w)}.btn-p:hover{background:var(--dk)}
.btn-g{background:var(--green);color:var(--w)}
.btn-r{background:var(--red);color:var(--w)}
.btn-o{background:transparent;border:1.5px solid var(--b2);color:var(--b6)}.btn-o:hover{border-color:var(--p);color:var(--p)}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:7px}
.btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.srch{padding:9px 13px;border:1.5px solid var(--b2);border-radius:9px;font-size:13px;color:var(--b7);outline:none;transition:var(--tr);min-width:180px;font-family:var(--fb)}
.srch:focus{border-color:var(--p)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fgl{display:flex;flex-direction:column;gap:5px}
.fgl label{font-size:11px;font-weight:700;color:var(--b5);text-transform:uppercase;letter-spacing:.8px}
.fi{width:100%;padding:10px 13px;background:var(--b1);border:1.5px solid var(--b2);border-radius:9px;font-size:13px;color:var(--b7);outline:none;transition:var(--tr);font-family:var(--fb)}
.fi:focus{border-color:var(--p);background:var(--w)}
.fi[readonly]{background:#f0f0f0;color:var(--b5)}
.pw-wrap{position:relative}
.pw-wrap .fi{padding-right:40px}
.pw-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--b4);display:flex;padding:2px;transition:color .18s}
.pw-eye:hover{color:var(--p)}
.pw-eye svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.mo.show{display:flex}
.mb{background:var(--w);border-radius:18px;padding:24px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;animation:popIn .22s ease;position:relative}
.mb::-webkit-scrollbar{width:3px}
.mb::-webkit-scrollbar-thumb{background:var(--b3);border-radius:3px}
.mo-title{font-family:var(--ff);font-size:18px;font-weight:700;color:var(--dp);margin-bottom:16px}
.mo-close{position:absolute;top:16px;right:16px;background:none;border:none;cursor:pointer;color:var(--b4);padding:4px;border-radius:6px;transition:color .18s}
.mo-close:hover{color:var(--red)}
.mo-close svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.mo-foot{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.ic{background:var(--b1);border-radius:8px;padding:10px 13px}
.ic-lbl{font-size:10px;color:var(--b4);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:3px}
.ic-val{font-size:13px;font-weight:600;color:var(--b7)}
.cred-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.cred-item{background:var(--dp);border-radius:10px;padding:14px;text-align:center}
.cred-lbl{font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:6px}
.cred-val{font-family:var(--fm);font-size:18px;font-weight:700;color:var(--w);word-break:break-all}
.ebox{display:none;background:var(--rl);color:var(--red);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;border:1px solid rgba(192,57,43,.18)}
.ebox.show{display:block}
.warn-box{background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:10px 14px;font-size:12px;color:#5d4037;margin-bottom:12px}
.sc-img{width:100%;max-height:200px;object-fit:contain;border-radius:8px;border:1px solid var(--b2);cursor:pointer;margin-bottom:8px}
.toast{position:fixed;bottom:24px;right:24px;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;transform:translateY(60px);opacity:0;transition:all .3s ease;box-shadow:0 8px 28px rgba(0,0,0,.2)}
.toast.show{transform:translateY(0);opacity:1}
.t-ok{background:var(--dp);color:var(--w)}
.t-err{background:var(--red);color:var(--w)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
@keyframes popIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@media(max-width:1200px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 32px rgba(0,0,0,.22)}
  .sb-overlay.open{display:block}
  .main{margin-left:0}
  .hamburger{display:flex}
  .stats-grid{grid-template-columns:1fr 1fr}
  .fg2{grid-template-columns:1fr}
  .pg{padding:16px}
  .topbar{padding:0 16px}
  .ig{grid-template-columns:1fr}
  .cred-grid{grid-template-columns:1fr}
  .card-hdr{flex-direction:column;align-items:flex-start}
}
@media(max-width:480px){.stats-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<script>(function(){if(!sessionStorage.getItem('admin_token'))window.location.replace('login.html')})();</script>

<div class="sb-overlay" id="sbOverlay" onclick="closeSB()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sb-head">
    <div class="sb-logo">
      <img src="logo.webp" alt="E" onerror="this.style.display='none';document.getElementById('sbLFb').style.display='block'">
      <span class="sb-logo-fb" id="sbLFb">E</span>
    </div>
    <div class="sb-info">
      <div class="sb-name">Emmanuel School</div>
      <div class="sb-role">Admin Panel</div>
    </div>
    <div class="live-chip"><span class="live-dot"></span>Live</div>
  </div>
  <nav class="sb-nav">
    <div class="nav-grp">Overview</div>
    <button class="ni active" onclick="goto('dashboard',this)"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</button>
    <div class="nav-grp">Students</div>
    <button class="ni" onclick="goto('students',this)"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>All Students</button>
    <button class="ni" onclick="goto('addStudent',this)"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Student</button>
    <button class="ni" onclick="goto('promote',this)"><svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>Promote Class</button>
    <button class="ni" onclick="goto('passout',this)"><svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/></svg>Passout Students</button>
    <div class="nav-grp">Teachers</div>
    <button class="ni" onclick="goto('teachers',this)"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>All Teachers</button>
    <button class="ni" onclick="goto('addTeacher',this)"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Teacher</button>
    <div class="nav-grp">Finance</div>
    <button class="ni" onclick="goto('fees',this)"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>Fee Management</button>
    <button class="ni" onclick="goto('payments',this)"><svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Payment Requests</button>
    <div class="nav-grp">Communication</div>
    <button class="ni" onclick="goto('notify',this)"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Send Notification</button>
    <div class="nav-grp">School</div>
    <button class="ni" onclick="goto('classes',this)"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Classes Overview</button>
    <button class="ni" onclick="goto('timetable',this)"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Timetable</button>
  </nav>
  <div class="sb-foot">
    <div class="sb-admin-row">
      <div class="sb-av" id="sbAv">A</div>
      <div style="min-width:0"><div class="sb-aname" id="sbName">Administrator</div><div class="sb-acode" id="sbCode">--</div></div>
    </div>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="tb-left">
      <button class="hamburger" onclick="openSB()"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="tb-title" id="pgTitle">Dashboard</div>
    </div>
    <div class="live-chip" style="border-color:rgba(26,122,74,.2);background:var(--gl);color:var(--green)">
      <span style="width:5px;height:5px;background:var(--green);border-radius:50%;display:inline-block;animation:pulse 1.6s infinite"></span>&nbsp;Live
    </div>
  </div>
  <div class="pg" id="pg"></div>
</main>

<!-- FEES MODAL -->
<div class="mo" id="moFees">
  <div class="mb" style="max-width:440px">
    <button class="mo-close" onclick="closeMo('moFees')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    <div class="mo-title">Edit Fees</div>
    <input type="hidden" id="mfStudId">
    <div id="mfName" style="font-weight:700;font-size:15px;color:var(--dp);margin-bottom:14px"></div>
    <div class="fg2">
      <div class="fgl"><label>Total Fees (Rs)</label><input class="fi" type="number" id="mfTotal" oninput="calcMF()"></div>
      <div class="fgl"><label>Paid Amount (Rs)</label><input class="fi" type="number" id="mfPaid" oninput="calcMF()"></div>
      <div class="fgl"><label>Remaining</label><input class="fi" type="number" id="mfRem" readonly></div>
      <div class="fgl"><label>Status</label>
        <select class="fi" id="mfSt">
          <option value="pending">Pending</option>
          <option value="partial">Partial</option>
          <option value="paid">Paid</option>
        </select>
      </div>
    </div>
    <div class="mo-foot">
      <button class="btn btn-o" onclick="closeMo('moFees')">Cancel</button>
      <button class="btn btn-p" onclick="saveFees()">Save</button>
    </div>
  </div>
</div>

<!-- VIEW STUDENT MODAL -->
<div class="mo" id="moVS">
  <div class="mb">
    <button class="mo-close" onclick="closeMo('moVS')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    <div class="mo-title">Student Details</div>
    <div id="moVSBody"></div>
    <div class="mo-foot"><button class="btn btn-o" onclick="closeMo('moVS')">Close</button></div>
  </div>
</div>

<!-- SUCCESS MODAL -->
<div class="mo" id="moOK">
  <div class="mb" style="max-width:400px;text-align:center">
    <div style="width:52px;height:52px;background:var(--gl);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div style="font-family:var(--ff);font-size:20px;font-weight:700;margin-bottom:6px;color:var(--dp)" id="okTitle">Done!</div>
    <div style="font-size:13px;color:var(--b5);margin-bottom:12px" id="okSub"></div>
    <div class="cred-grid">
      <div class="cred-item"><div class="cred-lbl">Login Code</div><div class="cred-val" id="okCode">--</div></div>
      <div class="cred-item"><div class="cred-lbl">Password</div><div class="cred-val" id="okPass">--</div></div>
    </div>
    <div id="okExtra"></div>
    <div class="warn-box">Screenshot lo — password baad mein nahi milega.</div>
    <button class="btn btn-p" style="width:100%" onclick="closeMo('moOK')">Done</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════
   CORRECT API URL — backend running
══════════════════════════════ */
const API = 'https://edumanage-backend-xi.vercel.app/api';

const TOKEN = sessionStorage.getItem('admin_token');
if(!TOKEN) window.location.replace('login.html');

const AN = sessionStorage.getItem('admin_name')||'Administrator';
const AC = sessionStorage.getItem('admin_code')||'--';
document.getElementById('sbName').textContent = AN;
document.getElementById('sbCode').textContent = AC;
document.getElementById('sbAv').textContent = AN.charAt(0).toUpperCase();

function H(){ return {'Content-Type':'application/json','Authorization':'Bearer '+TOKEN} }
function openSB(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('sbOverlay').classList.add('open') }
function closeSB(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sbOverlay').classList.remove('open') }
function openMo(id){ document.getElementById(id).classList.add('show') }
function closeMo(id){ document.getElementById(id).classList.remove('show') }
function doLogout(){ if(!confirm('Logout?'))return; sessionStorage.clear(); window.location.replace('login.html') }

let toastT;
function toast(msg,ok){
  const e=document.getElementById('toast');
  e.textContent=msg; e.className='toast '+(ok===false?'t-err':'t-ok');
  e.classList.add('show'); clearTimeout(toastT);
  toastT=setTimeout(()=>e.classList.remove('show'),3200);
}

const TITLES={
  dashboard:'Dashboard',students:'All Students',addStudent:'Add Student',
  editStudent:'Edit Student',teachers:'All Teachers',addTeacher:'Add Teacher',
  editTeacher:'Edit Teacher',fees:'Fee Management',payments:'Payment Requests',
  notify:'Send Notification',classes:'Classes Overview',timetable:'Timetable',
  promote:'Promote Class',passout:'Passout Students'
};

let allStudents=[],allTeachers=[],allClasses=[],allFees=[];

function getP(name){
  let p=document.getElementById('p-'+name);
  if(!p){p=document.createElement('div');p.className='panel';p.id='p-'+name;document.getElementById('pg').appendChild(p);}
  return p;
}

function goto(name,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  if(btn)btn.classList.add('active');
  document.getElementById('pgTitle').textContent=TITLES[name]||name;
  closeSB();
  const p=getP(name); p.classList.add('active');
  const map={
    dashboard:loadDash,students:loadStudents,addStudent:showAddStudent,
    teachers:loadTeachers,addTeacher:showAddTeacher,
    fees:loadFees,payments:loadPayments,
    notify:showNotify,classes:loadClasses,
    timetable:showTimetable,promote:showPromote,passout:showPassout
  };
  if(map[name]) map[name](p);
}

function ini(n){if(!n)return'?';return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}

function feeB(st){
  if(st==='paid') return'<span class="badge bg">Paid</span>';
  if(st==='partial') return'<span class="badge bo">Partial</span>';
  return'<span class="badge br">Pending</span>';
}

function spin(){
  return'<div style="display:flex;align-items:center;justify-content:center;padding:60px"><div style="width:26px;height:26px;border:2px solid var(--b2);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite"></div></div>';
}

function errH(m){
  return`<div style="background:var(--rl);color:var(--red);padding:14px;border-radius:10px;font-size:13px;margin-bottom:16px">${m}</div>`;
}

function calcMF(){
  const t=parseFloat(document.getElementById('mfTotal').value)||0;
  const p=parseFloat(document.getElementById('mfPaid').value)||0;
  const r=Math.max(0,t-p);
  document.getElementById('mfRem').value=r;
  document.getElementById('mfSt').value=p===0?'pending':(r===0?'paid':'partial');
}

function showOK(title,sub,code,pass,extra){
  document.getElementById('okTitle').textContent=title;
  document.getElementById('okSub').textContent=sub||'';
  document.getElementById('okCode').textContent=code||'--';
  document.getElementById('okPass').textContent=pass||'--';
  document.getElementById('okExtra').innerHTML=extra||'';
  openMo('moOK');
}

function togglePwF(id,btn){
  const i=document.getElementById(id);
  i.type=i.type==='password'?'text':'password';
  btn.querySelector('svg').style.opacity=i.type==='text'?'.4':'1';
}

function classOpts(ph){
  const base=allClasses.length
    ?allClasses.map(c=>`<option value="${c.id}">${c.standard}${c.section?' - '+c.section:''}</option>`).join('')
    :['Nursery','LKG','UKG','Class 1','Class 2','Class 3','Class 4','Class 5',
      'Class 6','Class 7','Class 8','Class 9','Class 10']
      .map(c=>`<option value="${c}">${c}</option>`).join('');
  return`<option value="">${ph||'Select'}</option>${base}`;
}

function classOptsName(ph){
  const base=allClasses.length
    ?allClasses.map(c=>`<option value="${c.standard}">${c.standard}${c.section?' - '+c.section:''}</option>`).join('')
    :['Nursery','LKG','UKG','Class 1','Class 2','Class 3','Class 4','Class 5',
      'Class 6','Class 7','Class 8','Class 9','Class 10']
      .map(c=>`<option value="${c}">${c}</option>`).join('');
  return`<option value="">${ph||'Select'}</option>${base}`;
}

/* ══ STUDENTS ══ */
async function loadStudents(p,fc,q){
  if(!p) p=getP('students');
  fc=fc||'all'; q=q||'';
  p.innerHTML=spin();
  try{
    let url=API+'/students';
    const params=[];
    if(q) params.push('search='+encodeURIComponent(q));
    if(fc!=='all') params.push('standard='+encodeURIComponent(fc));
    if(params.length) url+='?'+params.join('&');
    const r=await fetch(url,{headers:H()});
    if(r.status===401){doLogout();return}
    const d=await r.json();
    allStudents=d.students||[];
    renderStudents(p,fc,q);
  }catch(e){p.innerHTML=errH(e.message)}
}

async function delStudent(id,name){
  if(!confirm('"'+name+'" delete karo?')) return;
  try{
    const r=await fetch(API+'/students/'+id,{method:'DELETE',headers:H()});
    if(r.ok){toast('Student deleted');allStudents=[];loadStudents(getP('students'));}
    else toast('Delete failed',false);
  }catch(e){toast('Network error',false)}
}

function calcAF(){
  const t=parseFloat(document.getElementById('as_tf')?.value)||0;
  const p=parseFloat(document.getElementById('as_pf')?.value)||0;
  const r=Math.max(0,t-p);
  if(document.getElementById('as_rf')) document.getElementById('as_rf').value=r;
  if(document.getElementById('as_fst')) document.getElementById('as_fst').value=p===0?'pending':(r===0?'paid':'partial');
}

async function submitAS(){
  const name=document.getElementById('as_name').value.trim();
  const code=document.getElementById('as_code').value.trim().toUpperCase();
  const pass=document.getElementById('as_pass').value.trim();
  const cls=document.getElementById('as_cls').value;
  const e=document.getElementById('asE'); e.classList.remove('show');
  if(!name){e.textContent='Name required';e.classList.add('show');return}
  if(!code){e.textContent='Code required';e.classList.add('show');return}
  if(!pass||pass.length<4){e.textContent='Password min 4 chars';e.classList.add('show');return}
  if(!cls){e.textContent='Class select karo';e.classList.add('show');return}
  const btn=document.getElementById('asSBtn'); btn.disabled=true; btn.textContent='Adding...';
  const payload={
    name,code,password:pass,class_name:cls,
    roll_no:parseInt(document.getElementById('as_roll').value)||undefined,
    gender:document.getElementById('as_gen').value||undefined,
    dob:document.getElementById('as_dob').value||undefined,
    blood_group:document.getElementById('as_blood').value||undefined,
    parent_name:document.getElementById('as_par').value.trim()||undefined,
    parent_phone:document.getElementById('as_ph').value.trim()||undefined,
    address:document.getElementById('as_addr').value.trim()||undefined,
    has_bus:document.getElementById('as_bus').value==='true',
    bus_route:document.getElementById('as_route').value.trim()||undefined,
    total_fees:parseFloat(document.getElementById('as_tf').value)||0
  };
  Object.keys(payload).forEach(k=>payload[k]===undefined&&delete payload[k]);
  try{
    const r=await fetch(API+'/students',{method:'POST',headers:H(),body:JSON.stringify(payload)});
    const d=await r.json().catch(()=>({}));
    if(r.ok){
      allStudents=[];
      showOK('Student Added!','Share with student/parent:',code,pass,
        `<div style="background:rgba(128,0,32,.06);border-radius:8px;padding:10px;margin-bottom:12px;font-size:13px"><b>${name}</b> — ${cls}</div>`);
    }else{
      e.textContent=d.error||d.message||'Error adding student';
      e.classList.add('show');
    }
  }catch(ex){e.textContent='Network error: '+ex.message;e.classList.add('show')}
  btn.disabled=false; btn.textContent='Add Student';
}

function calcEF(){
  const t=parseFloat(document.getElementById('es_tf')?.value)||0;
  const p=parseFloat(document.getElementById('es_pf')?.value)||0;
  const r=Math.max(0,t-p);
  if(document.getElementById('es_rf')) document.getElementById('es_rf').value=r;
  if(document.getElementById('es_fst')) document.getElementById('es_fst').value=p===0?'pending':(r===0?'paid':'partial');
}

async function saveES(){
  const id=document.getElementById('es_id').value;
  const e=document.getElementById('esE'); e.classList.remove('show');
  const v=eid=>document.getElementById(eid)?.value;
  const payload={};
  if(v('es_name').trim()) payload.name=v('es_name').trim();
  if(v('es_cls')) payload.class_name=v('es_cls');
  if(v('es_roll')) payload.roll_no=parseInt(v('es_roll'));
  if(v('es_ph').trim()) payload.parent_phone=v('es_ph').trim();
  if(v('es_par').trim()) payload.parent_name=v('es_par').trim();
  if(v('es_blood')) payload.blood_group=v('es_blood');
  if(v('es_addr').trim()) payload.address=v('es_addr').trim();
  payload.has_bus=v('es_bus')==='true';
  if(v('es_route').trim()) payload.bus_route=v('es_route').trim();
  if(v('es_pass').trim()) payload.password=v('es_pass').trim();
  const btn=document.getElementById('esSBtn'); btn.disabled=true; btn.textContent='Saving...';
  try{
    const r=await fetch(API+'/students/'+id,{method:'PUT',headers:H(),body:JSON.stringify(payload)});

      await fetch(API+'/students/'+id+'/fees',{

  }catch(ex){e.textContent='Network error';e.classList.add('show')}

}

async function loadFees(p,fs,q){
  if(!p) p=getP('fees');
  fs=fs||'all'; q=q||'';
  p.innerHTML=spin();
  try{
    const r=await fetch(API+'/fees/all',{headers:H()});
    const d=await r.json(); allFees=d.fees||[];
    renderFees(p,fs,q);
  }catch(e){p.innerHTML=errH(e.message)}
}

function renderFees(p,fs,q){
  fs=fs||'all'; q=q||'';
  let list=[...allFees];
  if(fs!=='all') list=list.filter(f=>f.status===fs);
  if(q) list=list.filter(f=>(f.student_name||'').toLowerCase().includes(q.toLowerCase()));
  const paid=allFees.filter(f=>f.status==='paid').length;
  const part=allFees.filter(f=>f.status==='partial').length;
  const pend=allFees.filter(f=>f.status==='pending').length;
  p.innerHTML=`
  <div class="card">
    <div class="card-hdr">
      <input class="srch" placeholder="Search student..." value="${q}"
        oninput="renderFees(document.getElementById('p-fees'),'${fs}',this.value)">
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
      ${[['all','All',allFees.length],['paid','Paid',paid],['partial','Partial',part],['pending','Pending',pend]].map(([v,l,c])=>`
        <button style="padding:5px 12px;border-radius:100px;border:1.5px solid var(--b2);background:${fs===v?'var(--p)':'var(--w)'};color:${fs===v?'var(--w)':'var(--b5)'};font-size:12px;font-weight:600;cursor:pointer;font-family:var(--fb)"
          onclick="renderFees(document.getElementById('p-fees'),'${v}','${q}')">${l} (${c})</button>`).join('')}
    </div>
    <div class="tw"><table>
      <thead><tr><th>Student</th><th>Class</th><th>Total</th><th>Paid</th><th>Remaining</th><th>Status</th><th>Action</th></tr></thead>
      <tbody>
        ${!list.length?'<tr><td colspan="7" style="text-align:center;padding:28px;color:var(--b4)">No records</td></tr>':''}
        ${list.map(f=>{
          const t=parseFloat(f.total_amount)||0;
          const pd=parseFloat(f.paid_amount)||0;
          const rm=parseFloat(f.remaining_amount)||Math.max(0,t-pd);
          return`<tr>
            <td><div style="font-weight:600">${f.student_name||'-'}</div><span class="code-tag">${f.student_code||''}</span></td>
            <td>${f.standard||'-'}${f.section?' '+f.section:''}</td>
            <td>Rs ${t.toLocaleString('en-IN')}</td>
            <td style="color:var(--green);font-weight:600">Rs ${pd.toLocaleString('en-IN')}</td>
            <td style="color:var(--red);font-weight:600">Rs ${rm.toLocaleString('en-IN')}</td>
            <td>${feeB(f.status)}</td>
            <td><button class="btn btn-o btn-sm" onclick="openEF(${f.student_id},'${(f.student_name||'').replace(/'/g,"\\'")}',${t},${pd})">Edit</button></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>
  </div>`;
}

      </select>
    </div>
    <div id="ntCW" style="display:none;margin-bottom:12px">
      <label style="font-size:11px;font-weight:700;color:var(--b5);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px">Class</label>
      <select class="fi" id="nt_cls">${classOptsName('Select class')}</select>
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:11px;font-weight:700;color:var(--b5);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px">Title *</label>
      <input class="fi" id="nt_title" placeholder="Notification title">
    </div>
    <div style="margin-bottom:18px">
      <label style="font-size:11px;font-weight:700;color:var(--b5);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px">Message *</label>
      <textarea class="fi" id="nt_msg" rows="4" style="resize:vertical;min-height:80px" placeholder="Write message..."></textarea>
    </div>
    <button class="btn btn-p" onclick="sendNotif()">Send Notification</button>
  </div>
  <div class="card" style="max-width:560px;margin-top:20px" id="notifList">
    <div class="card-title">Recent Notifications</div>
    <div style="color:var(--b4);font-size:13px">Loading...</div>
  </div>`;
  loadNotifList();
}

async function loadNotifList(){
  try{
    const r=await fetch(API+'/notifications',{headers:H()});
    const d=await r.json(); const list=d.notifications||[];
    const el=document.getElementById('notifList');
    if(!el) return;
    el.innerHTML=`<div class="card-title">Recent Notifications</div>`+
      (!list.length?'<div style="text-align:center;padding:20px;color:var(--b4)">No notifications yet</div>':
        list.slice(0,10).map(n=>`
          <div style="border-bottom:1px solid var(--b1);padding:12px 0">
            <div style="font-weight:700;font-size:14px;margin-bottom:3px">${n.title||''}</div>
            <div style="font-size:13px;color:var(--b5);margin-bottom:4px">${n.message||''}</div>
            <div style="font-size:11px;color:var(--b4)">${n.created_at?new Date(n.created_at).toLocaleString('en-IN'):''}</div>
          </div>`).join(''));
  }catch(e){}
}

async function sendNotif(){
  const title=document.getElementById('nt_title').value.trim();
  const msg=document.getElementById('nt_msg').value.trim();
  if(!title||!msg){toast('Title and message required',false);return}
  const tgt=document.getElementById('nt_tgt').value;
  const body={title,message:msg,target_type:tgt==='all'?'all':'class'};
  if(tgt==='class') body.target_id=document.getElementById('nt_cls').value;
  try{
    const r=await fetch(API+'/notifications/send',{method:'POST',headers:H(),body:JSON.stringify(body)});
    if(r.ok){
      toast('Notification sent!');
      document.getElementById('nt_title').value='';
      document.getElementById('nt_msg').value='';
      loadNotifList();
    }else toast('Failed to send',false);
  }catch(e){toast('Network error',false)}
}

/* ══ CLASSES ══ */
async function loadClasses(p){
  if(!p) p=getP('classes');
  p.innerHTML=spin();
  try{
    await fetchClasses();
    const sr=await fetch(API+'/students',{headers:H()});
    const sd=await sr.json(); const studs=sd.students||[];
    const cc={};studs.forEach(s=>{const c=s.standard||'Other';cc[c]=(cc[c]||0)+1;});
    p.innerHTML=`
    <div style="margin-bottom:16px;font-size:13px;color:var(--b5)">Click a class to view group and posts.</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px">
      ${allClasses.length
        ?allClasses.map(c=>`
          <div style="background:var(--w);border:1px solid var(--b2);border-radius:14px;padding:20px;text-align:center;cursor:pointer;transition:var(--tr)"
            onclick="openCG(${c.id},'${c.standard}')"
            onmouseover="this.style.borderColor='var(--p)';this.style.transform='translateY(-2px)'"
            onmouseout="this.style.borderColor='var(--b2)';this.style.transform=''">
            <div style="font-family:var(--ff);font-size:20px;font-weight:700;color:var(--p);margin-bottom:4px">${c.standard}${c.section?' - '+c.section:''}</div>
            <div style="font-size:13px;font-weight:700;color:var(--dp)">${cc[c.standard]||0} students</div>
            <div style="font-size:11px;color:var(--b5);margin-top:3px">${c.teacher_name||'No teacher'}</div>
          </div>`).join('')
        :Object.keys(cc).sort().map(c=>`
          <div style="background:var(--w);border:1px solid var(--b2);border-radius:14px;padding:20px;text-align:center">
            <div style="font-family:var(--ff);font-size:20px;font-weight:700;color:var(--p);margin-bottom:4px">${c}</div>
            <div style="font-size:13px;font-weight:700;color:var(--dp)">${cc[c]} students</div>
          </div>`).join('')}
    </div>`;
  }catch(e){p.innerHTML=errH(e.message)}
}

/* ══ CLASS GROUP ══ */
async function openCG(classId,standard){
  const p=getP('classGroup');
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  p.classList.add('active'); document.getElementById('pgTitle').textContent=standard+' — Group'; closeSB();
  p.innerHTML=spin();
  let posts=[];
  try{
    const r=await fetch(API+'/posts/'+classId,{headers:H()});
    if(r.ok){const d=await r.json();posts=d.posts||[];}
  }catch(e){}
  renderCG(p,classId,standard,posts);
}

function renderCG(p,classId,standard,posts){
  p.innerHTML=`
  <button class="btn btn-o btn-sm" onclick="goto('classes')" style="margin-bottom:16px">Back to Classes</button>
  <div class="card">
    <div class="card-title">Post to ${standard}</div>
    <textarea class="fi" id="gMsg" rows="3" style="resize:none;margin-bottom:10px" placeholder="Write for ${standard}..."></textarea>
    <input class="fi" id="gVid" placeholder="Video link (optional)" style="margin-bottom:12px">
    <button class="btn btn-p" onclick="postCG(${classId},'${standard}')">Post</button>
  </div>
  <div class="card">
    <div class="card-title">Posts (${posts.length})</div>
    ${!posts.length?'<div style="text-align:center;padding:32px;color:var(--b4)">No posts yet</div>':''}
    ${posts.map(pp=>`
      <div style="border:1px solid var(--b2);border-radius:10px;padding:14px;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="font-size:13px;font-weight:700;color:var(--p)">${pp.posted_by_name||'Admin'}</div>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="font-size:11px;color:var(--b4)">${pp.created_at?new Date(pp.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):''}</div>
            <button onclick="delPost(${pp.id},${classId},'${standard}')"
              style="background:none;border:none;cursor:pointer;color:var(--b4);font-size:17px;line-height:1;padding:2px">x</button>
          </div>
        </div>
        <div style="font-size:13px;color:var(--b6);line-height:1.6">${pp.text_content||''}</div>
        ${pp.video_link?`<a href="${pp.video_link}" target="_blank" style="display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:12px;color:var(--p);font-weight:600;text-decoration:none">Watch Video</a>`:''}
      </div>`).join('')}
  </div>`;
  p._classId=classId; p._standard=standard; p._posts=posts;
}

async function postCG(classId,standard){
  const txt=document.getElementById('gMsg')?.value.trim();
  const vid=document.getElementById('gVid')?.value.trim();
  if(!txt&&!vid){toast('Kuch likho pehle',false);return}
  try{
    const r=await fetch(API+'/posts',{method:'POST',headers:H(),body:JSON.stringify({class_id:classId,text_content:txt,video_link:vid||null})});
    const d=await r.json().catch(()=>({}));
    if(r.ok){
      const p=getP('classGroup');
      const posts=[d.post||{text_content:txt,video_link:vid,created_at:new Date(),posted_by_name:AN,id:Date.now()},...(p._posts||[])];
      toast('Posted!'); renderCG(p,classId,standard,posts);
    }else toast('Error: '+(d.error||'Failed'),false);
  }catch(e){toast('Network error',false)}
}

async function delPost(id,classId,standard){
  if(!confirm('Delete post?')) return;
  try{
    const r=await fetch(API+'/posts/'+id,{method:'DELETE',headers:H()});
    if(r.ok){
      const p=getP('classGroup');
      const posts=(p._posts||[]).filter(x=>x.id!==id);
      toast('Deleted'); renderCG(p,classId,standard,posts);
    }else toast('Failed',false);
  }catch(e){toast('Network error',false)}
}

/* ══ TIMETABLE ══ */
async function showTimetable(p){
  if(!p) p=getP('timetable');
  if(!allClasses.length) await fetchClasses();
  p.innerHTML=`
  <div class="card" style="max-width:700px">
    <div class="card-title">Manage Timetable</div>
    <div class="fgl" style="margin-bottom:16px">
      <label>Select Class</label>
      <select class="fi" id="tt_cls" onchange="loadTT(this.value)">${classOpts('Select class')}</select>
    </div>
    <div id="ttArea" style="color:var(--b4);font-size:13px">Select a class to view timetable</div>
  </div>`;
}

async function loadTT(classId){
  if(!classId) return;
  const area=document.getElementById('ttArea');
  area.innerHTML='<div style="color:var(--b5);font-size:13px">Loading...</div>';
  try{
    const r=await fetch(API+'/timetable/'+classId,{headers:H()});
    const d=await r.json(); const tt=d.timetable||[];
    const days=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const ttMap={};tt.forEach(row=>ttMap[row.day]=row);
    area.innerHTML=`
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead>
          <tr style="background:var(--b1)">
            <th style="padding:8px 10px;text-align:left;border:1px solid var(--b2);white-space:nowrap">Day</th>
            ${[1,2,3,4,5,6,7].map(n=>`<th style="padding:8px 10px;text-align:center;border:1px solid var(--b2)">P${n}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${days.map(day=>{
            const row=ttMap[day]||{};
            return`<tr>
              <td style="padding:8px 10px;font-weight:600;color:var(--p);border:1px solid var(--b2);white-space:nowrap">${day}</td>
              ${[1,2,3,4,5,6,7].map(n=>`
                <td style="padding:4px;border:1px solid var(--b2)">
                  <input style="width:90px;padding:5px 6px;border:1px solid var(--b2);border-radius:5px;font-size:11px;font-family:var(--fb)"
                    id="tt_${day}_${n}" value="${row['period_'+n]||''}" placeholder="Subject">
                </td>`).join('')}
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <button class="btn btn-p" style="margin-top:14px" onclick="saveTT(${classId})">Save Timetable</button>`;
  }catch(e){area.innerHTML=errH(e.message)}
}

async function saveTT(classId){
  const days=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  try{
    for(const day of days){
      const periods=[1,2,3,4,5,6,7].map(n=>document.getElementById(`tt_${day}_${n}`)?.value.trim()||'');
      await fetch(API+'/timetable',{
        method:'POST',headers:H(),
        body:JSON.stringify({class_id:classId,day,periods})
      });
    }
    toast('Timetable saved!');
  }catch(e){toast('Failed: '+e.message,false)}
}

/* ══ PROMOTE ══ */
async function showPromote(p){
  if(!p) p=getP('promote');
  if(!allClasses.length) await fetchClasses();
  p.innerHTML=`
  <div class="card" style="max-width:460px">
    <div class="card-title">Promote Class</div>
    <p style="font-size:13px;color:var(--b5);margin-bottom:18px;line-height:1.6">Move all students from one class to the next at year end.</p>
    <div class="fgl" style="margin-bottom:14px"><label>From Class</label><select class="fi" id="pFrom">${classOptsName('Select class')}</select></div>
    <div class="fgl" style="margin-bottom:18px"><label>To Class</label><select class="fi" id="pTo">${classOptsName('Select class')}</select></div>
    <button class="btn btn-p" onclick="doPromote()">Promote Students</button>
  </div>`;
}

async function doPromote(){
  const from=document.getElementById('pFrom').value;
  const to=document.getElementById('pTo').value;
  if(!from||!to){toast('Both classes required',false);return}
  if(from===to){toast('From and To cannot be same',false);return}
  if(!confirm('"'+from+'" to "'+to+'" promote karo?')) return;
  try{
    const r=await fetch(API+'/students/promote',{method:'POST',headers:H(),body:JSON.stringify({from_standard:from,to_standard:to})});
    const d=await r.json().catch(()=>({}));
    if(r.ok){toast(d.message||'Promoted!');allStudents=[];}
    else toast(d.error||d.message||'Failed',false);
  }catch(e){toast('Network error',false)}
}

/* ══ PASSOUT ══ */
async function showPassout(p){
  if(!p) p=getP('passout');
  if(!allClasses.length) await fetchClasses();
  p.innerHTML=`
  <div class="card" style="max-width:480px">
    <div class="card-title">Passout Students</div>
    <p style="font-size:13px;color:var(--b5);margin-bottom:18px;line-height:1.6">Mark all students of a class as passed out. They will be removed from active list.</p>
    <div class="fgl" style="margin-bottom:12px">
      <label>Select Class</label>
      <select class="fi" id="poC">${classOptsName('Select class')}</select>
    </div>
    <div class="fgl" style="margin-bottom:18px">
      <label>Type class name to confirm</label>
      <input class="fi" id="poConfirm" placeholder="e.g. Class 10">
    </div>
    <button class="btn btn-r" onclick="doPassout()">Mark as Passout</button>
  </div>`;
}

async function doPassout(){
  const cls=document.getElementById('poC').value;
  const conf=document.getElementById('poConfirm').value.trim();
  if(!cls){toast('Class select karo',false);return}
  if(conf!==cls){toast('Class name match nahi kiya',false);return}
  if(!confirm('"'+cls+'" — sare students passout?')) return;
  try{
    const r=await fetch(API+'/students/promote',{method:'POST',headers:H(),body:JSON.stringify({from_standard:cls,to_standard:'Passout',passout:true})});
    const d=await r.json().catch(()=>({}));
    if(r.ok){toast(d.message||'Students passed out!');allStudents=[];}
    else toast(d.error||d.message||'Failed',false);
  }catch(e){toast('Network error',false)}
}

/* ══ INIT ══ */
(async function init(){
  await fetchClasses();
  goto('dashboard',document.querySelector('.ni.active'));
})();
</script>
