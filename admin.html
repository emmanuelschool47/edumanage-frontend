<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#800020">
<title>Admin Panel — EduManage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#800020;--black-dark:#5c0018;--black-deeper:#3d0010;
  --white:#ffffff;
  --gray-50:#fafafa;--gray-100:#f5f5f5;--gray-200:#eeeeee;
  --gray-300:#e0e0e0;--gray-400:#bdbdbd;--gray-500:#9e9e9e;
  --gray-600:#757575;--gray-700:#616161;
  --green:#1a7a4a;--green-light:#e8f5ee;
  --red:#c0392b;--red-light:#fdf0ef;
  --gold:#b8860b;--gold-light:#fdf8e8;
  --font-display:'Playfair Display',serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --radius:12px;
  --shadow:0 4px 16px rgba(128,0,32,.12);
  --shadow-lg:0 8px 32px rgba(128,0,32,.2);
  --transition:all .25s ease;
}
body{display:flex;min-height:100vh;background:var(--gray-50);font-family:var(--font-body)}

/* SIDEBAR */
.sidebar{width:240px;background:var(--black-deeper);color:var(--white);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s ease;overflow-y:auto}
.sidebar-logo{padding:20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:var(--white);color:var(--black);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0;font-family:var(--font-display)}
.logo-name{font-family:var(--font-display);font-size:16px;font-weight:700}
.logo-role{font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px}
.sidebar-nav{flex:1;padding:12px}
.nav-group{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1.5px;padding:12px 8px 4px}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:8px;border:none;background:transparent;color:rgba(255,255,255,.55);font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;text-align:left;transition:var(--transition);margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,.08);color:var(--white)}
.nav-item.active{background:var(--white);color:var(--black);font-weight:600}
.nav-item svg{width:16px;height:16px;stroke:currentColor;flex-shrink:0}
.sidebar-footer{padding:16px;border-top:1px solid rgba(255,255,255,.08)}
.admin-info{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.admin-avatar{width:34px;height:34px;background:rgba(255,255,255,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.admin-name{font-size:13px;font-weight:600;color:var(--white)}
.admin-code{font-size:10px;color:rgba(255,255,255,.3);font-family:var(--font-mono)}
.logout-btn{width:100%;padding:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:rgba(255,255,255,.5);font-family:var(--font-body);font-size:12px;cursor:pointer;transition:var(--transition)}
.logout-btn:hover{background:var(--red);border-color:var(--red);color:var(--white)}

/* MAIN */
.main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{position:sticky;top:0;z-index:50;background:var(--white);border-bottom:1px solid var(--gray-200);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-family:var(--font-display);font-size:20px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:12px}
.live-pill{display:flex;align-items:center;gap:5px;padding:4px 12px;background:var(--green-light);border:1px solid rgba(26,122,74,.15);border-radius:100px;font-size:11px;font-weight:600;color:var(--green)}
.live-dot{width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse 1.5s ease-in-out infinite}
.hamburger{display:none;background:none;border:none;cursor:pointer;color:#0a0a0a;padding:4px}
.hamburger svg{width:22px;height:22px;stroke:currentColor;stroke-width:2}
.page-content{padding:24px;flex:1}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--white);border:1px solid var(--gray-200);border-radius:14px;padding:18px;transition:var(--transition)}
.stat-card:hover{border-color:var(--black);transform:translateY(-2px);box-shadow:var(--shadow)}
.stat-icon{width:36px;height:36px;background:rgba(128,0,32,.08);border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.stat-icon svg{width:18px;height:18px;stroke:var(--black)}
.stat-num{font-family:var(--font-display);font-size:28px;font-weight:700;line-height:1;margin-bottom:4px;color:var(--black)}
.stat-label{font-size:11px;color:var(--gray-400);font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* LAYOUT */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:var(--white);border:1px solid var(--gray-200);border-radius:14px;padding:20px;margin-bottom:20px}
.card-title{font-family:var(--font-display);font-size:17px;font-weight:600;margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead{background:var(--gray-50)}
th{padding:10px 14px;text-align:left;font-size:11px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.8px;font-weight:600;white-space:nowrap;border-bottom:1px solid var(--gray-200)}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--gray-100)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gray-50)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:600}
.b-green{background:var(--green-light);color:var(--green)}
.b-red{background:var(--red-light);color:var(--red)}
.b-gold{background:var(--gold-light);color:var(--gold)}
.b-gray{background:var(--gray-100);color:var(--gray-600)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;transition:var(--transition)}
.btn:active{transform:scale(.97)}
.btn-black{background:var(--black);color:var(--white)}
.btn-black:hover{background:var(--black-dark)}
.btn-green{background:var(--green);color:var(--white)}
.btn-red{background:var(--red);color:var(--white)}
.btn-outline{background:transparent;border:1.5px solid var(--gray-200);color:var(--gray-700)}
.btn-outline:hover{border-color:var(--black);color:var(--black)}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:7px}

/* FORM */
.search-input{padding:9px 14px;border:1.5px solid var(--gray-200);border-radius:9px;font-family:var(--font-body);font-size:13px;color:#0a0a0a;outline:none;transition:var(--transition);min-width:200px}
.search-input:focus{border-color:var(--black)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.fi{width:100%;padding:10px 13px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:9px;font-family:var(--font-body);font-size:13px;color:#0a0a0a;outline:none;transition:var(--transition)}
.fi:focus{border-color:var(--black);background:var(--white)}
.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;overflow-x:auto;padding-bottom:4px}
.filter-btn{padding:6px 14px;border-radius:100px;border:1.5px solid var(--gray-200);background:var(--white);font-family:var(--font-body);font-size:12px;font-weight:600;color:var(--gray-500);cursor:pointer;transition:var(--transition);white-space:nowrap}
.filter-btn.active{background:var(--black);border-color:var(--black);color:var(--white)}

/* INFO */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.info-cell{background:var(--gray-50);border-radius:8px;padding:11px 13px}
.info-cell-label{font-size:10px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:3px}
.info-cell-val{font-size:13px;font-weight:600}

/* PROFILE */
.profile-row{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--gray-100)}
.profile-av{width:64px;height:64px;background:rgba(128,0,32,.08);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:26px;color:var(--black);flex-shrink:0;overflow:hidden}
.profile-av img{width:100%;height:100%;object-fit:cover}
.profile-name{font-family:var(--font-display);font-size:22px;font-weight:700}
.profile-code{font-family:var(--font-mono);font-size:12px;color:var(--gray-400);margin-top:2px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:var(--white);border-radius:16px;padding:24px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;animation:scaleIn .3s ease}
.modal-title{font-family:var(--font-display);font-size:20px;font-weight:700;margin-bottom:16px;color:var(--black)}
.modal-footer{display:flex;gap:10px;margin-top:16px}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--gray-100);border:none;border-radius:8px;font-family:var(--font-body);font-size:13px;color:var(--gray-600);cursor:pointer;margin-bottom:18px;transition:var(--transition)}
.back-btn:hover{background:rgba(128,0,32,.08);color:var(--black)}
.back-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2}

/* CRED BOX */
.cred-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.cred-item{background:var(--black-deeper);border-radius:10px;padding:16px;text-align:center}
.cred-label{font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:8px}
.cred-val{font-family:var(--font-mono);font-size:20px;font-weight:700;color:#fff;word-break:break-all}

/* CLASS GRID */
.class-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.class-card{background:var(--white);border:1px solid var(--gray-200);border-radius:14px;padding:20px;cursor:pointer;transition:var(--transition);text-align:center}
.class-card:hover{border-color:var(--black);transform:translateY(-3px);box-shadow:var(--shadow)}
.class-card-name{font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--black);margin-bottom:4px}
.class-card-sub{font-size:12px;color:var(--gray-400)}

/* POST */
.post-item{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.post-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.post-author{font-size:12px;font-weight:700;color:var(--black)}
.post-time{font-size:11px;color:var(--gray-300)}
.post-text{font-size:13px;color:var(--gray-700);line-height:1.6}

/* UTILS */
.loading-state{display:flex;align-items:center;justify-content:center;min-height:300px;flex-direction:column;gap:14px}
.spinner{width:28px;height:28px;border:2px solid var(--gray-200);border-top-color:var(--black);border-radius:50%;animation:spin .8s linear infinite}
.empty-state{text-align:center;padding:40px;color:var(--gray-300)}
.empty-state svg{width:40px;height:40px;stroke:var(--gray-200);margin:0 auto 12px;display:block}
.empty-state p{font-size:13px}
.err-box{display:none;background:var(--red-light);color:var(--red);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;border:1px solid rgba(192,57,43,.2)}
.err-box.show{display:block}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;transform:translateY(60px);opacity:0;transition:all .3s ease;box-shadow:var(--shadow-lg)}
.toast.show{transform:translateY(0);opacity:1}
.toast-ok{background:var(--black);color:var(--white)}
.toast-err{background:var(--red);color:var(--white)}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

@media(max-width:1200px){.stats-grid{grid-template-columns:repeat(2,1fr)}.class-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 30px rgba(0,0,0,.2)}
  .main{margin-left:0}
  .hamburger{display:flex}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .two-col{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .page-content{padding:16px}
  .topbar{padding:0 16px}
  .info-grid{grid-template-columns:1fr}
  .class-grid{grid-template-columns:repeat(2,1fr)}
  .cred-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" style="position:fixed;inset:0;background:linear-gradient(135deg,#3d0010,#800020,#a30027);display:flex;align-items:center;justify-content:center;padding:20px;z-index:9999">
  <div style="background:#fff;border-radius:20px;padding:40px 32px;width:100%;max-width:400px;box-shadow:0 24px 60px rgba(0,0,0,.35)">
    <div style="text-align:center;margin-bottom:28px">
      <div style="width:56px;height:56px;background:#800020;color:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-family:'Playfair Display',serif;font-size:22px;font-weight:700">E</div>
      <div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-bottom:4px">EduManage Pro</div>
      <div style="font-size:13px;color:#999">Emmanuel School · Admin Panel</div>
    </div>
    <div id="lErr" style="display:none;background:#fdf0ef;color:#c0392b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px"></div>
    <div style="margin-bottom:14px">
      <label style="display:block;font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Admin Code</label>
      <input id="aCode" style="width:100%;padding:12px 14px;background:#fafafa;border:1.5px solid #eee;border-radius:10px;font-size:14px;outline:none;text-transform:uppercase;font-family:'Inter',sans-serif" placeholder="e.g. ADMIN47" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div style="margin-bottom:20px">
      <label style="display:block;font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Password</label>
      <input id="aPass" type="password" style="width:100%;padding:12px 14px;background:#fafafa;border:1.5px solid #eee;border-radius:10px;font-size:14px;outline:none;font-family:'Inter',sans-serif" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button id="lBtn" onclick="doLogin()" style="width:100%;padding:13px;background:linear-gradient(135deg,#800020,#a30027);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">Login to Admin Panel</button>
  </div>
</div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar" style="display:none">
  <div class="sidebar-logo">
    <div class="logo-mark">E</div>
    <div><div class="logo-name">EduManage</div><div class="logo-role">Admin Panel</div></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-group">Overview</div>
    <button class="nav-item active" onclick="goto('dashboard',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard
    </button>
    <div class="nav-group">Students</div>
    <button class="nav-item" onclick="goto('students',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>All Students
    </button>
    <button class="nav-item" onclick="goto('addStudent',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Student
    </button>
    <button class="nav-item" onclick="goto('promote',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>Promote Class
    </button>
    <button class="nav-item" onclick="goto('passout',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/></svg>Passout Students
    </button>
    <div class="nav-group">Teachers</div>
    <button class="nav-item" onclick="goto('teachers',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>All Teachers
    </button>
    <button class="nav-item" onclick="goto('addTeacher',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Teacher
    </button>
    <div class="nav-group">Finance</div>
    <button class="nav-item" onclick="goto('fees',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>Fee Management
    </button>
    <button class="nav-item" onclick="goto('payments',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Payment Requests
    </button>
    <div class="nav-group">Communication</div>
    <button class="nav-item" onclick="goto('notify',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Send Notification
    </button>
    <div class="nav-group">School</div>
    <button class="nav-item" onclick="goto('classes',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Classes Overview
    </button>
  </nav>
  <div class="sidebar-footer">
    <div class="admin-info">
      <div class="admin-avatar">A</div>
      <div><div class="admin-name" id="adminName">Administrator</div><div class="admin-code" id="adminCode">ADMIN47</div></div>
    </div>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
  </div>
</aside>

<!-- MAIN -->
<main class="main" id="mainArea" style="display:none">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:14px">
      <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">
        <svg viewBox="0 0 24 24" fill="none"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title" id="pageTitle">Dashboard</div>
    </div>
    <div class="topbar-right"><div class="live-pill"><div class="live-dot"></div>Live</div></div>
  </div>
  <div class="page-content" id="pageContent">
    <div class="loading-state"><div class="spinner"></div></div>
  </div>
</main>

<!-- EDIT STUDENT MODAL -->
<div class="modal-overlay" id="editStudentModal">
  <div class="modal-box">
    <div class="modal-title">Edit Student</div>
    <div class="err-box" id="esErr"></div>
    <div class="form-grid">
      <div class="fg"><label>Full Name</label><input class="fi" id="es_name" placeholder="Name"></div>
      <div class="fg"><label>Parent Phone</label><input class="fi" id="es_phone" placeholder="Phone"></div>
      <div class="fg"><label>Class</label>
        <!-- Populated from DB -->

<script>
const API = 'https://edumanage-backend-xi.vercel.app/api';

let TOKEN = null;
let allStudents = [], allTeachers = [], allClasses = [], classPosts = [], currentClass = null;
let editStuId = null, editTchId = null, editFeeId = null;

/* ══════════════════════════════════
   BOOT
══════════════════════════════════ */
window.onload = function() {
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('sidebar').style.display   = 'none';
  document.getElementById('mainArea').style.display  = 'none';
  setTimeout(() => document.getElementById('aCode').focus(), 300);
};

/* ══════════════════════════════════
   AUTH
══════════════════════════════════ */
async function doLogin() {
  const code = document.getElementById('aCode').value.trim().toUpperCase();
  const pass = document.getElementById('aPass').value;
  const err  = document.getElementById('lErr');
  const btn  = document.getElementById('lBtn');
  if (!code || !pass) { err.textContent='Code aur password bharo'; err.style.display='block'; return; }
  err.style.display = 'none';
  btn.textContent = 'Logging in...'; btn.disabled = true;
  try {
    const res  = await fetch(API+'/auth/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,password:pass,role:'admin'})});
    const data = await res.json();
    if (data.token) {
      TOKEN = data.token;
      document.getElementById('adminName').textContent = data.user?.name || 'Administrator';
      document.getElementById('adminCode').textContent = code;
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('sidebar').style.display   = 'flex';
      document.getElementById('mainArea').style.display  = 'flex';
      /* Load classes from DB first */
      await loadClassesFromDB();
      loadDashboard();
    } else {
      err.textContent = data.message || data.error || 'Invalid credentials';
      err.style.display = 'block';
      btn.textContent = 'Login to Admin Panel'; btn.disabled = false;
    }
  } catch(e) {
    err.textContent = 'Network error: '+e.message;
    err.style.display = 'block';
    btn.textContent = 'Login to Admin Panel'; btn.disabled = false;
  }
}

function doLogout() {
  if (!confirm('Logout?')) return;
  TOKEN = null; allStudents = []; allTeachers = []; allClasses = [];
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('sidebar').style.display   = 'none';
  document.getElementById('mainArea').style.display  = 'none';
  document.getElementById('aCode').value = '';
  document.getElementById('aPass').value = '';
  document.getElementById('lBtn').textContent = 'Login to Admin Panel';
  document.getElementById('lBtn').disabled = false;
  document.getElementById('lErr').style.display = 'none';
}

/* ══════════════════════════════════
   KEY FIX: Load real classes from DB
   Backend: GET /teachers/classes
   Returns: classes with standard field
══════════════════════════════════ */
async function loadClassesFromDB() {
  try {
    const res = await fetch(API+'/teachers/classes', {headers: H()});
    if (res.ok) {
      const data = await res.json();
      allClasses = Array.isArray(data) ? data : (data.classes || []);
      populateClassDropdowns();
    }
  } catch(_) {
    /* If endpoint fails, use default list */
    allClasses = [];
    populateClassDropdowns();
  }
}

function populateClassDropdowns() {
  /* Build options from real DB classes */
  const opts = allClasses.length
    ? allClasses.map(c => `<option value="${c.standard}">${c.standard}${c.section?' - '+c.section:''}</option>`).join('')
    : ['Nursery','LKG','UKG','Class 1','Class 2','Class 3','Class 4','Class 5','Class 6','Class 7','Class 8','Class 9','Class 10']
        .map(c => `<option value="${c}">${c}</option>`).join('');

  /* Teacher edit modal */
  const etCls = document.getElementById('et_class');
  if (etCls) etCls.innerHTML = `<option value="">None / Remove class</option>${opts}`;

  /* Student edit modal */
  const esCls = document.getElementById('es_class');
  if (esCls) esCls.innerHTML = `<option value="">No change</option>${opts}`;
}

/* ══════════════════════════════════
   HELPERS
══════════════════════════════════ */
function H() { return {Authorization:'Bearer '+TOKEN,'Content-Type':'application/json'}; }

function showToast(msg, ok=true) {
  const e = document.getElementById('toast');
  e.textContent = msg;
  e.className = 'toast '+(ok?'toast-ok':'toast-err');
  e.classList.add('show');
  setTimeout(() => e.classList.remove('show'), 3500);
}

function closeModal(id) { document.getElementById(id).classList.remove('show'); }

function setPage(title, html) {
  document.getElementById('pageTitle').textContent = title;
  document.getElementById('pageContent').innerHTML = html;
}

function loading() { setPage('Loading...','<div class="loading-state"><div class="spinner"></div></div>'); }

function ini(n) { if(!n)return'?'; return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }

function ago(d) {
  if(!d)return'';
  const s=Math.floor((Date.now()-new Date(d))/1000);
  if(s<60)return'just now';
  if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

function fBadge(st) {
  if(st==='paid')return'<span class="badge b-green">Paid</span>';
  if(st==='partial')return'<span class="badge b-gold">Partial</span>';
  return'<span class="badge b-red">Pending</span>';
}

function showSuccess(title, sub, code, pass, extra='') {
  document.getElementById('successTitle').textContent = '✅ '+title;
  document.getElementById('successSub').textContent   = sub||'';
  document.getElementById('s_code').textContent       = code||'—';
  document.getElementById('s_pass').textContent       = pass||'—';
  document.getElementById('s_extra').innerHTML        = extra;
  document.getElementById('successModal').classList.add('show');
}

/* Get class options HTML for add forms */
function classOpts(placeholder='Select class') {
  const base = allClasses.length
    ? allClasses.map(c=>`<option value="${c.standard}">${c.standard}${c.section?' - '+c.section:''}</option>`).join('')
    : ['Nursery','LKG','UKG','Class 1','Class 2','Class 3','Class 4','Class 5','Class 6','Class 7','Class 8','Class 9','Class 10']
        .map(c=>`<option value="${c}">${c}</option>`).join('');
  return `<option value="">${placeholder}</option>${base}`;
}

function goto(page, btn) {
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.getElementById('sidebar').classList.remove('open');
  const map = {
    dashboard:loadDashboard, students:loadStudents, addStudent:showAddStudent,
    promote:showPromote, passout:showPassout,
    teachers:loadTeachers, addTeacher:showAddTeacher,
    fees:loadFees, payments:loadPayments,
    notify:showNotify, classes:loadClassesPage
  };
  if(map[page]) map[page]();
}

/* ══════════════════════════════════
   DASHBOARD
══════════════════════════════════ */
async function loadDashboard() {
  loading();
  try {
    const [sr,tr,fr] = await Promise.all([
      fetch(API+'/students',{headers:H()}),
      fetch(API+'/teachers',{headers:H()}),
      fetch(API+'/fees',{headers:H()})
    ]);
    if(sr.status===401){doLogout();return;}
    const sd=await sr.json(); allStudents=Array.isArray(sd)?sd:(sd.students||[]);
    const td=await tr.json(); allTeachers=Array.isArray(td)?td:(td.teachers||[]);
    const fd=await fr.json(); const fees=Array.isArray(fd)?fd:(fd.fees||[]);
    const paid=fees.filter(f=>f.status==='paid').length;
    const pend=fees.filter(f=>f.status==='pending').length;
    const cc={}; allStudents.forEach(s=>{const c=s.class_name||s.standard||'Other';cc[c]=(cc[c]||0)+1;});

    setPage('Dashboard',`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div class="stat-num">${allStudents.length}</div><div class="stat-label">Total Students</div></div>
      <div class="stat-card"><div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div class="stat-num">${allTeachers.length}</div><div class="stat-label">Total Teachers</div></div>
      <div class="stat-card"><div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polyline points="9 11 12 14 22 4"/></svg></div><div class="stat-num">${paid}</div><div class="stat-label">Fees Paid</div></div>
      <div class="stat-card"><div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="stat-num">${pend}</div><div class="stat-label">Fees Pending</div></div>
    </div>
    <div class="two-col">
      <div class="card"><div class="card-title">Recent Students</div>
        ${allStudents.slice(0,6).map(s=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--gray-100)"><div style="width:34px;height:34px;background:rgba(128,0,32,.08);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--black);font-weight:700;flex-shrink:0">${ini(s.name)}</div><div style="flex:1"><div style="font-size:13px;font-weight:600">${s.name}</div><div style="font-size:11px;color:var(--gray-400)">${s.class_name||s.standard||'-'}</div></div>${fBadge(s.fees_status)}</div>`).join('')}
        <button class="btn btn-outline" style="width:100%;margin-top:12px" onclick="goto('students')">View All →</button>
      </div>
      <div class="card"><div class="card-title">Class Strength</div>
        ${Object.entries(cc).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([c,n])=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--gray-100)"><div style="flex:1;font-size:13px;font-weight:600">${c}</div><div style="font-size:12px;color:var(--gray-400)">${n}</div><div style="width:60px;height:4px;background:var(--gray-100);border-radius:2px;overflow:hidden"><div style="height:100%;background:var(--black);width:${Math.min(100,n*7)}%"></div></div></div>`).join('')}
        <button class="btn btn-outline" style="width:100%;margin-top:12px" onclick="goto('classes')">Classes Overview →</button>
      </div>
    </div>`);
  } catch(e) { setPage('Dashboard',`<div class="empty-state"><p>Error: ${e.message}</p></div>`); }
}

/* ══════════════════════════════════
   STUDENTS
══════════════════════════════════ */
async function loadStudents(fc='all', q='') {
  if (!allStudents.length) {
    loading();
    const r=await fetch(API+'/students',{headers:H()});
    if(r.status===401){doLogout();return;}
    const d=await r.json(); allStudents=Array.isArray(d)?d:(d.students||[]);
  }
  renderStudents(fc,q);
}

function renderStudents(fc='all', q='') {
  let list=[...allStudents];
  if(fc!=='all') list=list.filter(s=>(s.class_name||s.standard||'')===fc);
  if(q) list=list.filter(s=>s.name?.toLowerCase().includes(q.toLowerCase())||s.code?.toLowerCase().includes(q.toLowerCase()));
  const cc={}; allStudents.forEach(s=>{const c=s.class_name||s.standard||'Other';cc[c]=(cc[c]||0)+1;});
  const filterBtns = Object.keys(cc).sort();

  setPage('All Students',`
  <div class="card">
    <div class="card-header">
      <input class="search-input" placeholder="Search name or code..." value="${q}" oninput="renderStudents('${fc}',this.value)">
      <button class="btn btn-black" onclick="goto('addStudent')">+ Add Student</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn ${fc==='all'?'active':''}" onclick="renderStudents('all','${q}')">All (${allStudents.length})</button>
      ${filterBtns.map(c=>`<button class="filter-btn ${fc===c?'active':''}" onclick="renderStudents('${c}','${q}')">${c} (${cc[c]})</button>`).join('')}
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Student</th><th>Code</th><th>Class</th><th>Roll</th><th>Parent Phone</th><th>Fees</th><th>Actions</th></tr></thead>
      <tbody>
        ${!list.length?'<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--gray-400)">No students</td></tr>':''}
        ${list.map(s=>`<tr>
          <td><div style="font-weight:600">${s.name}</div><div style="font-size:11px;color:var(--gray-400)">${s.parent_name||''}</div></td>
          <td><span style="font-family:var(--font-mono);font-size:12px;background:rgba(128,0,32,.08);color:var(--black);padding:2px 8px;border-radius:5px">${s.code||'-'}</span></td>
          <td>${s.class_name||s.standard||'-'}</td>
          <td>${s.roll_no||'-'}</td>
          <td>${s.parent_phone||'-'}</td>
          <td>${fBadge(s.fees_status)}</td>
          <td><div style="display:flex;gap:5px;flex-wrap:wrap">
            <button class="btn btn-outline btn-sm" onclick="viewStudent('${s._id||s.id}')">View</button>
            <button class="btn btn-black btn-sm" onclick="openEditStudent('${s._id||s.id}')">Edit</button>
            <button class="btn btn-red btn-sm" onclick="deleteStudent('${s._id||s.id}','${(s.name||'').replace(/'/g,"\\'")}')">Del</button>
          </div></td>
        </tr>`).join('')}
      </tbody>
    </table></div>
  </div>`);
}

function viewStudent(id) {
  const s=allStudents.find(x=>(x._id||x.id)===id); if(!s)return;
  setPage(s.name,`
  <button class="back-btn" onclick="renderStudents()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Back</button>
  <div class="card">
    <div class="profile-row">
      <div class="profile-av">${s.photo_url?`<img src="${s.photo_url}" alt="">`:ini(s.name)}</div>
      <div><div class="profile-name">${s.name}</div><div class="profile-code">${s.code||''}</div>
        <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap"><span class="badge b-gray">${s.class_name||s.standard||'-'}</span><span class="badge b-gray">Roll ${s.roll_no||'-'}</span>${fBadge(s.fees_status)}</div>
      </div>
    </div>
    <div class="info-grid">
      <div class="info-cell"><div class="info-cell-label">Parent</div><div class="info-cell-val">${s.parent_name||'-'}</div></div>
      <div class="info-cell"><div class="info-cell-label">Parent Phone</div><div class="info-cell-val">${s.parent_phone||'-'}</div></div>
      <div class="info-cell"><div class="info-cell-label">DOB</div><div class="info-cell-val">${s.dob?new Date(s.dob).toLocaleDateString('en-IN'):'-'}</div></div>
      <div class="info-cell"><div class="info-cell-label">Blood</div><div class="info-cell-val">${s.blood_group||'-'}</div></div>
      <div class="info-cell"><div class="info-cell-label">Address</div><div class="info-cell-val">${s.address||'-'}</div></div>
      <div class="info-cell"><div class="info-cell-label">Bus</div><div class="info-cell-val">${s.has_bus?'🚌 Yes':'No'}</div></div>
    </div>
    ${s.remarks?`<div style="border-left:3px solid var(--black);padding:10px 14px;border-radius:0 8px 8px 0;background:rgba(128,0,32,.06);margin-bottom:12px"><div style="font-size:10px;color:var(--black);font-weight:700;text-transform:uppercase;margin-bottom:4px">Remarks</div><div style="font-size:13px">${s.remarks}</div></div>`:''}
    <div style="display:flex;gap:8px">
      <button class="btn btn-black" onclick="openEditStudent('${s._id||s.id}')">Edit</button>
      <button class="btn btn-red" onclick="deleteStudent('${s._id||s.id}','${(s.name||'').replace(/'/g,"\\'")}')">Delete</button>
    </div>
  </div>`);
}

function openEditStudent(id) {
  const s=allStudents.find(x=>(x._id||x.id)===id); if(!s)return;
  editStuId=id;
  /* Repopulate dropdowns from DB classes */
  populateClassDropdowns();
  document.getElementById('es_name').value   = s.name||'';
  document.getElementById('es_phone').value  = s.parent_phone||'';
  document.getElementById('es_class').value  = s.class_name||s.standard||'';
  document.getElementById('es_roll').value   = s.roll_no||'';
  document.getElementById('es_parent').value = s.parent_name||'';
  document.getElementById('es_address').value= s.address||'';
  document.getElementById('es_blood').value  = s.blood_group||'';
  document.getElementById('es_bus').value    = s.has_bus===true?'true':s.has_bus===false?'false':'';
  document.getElementById('es_bus_route').value=s.bus_route||'';
  document.getElementById('es_remarks').value= s.remarks||'';
  document.getElementById('es_pass').value   = '';
  document.getElementById('esErr').classList.remove('show');
  document.getElementById('editStudentModal').classList.add('show');
}

async function saveEditStudent() {
  const p={};
  const v=id=>document.getElementById(id).value;
  if(v('es_name').trim())    p.name=v('es_name').trim();
  if(v('es_phone').trim())   p.parent_phone=v('es_phone').trim();
  if(v('es_class'))          p.class_name=v('es_class');
  if(v('es_roll'))           p.roll_no=Number(v('es_roll'));
  if(v('es_parent').trim())  p.parent_name=v('es_parent').trim();
  if(v('es_address').trim()) p.address=v('es_address').trim();
  if(v('es_blood'))          p.blood_group=v('es_blood');
  if(v('es_bus')!=='')       p.has_bus=v('es_bus')==='true';
  if(v('es_bus_route').trim())p.bus_route=v('es_bus_route').trim();
  if(v('es_remarks').trim()) p.remarks=v('es_remarks').trim();
  if(v('es_pass').trim())    p.password=v('es_pass').trim();
  try {
    const res=await fetch(API+'/students/'+editStuId,{method:'PUT',headers:H(),body:JSON.stringify(p)});
    const data=await res.json().catch(()=>({}));
    if(res.ok){showToast('Student updated!');closeModal('editStudentModal');allStudents=[];loadStudents();}
    else{document.getElementById('esErr').textContent='Error: '+(data.message||data.error||'Failed');document.getElementById('esErr').classList.add('show');}
  } catch(e){document.getElementById('esErr').textContent='Network error: '+e.message;document.getElementById('esErr').classList.add('show');}
}

async function deleteStudent(id,name) {
  if(!confirm(`"${name}" delete karo?`))return;
  try {
    const res=await fetch(API+'/students/'+id,{method:'DELETE',headers:H()});
    if(res.ok){showToast('Student deleted');allStudents=allStudents.filter(s=>(s._id||s.id)!==id);renderStudents();}
    else showToast('Delete failed',false);

async function submitAddStudent() {
  const name=document.getElementById('as_name').value.trim();
  const code=document.getElementById('as_code').value.trim().toUpperCase();
  const cls =document.getElementById('as_class').value;
  const pass=document.getElementById('as_pass').value.trim();
  const errEl=document.getElementById('asSErr');
  errEl.classList.remove('show');

  if(!name){errEl.textContent='Student ka naam bharo';errEl.classList.add('show');return;}
  if(!code){errEl.textContent='Student code bharo (e.g. AYUSH09)';errEl.classList.add('show');return;}
  if(!cls) {errEl.textContent='Class select karo';errEl.classList.add('show');return;}
  if(!pass||pass.length<4){errEl.textContent='Password min 4 characters';errEl.classList.add('show');return;}

  const btn=document.getElementById('asSBtn');
  btn.textContent='Adding...';btn.disabled=true;

  const payload={name,code,password:pass,class_name:cls};
  const map={as_roll:'roll_no',as_gender:'gender',as_dob:'dob',as_blood:'blood_group',as_parent:'parent_name',as_pphone:'parent_phone',as_address:'address',as_route:'bus_route',as_adm:'admission_date',as_fees:'total_fees'};
  Object.entries(map).forEach(([elId,field])=>{
    const val=document.getElementById(elId).value.trim();
    if(val) payload[field]=['roll_no','total_fees'].includes(field)?Number(val):val;
  });
  payload.has_bus=document.getElementById('as_bus').value==='true';

  try {
    const res=await fetch(API+'/students',{method:'POST',headers:H(),body:JSON.stringify(payload)});
    const data=await res.json().catch(()=>({}));
    if(res.ok){
      allStudents=[];
      showSuccess('Student Added!','Share with student/parent:',code,pass,
        `<div style="background:rgba(128,0,32,.08);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px"><b>Naam:</b> ${name} &nbsp;|&nbsp; <b>Class:</b> ${cls}</div>`);
    } else {
      errEl.textContent='Error: '+(data.message||data.error||JSON.stringify(data));
      errEl.classList.add('show');
      btn.textContent='Add Student';btn.disabled=false;
    }
  } catch(e){errEl.textContent='Network error: '+e.message;errEl.classList.add('show');btn.textContent='Add Student';btn.disabled=false;}
}

async function saveEditTeacher() {
  /* KEY FIX: Backend PUT /teachers/:id accepts {name, phone, class_name}
     class_name is matched against classes.standard column
     So we send the standard value directly */
  const cls=document.getElementById('et_class').value;
  const v=id=>document.getElementById(id).value;
  const p={class_name:cls};  /* This matches backend: WHERE standard = ${class_name} */
  if(v('et_name').trim())    p.name=v('et_name').trim();
  if(v('et_phone').trim())   p.phone=v('et_phone').trim();
  if(v('et_subject').trim()) p.subject=v('et_subject').trim();
  if(v('et_pass').trim())    p.password=v('et_pass').trim();

  try {
    const res=await fetch(API+'/teachers/'+editTchId,{method:'PUT',headers:H(),body:JSON.stringify(p)});
    const data=await res.json().catch(()=>({}));
    if(res.ok){
      showToast('✅ Teacher updated! Class: '+(cls||'None'));
      closeModal('editTeacherModal');
      allTeachers=[];
      loadTeachers();
    } else {
      document.getElementById('etErr').textContent='Error: '+(data.message||data.error||JSON.stringify(data));
      document.getElementById('etErr').classList.add('show');
    }
  } catch(e){
    document.getElementById('etErr').textContent='Network error: '+e.message;
    document.getElementById('etErr').classList.add('show');
  }
}

    </div>
    <div class="fg" style="margin-bottom:12px"><label>Title ✱</label><input class="fi" id="nt_title" placeholder="Notification title"></div>
    <div class="fg" style="margin-bottom:20px"><label>Message ✱</label><textarea class="fi" id="nt_msg" rows="4" style="resize:none;min-height:90px" placeholder="Write message..."></textarea></div>
    <button class="btn btn-black" onclick="sendNotification()">📢 Send</button>
  </div>`);
}
async function sendNotification(){
  const title=document.getElementById('nt_title').value.trim();
  const msg=document.getElementById('nt_msg').value.trim();
  if(!title||!msg){showToast('Title aur message bharo',false);return;}
  const tgt=document.getElementById('nt_tgt').value;
  const p={title,message:msg,send_to_all:tgt==='all'};
  if(tgt==='class')p.class_name=document.getElementById('nt_cls').value;
  try{const r=await fetch(API+'/notifications',{method:'POST',headers:H(),body:JSON.stringify(p)});const d=await r.json().catch(()=>({}));if(r.ok){showToast('Sent!');document.getElementById('nt_title').value='';document.getElementById('nt_msg').value='';}else showToast('Error: '+(d.message||'Failed'),false);}
  catch(e){showToast('Network error',false);}
}

/* ══════════════════════════════════
   CLASSES PAGE
══════════════════════════════════ */
async function loadClassesPage(){
  loading();
  const r=await fetch(API+'/students',{headers:H()});
  const d=await r.json();const studs=Array.isArray(d)?d:(d.students||[]);
  const cc={};studs.forEach(s=>{const c=s.class_name||s.standard||'Other';cc[c]=(cc[c]||0)+1;});

  /* Use DB classes if available, else student classes */
  const classItems = allClasses.length
    ? allClasses.map(c=>({name:c.standard+(c.section?' - '+c.section:''),std:c.standard,count:cc[c.standard]||0,teacher:c.teacher_name||''}))
    : Object.keys(cc).sort().map(c=>({name:c,std:c,count:cc[c]||0,teacher:''}));

  setPage('Classes Overview',`
  <p style="font-size:13px;color:var(--gray-500);margin-bottom:20px">Class pe click karo group kholne ke liye.</p>
  <div class="class-grid">
    ${classItems.map(c=>`
      <div class="class-card" onclick="openClassGroup('${c.std}')">
        <div style="width:44px;height:44px;background:rgba(128,0,32,.08);border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--black)" stroke-width="2" stroke-linecap="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
        <div class="class-card-name">${c.name}</div>
        <div class="class-card-sub">${c.count} students${c.teacher?' · '+c.teacher:''}</div>
      </div>`).join('')}
  </div>`);
}

async function openClassGroup(cls){
  currentClass=cls;classPosts=[];
  setPage(cls+' Group','<div class="loading-state"><div class="spinner"></div></div>');
  try{const r=await fetch(API+'/posts?class='+encodeURIComponent(cls),{headers:H()});if(r.ok){const d=await r.json();classPosts=Array.isArray(d)?d:(d.posts||[]);}}catch(_){}
  renderClassGroup(cls);
}

function renderClassGroup(cls){
  setPage(cls+' — Group',`
  <button class="back-btn" onclick="loadClassesPage()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>All Classes</button>
  <div class="card">
    <div class="card-title">Post to ${cls}</div>
    <textarea class="fi" id="gMsg" rows="3" style="resize:none;margin-bottom:10px" placeholder="${cls} ke students ke liye likho..."></textarea>
    <input class="fi" id="gVid" placeholder="Video link (optional)" style="margin-bottom:12px">
    <button class="btn btn-black" onclick="postToGroup('${cls}')">📢 Post</button>
  </div>
  <div class="card">
    <div class="card-title">Posts (${classPosts.length})</div>
    ${!classPosts.length?'<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>No posts yet</p></div>':''}
    ${classPosts.map(p=>`
      <div class="post-item">
        <div class="post-head">
          <div class="post-author">${p.posted_by_name||'Admin'}</div>
          <div style="display:flex;align-items:center;gap:10px">
            <div class="post-time">${ago(p.created_at)}</div>
            <button onclick="deleteGroupPost('${p._id||p.id}','${cls}')" style="background:none;border:none;cursor:pointer;color:var(--gray-300);font-size:13px">🗑</button>
          </div>
        </div>
        <div class="post-text">${p.text_content||''}</div>
        ${p.video_link?`<a href="${p.video_link}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:12px;color:var(--black);font-weight:500;text-decoration:none">▶ Watch</a>`:''}
      </div>`).join('')}
  </div>`);
}

async function postToGroup(cls){
  const txt=document.getElementById('gMsg')?.value.trim();
  const vid=document.getElementById('gVid')?.value.trim();
  if(!txt&&!vid){showToast('Kuch likho pehle',false);return;}
  try{const r=await fetch(API+'/posts',{method:'POST',headers:H(),body:JSON.stringify({text_content:txt,video_link:vid||null,class_name:cls,target_class:cls})});const d=await r.json().catch(()=>({}));if(r.ok){classPosts.unshift(d.post||{text_content:txt,video_link:vid,created_at:new Date(),posted_by_name:'Admin'});showToast('Posted!');document.getElementById('gMsg').value='';document.getElementById('gVid').value='';renderClassGroup(cls);}else showToast('Error: '+(d.message||'Failed'),false);}
  catch(e){showToast('Network error',false);}
}

async function deleteGroupPost(id,cls){
  if(!confirm('Delete karo?'))return;
  try{const r=await fetch(API+'/posts/'+id,{method:'DELETE',headers:H()});if(r.ok){classPosts=classPosts.filter(p=>(p._id||p.id)!==id);showToast('Deleted');renderClassGroup(cls);}else showToast('Failed',false);}
  catch(e){showToast('Network error',false);}
}
</script>
