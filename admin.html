<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#800020">
<title>Admin Panel — Emmanuel School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --m:#800020;--md:#5c0018;--mp:#3d0010;--ml:#a30027;
  --mp2:rgba(128,0,32,.09);--mg:rgba(128,0,32,.18);
  --w:#fff;--b:#0a0a0a;
  --g5:#fafafa;--g1:#f5f5f5;--g2:#eee;--g3:#e0e0e0;
  --g4:#bdbdbd;--g5c:#9e9e9e;--g6:#757575;--g7:#616161;
  --green:#1a7a4a;--gl:#e8f5ee;
  --red:#c0392b;--rl:#fdf0ef;
  --gold:#b8860b;--gol:#fdf8e8;
  --fd:'Playfair Display',serif;--fb:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
  --r:12px;
}
body{display:flex;min-height:100vh;background:var(--g5);font-family:var(--fb)}

/* SIDEBAR */
.sidebar{width:240px;background:var(--mp);color:var(--w);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto;transition:transform .3s}
.sb-logo{padding:20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sb-mark{width:32px;height:32px;background:var(--w);color:var(--m);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;font-family:var(--fd)}
.sb-name{font-family:var(--fd);font-size:16px;font-weight:700}
.sb-role{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1px}
.sb-nav{flex:1;padding:12px}
.nav-grp{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1.5px;padding:12px 8px 4px}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:8px;border:none;background:transparent;color:rgba(255,255,255,.55);font-family:var(--fb);font-size:13px;font-weight:500;cursor:pointer;text-align:left;margin-bottom:2px;transition:all .2s}
.nav-item:hover{background:rgba(255,255,255,.1);color:var(--w)}
.nav-item.active{background:var(--w);color:var(--m);font-weight:700}
.nav-item svg{width:16px;height:16px;stroke:currentColor;flex-shrink:0}
.sb-foot{padding:16px;border-top:1px solid rgba(255,255,255,.08)}
.adm-info{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.adm-av{width:34px;height:34px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.adm-nm{font-size:13px;font-weight:600;color:var(--w)}
.adm-cd{font-size:10px;color:rgba(255,255,255,.35);font-family:var(--fm)}
.lout-btn{width:100%;padding:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:rgba(255,255,255,.5);font-family:var(--fb);font-size:12px;cursor:pointer}
.lout-btn:hover{background:var(--red);border-color:var(--red);color:var(--w)}

/* MAIN */
.main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{position:sticky;top:0;z-index:50;background:var(--w);border-bottom:1px solid var(--g2);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between}
.tb-title{font-family:var(--fd);font-size:20px;font-weight:600}
.live-pill{display:flex;align-items:center;gap:5px;padding:4px 12px;background:var(--gl);border-radius:100px;font-size:11px;font-weight:600;color:var(--green)}
.live-dot{width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite}
.hbg{display:none;background:none;border:none;cursor:pointer;padding:4px}
.hbg svg{width:22px;height:22px;stroke:var(--b);stroke-width:2}
.pg{padding:24px;flex:1}

/* CARDS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.sc{background:var(--w);border:1px solid var(--g2);border-radius:14px;padding:18px;transition:all .2s}
.sc:hover{border-color:var(--m);box-shadow:0 4px 16px var(--mg)}
.si{width:36px;height:36px;background:var(--mp2);border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.si svg{width:18px;height:18px;stroke:var(--m)}
.sn{font-family:var(--fd);font-size:28px;font-weight:700;color:var(--m);margin-bottom:4px}
.sl{font-size:11px;color:var(--g4);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:var(--w);border:1px solid var(--g2);border-radius:14px;padding:20px;margin-bottom:20px}
.ct{font-family:var(--fd);font-size:17px;font-weight:600;margin-bottom:16px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}

/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead{background:var(--g5)}
th{padding:10px 14px;text-align:left;font-size:11px;color:var(--g4);text-transform:uppercase;letter-spacing:.8px;font-weight:600;border-bottom:1px solid var(--g2);white-space:nowrap}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--g1)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--g5)}

/* BADGES & BUTTONS */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:600}
.bg{background:var(--gl);color:var(--green)}
.br{background:var(--rl);color:var(--red)}
.bo{background:var(--gol);color:var(--gold)}
.bk{background:var(--g1);color:var(--g6)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;font-family:var(--fb);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn:active{transform:scale(.97)}
.bm{background:var(--m);color:var(--w)}
.bm:hover{background:var(--md)}
.bgr{background:var(--green);color:var(--w)}
.brd{background:var(--red);color:var(--w)}
.bol{background:transparent;border:1.5px solid var(--g2);color:var(--g7)}
.bol:hover{border-color:var(--m);color:var(--m)}
.bsm{padding:5px 12px;font-size:11px;border-radius:7px}

/* FORM */
.si2{padding:9px 14px;border:1.5px solid var(--g2);border-radius:9px;font-family:var(--fb);font-size:13px;color:var(--b);outline:none;min-width:200px}
.si2:focus{border-color:var(--m)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--g5c);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.fi{width:100%;padding:10px 13px;background:var(--g5);border:1.5px solid var(--g2);border-radius:9px;font-family:var(--fb);font-size:13px;color:var(--b);outline:none;transition:all .2s}
.fi:focus{border-color:var(--m);background:var(--w)}
.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.fb2{padding:6px 14px;border-radius:100px;border:1.5px solid var(--g2);background:var(--w);font-family:var(--fb);font-size:12px;font-weight:600;color:var(--g5c);cursor:pointer;white-space:nowrap}
.fb2.active{background:var(--m);border-color:var(--m);color:var(--w)}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.mo.show{display:flex}
.mb{background:var(--w);border-radius:16px;padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:scIn .3s ease}
.mt2{font-family:var(--fd);font-size:20px;font-weight:700;margin-bottom:16px;color:var(--m)}
.mf{display:flex;gap:10px;margin-top:16px}
.bbk{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--g1);border:none;border-radius:8px;font-family:var(--fb);font-size:13px;color:var(--g6);cursor:pointer;margin-bottom:18px}
.bbk:hover{background:var(--mp2);color:var(--m)}
.bbk svg{width:14px;height:14px;stroke:currentColor;stroke-width:2}

/* CLASS GRID */
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.cc{background:var(--w);border:1px solid var(--g2);border-radius:14px;padding:20px;cursor:pointer;transition:all .2s;text-align:center}
.cc:hover{border-color:var(--m);transform:translateY(-3px);box-shadow:0 6px 20px var(--mg)}
.cc-name{font-family:var(--fd);font-size:18px;font-weight:700;color:var(--m);margin-bottom:6px}
.cc-sub{font-size:12px;color:var(--g4)}
.cc-icon{width:44px;height:44px;background:var(--mp2);border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.cc-icon svg{width:20px;height:20px;stroke:var(--m)}

/* POST */
.pi{background:var(--w);border:1px solid var(--g2);border-radius:var(--r);padding:14px;margin-bottom:10px}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pau{font-size:12px;font-weight:700;color:var(--m)}
.pt{font-size:10px;color:var(--g3)}
.ptxt{font-size:13px;color:var(--g7);line-height:1.6}

/* UTILS */
.ls{display:flex;align-items:center;justify-content:center;min-height:300px;flex-direction:column;gap:14px}
.sp{width:28px;height:28px;border:2px solid var(--g2);border-top-color:var(--m);border-radius:50%;animation:spin .8s linear infinite}
.es{text-align:center;padding:40px;color:var(--g3)}
.es p{font-size:13px}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;transform:translateY(60px);opacity:0;transition:all .3s;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.toast.show{transform:translateY(0);opacity:1}
.tok{background:var(--m);color:var(--w)}
.ter{background:var(--red);color:var(--w)}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.ic{background:var(--g5);border-radius:8px;padding:11px 13px}
.icl{font-size:10px;color:var(--g4);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:3px}
.icv{font-size:13px;font-weight:600}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes scIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 30px rgba(0,0,0,.2)}
  .main{margin-left:0}
  .hbg{display:flex}
  .sg{grid-template-columns:repeat(2,1fr)}
  .two,.cg,.fg2{grid-template-columns:1fr}
  .pg{padding:16px}
  .topbar{padding:0 16px}
  .ig{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sb-logo">
    <div class="sb-mark">E</div>
    <div><div class="sb-name">EduManage</div><div class="sb-role">Admin Panel</div></div>
  </div>
  <nav class="sb-nav">
    <div class="nav-grp">Overview</div>
    <button class="nav-item active" onclick="go('dashboard',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard
    </button>
    <div class="nav-grp">Students</div>
    <button class="nav-item" onclick="go('students',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>All Students
    </button>
    <button class="nav-item" onclick="go('addStudent',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Student
    </button>
    <button class="nav-item" onclick="go('promote',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>Promote Class
    </button>
    <button class="nav-item" onclick="go('passout',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/></svg>Passout Students
    </button>
    <div class="nav-grp">Teachers</div>
    <button class="nav-item" onclick="go('teachers',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>All Teachers
    </button>
    <button class="nav-item" onclick="go('addTeacher',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Teacher
    </button>
    <div class="nav-grp">Finance</div>
    <button class="nav-item" onclick="go('fees',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>Fee Management
    </button>
    <button class="nav-item" onclick="go('payments',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Payment Requests
    </button>
    <div class="nav-grp">Communication</div>
    <button class="nav-item" onclick="go('notify',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Send Notification
    </button>
    <div class="nav-grp">School</div>
    <button class="nav-item" onclick="go('classes',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Classes Overview
    </button>
  </nav>
  <div class="sb-foot">
    <div class="adm-info">
      <div class="adm-av">A</div>
      <div><div class="adm-nm" id="admName">Administrator</div><div class="adm-cd" id="admCode">ADMIN47</div></div>
    </div>
    <button class="lout-btn" onclick="doLogout()">Logout</button>
  </div>
</aside>

<!-- MAIN -->
<main class="main" id="mainArea">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:14px">
      <button class="hbg" onclick="document.getElementById('sidebar').classList.toggle('open')">
        <svg viewBox="0 0 24 24" fill="none"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="tb-title" id="pgTitle">Dashboard</div>
    </div>
    <div class="live-pill"><div class="live-dot"></div>Live</div>
  </div>
  <div class="pg" id="pgContent">
    <div class="ls"><div class="sp"></div></div>
  </div>
</main>

<!-- LOGIN OVERLAY -->
<div id="loginOverlay" style="position:fixed;inset:0;background:linear-gradient(135deg,#3d0010,#800020,#a30027);display:flex;align-items:center;justify-content:center;padding:20px;z-index:999">
  <div style="background:#fff;border-radius:20px;padding:40px 32px;width:100%;max-width:380px;box-shadow:0 24px 60px rgba(0,0,0,.3)">
    <div style="text-align:center;margin-bottom:28px">
      <div style="width:56px;height:56px;background:#800020;color:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-family:'Playfair Display',serif;font-size:22px;font-weight:700">E</div>
      <div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-bottom:4px">EduManage</div>
      <div style="font-size:13px;color:#999">Admin Panel Login</div>
    </div>
    <div id="loginErr" style="display:none;background:#fdf0ef;color:#c0392b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;border:1px solid rgba(192,57,43,.2)"></div>
    <div style="margin-bottom:14px">
      <label style="display:block;font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Admin Code</label>
      <input id="adCode" style="width:100%;padding:12px 14px;background:#fafafa;border:1.5px solid #eee;border-radius:10px;font-size:14px;outline:none;text-transform:uppercase" placeholder="e.g. ADMIN47" onkeydown="if(event.key==='Enter')adminLogin()">
    </div>
    <div style="margin-bottom:20px">
      <label style="display:block;font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Password</label>
      <input id="adPass" type="password" style="width:100%;padding:12px 14px;background:#fafafa;border:1.5px solid #eee;border-radius:10px;font-size:14px;outline:none" placeholder="Enter password" onkeydown="if(event.key==='Enter')adminLogin()">
    </div>
    <button id="loginBtn" onclick="adminLogin()" style="width:100%;padding:13px;background:linear-gradient(135deg,#800020,#a30027);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer">Login to Admin Panel</button>
  </div>
</div>

<!-- EDIT STUDENT MODAL -->
<div class="mo" id="esModal">
  <div class="mb">
    <div class="mt2">Edit Student</div>
    <div class="fg2">
      <div class="fg"><label>Full Name</label><input class="fi" id="es_name" placeholder="Name"></div>
      <div class="fg"><label>Class</label>
        <select class="fi" id="es_class">
          <option value="">No change</option>
          <option>Nursery</option><option>LKG</option><option>UKG</option>
          <option>Class 1</option><option>Class 2</option><option>Class 3</option><option>Class 4</option><option>Class 5</option><option>Class 6</option><option>Class 7</option><option>Class 8</option><option>Class 9</option><option>Class 10</option>
        </select>
      </div>
      <div class="fg"><label>Roll No</label><input class="fi" id="es_roll" type="number" placeholder="Roll"></div>
      <div class="fg"><label>Parent Phone</label><input class="fi" id="es_phone" placeholder="Parent phone"></div>
      <div class="fg"><label>Parent Name</label><input class="fi" id="es_parent" placeholder="Parent name"></div>
      <div class="fg"><label>Address</label><input class="fi" id="es_addr" placeholder="Address"></div>
      <div class="fg"><label>Blood Group</label>
        <select class="fi" id="es_blood"><option value="">No change</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>O+</option><option>O-</option><option>AB+</option><option>AB-</option></select>
      </div>
      <div class="fg"><label>Bus</label>
        <select class="fi" id="es_bus"><option value="">No change</option><option value="true">Yes</option><option value="false">No</option></select>
      </div>
      <div class="fg"><label>Bus Route</label><input class="fi" id="es_route" placeholder="Route"></div>
      <div class="fg"><label>Remarks</label><input class="fi" id="es_rem" placeholder="Remarks"></div>
      <div class="fg"><label>New Password</label><input class="fi" id="es_pass" type="password" placeholder="Leave blank = no change"></div>
    </div>
    <div class="mf">
      <button class="btn bol" style="flex:1" onclick="closeM('esModal')">Cancel</button>
      <button class="btn bm" style="flex:1" onclick="saveStudent()">Save Changes</button>
    </div>
  </div>
</div>

<!-- EDIT TEACHER MODAL -->
<div class="mo" id="etModal">
  <div class="mb">
    <div class="mt2">Edit Teacher</div>
    <div class="fg2">
      <div class="fg"><label>Full Name</label><input class="fi" id="et_name" placeholder="Name"></div>
      <div class="fg"><label>Phone</label><input class="fi" id="et_phone" placeholder="Phone"></div>
      <div class="fg"><label>Subject</label><input class="fi" id="et_sub" placeholder="Subject"></div>
      <div class="fg"><label>Assigned Class</label>
        <select class="fi" id="et_cls">
          <option value="">None</option>
          <option>Nursery</option><option>LKG</option><option>UKG</option>
          <option>Class 1</option><option>Class 2</option><option>Class 3</option><option>Class 4</option><option>Class 5</option><option>Class 6</option><option>Class 7</option><option>Class 8</option><option>Class 9</option><option>Class 10</option>
        </select>
      </div>
      <div class="fg"><label>New Password</label><input class="fi" id="et_pass" type="password" placeholder="Leave blank = no change"></div>
    </div>
    <div class="mf">
      <button class="btn bol" style="flex:1" onclick="closeM('etModal')">Cancel</button>

<div class="toast" id="toast"></div>

<script>
const API = 'https://edumanage-backend-xi.vercel.app/api';
const CLASSES = ['Nursery','LKG','UKG','Class 1','Class 2','Class 3','Class 4','Class 5','Class 6','Class 7','Class 8','Class 9','Class 10'];

let token = null;
let allStudents = [], allTeachers = [], classPosts = [], curClass = null;
let editStuId = null, editTchId = null, editFeeId = null;

/* ── BOOT: always show login ── */
window.onload = function() {
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('mainArea').style.display = 'none';
  document.getElementById('sidebar').style.display = 'none';
};

async function adminLogin() {
  const code = document.getElementById('adCode').value.trim().toUpperCase();
  const pass = document.getElementById('adPass').value.trim();
  const err = document.getElementById('loginErr');
  const btn = document.getElementById('loginBtn');
  if (!code || !pass) { err.textContent='Enter code and password'; err.style.display='block'; return; }
  err.style.display = 'none';
  btn.textContent = 'Logging in...'; btn.disabled = true;
  try {
    const res = await fetch(API+'/auth/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code, password:pass, role:'admin'})});
    const d = await res.json();
    if (d.token) {
      token = d.token;
      document.getElementById('admName').textContent = d.user?.name || 'Administrator';
      document.getElementById('admCode').textContent = code;
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('mainArea').style.display = 'flex';
      document.getElementById('sidebar').style.display = 'flex';
      loadDashboard();
    } else {
      err.textContent = d.message || 'Invalid credentials';
      err.style.display = 'block';
      btn.textContent = 'Login to Admin Panel'; btn.disabled = false;
    }
  } catch(_) {
    err.textContent = 'Network error. Check internet.';
    err.style.display = 'block';
    btn.textContent = 'Login to Admin Panel'; btn.disabled = false;
  }
}

function doLogout() {
  if (!confirm('Logout?')) return;
  token = null;
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('mainArea').style.display = 'none';
  document.getElementById('sidebar').style.display = 'none';
  document.getElementById('adCode').value = '';
  document.getElementById('adPass').value = '';
  document.getElementById('loginBtn').textContent = 'Login to Admin Panel';
  document.getElementById('loginBtn').disabled = false;
}

/* HELPERS */
function H() { return {Authorization:'Bearer '+token, 'Content-Type':'application/json'}; }
function toast(m, ok=true) { const e=document.getElementById('toast'); e.textContent=m; e.className='toast '+(ok?'tok':'ter'); e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),3000); }
function closeM(id) { document.getElementById(id).classList.remove('show'); }
function setPage(title, html) { document.getElementById('pgTitle').textContent=title; document.getElementById('pgContent').innerHTML=html; }
function loading() { setPage('Loading...','<div class="ls"><div class="sp"></div></div>'); }
function ini(n) { if(!n)return'?'; return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function ago(d) { if(!d)return''; const s=Math.floor((Date.now()-new Date(d))/1000); if(s<60)return'just now'; if(s<3600)return Math.floor(s/60)+'m ago'; if(s<86400)return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago'; }
function feeBadge(st) { return st==='paid'?'<span class="badge bg">Paid</span>':st==='partial'?'<span class="badge bo">Partial</span>':'<span class="badge br">Pending</span>'; }

function go(page, btn) {
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('sidebar').classList.remove('open');
  const pages = {dashboard:loadDashboard, students:loadStudents, addStudent:showAddStudent, promote:showPromote, passout:showPassout, teachers:loadTeachers, addTeacher:showAddTeacher, fees:loadFees, payments:loadPayments, notify:showNotify, classes:loadClasses};
  if (pages[page]) pages[page]();
}

/* ════ DASHBOARD ════ */
async function loadDashboard() {
  loading();
  try {
    const [sr, tr, fr] = await Promise.all([
      fetch(API+'/students', {headers:H()}),
      fetch(API+'/teachers', {headers:H()}),
      fetch(API+'/fees', {headers:H()})
    ]);
    if (sr.status===401) { doLogout(); return; }
    const sd = await sr.json(); allStudents = Array.isArray(sd)?sd:(sd.students||[]);
    const td = await tr.json(); allTeachers = Array.isArray(td)?td:(td.teachers||[]);
    const fd = await fr.json(); const fees = Array.isArray(fd)?fd:(fd.fees||[]);
    const paid = fees.filter(f=>f.status==='paid').length;
    const pend = fees.filter(f=>f.status==='pending').length;
    const cc = {}; allStudents.forEach(s=>{const c=s.class_name||s.standard||'Other'; cc[c]=(cc[c]||0)+1;});
    setPage('Dashboard', `
    <div class="sg">
      <div class="sc"><div class="si"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div class="sn">${allStudents.length}</div><div class="sl">Total Students</div></div>
      <div class="sc"><div class="si"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div class="sn">${allTeachers.length}</div><div class="sl">Total Teachers</div></div>
      <div class="sc"><div class="si"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polyline points="9 11 12 14 22 4"/></svg></div><div class="sn">${paid}</div><div class="sl">Fees Paid</div></div>
      <div class="sc"><div class="si"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="sn">${pend}</div><div class="sl">Fees Pending</div></div>
    </div>
    <div class="two">
      <div class="card"><div class="ct">Recent Students</div>
        ${allStudents.slice(0,6).map(s=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--g1)"><div style="width:34px;height:34px;background:var(--mp2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--m);font-weight:700;flex-shrink:0">${ini(s.name)}</div><div style="flex:1"><div style="font-size:13px;font-weight:600">${s.name}</div><div style="font-size:11px;color:var(--g4)">${s.class_name||s.standard||'-'}</div></div>${feeBadge(s.fees_status)}</div>`).join('')}
        <button class="btn bol" style="width:100%;margin-top:12px" onclick="go('students')">View All →</button>
      </div>
      <div class="card"><div class="ct">Class Strength</div>
        ${Object.entries(cc).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([c,n])=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--g1)"><div style="flex:1;font-size:13px;font-weight:600">${c}</div><div style="font-size:12px;color:var(--g4)">${n}</div><div style="width:50px;height:4px;background:var(--g1);border-radius:2px"><div style="height:100%;background:var(--m);width:${Math.min(100,n*8)}%"></div></div></div>`).join('')}
        <button class="btn bol" style="width:100%;margin-top:12px" onclick="go('classes')">Classes Overview →</button>
      </div>
    </div>`);
  } catch(e) { setPage('Dashboard','<div class="es"><p>Failed to load: '+e.message+'</p></div>'); }
}

/* ════ STUDENTS ════ */
async function loadStudents(fc='all', s='') {
  if (!allStudents.length) { loading(); const r=await fetch(API+'/students',{headers:H()}); const d=await r.json(); allStudents=Array.isArray(d)?d:(d.students||[]); }
  renderStu(fc, s);
}
function renderStu(fc='all', s='') {
  let list = allStudents;
  if (fc!=='all') list = list.filter(x=>(x.class_name||x.standard||'')==fc);
  if (s) list = list.filter(x=>x.name?.toLowerCase().includes(s.toLowerCase())||x.code?.toLowerCase().includes(s.toLowerCase()));
  const cc={}; allStudents.forEach(x=>{const c=x.class_name||x.standard||'Other'; cc[c]=(cc[c]||0)+1;});
  setPage('All Students', `
  <div class="card">
    <div class="ch">
      <input class="si2" placeholder="Search..." value="${s}" oninput="renderStu('${fc}',this.value)">
      <button class="btn bm" onclick="go('addStudent')">+ Add Student</button>
    </div>
    <div class="filter-row">
      <button class="fb2 ${fc==='all'?'active':''}" onclick="renderStu('all','${s}')">All (${allStudents.length})</button>
      ${CLASSES.filter(c=>cc[c]).map(c=>`<button class="fb2 ${fc===c?'active':''}" onclick="renderStu('${c}','${s}')">${c} (${cc[c]})</button>`).join('')}
    </div>
    <div class="tw"><table>
      <thead><tr><th>Student</th><th>Code</th><th>Class</th><th>Roll</th><th>Parent Phone</th><th>Fees</th><th>Actions</th></tr></thead>
      <tbody>${!list.length?'<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--g4)">No students found</td></tr>':list.map(x=>`<tr>
        <td><div style="font-weight:600">${x.name}</div><div style="font-size:11px;color:var(--g4)">${x.parent_name||''}</div></td>
        <td><span style="font-family:var(--fm);font-size:12px">${x.code||'-'}</span></td>
        <td>${x.class_name||x.standard||'-'}</td>
        <td>${x.roll_no||'-'}</td>
        <td>${x.parent_phone||'-'}</td>
        <td>${feeBadge(x.fees_status)}</td>
        <td><div style="display:flex;gap:5px;flex-wrap:wrap">
          <button class="btn bol bsm" onclick="viewStu('${x._id||x.id}')">View</button>
          <button class="btn bm bsm" onclick="openEditStu('${x._id||x.id}')">Edit</button>
          <button class="btn brd bsm" onclick="delStu('${x._id||x.id}','${x.name.replace(/'/g,"\\'")}')">Del</button>
        </div></td>
      </tr>`).join('')}</tbody>
    </table></div>
  </div>`);
}

function viewStu(id) {
  const s = allStudents.find(x=>(x._id||x.id)===id); if(!s) return;
  setPage(s.name, `
  <button class="bbk" onclick="renderStu()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Back</button>
  <div class="card">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--g1)">
      <div style="width:64px;height:64px;background:var(--mp2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:26px;color:var(--m)">${ini(s.name)}</div>
      <div><div style="font-family:var(--fd);font-size:22px;font-weight:700">${s.name}</div><div style="font-family:var(--fm);font-size:12px;color:var(--g4)">${s.code||''}</div><div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap"><span class="badge bk">${s.class_name||s.standard||'-'}</span><span class="badge bk">Roll ${s.roll_no||'-'}</span>${feeBadge(s.fees_status)}</div></div>
    </div>
    <div class="ig">
      <div class="ic"><div class="icl">Parent</div><div class="icv">${s.parent_name||'-'}</div></div>
      <div class="ic"><div class="icl">Parent Phone</div><div class="icv">${s.parent_phone||'-'}</div></div>
      <div class="ic"><div class="icl">DOB</div><div class="icv">${s.dob?new Date(s.dob).toLocaleDateString('en-IN'):'-'}</div></div>
      <div class="ic"><div class="icl">Blood Group</div><div class="icv">${s.blood_group||'-'}</div></div>
      <div class="ic"><div class="icl">Address</div><div class="icv">${s.address||'-'}</div></div>
      <div class="ic"><div class="icl">Bus</div><div class="icv">${s.has_bus?'Yes — '+(s.bus_route||''):'No'}</div></div>
      <div class="ic"><div class="icl">Gender</div><div class="icv">${s.gender||'-'}</div></div>
      <div class="ic"><div class="icl">Admission</div><div class="icv">${s.admission_date?new Date(s.admission_date).toLocaleDateString('en-IN'):'-'}</div></div>
    </div>
    ${s.remarks?`<div style="border-left:3px solid var(--m);padding:10px 14px;border-radius:0 8px 8px 0;background:var(--mp2)"><div style="font-size:10px;color:var(--m);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">Remarks</div><div style="font-size:13px">${s.remarks}</div></div>`:''}
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn bm" onclick="openEditStu('${s._id||s.id}')">Edit</button>
      <button class="btn brd" onclick="delStu('${s._id||s.id}','${s.name.replace(/'/g,"\\'")}')">Delete</button>
    </div>
  </div>`);
}

function openEditStu(id) {
  const s = allStudents.find(x=>(x._id||x.id)===id); if(!s) return;
  editStuId = id;
  document.getElementById('es_name').value = s.name||'';
  document.getElementById('es_class').value = s.class_name||s.standard||'';
  document.getElementById('es_roll').value = s.roll_no||'';
  document.getElementById('es_phone').value = s.parent_phone||'';
  document.getElementById('es_parent').value = s.parent_name||'';
  document.getElementById('es_addr').value = s.address||'';
  document.getElementById('es_blood').value = s.blood_group||'';
  document.getElementById('es_bus').value = s.has_bus===true?'true':s.has_bus===false?'false':'';
  document.getElementById('es_route').value = s.bus_route||'';
  document.getElementById('es_rem').value = s.remarks||'';
  document.getElementById('es_pass').value = '';
  document.getElementById('esModal').classList.add('show');
}

async function saveStudent() {
  const p = {};
  const v = id => document.getElementById(id).value;
  if(v('es_name').trim()) p.name = v('es_name').trim();
  if(v('es_class')) p.class_name = v('es_class');
  if(v('es_roll')) p.roll_no = Number(v('es_roll'));
  if(v('es_phone').trim()) p.parent_phone = v('es_phone').trim();
  if(v('es_parent').trim()) p.parent_name = v('es_parent').trim();
  if(v('es_addr').trim()) p.address = v('es_addr').trim();
  if(v('es_blood')) p.blood_group = v('es_blood');
  if(v('es_bus')!=='') p.has_bus = v('es_bus')==='true';
  if(v('es_route').trim()) p.bus_route = v('es_route').trim();
  if(v('es_rem').trim()) p.remarks = v('es_rem').trim();
  if(v('es_pass').trim()) p.password = v('es_pass').trim();
  try {
    const res = await fetch(API+'/students/'+editStuId, {method:'PUT', headers:H(), body:JSON.stringify(p)});
    if(res.ok) { toast('Student updated!'); closeM('esModal'); allStudents=[]; loadStudents(); }
    else { const e=await res.json(); toast(e.message||'Failed',false); }
  } catch(_) { toast('Network error',false); }
}

async function delStu(id, name) {
  if(!confirm('Delete "'+name+'"? Cannot be undone.')) return;
  try {
    const res = await fetch(API+'/students/'+id, {method:'DELETE', headers:H()});
    if(res.ok) { toast('Deleted'); allStudents=allStudents.filter(x=>(x._id||x.id)!==id); renderStu(); }
    else toast('Failed',false);
  } catch(_) { toast('Network error',false); }
}

function showAddStudent() {
  setPage('Add Student', `
  <div class="card" style="max-width:700px">
    <div class="ct">New Student</div>
    <div class="fg2">
      <div class="fg"><label>Full Name *</label><input class="fi" id="as_name" placeholder="Student full name"></div>

async function submitAddStu() {
  const name = document.getElementById('as_name').value.trim();
  const cls = document.getElementById('as_cls').value;
  const pass = document.getElementById('as_pass').value.trim();
  if(!name||!cls||!pass) { toast('Name, class and password required',false); return; }
  const p = {name, class_name:cls, password:pass,
    roll_no:document.getElementById('as_roll').value||undefined,
    gender:document.getElementById('as_gen').value||undefined,
    dob:document.getElementById('as_dob').value||undefined,
    blood_group:document.getElementById('as_blood').value||undefined,
    parent_name:document.getElementById('as_par').value.trim()||undefined,
    parent_phone:document.getElementById('as_pph').value.trim()||undefined,
    address:document.getElementById('as_addr').value.trim()||undefined,
    has_bus:document.getElementById('as_bus').value==='true',
    bus_route:document.getElementById('as_route').value.trim()||undefined,
    total_fees:document.getElementById('as_fees').value?Number(document.getElementById('as_fees').value):undefined
  };
  try {
    const res = await fetch(API+'/students', {method:'POST', headers:H(), body:JSON.stringify(p)});
    const d = await res.json();
    if(res.ok) { toast('Student added! Code: '+(d.student?.code||d.code||'')); allStudents=[]; go('students'); }
    else toast(d.message||'Failed',false);
  } catch(_) { toast('Network error',false); }
}

/* ════ PROMOTE ════ */
function showPromote() {
  setPage('Promote Class', `
  <div class="card" style="max-width:480px">
    <div class="ct">Promote Entire Class</div>
    <p style="font-size:13px;color:var(--g5c);margin-bottom:20px">All students of selected class will move to next class.</p>
    <div class="fg" style="margin-bottom:14px"><label>From Class</label><select class="fi" id="pfrom">${CLASSES.map(c=>`<option>${c}</option>`).join('')}</select></div>
    <div class="fg" style="margin-bottom:20px"><label>To Class</label><select class="fi" id="pto">${CLASSES.map(c=>`<option>${c}</option>`).join('')}</select></div>

}
async function doPromote() {
  const from = document.getElementById('pfrom').value;
  const to = document.getElementById('pto').value;
  if(from===to) { toast('From and To cannot be same',false); return; }
  if(!confirm('Move all "'+from+'" students to "'+to+'"?')) return;
  try {
    const res = await fetch(API+'/students/promote', {method:'POST', headers:H(), body:JSON.stringify({from_class:from, to_class:to})});
    const d = await res.json();
    if(res.ok) { toast(d.message||'Promoted!'); allStudents=[]; }
    else toast(d.message||'Failed',false);
  } catch(_) { toast('Network error',false); }

/* ════ TEACHERS ════ */
async function loadTeachers(s='') {
  loading();
  const res = await fetch(API+'/teachers', {headers:H()});
  const d = await res.json(); allTeachers = Array.isArray(d)?d:(d.teachers||[]);
  renderTch(s);
}
function renderTch(s='') {
  let list = allTeachers;
  if(s) list = list.filter(t=>t.name?.toLowerCase().includes(s.toLowerCase())||t.code?.toLowerCase().includes(s.toLowerCase()));
  setPage('All Teachers', `
  <div class="card">
    <div class="ch">
      <input class="si2" placeholder="Search..." value="${s}" oninput="renderTch(this.value)">
      <button class="btn bm" onclick="go('addTeacher')">+ Add Teacher</button>
    </div>
    <div class="tw"><table>
      <thead><tr><th>Teacher</th><th>Code</th><th>Subject</th><th>Class</th><th>Phone</th><th>Actions</th></tr></thead>
      <tbody>${!list.length?'<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--g4)">No teachers</td></tr>':list.map(t=>`<tr>
        <td style="font-weight:600">${t.name}</td>
        <td><span style="font-family:var(--fm);font-size:12px">${t.code||'-'}</span></td>
        <td>${t.subject||'-'}</td>
        <td>${t.class_name||t.assigned_class||t.class||'Not assigned'}</td>
        <td>${t.phone||'-'}</td>
        <td><div style="display:flex;gap:5px">
          <button class="btn bm bsm" onclick="openEditTch('${t._id||t.id}')">Edit</button>
          <button class="btn brd bsm" onclick="delTch('${t._id||t.id}','${t.name.replace(/'/g,"\\'")}')">Del</button>
        </div></td>
      </tr>`).join('')}</tbody>
    </table></div>
  </div>`);
}

function openEditTch(id) {
  const t = allTeachers.find(x=>(x._id||x.id)===id); if(!t) return;
  editTchId = id;
  document.getElementById('et_name').value = t.name||'';
  document.getElementById('et_phone').value = t.phone||'';
  document.getElementById('et_sub').value = t.subject||'';
  document.getElementById('et_cls').value = t.class_name||t.assigned_class||t.class||'';
  document.getElementById('et_pass').value = '';
  document.getElementById('etModal').classList.add('show');
}
async function saveTeacher() {
  const p = {};
  const v = id => document.getElementById(id).value;
  if(v('et_name').trim()) p.name = v('et_name').trim();
  if(v('et_phone').trim()) p.phone = v('et_phone').trim();
  if(v('et_sub').trim()) p.subject = v('et_sub').trim();
  p.class_name = v('et_cls'); p.assigned_class = v('et_cls');
  if(v('et_pass').trim()) p.password = v('et_pass').trim();
  try {
    const res = await fetch(API+'/teachers/'+editTchId, {method:'PUT', headers:H(), body:JSON.stringify(p)});
    if(res.ok) { toast('Teacher updated!'); closeM('etModal'); allTeachers=[]; loadTeachers(); }
    else { const e=await res.json(); toast(e.message||'Failed',false); }
  } catch(_) { toast('Network error',false); }
}
async function delTch(id, name) {
  if(!confirm('Delete "'+name+'"?')) return;
  try {
    const res = await fetch(API+'/teachers/'+id, {method:'DELETE', headers:H()});
    if(res.ok) { toast('Deleted'); allTeachers=allTeachers.filter(x=>(x._id||x.id)!==id); renderTch(); }
    else toast('Failed',false);
  } catch(_) { toast('Network error',false); }
}

/* ════ ADD TEACHER ════ */
function showAddTeacher() {
  setPage('Add Teacher', `
  <div class="card" style="max-width:580px">
    <div class="ct">New Teacher</div>
    <div class="fg2">
      <div class="fg"><label>Full Name *</label><input class="fi" id="at_name" placeholder="Teacher name"></div>
      <div class="fg"><label>Phone</label><input class="fi" id="at_ph" placeholder="Phone"></div>
      <div class="fg"><label>Subject</label><input class="fi" id="at_sub" placeholder="Subject taught"></div>
      <div class="fg"><label>Assigned Class</label><select class="fi" id="at_cls"><option value="">None</option>${CLASSES.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div class="fg"><label>Password *</label><input class="fi" id="at_pass" type="password" placeholder="Login password"></div>
    </div>
    <div style="margin-top:16px;display:flex;gap:10px">
      <button class="btn bol" onclick="go('teachers')">Cancel</button>
      <button class="btn bm" onclick="submitAddTch()">Add Teacher</button>
    </div>
  </div>`);
}
async function submitAddTch() {
  const name = document.getElementById('at_name').value.trim();
  const pass = document.getElementById('at_pass').value.trim();
  if(!name||!pass) { toast('Name and password required',false); return; }
  const cls = document.getElementById('at_cls').value;
  const p = {name, password:pass, phone:document.getElementById('at_ph').value.trim()||undefined, subject:document.getElementById('at_sub').value.trim()||undefined};
  if(cls) { p.class_name=cls; p.assigned_class=cls; }
  try {
    const res = await fetch(API+'/teachers', {method:'POST', headers:H(), body:JSON.stringify(p)});
    const d = await res.json();
    if(res.ok) { toast('Teacher added! Code: '+(d.teacher?.code||d.code||'')); allTeachers=[]; go('teachers'); }
    else toast(d.message||'Failed',false);
  } catch(_) { toast('Network error',false); }
}

/* ════ FEES ════ */
async function loadFees(fs='all', s='') {
  loading();
  try {
    const res = await fetch(API+'/fees', {headers:H()});
    const d = await res.json(); const fees = Array.isArray(d)?d:(d.fees||[]);
    let list = fees;
    if(fs!=='all') list = list.filter(f=>f.status===fs);
    if(s) list = list.filter(f=>f.student_name?.toLowerCase().includes(s.toLowerCase()));
    setPage('Fee Management', `
    <div class="card">
      <div class="ch"><input class="si2" placeholder="Search student..." value="${s}" oninput="loadFees('${fs}',this.value)"></div>
      <div class="filter-row">
        <button class="fb2 ${fs==='all'?'active':''}" onclick="loadFees('all','${s}')">All (${fees.length})</button>
        <button class="fb2 ${fs==='paid'?'active':''}" onclick="loadFees('paid','${s}')">Paid (${fees.filter(f=>f.status==='paid').length})</button>
        <button class="fb2 ${fs==='partial'?'active':''}" onclick="loadFees('partial','${s}')">Partial (${fees.filter(f=>f.status==='partial').length})</button>
        <button class="fb2 ${fs==='pending'?'active':''}" onclick="loadFees('pending','${s}')">Pending (${fees.filter(f=>f.status==='pending').length})</button>
      </div>
      <div class="tw"><table>
        <thead><tr><th>Student</th><th>Class</th><th>Total Fees</th><th>Paid</th><th>Status</th><th>Action</th></tr></thead>
        <tbody>${!list.length?'<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--g4)">No records</td></tr>':list.map(f=>`<tr>
          <td style="font-weight:600">${f.student_name||'-'}</td>
          <td>${f.class_name||'-'}</td>
          <td>Rs. ${f.total_amount||0}</td>
          <td>Rs. ${f.paid_amount||0}</td>
          <td>${feeBadge(f.status)}</td>
          <td><button class="btn bm bsm" onclick="openFeeM('${f._id||f.id}','${(f.student_name||'').replace(/'/g,"\\'")}',${f.total_amount||0},${f.paid_amount||0},'${f.status}')">Update</button></td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`);
  } catch(_) { setPage('Fee Management','<div class="es"><p>Failed to load</p></div>'); }
}

function openFeeM(id, name, total, paid, status) {
  editFeeId = id;
  document.getElementById('fModalBody').innerHTML = `
    <p style="font-size:14px;font-weight:600;margin-bottom:16px">${name}</p>
    <div class="fg" style="margin-bottom:12px"><label>Status</label>
      <select class="fi" id="fm_st"><option value="pending" ${status==='pending'?'selected':''}>Pending</option><option value="partial" ${status==='partial'?'selected':''}>Partial</option><option value="paid" ${status==='paid'?'selected':''}>Paid</option></select>
    </div>
    <div class="fg" style="margin-bottom:12px"><label>Amount Paid (Rs.)</label><input class="fi" id="fm_pd" type="number" value="${paid}"></div>
    <div class="fg"><label>Total Fees (Rs.)</label><input class="fi" id="fm_tot" type="number" value="${total}"></div>`;
  document.getElementById('fModal').classList.add('show');
}
async function saveFees() {
  const p = {status:document.getElementById('fm_st').value, paid_amount:Number(document.getElementById('fm_pd').value), total_amount:Number(document.getElementById('fm_tot').value)};
  try {
    const res = await fetch(API+'/fees/'+editFeeId, {method:'PUT', headers:H(), body:JSON.stringify(p)});
    if(res.ok) { toast('Fees updated!'); closeM('fModal'); loadFees(); }
    else toast('Failed',false);
  } catch(_) { toast('Network error',false); }
}

/* ════ PAYMENTS ════ */
async function loadPayments() {
  loading();
  try {
    const res = await fetch(API+'/fees/payment-requests', {headers:H()});
    const d = await res.json(); const list = Array.isArray(d)?d:(d.payments||d.requests||[]);
    setPage('Payment Requests', `
    <div class="card">
      ${!list.length?'<div class="es"><p>No payment requests</p></div>':list.map(p=>`
        <div style="border:1px solid var(--g2);border-radius:var(--r);padding:14px;margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px">
            <div><div style="font-weight:600;font-size:14px">${p.student_name||'-'}</div><div style="font-size:11px;color:var(--g4)">${p.class_name||''}</div></div>
            ${p.status==='verified'?'<span class="badge bg">Verified</span>':p.status==='rejected'?'<span class="badge br">Rejected</span>':'<span class="badge bo">Pending</span>'}
          </div>
          <div style="font-size:13px;margin-bottom:6px">UPI Ref: <b style="font-family:var(--fm)">${p.upi_ref||'-'}</b> · Amount: <b>Rs. ${p.amount||0}</b></div>
          <div style="font-size:11px;color:var(--g4);margin-bottom:10px">${new Date(p.created_at||Date.now()).toLocaleString('en-IN')}</div>
          ${p.status==='pending'?`<div style="display:flex;gap:8px">
            <button class="btn bgr bsm" onclick="verifyPay('${p._id||p.id}')">✅ Verify</button>
            <button class="btn brd bsm" onclick="rejectPay('${p._id||p.id}')">✕ Reject</button>
          </div>`:''}
        </div>`).join('')}
    </div>`);
  } catch(_) { setPage('Payment Requests','<div class="es"><p>Failed to load</p></div>'); }
}
async function verifyPay(id) {
  try { const res=await fetch(API+'/fees/verify-payment/'+id,{method:'PUT',headers:H(),body:JSON.stringify({status:'verified'})}); if(res.ok){toast('Verified!');loadPayments();}else toast('Failed',false); } catch(_){toast('Network error',false);}
}
async function rejectPay(id) {
  if(!confirm('Reject this payment?'))return;
  try { const res=await fetch(API+'/fees/verify-payment/'+id,{method:'PUT',headers:H(),body:JSON.stringify({status:'rejected'})}); if(res.ok){toast('Rejected');loadPayments();}else toast('Failed',false); } catch(_){toast('Network error',false);}
}

/* ════ NOTIFY ════ */
function showNotify() {
  setPage('Send Notification', `
  <div class="card" style="max-width:580px">
    <div class="ct">Send Notification</div>
    <div class="fg" style="margin-bottom:12px"><label>Send To</label>
      <select class="fi" id="nt_tgt" onchange="document.getElementById('nt_cw').style.display=this.value==='class'?'block':'none'">
        <option value="all">All Students</option>
        <option value="class">Specific Class</option>
      </select>
    </div>
    <div id="nt_cw" style="display:none;margin-bottom:12px">
      <div class="fg"><label>Class</label><select class="fi" id="nt_cls">${CLASSES.map(c=>`<option>${c}</option>`).join('')}</select></div>
    </div>
    <div class="fg" style="margin-bottom:12px"><label>Title *</label><input class="fi" id="nt_ttl" placeholder="Notification title"></div>
    <div class="fg" style="margin-bottom:20px"><label>Message *</label><textarea class="fi" id="nt_msg" rows="4" style="resize:none;min-height:90px" placeholder="Write message..."></textarea></div>
    <button class="btn bm" onclick="sendNotif()">Send Notification</button>
  </div>`);
}
async function sendNotif() {
  const title = document.getElementById('nt_ttl').value.trim();
  const msg = document.getElementById('nt_msg').value.trim();
  if(!title||!msg) { toast('Enter title and message',false); return; }
  const tgt = document.getElementById('nt_tgt').value;
  const p = {title, message:msg, send_to_all:tgt==='all'};
  if(tgt==='class') p.class_name = document.getElementById('nt_cls').value;
  try {
    const res = await fetch(API+'/notifications', {method:'POST', headers:H(), body:JSON.stringify(p)});
    if(res.ok) { toast('Notification sent!'); document.getElementById('nt_ttl').value=''; document.getElementById('nt_msg').value=''; }
    else toast('Failed',false);
  } catch(_) { toast('Network error',false); }
}

/* ════ CLASSES ════ */
async function loadClasses() {
  loading();
  const res = await fetch(API+'/students', {headers:H()});
  const d = await res.json(); const studs = Array.isArray(d)?d:(d.students||[]);
  const cc = {}; studs.forEach(s=>{const c=s.class_name||s.standard||'Other'; cc[c]=(cc[c]||0)+1;});
  setPage('Classes Overview', `
  <p style="font-size:13px;color:var(--g5c);margin-bottom:20px">Click a class to open its group and post messages.</p>
  <div class="cg">
    ${CLASSES.map(c=>`
      <div class="cc" onclick="openClassGroup('${c}')">
        <div class="cc-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
        <div class="cc-name">${c}</div>
        <div class="cc-sub">${cc[c]||0} students</div>
      </div>`).join('')}
  </div>`);
}

async function openClassGroup(cls) {
  curClass = cls;
  setPage(cls+' Group', '<div class="ls"><div class="sp"></div></div>');
  try {
    const res = await fetch(API+'/posts?class='+encodeURIComponent(cls), {headers:H()});
    const d = await res.json(); classPosts = Array.isArray(d)?d:(d.posts||[]);
  } catch(_) { classPosts = []; }
  renderClassGroup(cls);
}

function renderClassGroup(cls) {
  setPage(cls+' — Group', `
  <button class="bbk" onclick="loadClasses()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>All Classes</button>
  <div class="card">
    <div class="ct">Post to ${cls}</div>
    <textarea class="fi" id="gMsg" rows="3" style="resize:none;margin-bottom:10px" placeholder="Write a message for ${cls} students..."></textarea>
    <input class="fi" id="gVid" placeholder="Video link (optional)" style="margin-bottom:12px">
    <button class="btn bm" onclick="postGroup('${cls}')">📢 Post to ${cls}</button>
  </div>
  <div class="card">
    <div class="ct">Posts (${classPosts.length})</div>
    ${!classPosts.length?'<div class="es"><p>No posts yet in this group</p></div>':classPosts.map(p=>`
      <div class="pi">
        <div class="ph">
          <div class="pau">${p.posted_by_name||'Admin'}</div>
          <div style="display:flex;align-items:center;gap:10px">
            <div class="pt">${ago(p.created_at)}</div>
            <button onclick="delGroupPost('${p._id||p.id}','${cls}')" style="background:none;border:none;cursor:pointer;color:var(--g4);font-size:13px" title="Delete">🗑</button>
          </div>
        </div>
        <div class="ptxt">${p.text_content||''}</div>
        ${p.video_link?`<a href="${p.video_link}" target="_blank" style="display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:12px;color:var(--m);font-weight:500;text-decoration:none">▶ Watch</a>`:''}
      </div>`).join('')}
  </div>`);
}

async function postGroup(cls) {
  const txt = document.getElementById('gMsg')?.value.trim();
  const vid = document.getElementById('gVid')?.value.trim();
  if(!txt&&!vid) { toast('Write something first',false); return; }
  try {
    const res = await fetch(API+'/posts', {method:'POST', headers:H(), body:JSON.stringify({text_content:txt, video_link:vid||null, class_name:cls, target_class:cls})});
    if(res.ok) {
      const d = await res.json();
      classPosts.unshift(d.post||{text_content:txt,video_link:vid,created_at:new Date(),posted_by_name:'Admin'});
      toast('Posted to '+cls+'!');
      renderClassGroup(cls);
    } else toast('Failed to post',false);
  } catch(_) { toast('Network error',false); }
}

async function delGroupPost(id, cls) {
  if(!confirm('Delete this post?')) return;
  try {
    const res = await fetch(API+'/posts/'+id, {method:'DELETE', headers:H()});
    if(res.ok) { classPosts=classPosts.filter(p=>(p._id||p.id)!==id); toast('Deleted'); renderClassGroup(cls); }
    else toast('Failed',false);
  } catch(_) { toast('Network error',false); }
}
</script>
</body>
