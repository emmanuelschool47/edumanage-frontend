<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#800020">
<title>Admin Panel — EduManage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --m:#800020;--m-dark:#5c0018;--m-deeper:#3d0010;--m-light:#a30027;
  --m-pale:rgba(128,0,32,.09);--m-glow:rgba(128,0,32,.18);
  --white:#fff;--black:#0a0a0a;
  --g50:#fafafa;--g100:#f5f5f5;--g200:#eeeeee;--g300:#e0e0e0;
  --g400:#bdbdbd;--g500:#9e9e9e;--g600:#757575;--g700:#616161;
  --green:#1a7a4a;--green-l:#e8f5ee;--red:#c0392b;--red-l:#fdf0ef;
  --gold:#b8860b;--gold-l:#fdf8e8;
  --fd:'Playfair Display',serif;--fb:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
  --r:12px;--sh:0 2px 8px rgba(0,0,0,.08);--tr:all .25s ease;
}
body{display:flex;min-height:100vh;background:var(--g50);font-family:var(--fb)}

/* SIDEBAR */
.sidebar{width:240px;background:var(--m-deeper);color:var(--white);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s ease;overflow-y:auto}
.sidebar-logo{padding:20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:var(--white);color:var(--m);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0;font-family:var(--fd)}
.logo-name{font-family:var(--fd);font-size:16px;font-weight:700}
.logo-role{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1px}
.sidebar-nav{flex:1;padding:12px}
.nav-group{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1.5px;padding:12px 8px 4px}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:8px;border:none;background:transparent;color:rgba(255,255,255,.55);font-family:var(--fb);font-size:13px;font-weight:500;cursor:pointer;text-align:left;transition:var(--tr);margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,.1);color:var(--white)}
.nav-item.active{background:var(--white);color:var(--m);font-weight:700}
.nav-item svg{width:16px;height:16px;stroke:currentColor;flex-shrink:0}
.sidebar-footer{padding:16px;border-top:1px solid rgba(255,255,255,.08)}
.admin-info{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.admin-avatar{width:34px;height:34px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.admin-name{font-size:13px;font-weight:600;color:var(--white)}
.admin-code{font-size:10px;color:rgba(255,255,255,.35);font-family:var(--fm)}
.logout-btn{width:100%;padding:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:rgba(255,255,255,.5);font-family:var(--fb);font-size:12px;cursor:pointer;transition:var(--tr)}
.logout-btn:hover{background:var(--red);border-color:var(--red);color:var(--white)}

/* MAIN */
.main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{position:sticky;top:0;z-index:50;background:var(--white);border-bottom:1px solid var(--g200);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-family:var(--fd);font-size:20px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:12px}
.live-pill{display:flex;align-items:center;gap:5px;padding:4px 12px;background:var(--green-l);border:1px solid rgba(26,122,74,.15);border-radius:100px;font-size:11px;font-weight:600;color:var(--green)}
.live-dot{width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite}
.hamburger{display:none;background:none;border:none;cursor:pointer;color:var(--black);padding:4px}
.hamburger svg{width:22px;height:22px;stroke:currentColor;stroke-width:2}
.page-content{padding:24px;flex:1}

/* CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--white);border:1px solid var(--g200);border-radius:14px;padding:18px;transition:var(--tr)}
.stat-card:hover{border-color:var(--m);transform:translateY(-2px);box-shadow:0 4px 16px var(--m-glow)}
.stat-icon{width:36px;height:36px;background:var(--m-pale);border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.stat-icon svg{width:18px;height:18px;stroke:var(--m)}
.stat-num{font-family:var(--fd);font-size:28px;font-weight:700;line-height:1;margin-bottom:4px;color:var(--m)}
.stat-label{font-size:11px;color:var(--g400);font-weight:600;text-transform:uppercase;letter-spacing:.5px}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:var(--white);border:1px solid var(--g200);border-radius:14px;padding:20px;margin-bottom:20px}
.card-title{font-family:var(--fd);font-size:17px;font-weight:600;margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead{background:var(--g50)}
th{padding:10px 14px;text-align:left;font-size:11px;color:var(--g400);text-transform:uppercase;letter-spacing:.8px;font-weight:600;white-space:nowrap;border-bottom:1px solid var(--g200)}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--g100)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--g50)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:600}
.b-green{background:var(--green-l);color:var(--green)}
.b-red{background:var(--red-l);color:var(--red)}
.b-gold{background:var(--gold-l);color:var(--gold)}
.b-gray{background:var(--g100);color:var(--g600)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;font-family:var(--fb);font-size:13px;font-weight:600;cursor:pointer;transition:var(--tr)}
.btn:active{transform:scale(.97)}
.btn-m{background:var(--m);color:var(--white)}
.btn-m:hover{background:var(--m-dark)}
.btn-green{background:var(--green);color:var(--white)}
.btn-red{background:var(--red);color:var(--white)}
.btn-outline{background:transparent;border:1.5px solid var(--g200);color:var(--g700)}
.btn-outline:hover{border-color:var(--m);color:var(--m)}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:7px}

/* FORM */
.search-input{padding:9px 14px;border:1.5px solid var(--g200);border-radius:9px;font-family:var(--fb);font-size:13px;color:var(--black);outline:none;transition:var(--tr);min-width:200px}
.search-input:focus{border-color:var(--m)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--g500);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.fi{width:100%;padding:10px 13px;background:var(--g50);border:1.5px solid var(--g200);border-radius:9px;font-family:var(--fb);font-size:13px;color:var(--black);outline:none;transition:var(--tr)}
.fi:focus{border-color:var(--m);background:var(--white)}
.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;overflow-x:auto;padding-bottom:4px}
.filter-btn{padding:6px 14px;border-radius:100px;border:1.5px solid var(--g200);background:var(--white);font-family:var(--fb);font-size:12px;font-weight:600;color:var(--g500);cursor:pointer;transition:var(--tr);white-space:nowrap}
.filter-btn.active{background:var(--m);border-color:var(--m);color:var(--white)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.info-cell{background:var(--g50);border-radius:8px;padding:11px 13px}
.info-cell-label{font-size:10px;color:var(--g400);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:3px}
.info-cell-val{font-size:13px;font-weight:600}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:var(--white);border-radius:16px;padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:scaleIn .3s ease}
.modal-title{font-family:var(--fd);font-size:20px;font-weight:700;margin-bottom:16px;color:var(--m)}
.modal-footer{display:flex;gap:10px;margin-top:16px}

.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--g100);border:none;border-radius:8px;font-family:var(--fb);font-size:13px;color:var(--g600);cursor:pointer;margin-bottom:18px;transition:var(--tr)}
.back-btn:hover{background:var(--m-pale);color:var(--m)}
.back-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2}

/* PROFILE */
.profile-row{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--g100)}
.profile-av{width:64px;height:64px;background:var(--m-pale);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:26px;color:var(--m);flex-shrink:0;overflow:hidden}
.profile-av img{width:100%;height:100%;object-fit:cover}
.profile-name{font-family:var(--fd);font-size:22px;font-weight:700}
.profile-code{font-family:var(--fm);font-size:12px;color:var(--g400);margin-top:2px}

/* LOADING / EMPTY */
.loading-state{display:flex;align-items:center;justify-content:center;min-height:300px;flex-direction:column;gap:14px}
.spinner{width:28px;height:28px;border:2px solid var(--g200);border-top-color:var(--m);border-radius:50%;animation:spin .8s linear infinite}
.empty-state{text-align:center;padding:40px;color:var(--g300)}
.empty-state svg{width:40px;height:40px;stroke:var(--g200);margin:0 auto 12px;display:block}
.empty-state p{font-size:13px}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;transform:translateY(60px);opacity:0;transition:all .3s ease;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.toast.show{transform:translateY(0);opacity:1}
.toast-ok{background:var(--m);color:var(--white)}
.toast-err{background:var(--red);color:var(--white)}

/* CLASS GROUP */
.class-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.class-card{background:var(--white);border:1px solid var(--g200);border-radius:14px;padding:20px;cursor:pointer;transition:var(--tr);text-align:center}
.class-card:hover{border-color:var(--m);transform:translateY(-3px);box-shadow:0 6px 20px var(--m-glow)}
.class-card-name{font-family:var(--fd);font-size:18px;font-weight:700;color:var(--m);margin-bottom:6px}
.class-card-sub{font-size:12px;color:var(--g400)}
.class-card-icon{width:44px;height:44px;background:var(--m-pale);border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.class-card-icon svg{width:20px;height:20px;stroke:var(--m)}

/* GROUP POST */
.post-item{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:14px;margin-bottom:10px}
.post-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.post-author{font-size:12px;font-weight:700;color:var(--m)}
.post-time{font-size:11px;color:var(--g300)}
.post-text{font-size:13px;color:var(--g700);line-height:1.6}
.composer-box{background:var(--g50);border:1.5px solid var(--g200);border-radius:var(--r);padding:14px;margin-bottom:16px}
.ctxt{width:100%;min-height:80px;padding:10px;border:1.5px solid var(--g200);border-radius:8px;font-family:var(--fb);font-size:13px;color:var(--black);resize:none;outline:none;background:var(--white);margin-bottom:10px}
.ctxt:focus{border-color:var(--m)}

/* PHOTO UPLOAD */
.photo-upload-area{border:2px dashed var(--g300);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:var(--tr)}
.photo-upload-area:hover{border-color:var(--m)}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 30px rgba(0,0,0,.2)}
  .main{margin-left:0}
  .hamburger{display:flex}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .two-col,.class-grid{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .page-content{padding:16px}
  .topbar{padding:0 16px}
  .info-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">E</div>
    <div>
      <div class="logo-name">EduManage</div>
      <div class="logo-role">Admin Panel</div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-group">Overview</div>
    <button class="nav-item active" onclick="goto('dashboard',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard
    </button>
    <div class="nav-group">Students</div>
    <button class="nav-item" onclick="goto('students',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>All Students
    </button>
    <button class="nav-item" onclick="goto('addStudent',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Student
    </button>
    <button class="nav-item" onclick="goto('promote',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>Promote Class
    </button>
    <button class="nav-item" onclick="goto('passout',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/></svg>Passout Students
    </button>
    <div class="nav-group">Teachers</div>
    <button class="nav-item" onclick="goto('teachers',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>All Teachers
    </button>
    <button class="nav-item" onclick="goto('addTeacher',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Teacher
    </button>
    <div class="nav-group">Finance</div>
    <button class="nav-item" onclick="goto('fees',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>Fee Management
    </button>
    <button class="nav-item" onclick="goto('payments',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Payment Requests
    </button>
    <div class="nav-group">Communication</div>
    <button class="nav-item" onclick="goto('notify',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Send Notification
    </button>
    <div class="nav-group">School</div>
    <button class="nav-item" onclick="goto('classes',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Classes Overview
    </button>
  </nav>
  <div class="sidebar-footer">
    <div class="admin-info">
      <div class="admin-avatar">A</div>
      <div>
        <div class="admin-name" id="adminName">Administrator</div>
        <div class="admin-code" id="adminCode">ADMIN47</div>
      </div>
    </div>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:14px">
      <button class="hamburger" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title" id="pageTitle">Dashboard</div>
    </div>
    <div class="topbar-right">
      <div class="live-pill"><div class="live-dot"></div>Live</div>
    </div>
  </div>
  <div class="page-content" id="pageContent">
    <div class="loading-state"><div class="spinner"></div></div>
  </div>
</main>

<!-- EDIT STUDENT MODAL -->
<div class="modal-overlay" id="editStudentModal">
  <div class="modal-box">
    <div class="modal-title">Edit Student</div>
    <div class="form-grid">
      <div class="fg"><label>Full Name</label><input class="fi" id="es_name" placeholder="Name"></div>
      <div class="fg"><label>Phone</label><input class="fi" id="es_phone" placeholder="Phone"></div>
      <div class="fg"><label>Class</label>
        <select class="fi" id="es_class">
          <option value="">No change</option>
          <option>Nursery</option><option>LKG</option><option>UKG</option>
          <option>Class 1</option><option>Class 2</option><option>Class 3</option>
          <option>Class 4</option><option>Class 5</option><option>Class 6</option>
          <option>Class 7</option><option>Class 8</option><option>Class 9</option>
          <option>Class 10</option>
        </select>
      </div>
      <div class="fg"><label>Roll No</label><input class="fi" id="es_roll" type="number" placeholder="Roll"></div>
      <div class="fg"><label>Parent Name</label><input class="fi" id="es_parent" placeholder="Parent name"></div>
      <div class="fg"><label>Parent Phone</label><input class="fi" id="es_parent_phone" placeholder="Parent phone"></div>
      <div class="fg"><label>Address</label><input class="fi" id="es_address" placeholder="Address"></div>
      <div class="fg"><label>Blood Group</label>
        <select class="fi" id="es_blood">
          <option value="">No change</option>
          <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
          <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
        </select>
      </div>
      <div class="fg"><label>Bus</label>
        <select class="fi" id="es_bus">
          <option value="">No change</option>
          <option value="true">Yes</option><option value="false">No</option>
        </select>
      </div>
      <div class="fg"><label>Bus Route</label><input class="fi" id="es_bus_route" placeholder="Route"></div>
      <div class="fg"><label>Remarks</label><input class="fi" id="es_remarks" placeholder="Teacher remarks"></div>
      <div class="fg"><label>New Password (optional)</label><input class="fi" id="es_pass" type="password" placeholder="Leave blank to keep same"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" style="flex:1" onclick="closeModal('editStudentModal')">Cancel</button>
      <button class="btn btn-m" style="flex:1" onclick="saveEditStudent()">Save Changes</button>
    </div>
  </div>
</div>

<!-- EDIT TEACHER MODAL -->
<div class="modal-overlay" id="editTeacherModal">
  <div class="modal-box">
    <div class="modal-title">Edit Teacher</div>
    <div class="form-grid">
      <div class="fg"><label>Full Name</label><input class="fi" id="et_name" placeholder="Name"></div>
      <div class="fg"><label>Phone</label><input class="fi" id="et_phone" placeholder="Phone"></div>
      <div class="fg"><label>Subject</label><input class="fi" id="et_subject" placeholder="Subject"></div>
      <div class="fg"><label>Assigned Class</label>
        <select class="fi" id="et_class">
          <option value="">None</option>
          <option>Nursery</option><option>LKG</option><option>UKG</option>
          <option>Class 1</option><option>Class 2</option><option>Class 3</option>

<script>
const API='https://edumanage-backend-xi.vercel.app/api';
let adminToken=null,allStudents=[],allTeachers=[],currentPage='dashboard';
let editingStudentId=null,editingTeacherId=null,editingFeesId=null;
let classPosts=[],currentClassGroup=null;

const CLASSES=['Nursery','LKG','UKG','Class 1','Class 2','Class 3','Class 4','Class 5','Class 6','Class 7','Class 8','Class 9','Class 10'];

/* ── BOOT ── */
(function(){
  const t=localStorage.getItem('adm_token');
  if(t&&t.length>20){adminToken=t;loadDashboard();}
  else showLoginPage();
})();

function showLoginPage(){
  document.getElementById('sidebar').style.display='none';
  document.querySelector('.main').style.marginLeft='0';
  document.getElementById('pageContent').innerHTML=`
  <div style="min-height:100vh;background:linear-gradient(135deg,#3d0010,#800020,#a30027);display:flex;align-items:center;justify-content:center;padding:20px;margin:-24px">
    <div style="background:#fff;border-radius:20px;padding:40px 32px;width:100%;max-width:380px;box-shadow:0 24px 60px rgba(0,0,0,.3)">
      <div style="text-align:center;margin-bottom:28px">
        <div style="width:56px;height:56px;background:#800020;color:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-family:var(--fd);font-size:22px;font-weight:700">E</div>
        <div style="font-family:var(--fd);font-size:24px;font-weight:700;margin-bottom:4px">EduManage</div>
        <div style="font-size:13px;color:#999">Admin Panel Login</div>
      </div>
      <div id="loginErr" style="display:none;background:#fdf0ef;color:#c0392b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px"></div>
      <div style="margin-bottom:14px">
        <label style="display:block;font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Admin Code</label>
        <input id="adCode" class="fi" placeholder="e.g. ADMIN47" style="text-transform:uppercase" onkeydown="if(event.key==='Enter')adminLogin()">
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Password</label>
        <input id="adPass" class="fi" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')adminLogin()">
      </div>
      <button onclick="adminLogin()" style="width:100%;padding:13px;background:linear-gradient(135deg,#800020,#a30027);color:#fff;border:none;border-radius:10px;font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer">Login to Admin Panel</button>
    </div>
  </div>`;
}

async function adminLogin(){
  const code=document.getElementById('adCode').value.trim().toUpperCase();
  const pass=document.getElementById('adPass').value.trim();
  const errEl=document.getElementById('loginErr');
  if(!code||!pass){errEl.textContent='Enter code and password';errEl.style.display='block';return;}
  try{
    const res=await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,password:pass,role:'admin'})});
    const d=await res.json();
    if(d.token){
      localStorage.setItem('adm_token',d.token);
      adminToken=d.token;
      document.getElementById('sidebar').style.display='';
      document.querySelector('.main').style.marginLeft='';
      document.getElementById('adminName').textContent=d.user?.name||'Administrator';
      document.getElementById('adminCode').textContent=code;
      loadDashboard();
    }else{errEl.textContent=d.message||'Invalid credentials';errEl.style.display='block';}
  }catch(_){document.getElementById('loginErr').textContent='Network error';document.getElementById('loginErr').style.display='block';}
}

function doLogout(){
  if(!confirm('Logout?'))return;
  localStorage.removeItem('adm_token');location.reload();
}

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open')}

/* ── HELPERS ── */
function h(){return{Authorization:`Bearer ${adminToken}`,'Content-Type':'application/json'}}
function showToast(msg,ok=true){const e=document.getElementById('toast');e.textContent=msg;e.className='toast '+(ok?'toast-ok':'toast-err');e.classList.add('show');setTimeout(()=>e.classList.remove('show'),3000)}
function closeModal(id){document.getElementById(id).classList.remove('show')}
function setPage(title,html){document.getElementById('pageTitle').textContent=title;document.getElementById('pageContent').innerHTML=html}
function loading(){setPage('Loading...','<div class="loading-state"><div class="spinner"></div></div>')}
function initials(n){if(!n)return'?';return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function timeAgo(d){if(!d)return'';const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'}

function goto(page,btn){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  document.getElementById('sidebar').classList.remove('open');
  if(page==='dashboard')loadDashboard();
  else if(page==='students')loadStudents();
  else if(page==='addStudent')showAddStudent();
  else if(page==='promote')showPromote();
  else if(page==='passout')showPassout();
  else if(page==='teachers')loadTeachers();
  else if(page==='addTeacher')showAddTeacher();
  else if(page==='fees')loadFees();
  else if(page==='payments')loadPayments();
  else if(page==='notify')showNotify();
  else if(page==='classes')loadClasses();
}

async function loadDashboard(){
  loading();
  try{
    const [sRes,tRes,fRes]=await Promise.allSettled([
      fetch(API+'/students',{headers:h()}),
      fetch(API+'/teachers',{headers:h()}),
      fetch(API+'/fees',{headers:h()}),
    ]);
    if(sRes.value?.status===401){localStorage.removeItem('adm_token');location.reload();return;}
    let studs=[],tchs=[],fees=[];
    if(sRes.status==='fulfilled'&&sRes.value.ok){const d=await sRes.value.json();studs=Array.isArray(d)?d:(d.students||[]);allStudents=studs;}
    if(tRes.status==='fulfilled'&&tRes.value.ok){const d=await tRes.value.json();tchs=Array.isArray(d)?d:(d.teachers||[]);allTeachers=tchs;}
    if(fRes.status==='fulfilled'&&fRes.value.ok){const d=await fRes.value.json();fees=Array.isArray(d)?d:(d.fees||[]);}

        <div class="stat-num">${tchs.length}</div>
        <div class="stat-label">Total Teachers</div>

      <div class="stat-card">
        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>
        <div class="stat-num">${feesPaid}</div>
        <div class="stat-label">Fees Paid</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
        <div class="stat-num">${feesPending}</div>
        <div class="stat-label">Fees Pending</div>
      </div>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-title">Recent Students</div>
        ${studs.slice(0,6).map(s=>`
          <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--g100)">

async function loadStudents(filterClass='all',search=''){
  loading();
  try{
    const res=await fetch(API+'/students',{headers:h()});
    const d=await res.json();
    allStudents=Array.isArray(d)?d:(d.students||[]);
    renderStudentsList(filterClass,search);
  }catch(e){setPage('All Students',`<div class="empty-state"><p>Failed to load</p></div>`);}
}

function renderStudentsList(filterClass='all',search=''){
  let list=allStudents;
  if(filterClass!=='all')list=list.filter(s=>(s.class_name||s.standard||'')==filterClass);
  if(search)list=list.filter(s=>s.name?.toLowerCase().includes(search.toLowerCase())||s.code?.toLowerCase().includes(search.toLowerCase()));

  const classCounts={all:allStudents.length};
  allStudents.forEach(s=>{const c=s.class_name||s.standard||'Other';classCounts[c]=(classCounts[c]||0)+1;});

  setPage('All Students',`
  <div class="card">
    <div class="card-header">
      <input class="search-input" placeholder="Search students..." value="${search}" oninput="renderStudentsList('${filterClass}',this.value)">
      <button class="btn btn-m" onclick="goto('addStudent')">+ Add Student</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn ${filterClass==='all'?'active':''}" onclick="renderStudentsList('all','${search}')">All (${allStudents.length})</button>
      ${CLASSES.filter(c=>classCounts[c]).map(c=>`<button class="filter-btn ${filterClass===c?'active':''}" onclick="renderStudentsList('${c}','${search}')">${c} (${classCounts[c]||0})</button>`).join('')}
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Student</th><th>Code</th><th>Class</th><th>Roll</th><th>Parent</th><th>Fees</th><th>Actions</th></tr></thead>
        <tbody>
          ${!list.length?`<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--g400)">No students found</td></tr>`:''}
          ${list.map(s=>`<tr>
            <td><div style="font-weight:600">${s.name}</div><div style="font-size:11px;color:var(--g400)">${s.parent_phone||''}</div></td>
            <td><span style="font-family:var(--fm);font-size:12px">${s.code||'-'}</span></td>
            <td>${s.class_name||s.standard||'-'}</td>
            <td>${s.roll_no||'-'}</td>
            <td>${s.parent_name||'-'}</td>
            <td>${s.fees_status==='paid'?'<span class="badge b-green">Paid</span>':s.fees_status==='partial'?'<span class="badge b-gold">Partial</span>':'<span class="badge b-red">Pending</span>'}</td>
            <td style="display:flex;gap:6px;flex-wrap:wrap">
              <button class="btn btn-outline btn-sm" onclick="viewStudent('${s._id||s.id}')">View</button>
              <button class="btn btn-m btn-sm" onclick="openEditStudent('${s._id||s.id}')">Edit</button>
              <button class="btn btn-red btn-sm" onclick="deleteStudent('${s._id||s.id}','${s.name}')">Del</button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`);
}

function viewStudent(id){
  const s=allStudents.find(x=>(x._id||x.id)===id);if(!s)return;
  setPage(s.name,`
  <button class="back-btn" onclick="loadStudents()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Back</button>
  <div class="card">
    <div class="profile-row">
      <div class="profile-av">${s.photo_url?`<img src="${s.photo_url}">`:`${initials(s.name)}`}</div>
      <div>
        <div class="profile-name">${s.name}</div>
        <div class="profile-code">${s.code||''}</div>
        <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">
          <span class="badge b-gray">${s.class_name||s.standard||'-'}</span>
          <span class="badge b-gray">Roll ${s.roll_no||'-'}</span>
          ${s.fees_status==='paid'?'<span class="badge b-green">Fees Paid</span>':s.fees_status==='partial'?'<span class="badge b-gold">Fees Partial</span>':'<span class="badge b-red">Fees Pending</span>'}
        </div>
      </div>
    </div>
    <div class="info-grid">
      <div class="info-cell"><div class="info-cell-label">Parent</div><div class="info-cell-val">${s.parent_name||'-'}</div></div>
      <div class="info-cell"><div class="info-cell-label">Parent Phone</div><div class="info-cell-val">${s.parent_phone||'-'}</div></div>
      <div class="info-cell"><div class="info-cell-label">DOB</div><div class="info-cell-val">${s.dob?new Date(s.dob).toLocaleDateString('en-IN'):'-'}</div></div>
      <div class="info-cell"><div class="info-cell-label">Blood Group</div><div class="info-cell-val">${s.blood_group||'-'}</div></div>
      <div class="info-cell"><div class="info-cell-label">Address</div><div class="info-cell-val">${s.address||'-'}</div></div>
      <div class="info-cell"><div class="info-cell-label">Bus</div><div class="info-cell-val">${s.has_bus?'🚌 Yes — '+（s.bus_route||''):' No'}</div></div>
      <div class="info-cell"><div class="info-cell-label">Gender</div><div class="info-cell-val">${s.gender||'-'}</div></div>
      <div class="info-cell"><div class="info-cell-label">Admission</div><div class="info-cell-val">${s.admission_date?new Date(s.admission_date).toLocaleDateString('en-IN'):'-'}</div></div>
    </div>
    ${s.remarks?`<div style="border-left:3px solid var(--m);padding:10px 14px;border-radius:0 8px 8px 0;background:var(--m-pale);margin-top:8px"><div style="font-size:10px;color:var(--m);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">Remarks</div><div style="font-size:13px">${s.remarks}</div></div>`:''}
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-m" onclick="openEditStudent('${s._id||s.id}')">Edit Student</button>
      <button class="btn btn-red" onclick="deleteStudent('${s._id||s.id}','${s.name}')">Delete</button>
    </div>
  </div>`);
}

function openEditStudent(id){
  const s=allStudents.find(x=>(x._id||x.id)===id);if(!s)return;
  editingStudentId=id;
  ['name','phone','roll','parent','address','bus_route','remarks'].forEach(f=>{
    const el=document.getElementById('es_'+f);
    if(el)el.value=f==='phone'?s.parent_phone||'':f==='roll'?s.roll_no||'':f==='parent'?s.parent_name||'':s[f]||'';
  });
  document.getElementById('es_class').value=s.class_name||s.standard||'';
  document.getElementById('es_blood').value=s.blood_group||'';
  document.getElementById('es_bus').value=s.has_bus===true?'true':s.has_bus===false?'false':'';
  document.getElementById('es_pass').value='';
  document.getElementById('editStudentModal').classList.add('show');
}

async function saveEditStudent(){
  const payload={};
  const name=document.getElementById('es_name').value.trim();
  const phone=document.getElementById('es_phone').value.trim();
  const cls=document.getElementById('es_class').value;
  const roll=document.getElementById('es_roll').value;
  const parent=document.getElementById('es_parent').value.trim();
  const pphone=document.getElementById('es_parent_phone').value.trim();
  const addr=document.getElementById('es_address').value.trim();
  const blood=document.getElementById('es_blood').value;
  const bus=document.getElementById('es_bus').value;
  const route=document.getElementById('es_bus_route').value.trim();
  const remarks=document.getElementById('es_remarks').value.trim();
  const pass=document.getElementById('es_pass').value.trim();
  if(name)payload.name=name;
  if(phone)payload.parent_phone=phone;
  if(cls)payload.class_name=cls;
  if(roll)payload.roll_no=Number(roll);
  if(parent)payload.parent_name=parent;
  if(pphone)payload.parent_phone=pphone;
  if(addr)payload.address=addr;
  if(blood)payload.blood_group=blood;
  if(bus!=='')payload.has_bus=bus==='true';
  if(route)payload.bus_route=route;
  if(remarks)payload.remarks=remarks;
  if(pass)payload.password=pass;
  try{
    const res=await fetch(API+'/students/'+editingStudentId,{method:'PUT',headers:h(),body:JSON.stringify(payload)});
    if(res.ok){showToast('Student updated!');closeModal('editStudentModal');loadStudents();}
    else{const e=await res.json();showToast(e.message||'Failed',false);}
  }catch(_){showToast('Network error',false);}
}

async function deleteStudent(id,name){
  if(!confirm(`Delete student "${name}"? This cannot be undone.`))return;
  try{
    const res=await fetch(API+'/students/'+id,{method:'DELETE',headers:h()});
    if(res.ok){showToast('Student deleted');allStudents=allStudents.filter(s=>(s._id||s.id)!==id);renderStudentsList();}
    else showToast('Failed to delete',false);
  }catch(_){showToast('Network error',false);}
}

async function saveEditTeacher(){
  const payload={};
  const name=document.getElementById('et_name').value.trim();
  const phone=document.getElementById('et_phone').value.trim();
  const subj=document.getElementById('et_subject').value.trim();

  if(!txt&&!vid){showToast('Write a message first',false);return;}
  try{
    const res=await fetch(API+'/posts',{method:'POST',headers:h()),body:JSON.stringify({text_content:txt,video_link:vid||null,class_name:cls,target_class:cls})});
    if(res.ok){
      const d=await res.json();
      classPosts.unshift(d.post||{text_content:txt,video_link:vid,created_at:new Date(),posted_by_name:'Admin'});
      showToast('Posted to '+cls+'!');
      document.getElementById('groupMsg').value='';
      document.getElementById('groupVideo').value='';
      renderClassGroup(cls);
    }else showToast('Failed to post',false);
  }catch(_){showToast('Network error',false);}
}

async function deleteGroupPost(id,cls){
  if(!confirm('Delete this post?'))return;
  try{
    const res=await fetch(API+'/posts/'+id,{method:'DELETE',headers:h()});
    if(res.ok){classPosts=classPosts.filter(p=>(p._id||p.id)!==id);showToast('Deleted');renderClassGroup(cls);}
    else showToast('Failed',false);
  }catch(_){showToast('Network error',false);}
}
</script>
</body>
