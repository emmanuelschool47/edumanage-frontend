<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Teacher Panel — EduManage</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--white:#fff;--black:#0a0a0a;--gray-50:#fafafa;--gray-100:#f5f5f5;--gray-200:#eee;--gray-300:#e0e0e0;--gray-400:#bdbdbd;--gray-500:#9e9e9e;--gray-600:#757575;--gray-700:#616161;--green:#1a7a4a;--green-light:#e8f5ee;--red:#c0392b;--red-light:#fdf0ef;--gold:#b8860b;--font-display:'Playfair Display',serif;--font-body:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;--radius:12px}
body{font-family:var(--font-body);background:var(--gray-50);color:var(--black);padding-bottom:80px;min-height:100vh}
.login-screen{min-height:100vh;background:var(--black);display:flex;align-items:center;justify-content:center;padding:20px;position:relative}
.login-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.login-card{background:var(--white);border-radius:20px;padding:28px 22px;width:100%;max-width:360px;position:relative;z-index:1;box-shadow:0 25px 60px rgba(0,0,0,.4)}
.login-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px}
.login-lm{width:34px;height:34px;background:var(--black);color:var(--white);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px}
.login-name{font-family:var(--font-display);font-size:20px;font-weight:700}
.login-sub{text-align:center;font-size:12px;color:var(--gray-400);margin-bottom:20px}
.login-label{display:block;font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.login-input{width:100%;padding:12px 14px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--radius);font-family:var(--font-body);font-size:14px;color:var(--black);outline:none;margin-bottom:12px}
.login-input:focus{border-color:var(--black);background:var(--white)}
.login-btn{width:100%;padding:13px;background:var(--black);color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.login-err{background:var(--red-light);border:1px solid rgba(192,57,43,.15);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--red);margin-top:10px;display:none}
.login-err.show{display:block}
.login-sp{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:var(--white);border-radius:50%;animation:spin .7s linear infinite}
.topbar{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--gray-200);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.tl{font-family:var(--font-display);font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.lm{width:28px;height:28px;background:var(--black);color:var(--white);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.tr{display:flex;align-items:center;gap:8px}
.ls{display:flex;gap:2px;background:var(--gray-100);border-radius:100px;padding:2px}
.lb{padding:4px 9px;border-radius:100px;border:none;background:transparent;font-family:var(--font-body);font-size:10px;font-weight:700;color:var(--gray-400);cursor:pointer}
.lb.active{background:var(--white);color:var(--black)}
.ob{background:none;border:1px solid var(--gray-200);border-radius:7px;padding:6px 10px;font-size:11px;font-weight:600;color:var(--gray-500);cursor:pointer;font-family:var(--font-body)}
.cnt{max-width:600px;margin:0 auto}
.hdr{background:var(--black);color:var(--white);padding:20px 16px 24px;position:relative;overflow:hidden}
.hg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:32px 32px}
.hc{position:relative;z-index:1}
.grt{font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:600}
.tnm{font-family:var(--font-display);font-size:24px;font-weight:700;line-height:1.1;margin-bottom:6px}
.cps{display:flex;gap:6px;flex-wrap:wrap}
.cp{padding:3px 10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);border-radius:100px;font-size:10px;color:rgba(255,255,255,.7);font-weight:500}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 16px}
.sc{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px;text-align:center}
.sv{font-family:var(--font-display);font-size:24px;font-weight:700;line-height:1;margin-bottom:2px}
.sl{font-size:10px;color:var(--gray-400);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.sec{padding:0 16px;margin-bottom:18px}
.stt{font-family:var(--font-display);font-size:16px;font-weight:600;margin-bottom:10px}
.card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.si{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);margin-bottom:8px;cursor:pointer}
.sav{width:40px;height:40px;background:var(--gray-100);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:16px;color:var(--gray-600);flex-shrink:0}
.snm{font-size:14px;font-weight:600;margin-bottom:2px}
.smeta{font-size:11px;color:var(--gray-400)}
.att-sheet{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden}
.att-date-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--gray-100)}
.att-dl{font-size:13px;font-weight:600}
.di{padding:6px 10px;border:1.5px solid var(--gray-200);border-radius:8px;font-family:var(--font-mono);font-size:12px;color:var(--black);outline:none}
.di:focus{border-color:var(--black)}
.ar{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--gray-100);gap:10px}
.ar:last-child{border-bottom:none}
.aroll{font-family:var(--font-mono);font-size:12px;color:var(--gray-400);min-width:26px}
.anm{font-size:13px;font-weight:500;flex:1}
.atog{display:flex;border:1.5px solid var(--gray-200);border-radius:8px;overflow:hidden}
.atb{padding:6px 13px;border:none;font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--gray-400)}
.atb.pa{background:var(--green);color:var(--white)}
.atb.aa{background:var(--red);color:var(--white)}
.save-btn{width:calc(100% - 28px);margin:14px;padding:12px;background:var(--black);color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer}
.marks-sheet{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden}
.ms-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--gray-100)}
.ms-fields{padding:10px 14px 14px;display:none}
.ms-fields.open{display:block}
.mrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.mlbl{font-size:13px;font-weight:500;min-width:100px;color:var(--gray-700)}
.minput{flex:1;padding:7px 10px;border:1.5px solid var(--gray-200);border-radius:8px;font-family:var(--font-mono);font-size:13px;color:var(--black);outline:none;text-align:center;max-width:75px}
.minput:focus{border-color:var(--black)}
.msave{width:100%;padding:9px;background:var(--black);color:var(--white);border:none;border-radius:8px;font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;margin-top:6px}
.composer{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px}
.ctxt{width:100%;min-height:90px;padding:11px;border:1.5px solid var(--gray-200);border-radius:var(--radius);font-family:var(--font-body);font-size:14px;color:var(--black);resize:none;outline:none;margin-bottom:10px}
.ctxt:focus{border-color:var(--black)}
.post-btn{width:100%;padding:12px;background:var(--black);color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer}
.pi{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:12px;margin-bottom:8px}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pau{font-size:12px;font-weight:700}
.ptm{font-size:10px;color:var(--gray-300)}
.ptxt{font-size:13px;color:var(--gray-700);line-height:1.6}
.del-btn{background:none;border:none;cursor:pointer;color:var(--gray-300);padding:2px}
.del-btn:hover{color:var(--red)}
.del-btn svg{width:13px;height:13px;stroke:currentColor}
.nf{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.fi{width:100%;padding:10px 13px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--radius);font-family:var(--font-body);font-size:13px;color:var(--black);outline:none}
.fi:focus{border-color:var(--black);background:var(--white)}
.fita{width:100%;padding:10px 13px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--radius);font-family:var(--font-body);font-size:13px;color:var(--black);outline:none;resize:none;min-height:80px}
.fita:focus{border-color:var(--black);background:var(--white)}
.send-btn{width:100%;padding:12px;background:var(--black);color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:var(--gray-100);border:none;border-radius:8px;padding:9px 14px;font-family:var(--font-body);font-size:13px;color:var(--gray-600);cursor:pointer;margin:14px 16px 10px}
.back-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2}
.det-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px;margin:0 16px 12px}
.il{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;margin-bottom:10px}
.ir{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--gray-100)}
.ir:last-child{border-bottom:none}
.irl{font-size:12px;color:var(--gray-400);font-weight:500}
.irv{font-size:13px;font-weight:600}
.bn{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--gray-200);display:flex;padding:6px 0 8px;z-index:100}
.bb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;background:none;border:none;cursor:pointer}
.bi{width:21px;height:21px;stroke:var(--gray-300)}
.bla{font-size:9px;font-weight:600;color:var(--gray-300);text-transform:uppercase;letter-spacing:.5px}
.bb.active .bi{stroke:var(--black)}
.bb.active .bla{color:var(--black)}
.ls2{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px}
.sp{width:26px;height:26px;border:2px solid var(--gray-200);border-top-color:var(--black);border-radius:50%;animation:spin .8s linear infinite}
.lt{font-size:13px;color:var(--gray-400);text-align:center}
.eb{text-align:center;padding:28px;color:var(--gray-300)}
.eb p{font-size:13px}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--black);color:var(--white);padding:9px 18px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen" style="display:none">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-lm">E</div>
      <div class="login-name">EduManage</div>
    </div>
    <div class="login-sub">Teacher Login</div>
    <label class="login-label">Teacher Code</label>
    <input type="text" class="login-input" id="lCode" placeholder="e.g. TCH001" autocomplete="off" spellcheck="false" style="text-transform:uppercase">
    <label class="login-label">Password</label>
    <input type="password" class="login-input" id="lPass" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" id="lBtn" onclick="doLogin()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Sign In
    </button>
    <div class="login-err" id="lErr"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="appScreen" style="display:none">
  <div class="topbar">
    <div class="tl"><div class="lm">E</div>EduManage</div>
    <div class="tr">
      <div class="ls">
        <button class="lb active" onclick="setLang('en')">EN</button>
        <button class="lb" onclick="setLang('hi')">HI</button>
        <button class="lb" onclick="setLang('mr')">MR</button>
      </div>
      <button class="ob" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="cnt" id="mainContent">
    <div class="ls2"><div class="sp"></div><div class="lt">Loading...</div></div>
  </div>
  <nav class="bn">
    <button class="bb active" onclick="showPage('students',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="bla">Students</span>
    </button>
    <button class="bb" onclick="showPage('attendance',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span class="bla">Attend.</span>
    </button>
    <button class="bb" onclick="showPage('marks',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span class="bla">Marks</span>
    </button>
    <button class="bb" onclick="showPage('group',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="bla">Group</span>
    </button>
    <button class="bb" onclick="showPage('notify',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="bla">Notify</span>
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://edumanage-backend-xi.vercel.app/api';

let activeToken = null;
let cd = null;
let students = [];
let attState = {};
let cp = 'students';
let lang = localStorage.getItem('edu-lang') || 'en';

const T = {
  en:{students:'Students',attend:'Attendance',marks:'Marks',group:'Class Group',notify:'Notify',my_class:'My Class',total:'Students',mark_att:'Mark Attendance',update_marks:'Update Marks',post_group:'Post in Group',send_notif:'Send Notification',save_att:'Save Attendance',save_marks:'Save Marks',post:'Post',notif_sent:'Notification sent',att_saved:'Attendance saved',marks_saved:'Marks saved',posted:'Posted successfully',P:'P',A:'A',sel_date:'Select Date',write:'Write something for your class...',no_class:'No class assigned. Contact admin.',no_students:'No students in your class',no_posts:'No posts yet'},
  hi:{students:'छात्र',attend:'उपस्थिति',marks:'अंक',group:'क्लास ग्रुप',notify:'सूचना',my_class:'मेरी कक्षा',total:'छात्र',mark_att:'उपस्थिति लगाएं',update_marks:'अंक अपडेट करें',post_group:'ग्रुप में पोस्ट करें',send_notif:'सूचना भेजें',save_att:'उपस्थिति सहेजें',save_marks:'अंक सहेजें',post:'पोस्ट करें',notif_sent:'सूचना भेजी गई',att_saved:'उपस्थिति सहेजी गई',marks_saved:'अंक सहेजे गए',posted:'पोस्ट हुआ',P:'उ',A:'अ',sel_date:'तिथि चुनें',write:'कक्षा के लिए लिखें...',no_class:'कोई कक्षा नहीं। एडमिन से संपर्क करें।',no_students:'कोई छात्र नहीं',no_posts:'कोई पोस्ट नहीं'},
  mr:{students:'विद्यार्थी',attend:'हजेरी',marks:'गुण',group:'वर्ग गट',notify:'सूचना',my_class:'माझा वर्ग',total:'विद्यार्थी',mark_att:'हजेरी नोंदवा',update_marks:'गुण अपडेट करा',post_group:'गटात पोस्ट करा',send_notif:'सूचना पाठवा',save_att:'हजेरी जतन करा',save_marks:'गुण जतन करा',post:'पोस्ट करा',notif_sent:'सूचना पाठवली',att_saved:'हजेरी जतन झाली',marks_saved:'गुण जतन झाले',posted:'पोस्ट झाले',P:'उ',A:'अ',sel_date:'तारीख निवडा',write:'वर्गासाठी लिहा...',no_class:'कोणताही वर्ग नाही.',no_students:'विद्यार्थी नाहीत',no_posts:'पोस्ट नाही'}
};
function t(k){return T[lang][k]||T.en[k]||k}
function setLang(l){lang=l;localStorage.setItem('edu-lang',l);document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase()===l));showPage(cp)}
setLang(lang);

function init() {
  const savedToken = localStorage.getItem('tch_token');
  if (savedToken && savedToken.length > 20) {
    activeToken = savedToken;
    showApp();
    loadData();
  } else {
    showLogin();
  }
}

function showLogin() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
}

async function doLogin() {
  const code = document.getElementById('lCode').value.trim().toUpperCase();
  const pass = document.getElementById('lPass').value.trim();
  const errEl = document.getElementById('lErr');
  const btn = document.getElementById('lBtn');
  if (!code || !pass) { errEl.textContent='Please enter code and password';errEl.classList.add('show');return; }
  errEl.classList.remove('show');
  btn.innerHTML = '<div class="login-sp"></div> Signing in...';
  btn.disabled = true;
  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, password: pass })
    });
    const data = await res.json();
    if (data.success && data.token) {
      if (data.user.role !== 'teacher') {
        errEl.textContent = 'This login is for teachers only';
        errEl.classList.add('show');
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Sign In';
        btn.disabled = false;
        return;
      }
      activeToken = data.token;
      localStorage.setItem('tch_token', data.token);
      localStorage.setItem('tch_user', JSON.stringify(data.user));
      showApp();
      loadData();
    } else {
      errEl.textContent = data.error || 'Invalid code or password';
      errEl.classList.add('show');
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Sign In';
      btn.disabled = false;
    }
  } catch(e) {
    errEl.textContent = 'Could not connect. Check internet.';
    errEl.classList.add('show');
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Sign In';
    btn.disabled = false;
  }
}

document.getElementById('lCode').addEventListener('input', function(){ this.value = this.value.toUpperCase(); });

async function loadData() {
  document.getElementById('mainContent').innerHTML = '<div class="ls2"><div class="sp"></div><div class="lt">Loading your class...</div></div>';
  try {
    const res = await fetch(API + '/teachers/my-class', {
      headers: { 'Authorization': 'Bearer ' + activeToken }
    });
    if (res.status === 401) {
      activeToken = null;
      localStorage.removeItem('tch_token');
      localStorage.removeItem('tch_user');
      showLogin();
      document.getElementById('lErr').textContent = 'Session expired. Please login again.';
      document.getElementById('lErr').classList.add('show');
      return;
    }
    const data = await res.json();
    if (!data.class) {
      document.getElementById('mainContent').innerHTML = `<div class="ls2"><div class="lt">${t('no_class')}</div></div>`;
      return;
    }
    cd = data.class;
    students = data.students || [];
    showPage('students');
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `<div class="ls2"><div class="lt">Could not load.<br>Check internet.</div><button onclick="loadData()" style="margin-top:12px;padding:10px 20px;background:var(--black);color:var(--white);border:none;border-radius:8px;cursor:pointer;font-family:var(--font-body);font-weight:600;font-size:13px">Try Again</button></div>`;
  }
}

function showPage(p, btn) {
  cp = p;
  if (btn) { document.querySelectorAll('.bb').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
  if (!cd) { loadData(); return; }
  const c = document.getElementById('mainContent');
  if (p==='students') c.innerHTML = rStudents();
  else if (p==='attendance') c.innerHTML = rAtt();
  else if (p==='marks') c.innerHTML = rMarks();
  else if (p==='group') { rGroup(); return; }
  else if (p==='notify') c.innerHTML = rNotify();
}

function getUserName() {
  try { const u=JSON.parse(localStorage.getItem('tch_user')||'{}'); return u.name||'Teacher'; } catch(e){return'Teacher'}
}

function rStudents() {
  return `
  <div class="hdr"><div class="hg"></div><div class="hc">
    <div class="grt">Teacher</div>
    <div class="tnm">${getUserName()}</div>
    <div class="cps">
      <span class="cp">Class ${cd.standard||''}</span>
      <span class="cp">${students.length} ${t('total')}</span>
    </div>
  </div></div>
  <div class="stats-row">
    <div class="sc"><div class="sv">${students.length}</div><div class="sl">${t('total')}</div></div>
    <div class="sc"><div class="sv">${cd.standard||'N/A'}</div><div class="sl">Class</div></div>
    <div class="sc"><div class="sv">${cd.section||'A'}</div><div class="sl">Section</div></div>
  </div>
  <div class="sec"><div class="stt">${t('my_class')}</div>
  ${students.length>0?students.map(s=>`
    <div class="si" onclick="viewStudent('${s.id}')">
      <div class="sav">${s.name[0].toUpperCase()}</div>
      <div style="flex:1">
        <div class="snm">${s.name}</div>
        <div class="smeta">Roll ${s.roll_no||'N/A'} · ${s.code}</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--gray-300)" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>`).join(''):
  `<div class="eb"><p>${t('no_students')}</p></div>`}
  </div>`;
}

function viewStudent(id) {
  const s=students.find(x=>x.id===id); if(!s)return;
  const SUBS=['Math','Science','English','Hindi','Social Science','Marathi'];
  document.getElementById('mainContent').innerHTML=`
  <button class="back-btn" onclick="showPage('students',document.querySelectorAll('.bb')[0])">
    <svg viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Back
  </button>
  <div class="det-card">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <div class="sav" style="width:48px;height:48px;font-size:20px">${s.name[0].toUpperCase()}</div>
      <div>
        <div style="font-family:var(--font-display);font-size:18px;font-weight:700">${s.name}</div>
        <div style="font-size:12px;color:var(--gray-400)">Roll ${s.roll_no||'N/A'} · ${s.code}</div>
      </div>
    </div>
    <div class="il">
      ${ir('Parent',s.parent_name||'N/A')}${ir('Phone',s.parent_phone||s.phone||'N/A')}${ir('Blood',s.blood_group||'N/A')}${ir('Bus',s.has_bus?'Yes':'No')}
    </div>
  </div>
  <div class="det-card">
    <div style="font-family:var(--font-display);font-size:16px;font-weight:600;margin-bottom:10px">${t('update_marks')}</div>
    <div style="margin-bottom:12px"><label style="font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px">Exam Type</label><select class="fi" id="etype_${s.id}"><option>Unit Test</option><option>Half Yearly</option><option>Annual</option><option>Monthly Test</option></select></div>
    ${SUBS.map(sub=>`<div class="mrow"><div class="mlbl">${sub}</div><input type="number" class="minput" id="mk_${s.id}_${sub.replace(/ /g,'_')}" placeholder="0" min="0" max="100"></div>`).join('')}
    <button class="msave" onclick="saveMks('${s.id}')">Save Marks</button>
  </div>
  <div class="det-card">
    <div style="font-family:var(--font-display);font-size:16px;font-weight:600;margin-bottom:10px">Remarks</div>
    <textarea class="fita" id="rem_${s.id}" placeholder="Write remarks..."></textarea>
    <button class="msave" style="margin-top:4px" onclick="toast('Saved')">Save Remark</button>
  </div>`;
}

function ir(l,v){return`<div class="ir"><span class="irl">${l}</span><span class="irv">${v}</span></div>`}

async function saveMks(sid) {
  const et=document.getElementById('etype_'+sid)?.value||'Unit Test';
  const SUBS=['Math','Science','English','Hindi','Social Science','Marathi'];
  let saved=0;
  for(const sub of SUBS){
    const el=document.getElementById('mk_'+sid+'_'+sub.replace(/ /g,'_'));
    if(!el||el.value==='')continue;
    const val=parseInt(el.value);if(isNaN(val))continue;
    await fetch(API+'/marks/update',{method:'POST',headers:{Authorization:'Bearer '+activeToken,'Content-Type':'application/json'},body:JSON.stringify({student_id:sid,subject:sub,marks_obtained:val,total_marks:100,exam_type:et})});
    saved++;
  }
  toast(saved>0?t('marks_saved'):'Enter at least one mark');
}

function rAtt() {
  const today=new Date().toISOString().split('T')[0];
  students.forEach(s=>{if(!attState[s.id])attState[s.id]='present'});
  return `<div style="padding:16px"><div class="stt" style="margin-bottom:12px">${t('mark_att')}</div>
  <div class="att-sheet">
    <div class="att-date-row"><div class="att-dl">${t('sel_date')}</div><input type="date" class="di" id="attDate" value="${today}"></div>
    ${students.map(s=>`<div class="ar">
      <div class="aroll">${s.roll_no||'-'}</div>
      <div class="anm">${s.name}</div>
      <div class="atog">
        <button class="atb ${attState[s.id]==='present'?'pa':''}" id="pb_${s.id}" onclick="setAtt('${s.id}','present')">${t('P')}</button>
        <button class="atb ${attState[s.id]==='absent'?'aa':''}" id="ab_${s.id}" onclick="setAtt('${s.id}','absent')">${t('A')}</button>
      </div>
    </div>`).join('')}
    <button class="save-btn" onclick="saveAtt()">${t('save_att')}</button>
  </div></div>`;
}

function setAtt(sid,status) {
  attState[sid]=status;
  const pb=document.getElementById('pb_'+sid),ab=document.getElementById('ab_'+sid);
  if(pb)pb.className='atb '+(status==='present'?'pa':'');
  if(ab)ab.className='atb '+(status==='absent'?'aa':'');
}

async function saveAtt() {
  const date=document.getElementById('attDate')?.value;
  if(!date){toast('Select date');return}
  const list=students.map(s=>({student_id:s.id,status:attState[s.id]||'present'}));
  try{
    const r=await fetch(API+'/attendance/mark',{method:'POST',headers:{Authorization:'Bearer '+activeToken,'Content-Type':'application/json'},body:JSON.stringify({attendance_list:list,date})});
    const d=await r.json();
    if(d.success)toast(t('att_saved'));
    else toast(d.error||'Error');
  }catch(e){toast('Could not save')}
}

function rMarks() {
  const SUBS=['Math','Science','English','Hindi','Social Science','Marathi'];
  return `<div style="padding:16px"><div class="stt" style="margin-bottom:12px">${t('update_marks')}</div>
  <div class="marks-sheet">
    ${students.map(s=>`<div>
      <div class="ms-header" onclick="toggleMs('${s.id}')">
        <div class="sav" style="width:36px;height:36px;font-size:14px">${s.name[0].toUpperCase()}</div>
        <div style="flex:1"><div style="font-size:13px;font-weight:600">${s.name}</div><div style="font-size:11px;color:var(--gray-400)">Roll ${s.roll_no||'N/A'}</div></div>
        <svg id="exp_${s.id}" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--gray-300)" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="ms-fields" id="mf_${s.id}">
        <div style="margin-bottom:10px"><label style="font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px">Exam Type</label><select class="fi" id="bulk_et_${s.id}"><option>Unit Test</option><option>Half Yearly</option><option>Annual</option><option>Monthly Test</option></select></div>
        ${SUBS.map(sub=>`<div class="mrow"><div class="mlbl">${sub}</div><input type="number" class="minput" id="bulk_${s.id}_${sub.replace(/ /g,'_')}" placeholder="0" min="0" max="100"></div>`).join('')}
        <button class="msave" onclick="bulkSave('${s.id}')">${t('save_marks')}</button>
      </div>
    </div>`).join('')}
  </div></div>`;
}

function toggleMs(id) {
  const f=document.getElementById('mf_'+id),e=document.getElementById('exp_'+id);
  const open=f.classList.toggle('open');
  if(e)e.style.transform=open?'rotate(180deg)':'';
}

async function bulkSave(sid) {
  const et=document.getElementById('bulk_et_'+sid)?.value||'Unit Test';
  const SUBS=['Math','Science','English','Hindi','Social Science','Marathi'];
  let saved=0;
  for(const sub of SUBS){
    const el=document.getElementById('bulk_'+sid+'_'+sub.replace(/ /g,'_'));
    if(!el||el.value==='')continue;
    const val=parseInt(el.value);if(isNaN(val))continue;
    await fetch(API+'/marks/update',{method:'POST',headers:{Authorization:'Bearer '+activeToken,'Content-Type':'application/json'},body:JSON.stringify({student_id:sid,subject:sub,marks_obtained:val,total_marks:100,exam_type:et})});
    saved++;
  }
  const s=students.find(x=>x.id===sid);
  toast(saved>0?t('marks_saved')+' — '+(s?.name||''):'Enter at least one mark');
}

async function rGroup() {
  const c=document.getElementById('mainContent');
  c.innerHTML=`<div style="padding:16px"><div class="stt" style="margin-bottom:12px">${t('post_group')}</div>
  <div class="composer">
    <textarea class="ctxt" id="postTxt" placeholder="${t('write')}"></textarea>
    <button class="post-btn" onclick="submitPost()">${t('post')}</button>
  </div>
  <div style="margin-top:16px"><div class="stt" style="margin-bottom:10px">Recent Posts</div>
  <div id="gpl"><div class="ls2" style="min-height:100px"><div class="sp"></div></div></div></div></div>`;
  loadPosts();
}

async function submitPost() {
  const txt=document.getElementById('postTxt')?.value.trim();
  if(!txt){toast('Write something first');return}
  try{
    const r=await fetch(API+'/posts',{method:'POST',headers:{Authorization:'Bearer '+activeToken,'Content-Type':'application/json'},body:JSON.stringify({class_id:cd.id,text_content:txt,post_type:'general'})});
    const d=await r.json();
    if(d.success){toast(t('posted'));document.getElementById('postTxt').value='';loadPosts();}
    else toast(d.error||'Error');
  }catch(e){toast('Could not post')}
}

async function loadPosts() {
  const el=document.getElementById('gpl');if(!el)return;
  try{
    const r=await fetch(API+'/posts/'+cd.id,{headers:{Authorization:'Bearer '+activeToken}});
    const d=await r.json();const posts=d.posts||[];
    el.innerHTML=posts.length>0?posts.map(p=>`<div class="pi"><div class="ph"><span class="pau">${p.posted_by_name||'Teacher'}</span><div style="display:flex;align-items:center;gap:8px"><span class="ptm">${fmtDate(p.created_at)}</span><button class="del-btn" onclick="delPost('${p.id}')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button></div></div>${p.text_content?`<div class="ptxt">${p.text_content}</div>`:''} ${p.video_link?`<a href="${p.video_link}" target="_blank" style="font-size:12px;color:var(--black)">Watch Video</a>`:''}</div>`).join(''):
    `<div class="eb"><p>${t('no_posts')}</p></div>`;
  }catch(e){if(el)el.innerHTML=`<div class="eb"><p>Could not load</p></div>`}
}

async function delPost(id) {
  try{await fetch(API+'/posts/'+id,{method:'DELETE',headers:{Authorization:'Bearer '+activeToken}});toast('Post deleted');loadPosts();}catch(e){toast('Error')}
}

function rNotify() {
  return `<div style="padding:16px"><div class="stt" style="margin-bottom:12px">${t('send_notif')}</div>
  <div class="nf">
    <div class="fg"><label>Title *</label><input type="text" class="fi" id="ntit" placeholder="e.g. Holiday Tomorrow"></div>
    <div class="fg"><label>Message *</label><textarea class="fita" id="nmsg" placeholder="Write your message..."></textarea></div>
    <button class="send-btn" onclick="sendNotif()">${t('send_notif')}</button>
  </div></div>`;
}

async function sendNotif() {
  const title=document.getElementById('ntit')?.value.trim();
  const msg=document.getElementById('nmsg')?.value.trim();
  if(!title||!msg){toast('Enter title and message');return}
  try{
    const r=await fetch(API+'/notifications/send',{method:'POST',headers:{Authorization:'Bearer '+activeToken,'Content-Type':'application/json'},body:JSON.stringify({title,message:msg,target_type:'class',target_id:cd.id,type:'general'})});
    const d=await r.json();
    if(d.success){toast(t('notif_sent'));document.getElementById('ntit').value='';document.getElementById('nmsg').value='';}
    else toast(d.error||'Error');
  }catch(e){toast('Could not send')}
}

function fmtDate(ts){if(!ts)return'';try{return new Date(ts).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}catch(e){return''}}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3000)}
function doLogout(){activeToken=null;localStorage.removeItem('tch_token');localStorage.removeItem('tch_user');cd=null;students=[];showLogin();document.getElementById('lCode').value='';document.getElementById('lPass').value='';document.getElementById('lErr').classList.remove('show')}

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
init();
</script>
</body>
</html><!DOCTYPE html>
<html lang="en">
<head>

<title>Teacher Panel — EduManage</title>
<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--white:#fff;--black:#0a0a0a;--gray-50:#fafafa;--gray-100:#f5f5f5;--gray-200:#eee;--gray-300:#e0e0e0;--gray-400:#bdbdbd;--gray-500:#9e9e9e;--gray-600:#757575;--gray-700:#616161;--green:#1a7a4a;--green-light:#e8f5ee;--red:#c0392b;--red-light:#fdf0ef;--gold:#b8860b;--font-display:'Playfair Display',serif;--font-body:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;--radius:12px}
body{font-family:var(--font-body);background:var(--gray-50);color:var(--black);padding-bottom:80px;min-height:100vh}
.login-screen{min-height:100vh;background:var(--black);display:flex;align-items:center;justify-content:center;padding:20px;position:relative}
.login-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.login-card{background:var(--white);border-radius:20px;padding:28px 22px;width:100%;max-width:360px;position:relative;z-index:1;box-shadow:0 25px 60px rgba(0,0,0,.4)}
.login-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px}
.login-lm{width:34px;height:34px;background:var(--black);color:var(--white);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px}
.login-name{font-family:var(--font-display);font-size:20px;font-weight:700}
.login-sub{text-align:center;font-size:12px;color:var(--gray-400);margin-bottom:20px}
.login-label{display:block;font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.login-input{width:100%;padding:12px 14px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--radius);font-family:var(--font-body);font-size:14px;color:var(--black);outline:none;margin-bottom:12px}
.login-input:focus{border-color:var(--black);background:var(--white)}
.login-btn{width:100%;padding:13px;background:var(--black);color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.login-err{background:var(--red-light);border:1px solid rgba(192,57,43,.15);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--red);margin-top:10px;display:none}
.login-err.show{display:block}
.login-sp{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:var(--white);border-radius:50%;animation:spin .7s linear infinite}
.topbar{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--gray-200);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.tl{font-family:var(--font-display);font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.lm{width:28px;height:28px;background:var(--black);color:var(--white);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.tr{display:flex;align-items:center;gap:8px}
.ls{display:flex;gap:2px;background:var(--gray-100);border-radius:100px;padding:2px}
.lb{padding:4px 9px;border-radius:100px;border:none;background:transparent;font-family:var(--font-body);font-size:10px;font-weight:700;color:var(--gray-400);cursor:pointer}
.lb.active{background:var(--white);color:var(--black)}
.ob{background:none;border:1px solid var(--gray-200);border-radius:7px;padding:6px 10px;font-size:11px;font-weight:600;color:var(--gray-500);cursor:pointer;font-family:var(--font-body)}
.cnt{max-width:600px;margin:0 auto}
.hdr{background:var(--black);color:var(--white);padding:20px 16px 24px;position:relative;overflow:hidden}
.hg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:32px 32px}
.hc{position:relative;z-index:1}
.grt{font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:600}
.tnm{font-family:var(--font-display);font-size:24px;font-weight:700;line-height:1.1;margin-bottom:6px}
.cps{display:flex;gap:6px;flex-wrap:wrap}
.cp{padding:3px 10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);border-radius:100px;font-size:10px;color:rgba(255,255,255,.7);font-weight:500}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 16px}
.sc{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px;text-align:center}
.sv{font-family:var(--font-display);font-size:24px;font-weight:700;line-height:1;margin-bottom:2px}
.sl{font-size:10px;color:var(--gray-400);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.sec{padding:0 16px;margin-bottom:18px}
.stt{font-family:var(--font-display);font-size:16px;font-weight:600;margin-bottom:10px}
.card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.si{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);margin-bottom:8px;cursor:pointer}
.sav{width:40px;height:40px;background:var(--gray-100);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:16px;color:var(--gray-600);flex-shrink:0}
.snm{font-size:14px;font-weight:600;margin-bottom:2px}
.smeta{font-size:11px;color:var(--gray-400)}
.att-sheet{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden}
.att-date-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--gray-100)}
.att-dl{font-size:13px;font-weight:600}
.di{padding:6px 10px;border:1.5px solid var(--gray-200);border-radius:8px;font-family:var(--font-mono);font-size:12px;color:var(--black);outline:none}
.di:focus{border-color:var(--black)}
.ar{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--gray-100);gap:10px}
.ar:last-child{border-bottom:none}
.aroll{font-family:var(--font-mono);font-size:12px;color:var(--gray-400);min-width:26px}
.anm{font-size:13px;font-weight:500;flex:1}
.atog{display:flex;border:1.5px solid var(--gray-200);border-radius:8px;overflow:hidden}
.atb{padding:6px 13px;border:none;font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--gray-400)}
.atb.pa{background:var(--green);color:var(--white)}
.atb.aa{background:var(--red);color:var(--white)}
.save-btn{width:calc(100% - 28px);margin:14px;padding:12px;background:var(--black);color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer}
.marks-sheet{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden}
.ms-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--gray-100)}
.ms-fields{padding:10px 14px 14px;display:none}
.ms-fields.open{display:block}
.mrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.mlbl{font-size:13px;font-weight:500;min-width:100px;color:var(--gray-700)}
.minput{flex:1;padding:7px 10px;border:1.5px solid var(--gray-200);border-radius:8px;font-family:var(--font-mono);font-size:13px;color:var(--black);outline:none;text-align:center;max-width:75px}
.minput:focus{border-color:var(--black)}
.msave{width:100%;padding:9px;background:var(--black);color:var(--white);border:none;border-radius:8px;font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;margin-top:6px}
.composer{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px}
.ctxt{width:100%;min-height:90px;padding:11px;border:1.5px solid var(--gray-200);border-radius:var(--radius);font-family:var(--font-body);font-size:14px;color:var(--black);resize:none;outline:none;margin-bottom:10px}
.ctxt:focus{border-color:var(--black)}
.post-btn{width:100%;padding:12px;background:var(--black);color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer}
.pi{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:12px;margin-bottom:8px}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pau{font-size:12px;font-weight:700}
.ptm{font-size:10px;color:var(--gray-300)}
.ptxt{font-size:13px;color:var(--gray-700);line-height:1.6}
.del-btn{background:none;border:none;cursor:pointer;color:var(--gray-300);padding:2px}
.del-btn:hover{color:var(--red)}
.del-btn svg{width:13px;height:13px;stroke:currentColor}
.nf{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.fi{width:100%;padding:10px 13px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--radius);font-family:var(--font-body);font-size:13px;color:var(--black);outline:none}
.fi:focus{border-color:var(--black);background:var(--white)}
.fita{width:100%;padding:10px 13px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--radius);font-family:var(--font-body);font-size:13px;color:var(--black);outline:none;resize:none;min-height:80px}
.fita:focus{border-color:var(--black);background:var(--white)}
.send-btn{width:100%;padding:12px;background:var(--black);color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:var(--gray-100);border:none;border-radius:8px;padding:9px 14px;font-family:var(--font-body);font-size:13px;color:var(--gray-600);cursor:pointer;margin:14px 16px 10px}
.back-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2}
.det-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px;margin:0 16px 12px}
.il{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;margin-bottom:10px}
.ir{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--gray-100)}
.ir:last-child{border-bottom:none}
.irl{font-size:12px;color:var(--gray-400);font-weight:500}
.irv{font-size:13px;font-weight:600}
.bn{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--gray-200);display:flex;padding:6px 0 8px;z-index:100}
.bb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;background:none;border:none;cursor:pointer}
.bi{width:21px;height:21px;stroke:var(--gray-300)}
.bla{font-size:9px;font-weight:600;color:var(--gray-300);text-transform:uppercase;letter-spacing:.5px}
.bb.active .bi{stroke:var(--black)}
.bb.active .bla{color:var(--black)}
.ls2{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px}
.sp{width:26px;height:26px;border:2px solid var(--gray-200);border-top-color:var(--black);border-radius:50%;animation:spin .8s linear infinite}
.lt{font-size:13px;color:var(--gray-400);text-align:center}
.eb{text-align:center;padding:28px;color:var(--gray-300)}
.eb p{font-size:13px}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--black);color:var(--white);padding:9px 18px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen" style="display:none">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-lm">E</div>
      <div class="login-name">EduManage</div>
    </div>
    <div class="login-sub">Teacher Login</div>
    <label class="login-label">Teacher Code</label>
    <input type="text" class="login-input" id="lCode" placeholder="e.g. TCH001" autocomplete="off" spellcheck="false" style="text-transform:uppercase">
    <label class="login-label">Password</label>
    <input type="password" class="login-input" id="lPass" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" id="lBtn" onclick="doLogin()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Sign In
    </button>
    <div class="login-err" id="lErr"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="appScreen" style="display:none">
  <div class="topbar">
    <div class="tl"><div class="lm">E</div>EduManage</div>
    <div class="tr">
      <div class="ls">
        <button class="lb active" onclick="setLang('en')">EN</button>
        <button class="lb" onclick="setLang('hi')">HI</button>
        <button class="lb" onclick="setLang('mr')">MR</button>
      </div>
      <button class="ob" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="cnt" id="mainContent">
    <div class="ls2"><div class="sp"></div><div class="lt">Loading...</div></div>
  </div>
  <nav class="bn">
    <button class="bb active" onclick="showPage('students',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="bla">Students</span>
    </button>
    <button class="bb" onclick="showPage('attendance',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span class="bla">Attend.</span>
    </button>
    <button class="bb" onclick="showPage('marks',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span class="bla">Marks</span>
    </button>
    <button class="bb" onclick="showPage('group',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="bla">Group</span>
    </button>
    <button class="bb" onclick="showPage('notify',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="bla">Notify</span>
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://edumanage-backend-xi.vercel.app/api';

let activeToken = null;
let cd = null;
let students = [];
let attState = {};
let cp = 'students';
let lang = localStorage.getItem('edu-lang') || 'en';

const T = {
  en:{students:'Students',attend:'Attendance',marks:'Marks',group:'Class Group',notify:'Notify',my_class:'My Class',total:'Students',mark_att:'Mark Attendance',update_marks:'Update Marks',post_group:'Post in Group',send_notif:'Send Notification',save_att:'Save Attendance',save_marks:'Save Marks',post:'Post',notif_sent:'Notification sent',att_saved:'Attendance saved',marks_saved:'Marks saved',posted:'Posted successfully',P:'P',A:'A',sel_date:'Select Date',write:'Write something for your class...',no_class:'No class assigned. Contact admin.',no_students:'No students in your class',no_posts:'No posts yet'},
  hi:{students:'छात्र',attend:'उपस्थिति',marks:'अंक',group:'क्लास ग्रुप',notify:'सूचना',my_class:'मेरी कक्षा',total:'छात्र',mark_att:'उपस्थिति लगाएं',update_marks:'अंक अपडेट करें',post_group:'ग्रुप में पोस्ट करें',send_notif:'सूचना भेजें',save_att:'उपस्थिति सहेजें',save_marks:'अंक सहेजें',post:'पोस्ट करें',notif_sent:'सूचना भेजी गई',att_saved:'उपस्थिति सहेजी गई',marks_saved:'अंक सहेजे गए',posted:'पोस्ट हुआ',P:'उ',A:'अ',sel_date:'तिथि चुनें',write:'कक्षा के लिए लिखें...',no_class:'कोई कक्षा नहीं। एडमिन से संपर्क करें।',no_students:'कोई छात्र नहीं',no_posts:'कोई पोस्ट नहीं'},
  mr:{students:'विद्यार्थी',attend:'हजेरी',marks:'गुण',group:'वर्ग गट',notify:'सूचना',my_class:'माझा वर्ग',total:'विद्यार्थी',mark_att:'हजेरी नोंदवा',update_marks:'गुण अपडेट करा',post_group:'गटात पोस्ट करा',send_notif:'सूचना पाठवा',save_att:'हजेरी जतन करा',save_marks:'गुण जतन करा',post:'पोस्ट करा',notif_sent:'सूचना पाठवली',att_saved:'हजेरी जतन झाली',marks_saved:'गुण जतन झाले',posted:'पोस्ट झाले',P:'उ',A:'अ',sel_date:'तारीख निवडा',write:'वर्गासाठी लिहा...',no_class:'कोणताही वर्ग नाही.',no_students:'विद्यार्थी नाहीत',no_posts:'पोस्ट नाही'}
};
function t(k){return T[lang][k]||T.en[k]||k}
function setLang(l){lang=l;localStorage.setItem('edu-lang',l);document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase()===l));showPage(cp)}
setLang(lang);

function init() {
  const savedToken = localStorage.getItem('tch_token');
  if (savedToken && savedToken.length > 20) {
    activeToken = savedToken;
    showApp();
    loadData();
  } else {
    showLogin();
  }
}

function showLogin() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
}

async function doLogin() {
  const code = document.getElementById('lCode').value.trim().toUpperCase();
  const pass = document.getElementById('lPass').value.trim();
  const errEl = document.getElementById('lErr');
  const btn = document.getElementById('lBtn');
  if (!code || !pass) { errEl.textContent='Please enter code and password';errEl.classList.add('show');return; }
  errEl.classList.remove('show');
  btn.innerHTML = '<div class="login-sp"></div> Signing in...';
  btn.disabled = true;
  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, password: pass })
    });
    const data = await res.json();
    if (data.success && data.token) {
      if (data.user.role !== 'teacher') {
        errEl.textContent = 'This login is for teachers only';
        errEl.classList.add('show');
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Sign In';
        btn.disabled = false;
        return;
      }
      activeToken = data.token;
      localStorage.setItem('tch_token', data.token);
      localStorage.setItem('tch_user', JSON.stringify(data.user));
      showApp();
      loadData();
    } else {
      errEl.textContent = data.error || 'Invalid code or password';
      errEl.classList.add('show');
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Sign In';
      btn.disabled = false;
    }
  } catch(e) {
    errEl.textContent = 'Could not connect. Check internet.';
    errEl.classList.add('show');
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Sign In';
    btn.disabled = false;
  }
}

document.getElementById('lCode').addEventListener('input', function(){ this.value = this.value.toUpperCase(); });

async function loadData() {
  document.getElementById('mainContent').innerHTML = '<div class="ls2"><div class="sp"></div><div class="lt">Loading your class...</div></div>';
  try {
    const res = await fetch(API + '/teachers/my-class', {
      headers: { 'Authorization': 'Bearer ' + activeToken }
    });
    if (res.status === 401) {
      activeToken = null;
      localStorage.removeItem('tch_token');
      localStorage.removeItem('tch_user');
      showLogin();
      document.getElementById('lErr').textContent = 'Session expired. Please login again.';
      document.getElementById('lErr').classList.add('show');
      return;
    }
    const data = await res.json();
    if (!data.class) {
      document.getElementById('mainContent').innerHTML = `<div class="ls2"><div class="lt">${t('no_class')}</div></div>`;
      return;
    }
    cd = data.class;
    students = data.students || [];
    showPage('students');
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `<div class="ls2"><div class="lt">Could not load.<br>Check internet.</div><button onclick="loadData()" style="margin-top:12px;padding:10px 20px;background:var(--black);color:var(--white);border:none;border-radius:8px;cursor:pointer;font-family:var(--font-body);font-weight:600;font-size:13px">Try Again</button></div>`;
  }
}

function showPage(p, btn) {
  cp = p;
  if (btn) { document.querySelectorAll('.bb').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
  if (!cd) { loadData(); return; }
  const c = document.getElementById('mainContent');
  if (p==='students') c.innerHTML = rStudents();
  else if (p==='attendance') c.innerHTML = rAtt();
  else if (p==='marks') c.innerHTML = rMarks();
  else if (p==='group') { rGroup(); return; }
  else if (p==='notify') c.innerHTML = rNotify();
}

function getUserName() {
  try { const u=JSON.parse(localStorage.getItem('tch_user')||'{}'); return u.name||'Teacher'; } catch(e){return'Teacher'}
}

function rStudents() {
  return `
  <div class="hdr"><div class="hg"></div><div class="hc">
    <div class="grt">Teacher</div>
    <div class="tnm">${getUserName()}</div>
    <div class="cps">
      <span class="cp">Class ${cd.standard||''}</span>
      <span class="cp">${students.length} ${t('total')}</span>
    </div>
  </div></div>
  <div class="stats-row">
    <div class="sc"><div class="sv">${students.length}</div><div class="sl">${t('total')}</div></div>
    <div class="sc"><div class="sv">${cd.standard||'N/A'}</div><div class="sl">Class</div></div>
    <div class="sc"><div class="sv">${cd.section||'A'}</div><div class="sl">Section</div></div>
  </div>
  <div class="sec"><div class="stt">${t('my_class')}</div>
  ${students.length>0?students.map(s=>`
    <div class="si" onclick="viewStudent('${s.id}')">
      <div class="sav">${s.name[0].toUpperCase()}</div>
      <div style="flex:1">
        <div class="snm">${s.name}</div>
        <div class="smeta">Roll ${s.roll_no||'N/A'} · ${s.code}</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--gray-300)" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>`).join(''):
  `<div class="eb"><p>${t('no_students')}</p></div>`}
  </div>`;
}

function viewStudent(id) {
  const s=students.find(x=>x.id===id); if(!s)return;
  const SUBS=['Math','Science','English','Hindi','Social Science','Marathi'];
  document.getElementById('mainContent').innerHTML=`
  <button class="back-btn" onclick="showPage('students',document.querySelectorAll('.bb')[0])">
    <svg viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Back
  </button>
  <div class="det-card">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <div class="sav" style="width:48px;height:48px;font-size:20px">${s.name[0].toUpperCase()}</div>
      <div>
        <div style="font-family:var(--font-display);font-size:18px;font-weight:700">${s.name}</div>
        <div style="font-size:12px;color:var(--gray-400)">Roll ${s.roll_no||'N/A'} · ${s.code}</div>
      </div>
    </div>
    <div class="il">
      ${ir('Parent',s.parent_name||'N/A')}${ir('Phone',s.parent_phone||s.phone||'N/A')}${ir('Blood',s.blood_group||'N/A')}${ir('Bus',s.has_bus?'Yes':'No')}
    </div>
  </div>
  <div class="det-card">
    <div style="font-family:var(--font-display);font-size:16px;font-weight:600;margin-bottom:10px">${t('update_marks')}</div>
    <div style="margin-bottom:12px"><label style="font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px">Exam Type</label><select class="fi" id="etype_${s.id}"><option>Unit Test</option><option>Half Yearly</option><option>Annual</option><option>Monthly Test</option></select></div>
    ${SUBS.map(sub=>`<div class="mrow"><div class="mlbl">${sub}</div><input type="number" class="minput" id="mk_${s.id}_${sub.replace(/ /g,'_')}" placeholder="0" min="0" max="100"></div>`).join('')}
    <button class="msave" onclick="saveMks('${s.id}')">Save Marks</button>
  </div>
  <div class="det-card">
    <div style="font-family:var(--font-display);font-size:16px;font-weight:600;margin-bottom:10px">Remarks</div>
    <textarea class="fita" id="rem_${s.id}" placeholder="Write remarks..."></textarea>
    <button class="msave" style="margin-top:4px" onclick="toast('Saved')">Save Remark</button>
  </div>`;
}

function ir(l,v){return`<div class="ir"><span class="irl">${l}</span><span class="irv">${v}</span></div>`}

async function saveMks(sid) {
  const et=document.getElementById('etype_'+sid)?.value||'Unit Test';
  const SUBS=['Math','Science','English','Hindi','Social Science','Marathi'];
  let saved=0;
  for(const sub of SUBS){
    const el=document.getElementById('mk_'+sid+'_'+sub.replace(/ /g,'_'));
    if(!el||el.value==='')continue;
    const val=parseInt(el.value);if(isNaN(val))continue;
    await fetch(API+'/marks/update',{method:'POST',headers:{Authorization:'Bearer '+activeToken,'Content-Type':'application/json'},body:JSON.stringify({student_id:sid,subject:sub,marks_obtained:val,total_marks:100,exam_type:et})});
    saved++;
  }
  toast(saved>0?t('marks_saved'):'Enter at least one mark');
}

function rAtt() {
  const today=new Date().toISOString().split('T')[0];
  students.forEach(s=>{if(!attState[s.id])attState[s.id]='present'});
  return `<div style="padding:16px"><div class="stt" style="margin-bottom:12px">${t('mark_att')}</div>
  <div class="att-sheet">
    <div class="att-date-row"><div class="att-dl">${t('sel_date')}</div><input type="date" class="di" id="attDate" value="${today}"></div>
    ${students.map(s=>`<div class="ar">
      <div class="aroll">${s.roll_no||'-'}</div>
      <div class="anm">${s.name}</div>
      <div class="atog">
        <button class="atb ${attState[s.id]==='present'?'pa':''}" id="pb_${s.id}" onclick="setAtt('${s.id}','present')">${t('P')}</button>
        <button class="atb ${attState[s.id]==='absent'?'aa':''}" id="ab_${s.id}" onclick="setAtt('${s.id}','absent')">${t('A')}</button>
      </div>
    </div>`).join('')}
    <button class="save-btn" onclick="saveAtt()">${t('save_att')}</button>
  </div></div>`;
}

function setAtt(sid,status) {
  attState[sid]=status;
  const pb=document.getElementById('pb_'+sid),ab=document.getElementById('ab_'+sid);
  if(pb)pb.className='atb '+(status==='present'?'pa':'');
  if(ab)ab.className='atb '+(status==='absent'?'aa':'');
}

async function saveAtt() {
  const date=document.getElementById('attDate')?.value;
  if(!date){toast('Select date');return}
  const list=students.map(s=>({student_id:s.id,status:attState[s.id]||'present'}));
  try{
    const r=await fetch(API+'/attendance/mark',{method:'POST',headers:{Authorization:'Bearer '+activeToken,'Content-Type':'application/json'},body:JSON.stringify({attendance_list:list,date})});
    const d=await r.json();
    if(d.success)toast(t('att_saved'));
    else toast(d.error||'Error');
  }catch(e){toast('Could not save')}
}

function rMarks() {
  const SUBS=['Math','Science','English','Hindi','Social Science','Marathi'];
  return `<div style="padding:16px"><div class="stt" style="margin-bottom:12px">${t('update_marks')}</div>
  <div class="marks-sheet">
    ${students.map(s=>`<div>
      <div class="ms-header" onclick="toggleMs('${s.id}')">
        <div class="sav" style="width:36px;height:36px;font-size:14px">${s.name[0].toUpperCase()}</div>
        <div style="flex:1"><div style="font-size:13px;font-weight:600">${s.name}</div><div style="font-size:11px;color:var(--gray-400)">Roll ${s.roll_no||'N/A'}</div></div>
        <svg id="exp_${s.id}" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--gray-300)" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="ms-fields" id="mf_${s.id}">
        <div style="margin-bottom:10px"><label style="font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px">Exam Type</label><select class="fi" id="bulk_et_${s.id}"><option>Unit Test</option><option>Half Yearly</option><option>Annual</option><option>Monthly Test</option></select></div>
        ${SUBS.map(sub=>`<div class="mrow"><div class="mlbl">${sub}</div><input type="number" class="minput" id="bulk_${s.id}_${sub.replace(/ /g,'_')}" placeholder="0" min="0" max="100"></div>`).join('')}
        <button class="msave" onclick="bulkSave('${s.id}')">${t('save_marks')}</button>
      </div>
    </div>`).join('')}
  </div></div>`;
}

function toggleMs(id) {
  const f=document.getElementById('mf_'+id),e=document.getElementById('exp_'+id);
  const open=f.classList.toggle('open');
  if(e)e.style.transform=open?'rotate(180deg)':'';
}

async function bulkSave(sid) {
  const et=document.getElementById('bulk_et_'+sid)?.value||'Unit Test';
  const SUBS=['Math','Science','English','Hindi','Social Science','Marathi'];
  let saved=0;
  for(const sub of SUBS){
    const el=document.getElementById('bulk_'+sid+'_'+sub.replace(/ /g,'_'));
    if(!el||el.value==='')continue;
    const val=parseInt(el.value);if(isNaN(val))continue;
    await fetch(API+'/marks/update',{method:'POST',headers:{Authorization:'Bearer '+activeToken,'Content-Type':'application/json'},body:JSON.stringify({student_id:sid,subject:sub,marks_obtained:val,total_marks:100,exam_type:et})});
    saved++;
  }
  const s=students.find(x=>x.id===sid);
  toast(saved>0?t('marks_saved')+' — '+(s?.name||''):'Enter at least one mark');
}

async function rGroup() {
  const c=document.getElementById('mainContent');
  c.innerHTML=`<div style="padding:16px"><div class="stt" style="margin-bottom:12px">${t('post_group')}</div>
  <div class="composer">
    <textarea class="ctxt" id="postTxt" placeholder="${t('write')}"></textarea>
    <button class="post-btn" onclick="submitPost()">${t('post')}</button>
  </div>
  <div style="margin-top:16px"><div class="stt" style="margin-bottom:10px">Recent Posts</div>
  <div id="gpl"><div class="ls2" style="min-height:100px"><div class="sp"></div></div></div></div></div>`;
  loadPosts();
}

async function submitPost() {
  const txt=document.getElementById('postTxt')?.value.trim();
  if(!txt){toast('Write something first');return}
  try{
    const r=await fetch(API+'/posts',{method:'POST',headers:{Authorization:'Bearer '+activeToken,'Content-Type':'application/json'},body:JSON.stringify({class_id:cd.id,text_content:txt,post_type:'general'})});
    const d=await r.json();
    if(d.success){toast(t('posted'));document.getElementById('postTxt').value='';loadPosts();}
    else toast(d.error||'Error');
  }catch(e){toast('Could not post')}
}

async function loadPosts() {
  const el=document.getElementById('gpl');if(!el)return;
  try{
    const r=await fetch(API+'/posts/'+cd.id,{headers:{Authorization:'Bearer '+activeToken}});
    const d=await r.json();const posts=d.posts||[];
    el.innerHTML=posts.length>0?posts.map(p=>`<div class="pi"><div class="ph"><span class="pau">${p.posted_by_name||'Teacher'}</span><div style="display:flex;align-items:center;gap:8px"><span class="ptm">${fmtDate(p.created_at)}</span><button class="del-btn" onclick="delPost('${p.id}')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button></div></div>${p.text_content?`<div class="ptxt">${p.text_content}</div>`:''} ${p.video_link?`<a href="${p.video_link}" target="_blank" style="font-size:12px;color:var(--black)">Watch Video</a>`:''}</div>`).join(''):
    `<div class="eb"><p>${t('no_posts')}</p></div>`;
  }catch(e){if(el)el.innerHTML=`<div class="eb"><p>Could not load</p></div>`}
}

async function delPost(id) {
  try{await fetch(API+'/posts/'+id,{method:'DELETE',headers:{Authorization:'Bearer '+activeToken}});toast('Post deleted');loadPosts();}catch(e){toast('Error')}
}

function rNotify() {
  return `<div style="padding:16px"><div class="stt" style="margin-bottom:12px">${t('send_notif')}</div>
  <div class="nf">
    <div class="fg"><label>Title *</label><input type="text" class="fi" id="ntit" placeholder="e.g. Holiday Tomorrow"></div>
    <div class="fg"><label>Message *</label><textarea class="fita" id="nmsg" placeholder="Write your message..."></textarea></div>
    <button class="send-btn" onclick="sendNotif()">${t('send_notif')}</button>
  </div></div>`;
}

async function sendNotif() {
  const title=document.getElementById('ntit')?.value.trim();
  const msg=document.getElementById('nmsg')?.value.trim();
  if(!title||!msg){toast('Enter title and message');return}
  try{
    const r=await fetch(API+'/notifications/send',{method:'POST',headers:{Authorization:'Bearer '+activeToken,'Content-Type':'application/json'},body:JSON.stringify({title,message:msg,target_type:'class',target_id:cd.id,type:'general'})});
    const d=await r.json();
    if(d.success){toast(t('notif_sent'));document.getElementById('ntit').value='';document.getElementById('nmsg').value='';}
    else toast(d.error||'Error');
  }catch(e){toast('Could not send')}
}

function fmtDate(ts){if(!ts)return'';try{return new Date(ts).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}catch(e){return''}}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3000)}
function doLogout(){activeToken=null;localStorage.removeItem('tch_token');localStorage.removeItem('tch_user');cd=null;students=[];showLogin();document.getElementById('lCode').value='';document.getElementById('lPass').value='';document.getElementById('lErr').classList.remove('show')}

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
init();
</script>
</body>
</html>
