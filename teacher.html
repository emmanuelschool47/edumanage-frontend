<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#800020">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Teacher Panel — EduManage</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --m:#800020;--m-dark:#5c0018;--m-deeper:#3d0010;--m-light:#a30027;
  --m-pale:rgba(128,0,32,.08);--m-glow:rgba(128,0,32,.18);
  --white:#fff;--black:#0a0a0a;
  --g50:#fafafa;--g100:#f5f5f5;--g200:#eee;--g300:#e0e0e0;
  --g400:#bdbdbd;--g500:#9e9e9e;--g600:#757575;--g700:#616161;
  --green:#1a7a4a;--green-l:#e8f5ee;--red:#c0392b;--red-l:#fdf0ef;
  --gold:#b8860b;--gold-l:#fdf8e8;
  --fd:'Playfair Display',serif;--fb:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
  --r:12px;--tr:all .3s cubic-bezier(.4,0,.2,1);
}
body{font-family:var(--fb);background:var(--g50);color:var(--black);padding-bottom:80px;min-height:100vh}

/* ── LOGIN ── */
.login-screen{
  min-height:100vh;
  background:linear-gradient(160deg,var(--m-deeper) 0%,var(--m) 55%,var(--m-light) 100%);
  display:none;align-items:center;justify-content:center;
  padding:1.5rem;position:relative;
}
.login-screen.show{display:flex}
.login-bg{
  position:fixed;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;
}
.login-wrap{width:100%;max-width:380px;animation:loginIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes loginIn{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
.login-brand{text-align:center;margin-bottom:1.75rem}
.login-logo-icon{
  width:64px;height:64px;background:rgba(255,255,255,.15);
  border:2px solid rgba(255,255,255,.25);border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 1rem;font-family:var(--fd);font-size:1.6rem;
  font-weight:700;color:#fff;backdrop-filter:blur(8px);
}
.login-brand h1{font-family:var(--fd);font-size:1.9rem;font-weight:800;color:#fff;line-height:1.1;margin-bottom:.3rem}
.login-brand p{font-size:.85rem;color:rgba(255,255,255,.65);font-weight:300}
.login-card{background:rgba(255,255,255,.97);border-radius:20px;padding:2rem 1.75rem 1.75rem;box-shadow:0 24px 60px rgba(0,0,0,.25)}
.login-card-title{font-family:var(--fd);font-size:1.3rem;font-weight:700;color:var(--m);margin-bottom:.25rem}
.login-card-sub{font-size:.82rem;color:var(--g500);margin-bottom:1.4rem}
.login-label{display:block;font-size:.8rem;font-weight:600;color:var(--black);margin-bottom:.4rem;letter-spacing:.2px}
.login-input{
  width:100%;padding:.82rem 1rem;border:2px solid var(--g200);border-radius:10px;
  font-family:var(--fb);font-size:.95rem;color:var(--black);
  transition:border-color .3s,box-shadow .3s;background:var(--white);margin-bottom:1rem;
}
.login-input:focus{outline:none;border-color:var(--m);box-shadow:0 0 0 3px rgba(128,0,32,.12)}
.login-input::placeholder{color:#c0c0c0}
.login-btn{
  width:100%;padding:1rem;
  background:linear-gradient(135deg,var(--m),var(--m-light));
  color:#fff;border:none;border-radius:10px;
  font-family:var(--fb);font-size:.97rem;font-weight:700;cursor:pointer;
  letter-spacing:.4px;box-shadow:0 4px 16px rgba(128,0,32,.3);
  transition:var(--tr);display:flex;align-items:center;justify-content:center;gap:8px;
}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(128,0,32,.35)}
.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.login-err{
  background:var(--red-l);border:1px solid rgba(192,57,43,.2);
  border-radius:var(--r);padding:10px 14px;font-size:13px;
  color:var(--red);margin-top:10px;display:none;
}
.login-err.show{display:block}
.login-footer{text-align:center;margin-top:1.25rem}
.login-footer p{font-size:.75rem;color:rgba(255,255,255,.5)}
.login-footer strong{color:rgba(255,255,255,.8)}
.login-sp{width:16px;height:16px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--g200);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.tl{font-family:var(--fd);font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.lm{width:28px;height:28px;background:var(--m);color:var(--white);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.tr{display:flex;align-items:center;gap:8px}
.ls{display:flex;gap:2px;background:var(--g100);border-radius:100px;padding:2px}
.lb{padding:4px 9px;border-radius:100px;border:none;background:transparent;font-family:var(--fb);font-size:10px;font-weight:700;color:var(--g400);cursor:pointer;transition:var(--tr)}
.lb.active{background:var(--white);color:var(--m);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.ob{background:none;border:1px solid var(--g200);border-radius:7px;padding:6px 10px;font-size:11px;font-weight:600;color:var(--g500);cursor:pointer;font-family:var(--fb);transition:var(--tr)}
.ob:hover{border-color:var(--m);color:var(--m)}

/* ── LAYOUT ── */
.cnt{max-width:600px;margin:0 auto}

/* ── HOME HEADER ── */
.hdr{background:linear-gradient(135deg,var(--m-deeper),var(--m));color:var(--white);padding:20px 16px 24px;position:relative;overflow:hidden}
.hg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:32px 32px}
.hc{position:relative;z-index:1}
.grt{font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:600}
.tnm{font-family:var(--fd);font-size:24px;font-weight:700;line-height:1.1;margin-bottom:6px}
.cps{display:flex;gap:6px;flex-wrap:wrap}
.cp{padding:3px 10px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);border-radius:100px;font-size:10px;color:rgba(255,255,255,.8);font-weight:500}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 16px}
.sc{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:14px;text-align:center;transition:var(--tr)}
.sc:hover{border-color:var(--m);box-shadow:0 4px 12px var(--m-glow)}
.sv{font-family:var(--fd);font-size:24px;font-weight:700;line-height:1;margin-bottom:2px;color:var(--m)}
.sl{font-size:10px;color:var(--g400);font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* ── SECTION / CARD ── */
.sec{padding:0 16px;margin-bottom:18px}
.stt{font-family:var(--fd);font-size:16px;font-weight:600;margin-bottom:10px}
.card{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:14px;margin-bottom:10px}

/* ── STUDENT ITEM ── */
.si{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--white);border:1px solid var(--g200);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:var(--tr)}
.si:hover{border-color:var(--m);box-shadow:0 4px 12px var(--m-glow)}
.sav{width:40px;height:40px;background:var(--m-pale);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:16px;color:var(--m);flex-shrink:0}
.snm{font-size:14px;font-weight:600;margin-bottom:2px}
.smeta{font-size:11px;color:var(--g400)}

/* ── ATTENDANCE ── */
.att-sheet{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);overflow:hidden}
.att-date-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--g100)}
.att-dl{font-size:13px;font-weight:600}
.di{padding:6px 10px;border:1.5px solid var(--g200);border-radius:8px;font-family:var(--fm);font-size:12px;color:var(--black);outline:none;transition:var(--tr)}
.di:focus{border-color:var(--m)}
.ar{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--g100);gap:10px}
.ar:last-child{border-bottom:none}
.aroll{font-family:var(--fm);font-size:12px;color:var(--g400);min-width:26px}
.anm{font-size:13px;font-weight:500;flex:1}
.atog{display:flex;border:1.5px solid var(--g200);border-radius:8px;overflow:hidden}
.atb{padding:6px 13px;border:none;font-family:var(--fb);font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--g400);transition:var(--tr)}
.atb.pa{background:var(--green);color:var(--white)}
.atb.aa{background:var(--red);color:var(--white)}
.save-btn{width:calc(100% - 28px);margin:14px;padding:12px;background:linear-gradient(135deg,var(--m),var(--m-light));color:var(--white);border:none;border-radius:var(--r);font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px var(--m-glow);transition:var(--tr)}
.save-btn:hover{box-shadow:0 6px 16px rgba(128,0,32,.3)}

/* ── MARKS ── */
.marks-sheet{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);overflow:hidden}
.ms-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--g100);transition:var(--tr)}
.ms-header:hover{background:var(--m-pale)}
.ms-fields{padding:10px 14px 14px;display:none}
.ms-fields.open{display:block}
.mrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.mlbl{font-size:13px;font-weight:500;min-width:100px;color:var(--g700)}
.minput{flex:1;padding:7px 10px;border:1.5px solid var(--g200);border-radius:8px;font-family:var(--fm);font-size:13px;color:var(--black);outline:none;text-align:center;max-width:75px;transition:var(--tr)}
.minput:focus{border-color:var(--m)}
.mout{flex:1;padding:7px 10px;border:1.5px solid var(--g200);border-radius:8px;font-family:var(--fm);font-size:13px;color:var(--black);outline:none;text-align:center;max-width:75px;transition:var(--tr)}
.mout:focus{border-color:var(--m)}
.msave{width:100%;padding:9px;background:linear-gradient(135deg,var(--m),var(--m-light));color:var(--white);border:none;border-radius:8px;font-family:var(--fb);font-size:12px;font-weight:600;cursor:pointer;margin-top:6px;box-shadow:0 3px 10px var(--m-glow)}

/* ── GROUP POST ── */
.composer{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:14px}
.ctxt{width:100%;min-height:90px;padding:11px;border:1.5px solid var(--g200);border-radius:var(--r);font-family:var(--fb);font-size:14px;color:var(--black);resize:none;outline:none;margin-bottom:10px;transition:var(--tr)}
.ctxt:focus{border-color:var(--m)}
.post-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--m),var(--m-light));color:var(--white);border:none;border-radius:var(--r);font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px var(--m-glow);transition:var(--tr)}
.post-btn:hover{box-shadow:0 6px 16px rgba(128,0,32,.3)}
.pi{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:12px;margin-bottom:8px}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pau{font-size:12px;font-weight:700;color:var(--m)}
.ptm{font-size:10px;color:var(--g300)}
.ptxt{font-size:13px;color:var(--g700);line-height:1.6}
.del-btn{background:none;border:none;cursor:pointer;color:var(--g300);padding:2px;transition:var(--tr)}
.del-btn:hover{color:var(--red)}
.del-btn svg{width:13px;height:13px;stroke:currentColor}

/* ── NOTIFY ── */
.nf{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:14px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--g500);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.fi{width:100%;padding:10px 13px;background:var(--g50);border:1.5px solid var(--g200);border-radius:var(--r);font-family:var(--fb);font-size:13px;color:var(--black);outline:none;transition:var(--tr)}
.fi:focus{border-color:var(--m);background:var(--white)}
.fita{width:100%;padding:10px 13px;background:var(--g50);border:1.5px solid var(--g200);border-radius:var(--r);font-family:var(--fb);font-size:13px;color:var(--black);outline:none;resize:none;min-height:80px;transition:var(--tr)}
.fita:focus{border-color:var(--m);background:var(--white)}
.send-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--m),var(--m-light));color:var(--white);border:none;border-radius:var(--r);font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px var(--m-glow);transition:var(--tr)}
.send-btn:hover{box-shadow:0 6px 16px rgba(128,0,32,.3)}

/* Student selector for notifications */
.stu-sel-wrap{border:1.5px solid var(--g200);border-radius:var(--r);overflow:hidden;margin-bottom:12px;max-height:220px;overflow-y:auto}
.stu-sel-head{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--m-pale);border-bottom:1px solid var(--g200)}
.stu-sel-head span{font-size:11px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:.5px}
.stu-sel-all{font-size:11px;font-weight:600;color:var(--m);background:none;border:none;cursor:pointer;padding:3px 8px;border-radius:5px;background:rgba(128,0,32,.1)}
.stu-sel-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--g100);cursor:pointer;transition:var(--tr)}
.stu-sel-item:last-child{border-bottom:none}
.stu-sel-item:hover{background:var(--m-pale)}
.stu-sel-item input[type=checkbox]{accent-color:var(--m);width:15px;height:15px;flex-shrink:0}
.stu-sel-name{font-size:13px;font-weight:500}
.stu-sel-roll{font-size:11px;color:var(--g400);font-family:var(--fm)}
.sel-count{font-size:11px;color:var(--m);font-weight:600;margin-bottom:8px;padding:0 2px}

/* ── STUDENT DETAIL ── */
.back-btn{display:inline-flex;align-items:center;gap:6px;background:var(--g100);border:none;border-radius:8px;padding:9px 14px;font-family:var(--fb);font-size:13px;color:var(--g600);cursor:pointer;margin:14px 16px 10px;transition:var(--tr)}
.back-btn:hover{background:var(--m-pale);color:var(--m)}
.back-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2}
.det-card{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:14px;margin:0 16px 12px}
.il{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.ir{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--g100)}
.ir:last-child{border-bottom:none}
.irl{font-size:12px;color:var(--g400);font-weight:500}
.irv{font-size:13px;font-weight:600}

/* ── BOTTOM NAV ── */
.bn{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--g200);display:flex;padding:6px 0 8px;z-index:100}
.bb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;background:none;border:none;cursor:pointer;transition:var(--tr)}
.bi{width:21px;height:21px;stroke:var(--g300);transition:var(--tr)}
.bla{font-size:9px;font-weight:600;color:var(--g300);text-transform:uppercase;letter-spacing:.5px}
.bb.active .bi{stroke:var(--m)}
.bb.active .bla{color:var(--m)}

/* ── UTILITY ── */
.ls2{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px}
.sp{width:26px;height:26px;border:2px solid var(--g200);border-top-color:var(--m);border-radius:50%;animation:spin .8s linear infinite}
.lt{font-size:13px;color:var(--g400);text-align:center}
.eb{text-align:center;padding:28px;color:var(--g300)}
.eb p{font-size:13px}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--m);color:var(--white);padding:9px 18px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes spin{to{transform:rotate(360deg)}}
.badge-ok{background:var(--green-l);color:var(--green);padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600}
.badge-due{background:var(--red-l);color:var(--red);padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600}
.badge-par{background:var(--gold-l);color:var(--gold);padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600}
</style>
</head>
<body>

<!-- ── LOGIN SCREEN ── -->
<div class="login-screen" id="loginScreen">
  <div class="login-bg"></div>
  <div class="login-wrap">
    <div class="login-brand">
      <div class="login-logo-icon">EM</div>
      <h1>EduManage Pro</h1>
      <p>Emmanuel School — Teacher Portal</p>
    </div>
    <div class="login-card">
      <div class="login-card-title">Teacher Login</div>
      <div class="login-card-sub">Enter your teacher code &amp; password</div>
      <label class="login-label" for="lCode">Teacher Code</label>
      <input type="text" class="login-input" id="lCode" placeholder="e.g. TCH001"
             autocomplete="off" spellcheck="false" style="text-transform:uppercase"
             onkeydown="if(event.key==='Enter')doLogin()">
      <label class="login-label" for="lPass">Password</label>
      <input type="password" class="login-input" id="lPass" placeholder="Enter password"
             onkeydown="if(event.key==='Enter')doLogin()">
      <button class="login-btn" id="lBtn" onclick="doLogin()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Sign In
      </button>
      <div class="login-err" id="lErr"></div>
    </div>
    <div class="login-footer">
      <p>Contact <strong>Admin</strong> if you forgot your credentials</p>
    </div>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="appScreen" style="display:none">
  <div class="topbar">
    <div class="tl"><div class="lm">E</div>EduManage</div>
    <div class="tr">
      <div class="ls">
        <button class="lb active" onclick="setLang('en')">EN</button>
        <button class="lb" onclick="setLang('hi')">HI</button>
        <button class="lb" onclick="setLang('mr')">MR</button>
      </div>
      <button class="ob" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="cnt" id="mainContent">
    <div class="ls2"><div class="sp"></div><div class="lt">Loading...</div></div>
  </div>

  <nav class="bn">
    <button class="bb active" onclick="showPage('students',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="bla">Students</span>
    </button>
    <button class="bb" onclick="showPage('attendance',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span class="bla">Attend.</span>
    </button>
    <button class="bb" onclick="showPage('marks',this)">

<script>
const API = 'https://edumanage-backend-xi.vercel.app/api';

let activeToken = null;
let cd = null;          // class data / teacher info
let students = [];
let attState = {};
let posts = [];
let cp = 'students';
let lang = localStorage.getItem('edu-lang') || 'en';

/* ── TRANSLATIONS ── */
const T = {
  en:{students:'Students',attend:'Attendance',marks:'Marks',group:'Class Group',notify:'Notify',my_class:'My Class',total:'Students',mark_att:'Mark Attendance',update_marks:'Update Marks',post_group:'Post in Group',send_notif:'Send Notification',save_att:'Save Attendance',save_marks:'Save Marks',post:'Post',notif_sent:'Notification sent!',att_saved:'Attendance saved!',marks_saved:'Marks saved!',posted:'Posted successfully!',P:'P',A:'A',sel_date:'Select Date',write:'Write something for your class...',no_class:'No class assigned. Contact admin.',no_students:'No students in your class',no_posts:'No posts yet',out_of:'Out of',obtained:'Obtained',select_students:'Select Students',all_students:'All Students',selected:'selected'},
  hi:{students:'छात्र',attend:'उपस्थिति',marks:'अंक',group:'क्लास ग्रुप',notify:'सूचना',my_class:'मेरी कक्षा',total:'छात्र',mark_att:'उपस्थिति लगाएं',update_marks:'अंक अपडेट करें',post_group:'ग्रुप में पोस्ट करें',send_notif:'सूचना भेजें',save_att:'उपस्थिति सहेजें',save_marks:'अंक सहेजें',post:'पोस्ट करें',notif_sent:'सूचना भेजी गई!',att_saved:'उपस्थिति सहेजी गई!',marks_saved:'अंक सहेजे गए!',posted:'पोस्ट हुआ!',P:'उ',A:'अ',sel_date:'तिथि चुनें',write:'कक्षा के लिए लिखें...',no_class:'कोई कक्षा नहीं।',no_students:'कोई छात्र नहीं',no_posts:'कोई पोस्ट नहीं',out_of:'में से',obtained:'प्राप्त',select_students:'छात्र चुनें',all_students:'सभी छात्र',selected:'चुने गए'},
  mr:{students:'विद्यार्थी',attend:'हजेरी',marks:'गुण',group:'वर्ग गट',notify:'सूचना',my_class:'माझा वर्ग',total:'विद्यार्थी',mark_att:'हजेरी नोंदवा',update_marks:'गुण अपडेट करा',post_group:'गटात पोस्ट करा',send_notif:'सूचना पाठवा',save_att:'हजेरी जतन करा',save_marks:'गुण जतन करा',post:'पोस्ट करा',notif_sent:'सूचना पाठवली!',att_saved:'हजेरी जतन झाली!',marks_saved:'गुण जतन झाले!',posted:'पोस्ट झाले!',P:'उ',A:'अ',sel_date:'तारीख निवडा',write:'वर्गासाठी लिहा...',no_class:'कोणताही वर्ग नाही.',no_students:'विद्यार्थी नाहीत',no_posts:'पोस्ट नाही',out_of:'पैकी',obtained:'मिळाले',select_students:'विद्यार्थी निवडा',all_students:'सर्व विद्यार्थी',selected:'निवडले'}
};
function t(k){return(T[lang]&&T[lang][k])?T[lang][k]:(T.en[k]||k)}

function setLang(l){
  lang=l;localStorage.setItem('edu-lang',l);
  document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase()===l));
  showPage(cp);
}

/* ── BOOT ── */
(function init(){
  const saved = localStorage.getItem('tch_token');
  if(saved && saved.length > 20){
    activeToken = saved;
    showApp();
    loadData();
  } else {
    showLogin();
  }
})();

function showLogin(){
  document.getElementById('loginScreen').classList.add('show');
  document.getElementById('appScreen').style.display='none';
  setTimeout(()=>{const e=document.getElementById('lCode');if(e)e.focus();},400);
}
function showApp(){
  document.getElementById('loginScreen').classList.remove('show');
  document.getElementById('appScreen').style.display='block';
}

/* ── LOGIN ── */
async function doLogin(){
  const code = document.getElementById('lCode').value.trim().toUpperCase();
  const pass = document.getElementById('lPass').value.trim();
  const errEl = document.getElementById('lErr');
  const btn = document.getElementById('lBtn');
  if(!code||!pass){errEl.textContent='Please enter code and password';errEl.classList.add('show');return;}
  errEl.classList.remove('show');
  btn.innerHTML='<div class="login-sp"></div> Signing in...';
  btn.disabled=true;
  try{
    const res = await fetch(API+'/auth/login',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code,password:pass,role:'teacher'})
    });
    const data = await res.json();
    if((data.success||data.token) && data.token){
      if(data.user && data.user.role !== 'teacher'){
        errEl.textContent='This login is for teachers only';errEl.classList.add('show');
        btn.innerHTML='Sign In';btn.disabled=false;return;
      }
      /* ── SAVE FOREVER ── */
      localStorage.setItem('tch_token', data.token);
      localStorage.setItem('tch_name', data.user?.name||code);
      activeToken = data.token;
      showApp();
      loadData();
    } else {
      errEl.textContent = data.message||'Invalid code or password';
      errEl.classList.add('show');
      btn.innerHTML='Sign In';btn.disabled=false;
    }
  } catch(_){
    errEl.textContent='Network error. Check your internet.';
    errEl.classList.add('show');
    btn.innerHTML='Sign In';btn.disabled=false;
  }
}

/* ── LOGOUT ── */
function doLogout(){
  if(!confirm('Are you sure you want to logout?'))return;
  localStorage.removeItem('tch_token');
  localStorage.removeItem('tch_name');
  activeToken=null;cd=null;students=[];
  location.reload();
}

/* ── LOAD DATA ── */
async function loadData(){
  const h={Authorization:`Bearer ${activeToken}`,'Content-Type':'application/json'};
  try{
    const [meRes, stuRes, postRes] = await Promise.allSettled([
      fetch(API+'/teachers/me',{headers:h}),
      fetch(API+'/teachers/my-students',{headers:h}),
      fetch(API+'/posts/my-class',{headers:h}),
    ]);
    if(meRes.status==='fulfilled'&&meRes.value.ok){
      const d=await meRes.value.json();
      cd=d.teacher||d;
    } else if(meRes.status==='fulfilled'&&meRes.value.status===401){
      localStorage.removeItem('tch_token');showLogin();return;
    }
    if(stuRes.status==='fulfilled'&&stuRes.value.ok){
      const d=await stuRes.value.json();
      students=Array.isArray(d)?d:(d.students||[]);
    }
    if(postRes.status==='fulfilled'&&postRes.value.ok){
      const d=await postRes.value.json();
      posts=Array.isArray(d)?d:(d.posts||[]);
    }
    showPage('students');
  } catch(err){
    document.getElementById('mainContent').innerHTML=`<div class="ls2"><div class="eb"><p>Could not load data. Check internet.</p></div></div>`;
  }
}

/* ── ROUTER ── */
function showPage(page,btn){
  cp=page;
  document.querySelectorAll('.bb').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  else{
    const idx={students:0,attendance:1,marks:2,group:3,notify:4}[page];
    if(idx!==undefined)document.querySelectorAll('.bb')[idx]?.classList.add('active');
  }
  const el=document.getElementById('mainContent');
  if(page==='students')el.innerHTML=renderStudents();
  else if(page==='attendance')el.innerHTML=renderAttendance();
  else if(page==='marks')el.innerHTML=renderMarks();
  else if(page==='group')el.innerHTML=renderGroup();
  else if(page==='notify')el.innerHTML=renderNotify();
  el.scrollTop=0;window.scrollTo(0,0);
}

/* ── HELPERS ── */
function initials(n){if(!n)return '?';return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function timeAgo(d){if(!d)return '';const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'}
function todayStr(){return new Date().toISOString().slice(0,10)}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3000)}

  row.querySelectorAll('.atb').forEach(b=>{b.classList.remove('pa','aa')});
  btn.classList.add(val==='P'?'pa':'aa');

async function saveAttendance(){
  const date=document.getElementById('attDate').value;
  const records=students.map(s=>({student_id:s._id||s.id,status:attState[s._id||s.id]||'P'}));

    });

async function saveMark(sid,name){

  const txt=document.getElementById('postTxt').value.trim();
  const vid=document.getElementById('postVideo').value.trim();
  if(!txt&&!vid){showToast('Write something first');return;}
  try{
    const res=await fetch(API+'/posts',{
      method:'POST',headers:{Authorization:`Bearer ${activeToken}`,'Content-Type':'application/json'},
      body:JSON.stringify({text_content:txt,video_link:vid||null})
    });
    if(res.ok){
      const d=await res.json();
      posts.unshift(d.post||{text_content:txt,video_link:vid,created_at:new Date(),posted_by_name:cd?.name});
      showToast(t('posted'));
      document.getElementById('postTxt').value='';
      document.getElementById('postVideo').value='';
      showPage('group');
    }else{showToast('Failed. Try again.');}
  }catch(_){showToast('Network error.');}
}

async function deletePost(id){
  if(!confirm('Delete this post?'))return;
  try{
    const res=await fetch(API+'/posts/'+id,{method:'DELETE',headers:{Authorization:`Bearer ${activeToken}`}});
    if(res.ok){posts=posts.filter(p=>(p._id||p.id)!==id);showToast('Deleted');showPage('group');}
    else{showToast('Failed.');}
  }catch(_){showToast('Network error.');}
}

/* ── PAGE: NOTIFY ── */
function renderNotify(){
  const stuList=students.map(s=>`
    <div class="stu-sel-item" onclick="toggleStudentSel('${s._id||s.id}',this)">
      <input type="checkbox" id="chk_${s._id||s.id}" onclick="event.stopPropagation();updateSelCount()">
      <div>
        <div class="stu-sel-name">${s.name}</div>
        <div class="stu-sel-roll">Roll ${s.roll_no||'-'}</div>
      </div>
    </div>`).join('');
  return `
  <div class="hdr"><div class="hg"></div>
    <div class="hc"><div class="grt">${t('send_notif')}</div>
      <div class="tnm" style="font-size:18px">${cd?.class_name||'My Class'}</div>
    </div>
  </div>
  <div class="sec" style="margin-top:14px">
    <div class="nf">
      <div class="fg">
        <label>Notification Title</label>
        <input type="text" class="fi" id="ntitle" placeholder="e.g. Exam tomorrow, Holiday notice...">
      </div>
      <div class="fg">
        <label>Message</label>
        <textarea class="fita" id="nmsg" placeholder="Write your message here..."></textarea>
      </div>
      <div class="fg">
        <label>${t('select_students')}</label>
        <div style="display:flex;gap:6px;margin-bottom:8px">
          <button onclick="selectAllStudents(true)" style="flex:1;padding:7px;background:var(--m-pale);color:var(--m);border:1.5px solid rgba(128,0,32,.2);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">${t('all_students')}</button>
          <button onclick="selectAllStudents(false)" style="flex:1;padding:7px;background:var(--g100);color:var(--g600);border:1.5px solid var(--g200);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">Clear</button>
        </div>
        <div class="sel-count" id="selCount">0 ${t('selected')}</div>
        <div class="stu-sel-wrap">
          <div class="stu-sel-head">
            <span>${t('select_students')}</span>
          </div>
          ${stuList}
        </div>
      </div>
      <button class="send-btn" onclick="sendNotification()">${t('send_notif')}</button>
    </div>
  </div>`;
}

function toggleStudentSel(sid,row){
  const chk=document.getElementById('chk_'+sid);
  chk.checked=!chk.checked;
  row.style.background=chk.checked?'var(--m-pale)':'';
  updateSelCount();
}

function selectAllStudents(val){
  students.forEach(s=>{
    const chk=document.getElementById('chk_'+(s._id||s.id));
    if(chk){
      chk.checked=val;
      chk.closest('.stu-sel-item').style.background=val?'var(--m-pale)':'';
    }
  });
  updateSelCount();
}

function updateSelCount(){
  const count=students.filter(s=>{
    const c=document.getElementById('chk_'+(s._id||s.id));
    return c&&c.checked;
  }).length;
  const el=document.getElementById('selCount');
  if(el)el.textContent=count+' '+t('selected');
}

async function sendNotification(){
  const title=document.getElementById('ntitle').value.trim();
  const msg=document.getElementById('nmsg').value.trim();
  if(!title||!msg){showToast('Enter title and message');return;}

  // Get selected student IDs
  const selected=students
    .filter(s=>{const c=document.getElementById('chk_'+(s._id||s.id));return c&&c.checked;})
    .map(s=>s._id||s.id);

  if(!selected.length){showToast('Select at least one student');return;}

  const payload={
    title,message:msg,
    student_ids: selected,
    send_to_all: selected.length===students.length
  };

  try{
    const res=await fetch(API+'/notifications',{
      method:'POST',headers:{Authorization:`Bearer ${activeToken}`,'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    if(res.ok){
      showToast(t('notif_sent'));
      document.getElementById('ntitle').value='';
      document.getElementById('nmsg').value='';
      selectAllStudents(false);
    }else{showToast('Failed to send. Try again.');}
  }catch(_){showToast('Network error.');}
}

/* ── SERVICE WORKER ── */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{})});
}
</script>
