<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#800020">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Teacher Panel — EduManage</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --m:#800020;--m-dark:#5c0018;--m-deeper:#3d0010;--m-light:#a30027;
  --m-pale:rgba(128,0,32,.09);--m-glow:rgba(128,0,32,.18);
  --white:#fff;--black:#0a0a0a;
  --g50:#fafafa;--g100:#f5f5f5;--g200:#eee;--g300:#e0e0e0;
  --g400:#bdbdbd;--g500:#9e9e9e;--g600:#757575;--g700:#616161;
  --green:#1a7a4a;--green-l:#e8f5ee;--red:#c0392b;--red-l:#fdf0ef;
  --gold:#b8860b;--gold-l:#fdf8e8;
  --font-display:'Playfair Display',serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --radius:12px;
}
body{font-family:var(--font-body);background:var(--g50);color:var(--black);padding-bottom:80px;min-height:100vh}

/* ── LOGIN ── */
.login-screen{
  min-height:100vh;
  background:linear-gradient(160deg,var(--m-deeper) 0%,var(--m) 55%,var(--m-light) 100%);
  display:none;align-items:center;justify-content:center;padding:20px;
}
.login-screen.show{display:flex}
.login-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.login-wrap{width:100%;max-width:360px;animation:lIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes lIn{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
.login-brand{text-align:center;margin-bottom:1.5rem}
.login-icon{width:62px;height:62px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.25);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto .9rem;font-family:var(--font-display);font-size:1.5rem;font-weight:700;color:#fff;backdrop-filter:blur(8px)}
.login-brand h1{font-family:var(--font-display);font-size:1.8rem;font-weight:800;color:#fff;margin-bottom:.25rem}
.login-brand p{font-size:.83rem;color:rgba(255,255,255,.65);font-weight:300}
.login-card{background:rgba(255,255,255,.97);border-radius:20px;padding:26px 22px;box-shadow:0 25px 60px rgba(0,0,0,.28)}
.login-card-ttl{font-family:var(--font-display);font-size:1.25rem;font-weight:700;color:var(--m);margin-bottom:.2rem}
.login-card-sub{font-size:.8rem;color:var(--g500);margin-bottom:1.3rem}
.login-label{display:block;font-size:11px;font-weight:600;color:var(--g500);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.login-input{width:100%;padding:12px 14px;background:var(--g50);border:1.5px solid var(--g200);border-radius:var(--radius);font-family:var(--font-body);font-size:14px;color:var(--black);outline:none;margin-bottom:12px;transition:border-color .3s,box-shadow .3s}
.login-input:focus{border-color:var(--m);background:var(--white);box-shadow:0 0 0 3px var(--m-pale)}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--m),var(--m-light));color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px var(--m-glow);transition:all .3s}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px var(--m-glow)}
.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.login-err{background:var(--red-l);border:1px solid rgba(192,57,43,.15);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--red);margin-top:10px;display:none}
.login-err.show{display:block}
.login-sp{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:var(--white);border-radius:50%;animation:spin .7s linear infinite}
.login-foot{text-align:center;margin-top:1.1rem}
.login-foot p{font-size:.73rem;color:rgba(255,255,255,.5)}
.login-foot strong{color:rgba(255,255,255,.8)}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--g200);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.tl{font-family:var(--font-display);font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.lm{width:28px;height:28px;background:var(--m);color:var(--white);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.tr{display:flex;align-items:center;gap:8px}
.ls{display:flex;gap:2px;background:var(--g100);border-radius:100px;padding:2px}
.lb{padding:4px 9px;border-radius:100px;border:none;background:transparent;font-family:var(--font-body);font-size:10px;font-weight:700;color:var(--g400);cursor:pointer}
.lb.active{background:var(--white);color:var(--m);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.ob{background:none;border:1px solid var(--g200);border-radius:7px;padding:6px 10px;font-size:11px;font-weight:600;color:var(--g500);cursor:pointer;font-family:var(--font-body)}
.ob:hover{border-color:var(--m);color:var(--m)}

/* ── CONTENT ── */
.cnt{max-width:600px;margin:0 auto}

/* ── HEADER BANNER ── */
.hdr{background:linear-gradient(135deg,var(--m-deeper),var(--m));color:var(--white);padding:20px 16px 24px;position:relative;overflow:hidden}
.hg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:32px 32px}
.hc{position:relative;z-index:1}
.grt{font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:600}
.tnm{font-family:var(--font-display);font-size:24px;font-weight:700;line-height:1.1;margin-bottom:6px}
.cps{display:flex;gap:6px;flex-wrap:wrap}
.cp{padding:3px 10px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);border-radius:100px;font-size:10px;color:rgba(255,255,255,.8);font-weight:500}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 16px}
.sc{background:var(--white);border:1px solid var(--g200);border-radius:var(--radius);padding:14px;text-align:center}
.sv{font-family:var(--font-display);font-size:24px;font-weight:700;line-height:1;margin-bottom:2px;color:var(--m)}
.sl{font-size:10px;color:var(--g400);font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* ── SECTION ── */
.sec{padding:0 16px;margin-bottom:18px}
.stt{font-family:var(--font-display);font-size:16px;font-weight:600;margin-bottom:10px}
.card{background:var(--white);border:1px solid var(--g200);border-radius:var(--radius);padding:14px;margin-bottom:10px}

/* ── STUDENT ITEM ── */
.si{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--white);border:1px solid var(--g200);border-radius:var(--radius);margin-bottom:8px;cursor:pointer}
.si:hover{border-color:var(--m)}
.sav{width:40px;height:40px;background:var(--m-pale);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:16px;color:var(--m);flex-shrink:0}
.snm{font-size:14px;font-weight:600;margin-bottom:2px}
.smeta{font-size:11px;color:var(--g400)}

/* ── ATTENDANCE ── */
.att-sheet{background:var(--white);border:1px solid var(--g200);border-radius:var(--radius);overflow:hidden}
.att-date-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--g100)}
.att-dl{font-size:13px;font-weight:600}
.di{padding:6px 10px;border:1.5px solid var(--g200);border-radius:8px;font-family:var(--font-mono);font-size:12px;color:var(--black);outline:none}
.di:focus{border-color:var(--m)}
.ar{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--g100);gap:10px}
.ar:last-child{border-bottom:none}
.aroll{font-family:var(--font-mono);font-size:12px;color:var(--g400);min-width:26px}
.anm{font-size:13px;font-weight:500;flex:1}
.atog{display:flex;border:1.5px solid var(--g200);border-radius:8px;overflow:hidden}
.atb{padding:6px 13px;border:none;font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--g400)}
.atb.pa{background:var(--green);color:var(--white)}
.atb.aa{background:var(--red);color:var(--white)}
.save-btn{width:calc(100% - 28px);margin:14px;padding:12px;background:linear-gradient(135deg,var(--m),var(--m-light));color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px var(--m-glow)}

/* ── MARKS ── */
.marks-sheet{background:var(--white);border:1px solid var(--g200);border-radius:var(--radius);overflow:hidden}
.ms-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--g100)}
.ms-header:hover{background:var(--m-pale)}
.ms-fields{padding:10px 14px 14px;display:none;background:var(--g50)}
.ms-fields.open{display:block}
.mrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.mlbl{font-size:13px;font-weight:500;min-width:80px;color:var(--g700)}
.minput{flex:1;padding:7px 10px;border:1.5px solid var(--g200);border-radius:8px;font-family:var(--font-mono);font-size:13px;color:var(--black);outline:none;text-align:center;max-width:80px}
.minput:focus{border-color:var(--m)}
.msave{width:100%;padding:9px;background:linear-gradient(135deg,var(--m),var(--m-light));color:var(--white);border:none;border-radius:8px;font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;margin-top:6px}

/* ── GROUP ── */
.composer{background:var(--white);border:1px solid var(--g200);border-radius:var(--radius);padding:14px}
.ctxt{width:100%;min-height:90px;padding:11px;border:1.5px solid var(--g200);border-radius:var(--radius);font-family:var(--font-body);font-size:14px;color:var(--black);resize:none;outline:none;margin-bottom:10px}
.ctxt:focus{border-color:var(--m)}
.post-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--m),var(--m-light));color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer}
.pi{background:var(--white);border:1px solid var(--g200);border-radius:var(--radius);padding:12px;margin-bottom:8px}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pau{font-size:12px;font-weight:700;color:var(--m)}
.ptm{font-size:10px;color:var(--g300)}
.ptxt{font-size:13px;color:var(--g700);line-height:1.6}
.del-btn{background:none;border:none;cursor:pointer;color:var(--g300);padding:2px}
.del-btn:hover{color:var(--red)}
.del-btn svg{width:13px;height:13px;stroke:currentColor}

/* ── NOTIFY ── */
.nf{background:var(--white);border:1px solid var(--g200);border-radius:var(--radius);padding:14px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--g500);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.fi{width:100%;padding:10px 13px;background:var(--g50);border:1.5px solid var(--g200);border-radius:var(--radius);font-family:var(--font-body);font-size:13px;color:var(--black);outline:none}
.fi:focus{border-color:var(--m);background:var(--white)}
.fita{width:100%;padding:10px 13px;background:var(--g50);border:1.5px solid var(--g200);border-radius:var(--radius);font-family:var(--font-body);font-size:13px;color:var(--black);outline:none;resize:none;min-height:80px}
.fita:focus{border-color:var(--m);background:var(--white)}
.send-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--m),var(--m-light));color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer}

/* ── STUDENT SELECTOR (Notify) ── */
.stu-sel-box{border:1.5px solid var(--g200);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;max-height:250px;overflow-y:auto}
.stu-sel-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--g100);cursor:pointer;transition:background .15s;-webkit-user-select:none;user-select:none}
.stu-sel-item:last-child{border-bottom:none}
.stu-sel-item.on{background:var(--m-pale)}
.stu-sel-item:hover{background:var(--m-pale)}
.stu-chk{width:17px;height:17px;accent-color:var(--m);flex-shrink:0;pointer-events:none}
.stu-sel-name{font-size:13px;font-weight:600;flex:1}
.stu-sel-roll{font-size:11px;color:var(--g400);font-family:var(--font-mono)}
.sel-badge{display:inline-block;background:var(--m);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;margin-bottom:8px}

/* ── BACK + DETAIL ── */
.back-btn{display:inline-flex;align-items:center;gap:6px;background:var(--g100);border:none;border-radius:8px;padding:9px 14px;font-family:var(--font-body);font-size:13px;color:var(--g600);cursor:pointer;margin:14px 16px 10px}
.back-btn:hover{background:var(--m-pale);color:var(--m)}
.back-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2}
.det-card{background:var(--white);border:1px solid var(--g200);border-radius:var(--radius);padding:14px;margin:0 16px 12px}
.il{background:var(--white);border:1px solid var(--g200);border-radius:var(--radius);overflow:hidden;margin-bottom:10px}
.ir{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--g100)}
.ir:last-child{border-bottom:none}
.irl{font-size:12px;color:var(--g400);font-weight:500}
.irv{font-size:13px;font-weight:600}

/* ── BOTTOM NAV ── */
.bn{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--g200);display:flex;padding:6px 0 8px;z-index:100}
.bb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;background:none;border:none;cursor:pointer}
.bi{width:21px;height:21px;stroke:var(--g300)}
.bla{font-size:9px;font-weight:600;color:var(--g300);text-transform:uppercase;letter-spacing:.5px}
.bb.active .bi{stroke:var(--m)}
.bb.active .bla{color:var(--m)}

/* ── UTILITY ── */
.ls2{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px}
.sp{width:26px;height:26px;border:2px solid var(--g200);border-top-color:var(--m);border-radius:50%;animation:spin .8s linear infinite}
.lt{font-size:13px;color:var(--g400);text-align:center}
.eb{text-align:center;padding:28px;color:var(--g300)}
.eb p{font-size:13px}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--m);color:var(--white);padding:9px 18px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* debug card */
.dbg{background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:10px 14px;font-size:11px;font-family:var(--font-mono);color:#5d4037;margin:0 16px 12px;line-height:1.7;word-break:break-all}
.badge-ok{background:var(--green-l);color:var(--green);padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600}
.badge-due{background:var(--red-l);color:var(--red);padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600}
.badge-par{background:var(--gold-l);color:var(--gold);padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-bg"></div>
  <div class="login-wrap">
    <div class="login-brand">
      <div class="login-icon">EM</div>
      <h1>EduManage Pro</h1>
      <p>Emmanuel School — Teacher Portal</p>
    </div>
    <div class="login-card">
      <div class="login-card-ttl">Teacher Login</div>
      <div class="login-card-sub">Enter your teacher code &amp; password</div>
      <label class="login-label">Teacher Code</label>
      <input type="text" class="login-input" id="lCode" placeholder="e.g. TCH001"
             autocomplete="off" spellcheck="false" style="text-transform:uppercase"
             onkeydown="if(event.key==='Enter')doLogin()">
      <label class="login-label">Password</label>
      <input type="password" class="login-input" id="lPass" placeholder="Enter password"
             onkeydown="if(event.key==='Enter')doLogin()">
      <button class="login-btn" id="lBtn" onclick="doLogin()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Sign In
      </button>
      <div class="login-err" id="lErr"></div>
    </div>
    <div class="login-foot">
      <p>Contact <strong>Admin</strong> if you forgot your credentials</p>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="appScreen" style="display:none">
  <div class="topbar">
    <div class="tl"><div class="lm">E</div>EduManage</div>
    <div class="tr">
      <div class="ls">
        <button class="lb active" onclick="setLang('en')">EN</button>
        <button class="lb" onclick="setLang('hi')">HI</button>
        <button class="lb" onclick="setLang('mr')">MR</button>
      </div>
      <button class="ob" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="cnt" id="mainContent">
    <div class="ls2"><div class="sp"></div><div class="lt">Loading...</div></div>
  </div>
  <nav class="bn">
    <button class="bb active" onclick="showPage('students',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="bla">Students</span>
    </button>
    <button class="bb" onclick="showPage('attendance',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span class="bla">Attend.</span>
    </button>
    <button class="bb" onclick="showPage('marks',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span class="bla">Marks</span>
    </button>
    <button class="bb" onclick="showPage('group',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="bla">Group</span>
    </button>
    <button class="bb" onclick="showPage('notify',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="bla">Notify</span>
    </button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
const API = 'https://edumanage-backend-xi.vercel.app/api';

/* ── STATE ── */
let activeToken = null;
let cd          = null;      // raw teacher API response
let students    = [];
let attState    = {};
let posts       = [];
let cp          = 'students';
let lang        = localStorage.getItem('edu-lang') || 'en';
let selSet      = new Set(); // selected students for notification

/* ── TRANSLATIONS ── */
const T={

/* ── BOOT: forever login ── */
(function init(){
  const saved = localStorage.getItem('tch_token');
  if(saved && saved.length > 20){
    activeToken = saved;
    showApp();
    loadData();
  } else {
    showLogin();
  }
})();

function showLogin(){
  document.getElementById('loginScreen').classList.add('show');
  document.getElementById('appScreen').style.display='none';
  setTimeout(()=>{ const e=document.getElementById('lCode'); if(e)e.focus(); },400);
}
function showApp(){
  document.getElementById('loginScreen').classList.remove('show');
  document.getElementById('appScreen').style.display='block';
}

/* ── LOGIN ── */
async function doLogin(){
  const code=document.getElementById('lCode').value.trim().toUpperCase();
  const pass=document.getElementById('lPass').value.trim();
  const errEl=document.getElementById('lErr');
  const btn=document.getElementById('lBtn');
  if(!code||!pass){errEl.textContent='Please enter code and password';errEl.classList.add('show');return;}
  errEl.classList.remove('show');
  btn.innerHTML='<div class="login-sp"></div> Signing in...';
  btn.disabled=true;
  try{
    const res=await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,password:pass,role:'teacher'})});
    const data=await res.json();
    if(data.token){
      if(data.user&&data.user.role&&data.user.role!=='teacher'){
        errEl.textContent='This login is for teachers only';errEl.classList.add('show');
        btn.innerHTML='Sign In';btn.disabled=false;return;
      }
      /* ── SAVE FOREVER ── */
      localStorage.setItem('tch_token',data.token);
      localStorage.setItem('tch_name',data.user?.name||code);
      activeToken=data.token;
      showApp();
      loadData();
    } else {
      errEl.textContent=data.message||'Invalid code or password';
      errEl.classList.add('show');
      btn.innerHTML='Sign In';btn.disabled=false;
    }
  }catch(_){
    errEl.textContent='Network error. Check internet.';
    errEl.classList.add('show');
    btn.innerHTML='Sign In';btn.disabled=false;
  }
}

/* ── LOGOUT ── */
function doLogout(){
  if(!confirm('Are you sure you want to logout?'))return;
  localStorage.removeItem('tch_token');
  localStorage.removeItem('tch_name');
  activeToken=null;cd=null;students=[];posts=[];
  location.reload();
}

/* ── EXTRACT class name from ANY field name API may use ── */
function extractClass(obj){
  if(!obj) return '';
  const keys=[
    'class_name','assigned_class','class','className','assignedClass',
    'classAssigned','my_class','myClass','standard','std',
    'class_assigned','teacher_class','teacherClass','classname'
  ];
  for(const k of keys){
    if(obj[k] && String(obj[k]).trim()) return String(obj[k]).trim();
  }
  return '';
}

/* ── GET student id safely ── */
function sid(s){ return s._id||s.id||s.student_id||''; }

/* ── LOAD DATA ── */
async function loadData(){
  const h={Authorization:`Bearer ${activeToken}`,'Content-Type':'application/json'};
  try{
    /* 1. Teacher info */
    const tRes=await fetch(API+'/teachers/me',{headers:h});
    if(tRes.status===401){localStorage.removeItem('tch_token');showLogin();return;}
    if(tRes.ok){
      const raw=await tRes.json();
      /* raw may be {teacher:{...}} or directly the teacher object */
      cd = raw.teacher || raw.data || raw;
    }

    /* 2. Students — original endpoint first */
    const sRes=await fetch(API+'/teachers/my-students',{headers:h});
    if(sRes.ok){
      const raw=await sRes.json();
      students=Array.isArray(raw)?raw:(raw.students||raw.data||[]);
    }

    /* 3. If still empty, try /students with class filter */
    if(!students.length){
      const myClass=extractClass(cd);
      if(myClass){
        const r=await fetch(`${API}/students?class=${encodeURIComponent(myClass)}`,{headers:h});
        if(r.ok){const d=await r.json();students=Array.isArray(d)?d:(d.students||d.data||[]);}
      }
    }

    /* 4. If STILL empty, get all and filter client-side */
    if(!students.length){
      const myClass=extractClass(cd);
      const r=await fetch(API+'/students',{headers:h});
      if(r.ok){
        const d=await r.json();
        const all=Array.isArray(d)?d:(d.students||d.data||[]);
        if(myClass){
          const mc=myClass.toLowerCase().trim();
          const filtered=all.filter(s=>{
            const sc=String(s.class_name||s.standard||s.class||s.className||'').toLowerCase().trim();
            return sc===mc||sc.includes(mc)||mc.includes(sc);
          });
          students=filtered.length?filtered:all;
        } else {
          students=all;
        }
      }
    }

    /* 5. Posts */
    try{
      const pRes=await fetch(API+'/posts/my-class',{headers:h});
      if(pRes.ok){const d=await pRes.json();posts=Array.isArray(d)?d:(d.posts||[]);}
    }catch(_){}

    /* Init attState */
    students.forEach(s=>{if(!attState[sid(s)])attState[sid(s)]='P';});

    showPage('students');
  }catch(err){
    document.getElementById('mainContent').innerHTML=
      `<div class="ls2"><div class="eb"><p>Could not load data.<br>${err.message}</p></div></div>`;
  }
}

/* ── ROUTER ── */
function showPage(page,btn){
  cp=page;
  document.querySelectorAll('.bb').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  else{
    const idx={students:0,attendance:1,marks:2,group:3,notify:4}[page];
    if(idx!=null) document.querySelectorAll('.bb')[idx]?.classList.add('active');
  }
  const el=document.getElementById('mainContent');
  if(page==='students')    el.innerHTML=renderStudents();
  else if(page==='attendance') el.innerHTML=renderAttendance();
  else if(page==='marks')  el.innerHTML=renderMarks();
  else if(page==='group')  el.innerHTML=renderGroup();
  else if(page==='notify') el.innerHTML=renderNotify();
  el.scrollTop=0;window.scrollTo(0,0);
}

async function submitPost(){
  const txt=document.getElementById('postTxt')?.value.trim();
  const vid=document.getElementById('postVideo')?.value.trim();
  if(!txt&&!vid){showToast('Write something first');return;}
  try{
    const res=await fetch(API+'/posts',{method:'POST',headers:{Authorization:`Bearer ${activeToken}`,'Content-Type':'application/json'},body:JSON.stringify({text_content:txt,video_link:vid||null})});
    if(res.ok){
      const d=await res.json();
      posts.unshift(d.post||{text_content:txt,video_link:vid,created_at:new Date(),posted_by_name:cd?.name});
      showToast(t('posted'));showPage('group');
    }else{showToast('Failed. Try again.');}
  }catch(_){showToast('Network error.');}
}
async function deletePost(id){
  if(!confirm('Delete this post?'))return;
  try{
    const res=await fetch(API+'/posts/'+id,{method:'DELETE',headers:{Authorization:`Bearer ${activeToken}`}});
    if(res.ok){posts=posts.filter(p=>(p._id||p.id)!==id);showToast('Deleted');showPage('group');}
    else{showToast('Failed.');}
  }catch(_){showToast('Network error.');}
}

/* ── RENDER: NOTIFY ── */
function renderNotify(){
  selSet=new Set(); // reset on page open
  return `
  <div class="hdr"><div class="hg"></div>
    <div class="hc"><div class="grt">${t('send_notif')}</div>
      <div class="tnm" style="font-size:18px">${extractClass(cd)||t('my_class')}</div>
    </div>
  </div>
  <div class="sec" style="margin-top:14px">
    <div class="nf">
      <div class="fg">
        <label>Notification Title</label>
        <input type="text" class="fi" id="ntitle" placeholder="e.g. Exam tomorrow, Holiday notice...">
      </div>
      <div class="fg">
        <label>Message</label>
        <textarea class="fita" id="nmsg" placeholder="Write your message here..."></textarea>
      </div>
      <div class="fg">
        <label>${t('sel_students')}</label>
        <div style="display:flex;gap:6px;margin-bottom:8px">
          <button onclick="selAll(true)"
            style="flex:1;padding:8px;background:var(--m);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">
            ✅ ${t('all_students')}
          </button>
          <button onclick="selAll(false)"
            style="flex:1;padding:8px;background:var(--g100);color:var(--g600);border:1px solid var(--g200);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">
            ✕ Clear
          </button>
        </div>
        <div class="sel-badge" id="selBadge">0 ${t('selected')}</div>
        ${!students.length
          ? `<div class="eb"><p>${t('no_students')}</p></div>`
          : `<div class="stu-sel-box">
              ${students.map(s=>`
                <div class="stu-sel-item" id="srow_${sid(s)}" onclick="togStu('${sid(s)}')">
                  <input type="checkbox" class="stu-chk" id="schk_${sid(s)}"
                         onclick="event.stopPropagation();togStu('${sid(s)}')">
                  <div style="flex:1">
                    <div class="stu-sel-name">${s.name}</div>
                    <div class="stu-sel-roll">Roll ${s.roll_no||'-'}</div>
                  </div>
                </div>`).join('')}
             </div>`}
      </div>
      <button class="send-btn" onclick="sendNotif()">${t('send_notif')}</button>
    </div>
  </div>`;
}

/* toggle one student */
function togStu(id){
  selSet.has(id)?selSet.delete(id):selSet.add(id);
  const chk=document.getElementById('schk_'+id);
  const row=document.getElementById('srow_'+id);
  if(chk) chk.checked=selSet.has(id);
  if(row) row.classList.toggle('on',selSet.has(id));
  updBadge();
}

/* select / clear all */
function selAll(val){
  students.forEach(s=>{
    const id=sid(s);
    val?selSet.add(id):selSet.delete(id);
    const chk=document.getElementById('schk_'+id);
    const row=document.getElementById('srow_'+id);
    if(chk)chk.checked=val;
    if(row)row.classList.toggle('on',val);
  });
  updBadge();
}

function updBadge(){
  const el=document.getElementById('selBadge');
  if(el)el.textContent=selSet.size+' '+t('selected');
}

/* send */
async function sendNotif(){
  const title=document.getElementById('ntitle')?.value.trim();
  const msg=document.getElementById('nmsg')?.value.trim();
  if(!title||!msg){showToast('Enter title and message');return;}
  if(!selSet.size){showToast('Select at least one student');return;}
  const ids=[...selSet];
  try{
    const res=await fetch(API+'/notifications',{
      method:'POST',
      headers:{Authorization:`Bearer ${activeToken}`,'Content-Type':'application/json'},
      body:JSON.stringify({title,message:msg,student_ids:ids,send_to_all:ids.length===students.length})
    });
    if(res.ok){
      showToast(t('notif_sent'));
      document.getElementById('ntitle').value='';
      document.getElementById('nmsg').value='';
      selAll(false);
    }else{
      const e=await res.json().catch(()=>({}));
      showToast('Failed: '+(e.message||res.status));
    }
  }catch(_){showToast('Network error.');}
}

/* ── SW ── */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{})});
}
