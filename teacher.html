<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#800020">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Teacher Panel — EduManage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --m:#800020;--md:#5c0018;--mp:#3d0010;--ml:#a30027;--mp2:rgba(128,0,32,.09);
  --w:#fff;--b:#0a0a0a;
  --g5:#fafafa;--g1:#f5f5f5;--g2:#eee;--g3:#e0e0e0;--g4:#bdbdbd;--g5c:#9e9e9e;--g6:#757575;
  --green:#1a7a4a;--gl:#e8f5ee;--red:#c0392b;--rl:#fdf0ef;--gold:#b8860b;
  --fd:'Playfair Display',serif;--fb:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
  --r:12px;--tr:all .25s ease;
}
body{font-family:var(--fb);background:var(--g5);color:var(--b);padding-bottom:80px;min-height:100vh}

/* LOGIN */
.login-screen{min-height:100vh;background:linear-gradient(135deg,var(--mp),var(--m),var(--ml));display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--w);border-radius:20px;padding:32px 24px;width:100%;max-width:380px;box-shadow:0 24px 60px rgba(0,0,0,.35)}
.login-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}
.login-lm{width:38px;height:38px;background:var(--m);color:var(--w);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;font-family:var(--fd)}
.login-name{font-family:var(--fd);font-size:22px;font-weight:700}
.login-sub{text-align:center;font-size:12px;color:var(--g4);margin-bottom:24px}
.login-label{display:block;font-size:11px;font-weight:600;color:var(--g5c);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.login-input{width:100%;padding:12px 14px;background:var(--g5);border:1.5px solid var(--g2);border-radius:var(--r);font-family:var(--fb);font-size:14px;color:var(--b);outline:none;margin-bottom:14px;transition:var(--tr)}
.login-input:focus{border-color:var(--m);background:var(--w)}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--m),var(--ml));color:var(--w);border:none;border-radius:var(--r);font-family:var(--fb);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(128,0,32,.3)}
.login-err{background:var(--rl);border:1px solid rgba(192,57,43,.2);border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--red);margin-top:10px;display:none}
.login-err.show{display:block}
.login-sp{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:var(--w);border-radius:50%;animation:spin .7s linear infinite}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:var(--w);border-bottom:1px solid var(--g2);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.tl{font-family:var(--fd);font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.lm{width:28px;height:28px;background:var(--m);color:var(--w);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.tr{display:flex;align-items:center;gap:8px}
.ls{display:flex;gap:2px;background:var(--g1);border-radius:100px;padding:2px}
.lb{padding:4px 9px;border-radius:100px;border:none;background:transparent;font-family:var(--fb);font-size:10px;font-weight:700;color:var(--g4);cursor:pointer}
.lb.active{background:var(--w);color:var(--m)}
.ob{background:none;border:1px solid var(--g2);border-radius:7px;padding:6px 10px;font-size:11px;font-weight:600;color:var(--g5c);cursor:pointer;font-family:var(--fb);transition:var(--tr)}
.ob:hover{border-color:var(--m);color:var(--m)}
.cnt{max-width:600px;margin:0 auto}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(--mp),var(--m));color:var(--w);padding:20px 16px 24px;position:relative;overflow:hidden}
.hg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:32px 32px}
.hc{position:relative;z-index:1}
.grt{font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:600}
.tnm{font-family:var(--fd);font-size:24px;font-weight:700;line-height:1.1;margin-bottom:6px}
.cps{display:flex;gap:6px;flex-wrap:wrap}
.cp{padding:3px 10px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);border-radius:100px;font-size:10px;color:rgba(255,255,255,.8);font-weight:500}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 16px}
.sc{background:var(--w);border:1px solid var(--g2);border-radius:var(--r);padding:14px;text-align:center}
.sv{font-family:var(--fd);font-size:24px;font-weight:700;line-height:1;margin-bottom:2px;color:var(--m)}
.sl{font-size:10px;color:var(--g4);font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* SECTIONS */
.sec{padding:0 16px;margin-bottom:18px}
.stt{font-family:var(--fd);font-size:16px;font-weight:600;margin-bottom:10px}
.card{background:var(--w);border:1px solid var(--g2);border-radius:var(--r);padding:14px;margin-bottom:10px}

/* STUDENT ITEM */
.si{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--w);border:1px solid var(--g2);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:var(--tr)}
.si:hover{border-color:var(--m)}
.sav{width:40px;height:40px;background:var(--mp2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:16px;color:var(--m);flex-shrink:0}
.snm{font-size:14px;font-weight:600;margin-bottom:2px}
.smeta{font-size:11px;color:var(--g4)}

/* ATTENDANCE */
.att-sheet{background:var(--w);border:1px solid var(--g2);border-radius:var(--r);overflow:hidden}
.att-date-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--g1)}
.att-dl{font-size:13px;font-weight:600}
.di{padding:6px 10px;border:1.5px solid var(--g2);border-radius:8px;font-family:var(--fm);font-size:12px;color:var(--b);outline:none;transition:var(--tr)}
.di:focus{border-color:var(--m)}
.ar{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--g1);gap:10px}
.ar:last-child{border-bottom:none}
.aroll{font-family:var(--fm);font-size:12px;color:var(--g4);min-width:26px}
.anm{font-size:13px;font-weight:500;flex:1}
.atog{display:flex;border:1.5px solid var(--g2);border-radius:8px;overflow:hidden}
.atb{padding:6px 13px;border:none;font-family:var(--fb);font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--g4);transition:var(--tr)}
.atb.pa{background:var(--green);color:var(--w)}
.atb.aa{background:var(--red);color:var(--w)}
.save-btn{width:calc(100% - 28px);margin:14px;padding:12px;background:var(--m);color:var(--w);border:none;border-radius:var(--r);font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer;transition:var(--tr)}
.save-btn:hover{background:var(--md)}

/* MARKS */
.marks-sheet{background:var(--w);border:1px solid var(--g2);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.ms-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--g1);background:var(--g5)}
.ms-fields{padding:10px 14px 14px;display:none}
.ms-fields.open{display:block}
.ms-top{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.ms-top input,.ms-top select{flex:1;min-width:120px;padding:7px 10px;border:1.5px solid var(--g2);border-radius:8px;font-family:var(--fb);font-size:12px;color:var(--b);outline:none}
.ms-top input:focus,.ms-top select:focus{border-color:var(--m)}
.mrow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.mlbl{font-size:13px;font-weight:500;flex:1;color:var(--g6)}
.minput{padding:7px 10px;border:1.5px solid var(--g2);border-radius:8px;font-family:var(--fm);font-size:13px;color:var(--b);outline:none;text-align:center;width:70px}
.minput:focus{border-color:var(--m)}
.of-lbl{font-size:12px;color:var(--g4);min-width:30px}
.msave{width:100%;padding:9px;background:var(--m);color:var(--w);border:none;border-radius:8px;font-family:var(--fb);font-size:12px;font-weight:600;cursor:pointer;margin-top:6px}
.apply-all{padding:6px 12px;background:var(--mp2);border:1px solid rgba(128,0,32,.2);border-radius:8px;font-family:var(--fb);font-size:11px;font-weight:600;color:var(--m);cursor:pointer;transition:var(--tr)}

/* GROUP */
.composer{background:var(--w);border:1px solid var(--g2);border-radius:var(--r);padding:14px;margin-bottom:10px}
.ctxt{width:100%;min-height:90px;padding:11px;border:1.5px solid var(--g2);border-radius:var(--r);font-family:var(--fb);font-size:14px;color:var(--b);resize:none;outline:none;margin-bottom:10px}
.ctxt:focus{border-color:var(--m)}
.post-btn{width:100%;padding:12px;background:var(--m);color:var(--w);border:none;border-radius:var(--r);font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer}
.pi{background:var(--w);border:1px solid var(--g2);border-radius:var(--r);padding:12px;margin-bottom:8px}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pau{font-size:12px;font-weight:700;color:var(--m)}
.ptm{font-size:10px;color:var(--g3)}
.ptxt{font-size:13px;color:var(--g6);line-height:1.6}
.del-btn{background:none;border:none;cursor:pointer;color:var(--g3);padding:2px}
.del-btn:hover{color:var(--red)}
.del-btn svg{width:13px;height:13px;stroke:currentColor}

/* NOTIFY */
.nf{background:var(--w);border:1px solid var(--g2);border-radius:var(--r);padding:14px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--g5c);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.fi{width:100%;padding:10px 13px;background:var(--g5);border:1.5px solid var(--g2);border-radius:var(--r);font-family:var(--fb);font-size:13px;color:var(--b);outline:none;transition:var(--tr)}
.fi:focus{border-color:var(--m);background:var(--w)}
.fita{width:100%;padding:10px 13px;background:var(--g5);border:1.5px solid var(--g2);border-radius:var(--r);font-family:var(--fb);font-size:13px;color:var(--b);outline:none;resize:none;min-height:80px;transition:var(--tr)}
.fita:focus{border-color:var(--m);background:var(--w)}
.send-btn{width:100%;padding:12px;background:var(--m);color:var(--w);border:none;border-radius:var(--r);font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer}

/* STUDENT DETAIL */
.back-btn{display:inline-flex;align-items:center;gap:6px;background:var(--g1);border:none;border-radius:8px;padding:9px 14px;font-family:var(--fb);font-size:13px;color:var(--g6);cursor:pointer;margin:14px 16px 10px;transition:var(--tr)}
.back-btn:hover{background:var(--mp2);color:var(--m)}
.back-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2}
.det-card{background:var(--w);border:1px solid var(--g2);border-radius:var(--r);padding:16px;margin:0 16px 12px}
.il{background:var(--w);border:1px solid var(--g2);border-radius:var(--r);overflow:hidden;margin-bottom:10px;margin:0 16px 12px}
.ir{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--g1)}
.ir:last-child{border-bottom:none}
.irl{font-size:12px;color:var(--g4);font-weight:500}
.irv{font-size:13px;font-weight:600}

/* CHECKBOXES FOR NOTIFY */
.stu-check-list{max-height:220px;overflow-y:auto;border:1px solid var(--g2);border-radius:8px;margin-bottom:10px}
.stu-check-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--g1);cursor:pointer}
.stu-check-item:last-child{border-bottom:none}
.stu-check-item:hover{background:var(--mp2)}
.stu-check-item input{accent-color:var(--m);width:15px;height:15px;cursor:pointer}
.check-actions{display:flex;gap:8px;margin-bottom:8px}
.ca-btn{padding:5px 12px;border:1px solid var(--g2);border-radius:7px;font-size:11px;font-weight:600;color:var(--g5c);background:var(--w);cursor:pointer;transition:var(--tr)}
.ca-btn:hover{border-color:var(--m);color:var(--m)}

/* BOTTOM NAV */
.bn{position:fixed;bottom:0;left:0;right:0;background:var(--w);border-top:1px solid var(--g2);display:flex;padding:6px 0 8px;z-index:100}
.bb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;background:none;border:none;cursor:pointer;transition:var(--tr)}
.bi{width:21px;height:21px;stroke:var(--g3);transition:var(--tr)}
.bla{font-size:9px;font-weight:600;color:var(--g3);text-transform:uppercase;letter-spacing:.5px}
.bb.active .bi{stroke:var(--m)}
.bb.active .bla{color:var(--m)}

/* UTILS */
.ls2{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px}
.sp{width:26px;height:26px;border:2px solid var(--g2);border-top-color:var(--m);border-radius:50%;animation:spin .8s linear infinite}
.lt{font-size:13px;color:var(--g4);text-align:center}
.eb{text-align:center;padding:28px;color:var(--g3)}
.eb p{font-size:13px}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--m);color:var(--w);padding:9px 18px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.badge-ok{background:var(--gl);color:var(--green);padding:2px 8px;border-radius:100px;font-size:10px;font-weight:600}
.badge-no{background:var(--rl);color:var(--red);padding:2px 8px;border-radius:100px;font-size:10px;font-weight:600}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="apple-touch-icon" href="icons/icon-192x192.png">
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-lm">E</div>
      <div class="login-name">EduManage</div>
    </div>
    <div class="login-sub">Teacher Panel · Emmanuel School</div>
    <label class="login-label">Teacher Code</label>
    <input type="text" class="login-input" id="lCode" placeholder="e.g. TCH001" autocomplete="off" spellcheck="false" style="text-transform:uppercase" onkeydown="if(event.key==='Enter')document.getElementById('lPass').focus()">
    <label class="login-label">Password</label>
    <input type="password" class="login-input" id="lPass" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" id="lBtn" onclick="doLogin()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Sign In
    </button>
    <div class="login-err" id="lErr"></div>
  </div>
</div>

<!-- APP -->
<div id="appScreen" style="display:none">
  <div class="topbar">
    <div class="tl"><div class="lm">E</div>EduManage</div>
    <div class="tr">
      <div class="ls">
        <button class="lb active" onclick="setLang('en')">EN</button>
        <button class="lb" onclick="setLang('hi')">HI</button>
        <button class="lb" onclick="setLang('mr')">MR</button>
      </div>
      <button class="ob" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="cnt" id="mainContent">
    <div class="ls2"><div class="sp"></div><div class="lt">Loading...</div></div>
  </div>
  <nav class="bn">
    <button class="bb active" onclick="showPage('students',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <span class="bla">Students</span>
    </button>
    <button class="bb" onclick="showPage('attendance',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span class="bla">Attend.</span>
    </button>
    <button class="bb" onclick="showPage('marks',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span class="bla">Marks</span>
    </button>
    <button class="bb" onclick="showPage('group',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="bla">Group</span>
    </button>
    <button class="bb" onclick="showPage('notify',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="bla">Notify</span>
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://edumanage-backend-xi.vercel.app/api';

let TOKEN = null;
let teacherData = null;   /* {name, code, phone} from login */
let classData = null;     /* {id, standard, section} from my-class */
let students = [];        /* students array from my-class */
let posts = [];
let attState = {};
let cp = 'students';
let lang = localStorage.getItem('edu-lang') || 'en';

const T = {
  en:{no_class:'No class assigned yet. Contact admin.',no_students:'No students in your class.',loading:'Loading...'},
  hi:{no_class:'कोई कक्षा नहीं। एडमिन से संपर्क करें।',no_students:'कोई छात्र नहीं।',loading:'लोड हो रहा है...'},
  mr:{no_class:'वर्ग नाही. एडमिनशी संपर्क करा.',no_students:'विद्यार्थी नाहीत.',loading:'लोड होत आहे...'}
};
function t(k){return(T[lang]&&T[lang][k])?T[lang][k]:(T.en[k]||k)}

function setLang(l){
  lang=l;localStorage.setItem('edu-lang',l);
  document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase()===l));
  showPage(cp);
}
setLang(lang);

function H(){return{Authorization:'Bearer '+TOKEN,'Content-Type':'application/json'};}

function showToast(msg,ok=true){
  const e=document.getElementById('toast');
  e.textContent=msg;
  e.style.background=ok?'var(--m)':'var(--red)';
  e.classList.add('show');
  setTimeout(()=>e.classList.remove('show'),3000);
}

function ini(n){if(!n)return'?';return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function ago(d){if(!d)return'';const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}

/* ══════════════════
   BOOT
══════════════════ */
(function boot(){
  const saved = localStorage.getItem('tch_token');
  if(saved && saved.length > 20){
    TOKEN = saved;
    showApp();
    loadData();
  } else {
    showLogin();
  }
})();

function showLogin(){
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('appScreen').style.display='none';
  setTimeout(()=>document.getElementById('lCode').focus(),300);
}
function showApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
}

/* ══════════════════
   LOGIN
   FIX: check data.token not data.success&&data.token
══════════════════ */
async function doLogin(){
  const code = document.getElementById('lCode').value.trim().toUpperCase();
  const pass = document.getElementById('lPass').value.trim();
  const errEl = document.getElementById('lErr');
  const btn   = document.getElementById('lBtn');
  if(!code||!pass){errEl.textContent='Code aur password bharo';errEl.classList.add('show');return;}
  errEl.classList.remove('show');
  btn.innerHTML='<div class="login-sp"></div> Signing in...';
  btn.disabled=true;
  try{
    const res  = await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,password:pass,role:'teacher'})});
    const data = await res.json();

    /* KEY FIX: backend returns {token, user} — check data.token */
    if(data.token){
      if(data.user && data.user.role !== 'teacher'){
        errEl.textContent='Yeh login sirf teachers ke liye hai.';
        errEl.classList.add('show');
        btn.innerHTML='Sign In';btn.disabled=false;
        return;
      }
      TOKEN = data.token;
      teacherData = data.user || {name:code,code};
      localStorage.setItem('tch_token', TOKEN);
      showApp();
      loadData();
    } else {
      errEl.textContent = data.message || data.error || 'Invalid code or password.';
      errEl.classList.add('show');
      btn.innerHTML='Sign In';btn.disabled=false;
    }
  }catch(e){
    errEl.textContent='Network error: '+e.message;
    errEl.classList.add('show');
    btn.innerHTML='Sign In';btn.disabled=false;
  }
}

function doLogout(){
  if(!confirm('Logout?'))return;
  TOKEN=null;teacherData=null;classData=null;students=[];posts=[];
  localStorage.removeItem('tch_token');
  showLogin();
}

/* ══════════════════
   LOAD DATA
   FIX: GET /teachers/my-class returns {class, students}
══════════════════ */
async function loadData(){
  document.getElementById('mainContent').innerHTML='<div class="ls2"><div class="sp"></div><div class="lt">'+t('loading')+'</div></div>';
  try{
    const res  = await fetch(API+'/teachers/my-class',{headers:H()});
    if(res.status===401){localStorage.removeItem('tch_token');showLogin();return;}
    const data = await res.json();

    /* Backend returns: {class: {...}, students: [...]} */
    classData = data.class  || null;
    students  = data.students || [];

    /* Load posts */
    if(classData){
      try{
        const pr = await fetch(API+'/posts?class='+encodeURIComponent(classData.standard),{headers:H()});
        if(pr.ok){const pd=await pr.json();posts=Array.isArray(pd)?pd:(pd.posts||[]);}
      }catch(_){}
    }

    showPage(cp);
  }catch(e){
    document.getElementById('mainContent').innerHTML=`<div class="ls2"><div class="eb"><p>Error loading data: ${e.message}</p></div></div>`;
  }
}

/* ══════════════════
   ROUTER
══════════════════ */
function showPage(page, btn){
  cp=page;
  document.querySelectorAll('.bb').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  else{
    const idx={students:0,attendance:1,marks:2,group:3,notify:4}[page]??0;
    document.querySelectorAll('.bb')[idx]?.classList.add('active');
  }
  const el=document.getElementById('mainContent');
  if(page==='students')    el.innerHTML=renderStudents();
  else if(page==='attendance') el.innerHTML=renderAttendance();
  else if(page==='marks')  el.innerHTML=renderMarks();
  else if(page==='group')  el.innerHTML=renderGroup();
  else if(page==='notify') el.innerHTML=renderNotify();
  el.scrollTop=0;window.scrollTo(0,0);
}

/* ══════════════════
   ATTENDANCE
══════════════════ */
function renderAttendance(){
  if(!classData) return `<div style="padding:20px 16px"><div class="card" style="text-align:center;padding:24px;color:var(--g4)"><p>${t('no_class')}</p></div></div>`;
  const today = new Date().toISOString().slice(0,10);
  if(!students.length) return `<div style="padding:20px 16px"><div class="eb"><p>${t('no_students')}</p></div></div>`;
  return `
  <div class="hdr"><div class="hg"></div><div class="hc">
    <div class="grt">Attendance</div>
    <div class="tnm">${classData.standard}</div>
  </div></div>
  <div style="padding:14px 16px">
    <div class="att-sheet">
      <div class="att-date-row">
        <div class="att-dl">Date</div>
        <input type="date" class="di" id="attDate" value="${today}">
      </div>
      ${students.map(s=>{
        const sid=s._id||s.id||s.user_id;
        if(!attState[sid]) attState[sid]='P';
        return`<div class="ar">
          <div class="aroll">${s.roll_no||'-'}</div>
          <div class="anm">${s.name}</div>
          <div class="atog">
            <button class="atb ${attState[sid]==='P'?'pa':''}" onclick="toggleAtt('${sid}','P',this)">P</button>
            <button class="atb ${attState[sid]==='A'?'aa':''}" onclick="toggleAtt('${sid}','A',this)">A</button>
          </div>
        </div>`;}).join('')}
      <button class="save-btn" onclick="saveAttendance()">Save Attendance</button>
    </div>
  </div>`;
}

function toggleAtt(sid,val,btn){
  attState[sid]=val;
  const row=btn.closest('.atog');
  row.querySelectorAll('.atb').forEach(b=>{b.classList.remove('pa','aa');});
  if(val==='P') btn.classList.add('pa');
  else btn.classList.add('aa');
}

async function saveAttendance(){
  const date=document.getElementById('attDate')?.value||new Date().toISOString().slice(0,10);
  const records=students.map(s=>{
    const sid=s._id||s.id||s.user_id;
    return{student_id:sid,status:attState[sid]||'P',date};
  });
  try{
    const res=await fetch(API+'/attendance',{method:'POST',headers:H(),body:JSON.stringify({records,class_id:classData?.id,date})});
    if(res.ok) showToast('✅ Attendance saved!');
    else{const d=await res.json().catch(()=>({}));showToast('Error: '+(d.message||'Failed'),false);}
  }catch(e){showToast('Network error',false);}
}

/* ══════════════════
   MARKS
══════════════════ */
function renderMarks(){
  if(!classData) return `<div style="padding:20px 16px"><div class="card" style="text-align:center;padding:24px;color:var(--g4)"><p>${t('no_class')}</p></div></div>`;
  if(!students.length) return `<div style="padding:20px 16px"><div class="eb"><p>${t('no_students')}</p></div></div>`;
  return `
  <div class="hdr"><div class="hg"></div><div class="hc">
    <div class="grt">Marks</div>
    <div class="tnm">${classData.standard}</div>
  </div></div>
  <div style="padding:14px 16px">
    <div class="card" style="margin-bottom:14px">
      <div class="fg"><label>Subject</label><input class="fi" id="mk_sub" placeholder="e.g. Mathematics"></div>
      <div class="fg"><label>Exam Type</label>
        <select class="fi" id="mk_exam">
          <option>Unit Test 1</option><option>Unit Test 2</option>
          <option>Mid Term</option><option>Final Exam</option>
          <option>Class Test</option><option>Assignment</option>
        </select>
      </div>
      <div class="fg"><label>Out of (Total Marks)</label>
        <input type="number" class="fi" id="mk_total" placeholder="e.g. 100" value="100">
      </div>
      <button class="apply-all" onclick="applyTotalToAll()">Apply total to all ↓</button>
    </div>
    ${students.map(s=>{
      const sid=s._id||s.id||s.user_id;
      return`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--w);border:1px solid var(--g2);border-radius:var(--r);margin-bottom:8px">
        <div class="sav" style="width:34px;height:34px;font-size:13px">${ini(s.name)}</div>
        <div class="mlbl" style="flex:1;font-size:13px;min-width:0"><div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</div><div style="font-size:10px;color:var(--g4)">Roll ${s.roll_no||'-'}</div></div>
        <input type="number" class="minput mk-obtained" data-sid="${sid}" placeholder="Marks" min="0">
        <span style="font-size:12px;color:var(--g4)">/</span>
        <input type="number" class="minput mk-outof" data-sid="${sid}" placeholder="100" value="100" min="1">
      </div>`;}).join('')}
    <button class="save-btn" style="margin:14px 0 0 0;width:100%" onclick="saveMarks()">Save All Marks</button>
  </div>`;
}

function applyTotalToAll(){
  const total=document.getElementById('mk_total')?.value||'100';
  document.querySelectorAll('.mk-outof').forEach(el=>el.value=total);
}

async function saveMarks(){
  const sub=document.getElementById('mk_sub')?.value.trim();
  const exam=document.getElementById('mk_exam')?.value;
  if(!sub){showToast('Subject likhao',false);return;}
  const records=[];
  document.querySelectorAll('.mk-obtained').forEach(el=>{
    const val=el.value.trim();
    if(val!==''){
      const sid=el.dataset.sid;
      const outof=document.querySelector(`.mk-outof[data-sid="${sid}"]`)?.value||'100';
      records.push({student_id:sid,subject:sub,exam_type:exam,marks_obtained:Number(val),total_marks:Number(outof)});
    }
  });
  if(!records.length){showToast('Koi marks enter karo',false);return;}
  try{
    const res=await fetch(API+'/marks',{method:'POST',headers:H(),body:JSON.stringify({records,class_id:classData?.id})});
    if(res.ok) showToast('✅ Marks saved!');
    else{const d=await res.json().catch(()=>({}));showToast('Error: '+(d.message||'Failed'),false);}
  }catch(e){showToast('Network error',false);}
}

/* ══════════════════
   GROUP
══════════════════ */
function renderGroup(){
  if(!classData) return `<div style="padding:20px 16px"><div class="card" style="text-align:center;padding:24px;color:var(--g4)"><p>${t('no_class')}</p></div></div>`;
  return `
  <div class="hdr"><div class="hg"></div><div class="hc">
    <div class="grt">Class Group</div>
    <div class="tnm">${classData.standard}</div>
  </div></div>
  <div style="padding:14px 16px">
    <div class="composer">
      <textarea class="ctxt" id="postTxt" placeholder="Write something for your class..."></textarea>
      <input class="fi" id="postVid" placeholder="Video link (optional)" style="margin-bottom:10px">
      <button class="post-btn" onclick="doPost()">📢 Post</button>
    </div>
    ${!posts.length?`<div class="eb"><p>No posts yet</p></div>`:''}
    ${posts.map(p=>`
      <div class="pi">
        <div class="ph">
          <div class="pau">${p.posted_by_name||'Teacher'}</div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="ptm">${ago(p.created_at)}</div>
            <button class="del-btn" onclick="deletePost('${p._id||p.id}')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>
          </div>
        </div>
        <div class="ptxt">${p.text_content||''}</div>
        ${p.video_link?`<a href="${p.video_link}" target="_blank" style="display:inline-flex;align-items:center;gap:5px;margin-top:6px;font-size:12px;color:var(--m);font-weight:500;text-decoration:none">▶ Watch Video</a>`:''}
      </div>`).join('')}
  </div>`;
}

async function doPost(){
  const txt=document.getElementById('postTxt')?.value.trim();
  const vid=document.getElementById('postVid')?.value.trim();
  if(!txt&&!vid){showToast('Kuch likho',false);return;}
  try{
    const res=await fetch(API+'/posts',{method:'POST',headers:H(),body:JSON.stringify({text_content:txt,video_link:vid||null,class_name:classData?.standard,target_class:classData?.standard})});
    const d=await res.json().catch(()=>({}));
    if(res.ok){
      posts.unshift(d.post||{text_content:txt,video_link:vid,created_at:new Date(),posted_by_name:teacherData?.name||'Teacher'});
      showToast('✅ Posted!');
      showPage('group');
    }else showToast('Error: '+(d.message||'Failed'),false);
  }catch(e){showToast('Network error',false);}
}

async function deletePost(id){
  if(!confirm('Delete karo?'))return;
  try{
    const res=await fetch(API+'/posts/'+id,{method:'DELETE',headers:H()});
    if(res.ok){posts=posts.filter(p=>(p._id||p.id)!==id);showToast('Deleted');showPage('group');}
    else showToast('Failed',false);
  }catch(e){showToast('Network error',false);}
}

/* ══════════════════
   NOTIFY
══════════════════ */
function renderNotify(){
  if(!classData) return `<div style="padding:20px 16px"><div class="card" style="text-align:center;padding:24px;color:var(--g4)"><p>${t('no_class')}</p></div></div>`;
  return `
  <div class="hdr"><div class="hg"></div><div class="hc">
    <div class="grt">Notifications</div>
    <div class="tnm">${classData.standard}</div>
  </div></div>
  <div style="padding:14px 16px">
    <div class="nf">
      <div class="fg"><label>Title ✱</label><input class="fi" id="nTitle" placeholder="Notification title"></div>
      <div class="fg"><label>Message ✱</label><textarea class="fita" id="nMsg" placeholder="Write your message..."></textarea></div>
      <div class="fg"><label>Send To</label>
        <div class="check-actions">
          <button class="ca-btn" onclick="checkAll(true)">Select All</button>
          <button class="ca-btn" onclick="checkAll(false)">Clear All</button>
        </div>
        <div class="stu-check-list">
          ${students.map(s=>`
            <label class="stu-check-item">
              <input type="checkbox" class="stu-check" value="${s._id||s.id||s.user_id}" checked>
              <span style="font-size:13px;font-weight:500">${s.name}</span>
              <span style="font-size:11px;color:var(--g4);margin-left:auto">Roll ${s.roll_no||'-'}</span>
            </label>`).join('')}
        </div>
      </div>
      <button class="send-btn" onclick="sendNotification()">📢 Send Notification</button>
    </div>
  </div>`;
}

function checkAll(val){document.querySelectorAll('.stu-check').forEach(c=>c.checked=val);}

async function sendNotification(){
  const title=document.getElementById('nTitle')?.value.trim();
  const msg=document.getElementById('nMsg')?.value.trim();
  if(!title||!msg){showToast('Title aur message bharo',false);return;}
  const checked=[...document.querySelectorAll('.stu-check:checked')].map(c=>c.value);
  if(!checked.length){showToast('Koi student select karo',false);return;}
  try{
    const res=await fetch(API+'/notifications',{method:'POST',headers:H(),body:JSON.stringify({title,message:msg,class_name:classData?.standard,student_ids:checked})});
    if(res.ok){
      showToast('✅ Notification sent!');
      document.getElementById('nTitle').value='';
      document.getElementById('nMsg').value='';
    }else{const d=await res.json().catch(()=>({}));showToast('Error: '+(d.message||'Failed'),false);}
  }catch(e){showToast('Network error',false);}
}
