<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#800020">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Teacher Panel — EduManage</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#800020;
  --white:#fff;
  --gray-50:#fafafa;--gray-100:#f5f5f5;--gray-200:#eee;--gray-300:#e0e0e0;
  --gray-400:#bdbdbd;--gray-500:#9e9e9e;--gray-600:#757575;--gray-700:#616161;
  --green:#1a7a4a;--green-light:#e8f5ee;
  --red:#c0392b;--red-light:#fdf0ef;
  --gold:#b8860b;
  --font-display:'Playfair Display',serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --radius:12px;--transition:all .25s ease;
}
body{font-family:var(--font-body);background:var(--gray-50);color:#0a0a0a;padding-bottom:80px;min-height:100vh}

/* LOGIN */
.login-screen{min-height:100vh;background:linear-gradient(160deg,#3d0010,#800020,#a30027);display:flex;align-items:center;justify-content:center;padding:20px;position:relative}
.login-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.login-card{background:var(--white);border-radius:20px;padding:28px 22px;width:100%;max-width:360px;position:relative;z-index:1;box-shadow:0 25px 60px rgba(0,0,0,.4)}
.login-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px}
.login-lm{width:34px;height:34px;background:var(--black);color:var(--white);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px}
.login-name{font-family:var(--font-display);font-size:20px;font-weight:700}
.login-sub{text-align:center;font-size:12px;color:var(--gray-400);margin-bottom:20px}
.login-label{display:block;font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.login-input{width:100%;padding:12px 14px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--radius);font-family:var(--font-body);font-size:14px;color:#0a0a0a;outline:none;margin-bottom:12px;transition:.3s}
.login-input:focus{border-color:var(--black);background:var(--white)}
.login-btn{width:100%;padding:13px;background:var(--black);color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.login-err{background:var(--red-light);border:1px solid rgba(192,57,43,.15);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--red);margin-top:10px;display:none}
.login-err.show{display:block}
.login-sp{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:var(--white);border-radius:50%;animation:spin .7s linear infinite}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--gray-200);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.tl{font-family:var(--font-display);font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.lm{width:28px;height:28px;background:var(--black);color:var(--white);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.tr{display:flex;align-items:center;gap:8px}
.ls{display:flex;gap:2px;background:var(--gray-100);border-radius:100px;padding:2px}
.lb{padding:4px 9px;border-radius:100px;border:none;background:transparent;font-family:var(--font-body);font-size:10px;font-weight:700;color:var(--gray-400);cursor:pointer}
.lb.active{background:var(--white);color:var(--black)}
.ob{background:none;border:1px solid var(--gray-200);border-radius:7px;padding:6px 10px;font-size:11px;font-weight:600;color:var(--gray-500);cursor:pointer;font-family:var(--font-body)}

/* CONTENT */
.cnt{max-width:600px;margin:0 auto}
.hdr{background:var(--black);color:var(--white);padding:20px 16px 24px;position:relative;overflow:hidden}
.hg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:32px 32px}
.hc{position:relative;z-index:1}
.grt{font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:600}
.tnm{font-family:var(--font-display);font-size:24px;font-weight:700;line-height:1.1;margin-bottom:6px}
.cps{display:flex;gap:6px;flex-wrap:wrap}
.cp{padding:3px 10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);border-radius:100px;font-size:10px;color:rgba(255,255,255,.7);font-weight:500}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 16px}
.sc{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px;text-align:center}
.sv{font-family:var(--font-display);font-size:24px;font-weight:700;line-height:1;margin-bottom:2px;color:var(--black)}
.sl{font-size:10px;color:var(--gray-400);font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* SECTION */
.sec{padding:0 16px;margin-bottom:18px}
.stt{font-family:var(--font-display);font-size:16px;font-weight:600;margin-bottom:10px}
.card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px;margin-bottom:10px}

/* STUDENT ITEM */
.si{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);margin-bottom:8px;cursor:pointer}
.sav{width:40px;height:40px;background:var(--gray-100);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:16px;color:var(--gray-600);flex-shrink:0}
.snm{font-size:14px;font-weight:600;margin-bottom:2px}
.smeta{font-size:11px;color:var(--gray-400)}

/* ATTENDANCE */
.att-sheet{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden}
.att-date-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--gray-100)}
.att-dl{font-size:13px;font-weight:600}
.di{padding:6px 10px;border:1.5px solid var(--gray-200);border-radius:8px;font-family:var(--font-mono);font-size:12px;color:#0a0a0a;outline:none}
.di:focus{border-color:var(--black)}
.ar{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--gray-100);gap:10px}
.ar:last-child{border-bottom:none}
.aroll{font-family:var(--font-mono);font-size:12px;color:var(--gray-400);min-width:26px}
.anm{font-size:13px;font-weight:500;flex:1}
.atog{display:flex;border:1.5px solid var(--gray-200);border-radius:8px;overflow:hidden}
.atb{padding:6px 13px;border:none;font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--gray-400)}
.atb.pa{background:var(--green);color:var(--white)}
.atb.aa{background:var(--red);color:var(--white)}
.save-btn{width:calc(100% - 28px);margin:14px;padding:12px;background:var(--black);color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer}

/* MARKS */
.marks-sheet{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden}
.ms-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--gray-100)}
.ms-fields{padding:10px 14px 14px;display:none;background:var(--gray-50)}
.ms-fields.open{display:block}
.mrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.mlbl{font-size:13px;font-weight:500;min-width:80px;color:var(--gray-700)}
.minput{flex:1;padding:7px 10px;border:1.5px solid var(--gray-200);border-radius:8px;font-family:var(--font-mono);font-size:13px;color:#0a0a0a;outline:none;text-align:center;max-width:75px}
.minput:focus{border-color:var(--black)}
.msave{width:100%;padding:9px;background:var(--black);color:var(--white);border:none;border-radius:8px;font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;margin-top:6px}

/* GROUP */
.composer{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px}
.ctxt{width:100%;min-height:90px;padding:11px;border:1.5px solid var(--gray-200);border-radius:var(--radius);font-family:var(--font-body);font-size:14px;color:#0a0a0a;resize:none;outline:none;margin-bottom:10px}
.ctxt:focus{border-color:var(--black)}
.post-btn{width:100%;padding:12px;background:var(--black);color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer}
.pi{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:12px;margin-bottom:8px}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pau{font-size:12px;font-weight:700;color:var(--black)}
.ptm{font-size:10px;color:var(--gray-300)}
.ptxt{font-size:13px;color:var(--gray-700);line-height:1.6}
.del-btn{background:none;border:none;cursor:pointer;color:var(--gray-300);padding:2px}
.del-btn svg{width:13px;height:13px;stroke:currentColor}

/* NOTIFY */
.nf{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.fi{width:100%;padding:10px 13px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--radius);font-family:var(--font-body);font-size:13px;color:#0a0a0a;outline:none}
.fi:focus{border-color:var(--black);background:var(--white)}
.fita{width:100%;padding:10px 13px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--radius);font-family:var(--font-body);font-size:13px;color:#0a0a0a;outline:none;resize:none;min-height:80px}
.fita:focus{border-color:var(--black);background:var(--white)}
.send-btn{width:100%;padding:12px;background:var(--black);color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer}

/* NOTIFY STUDENT SELECTOR */
.stu-sel-box{border:1.5px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;max-height:240px;overflow-y:auto}
.stu-sel-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--gray-100);cursor:pointer;user-select:none}
.stu-sel-item:last-child{border-bottom:none}
.stu-sel-item.on{background:rgba(128,0,32,.07)}
.stu-sel-item:hover{background:rgba(128,0,32,.07)}
.stu-chk{width:17px;height:17px;accent-color:var(--black);flex-shrink:0;pointer-events:none}
.stu-sel-name{font-size:13px;font-weight:600;flex:1}
.stu-sel-roll{font-size:11px;color:var(--gray-400);font-family:var(--font-mono)}
.sel-badge{display:inline-block;background:var(--black);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;margin-bottom:8px}

/* BACK + DETAIL */
.back-btn{display:inline-flex;align-items:center;gap:6px;background:var(--gray-100);border:none;border-radius:8px;padding:9px 14px;font-family:var(--font-body);font-size:13px;color:var(--gray-600);cursor:pointer;margin:14px 16px 10px}
.back-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2}
.det-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px;margin:0 16px 12px}
.il{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;margin-bottom:10px}
.ir{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--gray-100)}
.ir:last-child{border-bottom:none}
.irl{font-size:12px;color:var(--gray-400);font-weight:500}
.irv{font-size:13px;font-weight:600}

/* BOTTOM NAV */
.bn{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--gray-200);display:flex;padding:6px 0 8px;z-index:100}
.bb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;background:none;border:none;cursor:pointer}
.bi{width:21px;height:21px;stroke:var(--gray-300)}
.bla{font-size:9px;font-weight:600;color:var(--gray-300);text-transform:uppercase;letter-spacing:.5px}
.bb.active .bi{stroke:var(--black)}
.bb.active .bla{color:var(--black)}

/* UTILS */
.ls2{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px}
.sp{width:26px;height:26px;border:2px solid var(--gray-200);border-top-color:var(--black);border-radius:50%;animation:spin .8s linear infinite}
.lt{font-size:13px;color:var(--gray-400);text-align:center}
.eb{text-align:center;padding:28px;color:var(--gray-300)}
.eb p{font-size:13px}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--black);color:var(--white);padding:9px 18px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-lm">E</div>
      <div class="login-name">EduManage</div>
    </div>
    <div class="login-sub">Teacher Login</div>
    <label class="login-label">Teacher Code</label>
    <input type="text" class="login-input" id="lCode" placeholder="e.g. TCH001"
           autocomplete="off" style="text-transform:uppercase"
           onkeydown="if(event.key==='Enter')doLogin()">
    <label class="login-label">Password</label>
    <input type="password" class="login-input" id="lPass" placeholder="Enter password"
           onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" id="lBtn" onclick="doLogin()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Sign In
    </button>
    <div class="login-err" id="lErr"></div>
  </div>
</div>

<!-- APP -->
<div id="appScreen" style="display:none">
  <div class="topbar">
    <div class="tl"><div class="lm">E</div>EduManage</div>
    <div class="tr">
      <div class="ls">
        <button class="lb active" onclick="setLang('en')">EN</button>
        <button class="lb" onclick="setLang('hi')">HI</button>
        <button class="lb" onclick="setLang('mr')">MR</button>
      </div>
      <button class="ob" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="cnt" id="mainContent">
    <div class="ls2"><div class="sp"></div><div class="lt">Loading...</div></div>
  </div>
  <nav class="bn">
    <button class="bb active" onclick="showPage('students',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="bla">Students</span>
    </button>
    <button class="bb" onclick="showPage('attendance',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span class="bla">Attend.</span>
    </button>
    <button class="bb" onclick="showPage('marks',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span class="bla">Marks</span>
    </button>
    <button class="bb" onclick="showPage('group',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="bla">Group</span>
    </button>
    <button class="bb" onclick="showPage('notify',this)">
      <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="bla">Notify</span>
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://edumanage-backend-xi.vercel.app/api';

let activeToken = null;
let cd = null;
let students = [];
let attState = {};
let posts = [];
let cp = 'students';
let lang = localStorage.getItem('edu-lang') || 'en';
let selSet = new Set();

const T = {
  en:{students:'Students',attend:'Attendance',marks:'Marks',group:'Class Group',notify:'Notify',my_class:'My Class',total:'Students',mark_att:'Mark Attendance',update_marks:'Update Marks',post_group:'Post in Group',send_notif:'Send Notification',save_att:'Save Attendance',save_marks:'Save Marks',post:'Post',notif_sent:'Notification sent!',att_saved:'Attendance saved!',marks_saved:'Marks saved!',posted:'Posted!',P:'P',A:'A',write:'Write something for your class...',no_class:'No class assigned. Contact admin.',no_students:'No students in your class',no_posts:'No posts yet',out_of:'Out of',obtained:'Obtained',sel_students:'Select Students',all_sel:'Select All',selected:'selected'},
  hi:{students:'छात्र',attend:'उपस्थिति',marks:'अंक',group:'क्लास ग्रुप',notify:'सूचना',my_class:'मेरी कक्षा',total:'छात्र',mark_att:'उपस्थिति लगाएं',update_marks:'अंक अपडेट करें',post_group:'ग्रुप में पोस्ट करें',send_notif:'सूचना भेजें',save_att:'उपस्थिति सहेजें',save_marks:'अंक सहेजें',post:'पोस्ट करें',notif_sent:'सूचना भेजी गई!',att_saved:'उपस्थिति सहेजी!',marks_saved:'अंक सहेजे!',posted:'पोस्ट हुआ!',P:'उ',A:'अ',write:'कक्षा के लिए लिखें...',no_class:'कोई कक्षा नहीं।',no_students:'कोई छात्र नहीं',no_posts:'कोई पोस्ट नहीं',out_of:'में से',obtained:'प्राप्त',sel_students:'छात्र चुनें',all_sel:'सभी चुनें',selected:'चुने गए'},
  mr:{students:'विद्यार्थी',attend:'हजेरी',marks:'गुण',group:'वर्ग गट',notify:'सूचना',my_class:'माझा वर्ग',total:'विद्यार्थी',mark_att:'हजेरी नोंदवा',update_marks:'गुण अपडेट करा',post_group:'गटात पोस्ट करा',send_notif:'सूचना पाठवा',save_att:'हजेरी जतन करा',save_marks:'गुण जतन करा',post:'पोस्ट करा',notif_sent:'सूचना पाठवली!',att_saved:'हजेरी जतन झाली!',marks_saved:'गुण जतन झाले!',posted:'पोस्ट झाले!',P:'उ',A:'अ',write:'वर्गासाठी लिहा...',no_class:'कोणताही वर्ग नाही.',no_students:'विद्यार्थी नाहीत',no_posts:'पोस्ट नाही',out_of:'पैकी',obtained:'मिळाले',sel_students:'विद्यार्थी निवडा',all_sel:'सर्व निवडा',selected:'निवडले'}
};
function t(k){return(T[lang]&&T[lang][k])?T[lang][k]:(T.en[k]||k)}
function setLang(l){
  lang=l;localStorage.setItem('edu-lang',l);
  document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase()===l));
  showPage(cp);
}

/* ── BOOT: Login every time ── */
function init(){
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('appScreen').style.display='none';
  setTimeout(()=>{const e=document.getElementById('lCode');if(e)e.focus();},300);
}
init();

/* ── LOGIN ── */
async function doLogin(){
  const code=document.getElementById('lCode').value.trim().toUpperCase();
  const pass=document.getElementById('lPass').value.trim();
  const errEl=document.getElementById('lErr');
  const btn=document.getElementById('lBtn');
  if(!code||!pass){errEl.textContent='Please enter code and password';errEl.classList.add('show');return;}
  errEl.classList.remove('show');
  btn.innerHTML='<div class="login-sp"></div> Signing in...';
  btn.disabled=true;
  try{
    const res=await fetch(API+'/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code,password:pass,role:'teacher'})
    });
    const data=await res.json();
    if(data.success && data.token){
      if(data.user && data.user.role!=='teacher'){
        errEl.textContent='This login is for teachers only';
        errEl.classList.add('show');
        btn.innerHTML='Sign In';btn.disabled=false;return;
      }
      activeToken=data.token;
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('appScreen').style.display='block';
      loadData();
    } else if(data.token){
      /* some backends don't return success field */
      activeToken=data.token;
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('appScreen').style.display='block';
      loadData();
    } else {
      errEl.textContent=data.message||'Invalid code or password';
      errEl.classList.add('show');
      btn.innerHTML='Sign In';btn.disabled=false;
    }
  }catch(_){
    errEl.textContent='Network error. Check internet.';
    errEl.classList.add('show');
    btn.innerHTML='Sign In';btn.disabled=false;
  }
}

/* ── LOGOUT ── */
function doLogout(){
  if(!confirm('Are you sure you want to logout?'))return;
  activeToken=null;cd=null;students=[];posts=[];attState={};
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('appScreen').style.display='none';
  document.getElementById('lCode').value='';
  document.getElementById('lPass').value='';
  document.getElementById('lBtn').innerHTML='Sign In';
  document.getElementById('lBtn').disabled=false;
  document.getElementById('lErr').classList.remove('show');
}

/* ── HELPERS ── */
function sid(s){return s._id||s.id||s.student_id||''}
function ini(n){if(!n)return'?';return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function timeAgo(d){if(!d)return'';const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'}
function todayStr(){return new Date().toISOString().slice(0,10)}
function showToast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),3000)}

/* ── LOAD DATA ── */
async function loadData(){
  const h={Authorization:'Bearer '+activeToken,'Content-Type':'application/json'};
  try{
    /* teacher info */
    const tRes=await fetch(API+'/teachers/me',{headers:h});
    if(tRes.status===401){doLogout();return;}
    if(tRes.ok){
      const raw=await tRes.json();
      cd=raw.teacher||raw.data||raw;
    }

    /* students — EXACT original endpoint */
    const sRes=await fetch(API+'/teachers/my-students',{headers:h});
    if(sRes.ok){
      const raw=await sRes.json();
      students=Array.isArray(raw)?raw:(raw.students||raw.data||[]);
    }

    /* posts */
    try{
      const pRes=await fetch(API+'/posts/my-class',{headers:h});
      if(pRes.ok){const d=await pRes.json();posts=Array.isArray(d)?d:(d.posts||[]);}
    }catch(_){}

    students.forEach(s=>{if(!attState[sid(s)])attState[sid(s)]='P';});
    showPage('students');
  }catch(e){
    document.getElementById('mainContent').innerHTML='<div class="ls2"><div class="eb"><p>Failed to load. Check internet.</p></div></div>';
  }
}

/* ── ROUTER ── */
function showPage(page,btn){
  cp=page;
  document.querySelectorAll('.bb').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  else{const i={students:0,attendance:1,marks:2,group:3,notify:4}[page];if(i!=null)document.querySelectorAll('.bb')[i]?.classList.add('active');}
  const el=document.getElementById('mainContent');
  if(page==='students')el.innerHTML=renderStudents();
  else if(page==='attendance')el.innerHTML=renderAttendance();
  else if(page==='marks')el.innerHTML=renderMarks();
  else if(page==='group')el.innerHTML=renderGroup();
  else if(page==='notify')el.innerHTML=renderNotify();
  el.scrollTop=0;window.scrollTo(0,0);
}

/* ── ATTENDANCE ── */
function renderAttendance(){
  if(!students.length)return`<div class="ls2"><div class="eb"><p>${t('no_students')}</p></div></div>`;
  students.forEach(s=>{if(!attState[sid(s)])attState[sid(s)]='P';});
  return `
  <div class="hdr"><div class="hg"></div>
    <div class="hc"><div class="grt">${t('mark_att')}</div>
      <div class="tnm" style="font-size:18px">${cd?.class_name||cd?.assigned_class||t('my_class')}</div>
    </div>
  </div>
  <div class="sec" style="margin-top:14px">
    <div class="att-sheet">
      <div class="att-date-row">
        <div class="att-dl">Date</div>
        <input type="date" class="di" id="attDate" value="${todayStr()}">
      </div>
      ${students.map(s=>{
        const id=sid(s);const st=attState[id]||'P';
        return `<div class="ar">
          <div class="aroll">${s.roll_no||'-'}</div>
          <div class="anm">${s.name}</div>
          <div class="atog">
            <button class="atb ${st==='P'?'pa':''}" onclick="setAtt('${id}','P',this)">${t('P')}</button>
            <button class="atb ${st==='A'?'aa':''}" onclick="setAtt('${id}','A',this)">${t('A')}</button>
          </div>
        </div>`;}).join('')}
      <button class="save-btn" onclick="saveAtt()">${t('save_att')}</button>
    </div>
  </div>`;
}
function setAtt(id,val,btn){
  attState[id]=val;
  btn.closest('.ar').querySelectorAll('.atb').forEach(b=>b.classList.remove('pa','aa'));
  btn.classList.add(val==='P'?'pa':'aa');
}
async function saveAtt(){
  const date=document.getElementById('attDate')?.value;
  const records=students.map(s=>({student_id:sid(s),status:attState[sid(s)]||'P'}));
  try{
    const res=await fetch(API+'/attendance',{method:'POST',headers:{Authorization:'Bearer '+activeToken,'Content-Type':'application/json'},body:JSON.stringify({date,records})});
    showToast(res.ok?t('att_saved'):'Failed. Try again.');
  }catch(_){showToast('Network error.');}
}

/* ── MARKS ── */

  if(!students.length)return`<div class="ls2"><div class="eb"><p>${t('no_students')}</p></div></div>`;
  return `
  <div class="hdr"><div class="hg"></div>
    <div class="hc"><div class="grt">${t('update_marks')}</div>
      <div class="tnm" style="font-size:18px">${cd?.class_name||cd?.assigned_class||t('my_class')}</div>
    </div>
  </div>
  <div class="sec" style="margin-top:14px">
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <select class="fi" id="examType" style="flex:1">
        <option>Unit Test 1</option><option>Unit Test 2</option>
        <option>Half Yearly</option><option>Annual</option><option>Prelim</option>
      </select>
      <select class="fi" id="subjectSel" style="flex:1">
        <option>Maths</option><option>Science</option><option>English</option>
        <option>Hindi</option><option>Marathi</option><option>SST</option>
        <option>Sanskrit</option><option>Computer</option><option>GK</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);padding:10px 14px">
      <label style="font-size:12px;font-weight:600;color:var(--gray-500);white-space:nowrap">${t('out_of')} (all):</label>
      <input type="number" class="fi" id="outOfGlobal" placeholder="100" min="1" style="max-width:85px;margin:0">
      <button onclick="applyOutOf()" style="padding:8px 14px;background:var(--black);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap">Apply</button>
    </div>
    <div class="marks-sheet">
      ${students.map((s,i)=>{
        const id=sid(s);
        return `<div>
          <div class="ms-header" onclick="document.getElementById('mk${i}').classList.toggle('open')">
            <div class="sav" style="width:32px;height:32px;font-size:13px">${ini(s.name)}</div>
            <div style="flex:1"><div style="font-size:13px;font-weight:600">${s.name}</div><div style="font-size:11px;color:var(--gray-400)">Roll ${s.roll_no||'-'}</div></div>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="ms-fields" id="mk${i}">
            <div class="mrow"><div class="mlbl">${t('obtained')}</div><input type="number" class="minput" id="obt_${id}" placeholder="0" min="0"></div>
            <div class="mrow"><div class="mlbl">${t('out_of')}</div><input type="number" class="minput" id="oof_${id}" placeholder="100" min="1"></div>
            <button class="msave" onclick="saveMark('${id}','${s.name.replace(/'/g,"\\'")}')">Save ${s.name.split(' ')[0]}'s Marks</button>
          </div>
        </div>`;}).join('')}
    </div>
  </div>`;
}
function applyOutOf(){
  const val=document.getElementById('outOfGlobal')?.value;
  if(!val){showToast('Enter out of value first');return;}
  students.forEach(s=>{const e=document.getElementById('oof_'+sid(s));if(e)e.value=val;});
  showToast('Out of '+val+' applied to all');
}
async function saveMark(id,name){
  const exam=document.getElementById('examType')?.value;
  const subj=document.getElementById('subjectSel')?.value;
  const obt=document.getElementById('obt_'+id)?.value;
  const oof=document.getElementById('oof_'+id)?.value;
  if(!obt||!oof){showToast('Enter marks and out of value');return;}
  try{
    const res=await fetch(API+'/marks',{method:'POST',headers:{Authorization:'Bearer '+activeToken,'Content-Type':'application/json'},body:JSON.stringify({student_id:id,exam_type:exam,subject:subj,marks_obtained:Number(obt),total_marks:Number(oof)})});
    showToast(res.ok?name.split(' ')[0]+': '+t('marks_saved'):'Failed.');
  }catch(_){showToast('Network error.');}
}

/* ── GROUP ── */
function renderGroup(){
  return `
  <div class="hdr"><div class="hg"></div>
    <div class="hc"><div class="grt">${t('post_group')}</div>
      <div class="tnm" style="font-size:18px">${cd?.class_name||cd?.assigned_class||t('my_class')}</div>
    </div>
  </div>
  <div class="sec" style="margin-top:14px">
    <div class="composer">
      <textarea class="ctxt" id="postTxt" placeholder="${t('write')}"></textarea>
      <input type="text" class="fi" id="postVideo" placeholder="YouTube/video link (optional)" style="margin-bottom:10px">
      <button class="post-btn" onclick="submitPost()">${t('post')}</button>
    </div>
  </div>
  <div class="sec">
    <div class="stt">${t('group')}</div>
    ${!posts.length?`<div class="eb"><p>${t('no_posts')}</p></div>`:''}
    ${posts.map(p=>`
      <div class="pi">
        <div class="ph">
          <div class="pau">${p.posted_by_name||cd?.name||'You'}</div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="ptm">${timeAgo(p.created_at)}</div>
            <button class="del-btn" onclick="deletePost('${p._id||p.id}')">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
            </button>
          </div>
        </div>
        <div class="ptxt">${p.text_content||''}</div>
        ${p.video_link?`<a href="${p.video_link}" target="_blank" style="font-size:12px;color:var(--black);text-decoration:none;font-weight:500;display:inline-block;margin-top:6px">▶ Watch Video</a>`:''}
      </div>`).join('')}
  </div>`;
}
async function submitPost(){
  const txt=document.getElementById('postTxt')?.value.trim();
  const vid=document.getElementById('postVideo')?.value.trim();
  if(!txt&&!vid){showToast('Write something first');return;}
  try{
    const res=await fetch(API+'/posts',{method:'POST',headers:{Authorization:'Bearer '+activeToken,'Content-Type':'application/json'},body:JSON.stringify({text_content:txt,video_link:vid||null})});
    if(res.ok){const d=await res.json();posts.unshift(d.post||{text_content:txt,video_link:vid,created_at:new Date(),posted_by_name:cd?.name});showToast(t('posted'));showPage('group');}
    else showToast('Failed.');
  }catch(_){showToast('Network error.');}
}
async function deletePost(id){
  if(!confirm('Delete this post?'))return;
  try{
    const res=await fetch(API+'/posts/'+id,{method:'DELETE',headers:{Authorization:'Bearer '+activeToken}});
    if(res.ok){posts=posts.filter(p=>(p._id||p.id)!==id);showToast('Deleted');showPage('group');}
  }catch(_){showToast('Network error.');}
}

/* ── NOTIFY ── */
function renderNotify(){
  selSet=new Set();
  return `
  <div class="hdr"><div class="hg"></div>
    <div class="hc"><div class="grt">${t('send_notif')}</div>
      <div class="tnm" style="font-size:18px">${cd?.class_name||cd?.assigned_class||t('my_class')}</div>
    </div>
  </div>
  <div class="sec" style="margin-top:14px">
    <div class="nf">
      <div class="fg"><label>Notification Title</label><input type="text" class="fi" id="ntitle" placeholder="e.g. Exam tomorrow..."></div>
      <div class="fg"><label>Message</label><textarea class="fita" id="nmsg" placeholder="Write your message..."></textarea></div>
      <div class="fg">
        <label>${t('sel_students')}</label>
        <div style="display:flex;gap:6px;margin-bottom:8px">
          <button onclick="selAll(true)" style="flex:1;padding:8px;background:var(--black);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">✅ ${t('all_sel')}</button>
          <button onclick="selAll(false)" style="flex:1;padding:8px;background:var(--gray-100);color:var(--gray-600);border:1px solid var(--gray-200);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">✕ Clear</button>
        </div>
        <div class="sel-badge" id="selBadge">0 ${t('selected')}</div>
        ${!students.length
          ?`<div class="eb"><p>${t('no_students')}</p></div>`
          :`<div class="stu-sel-box">
              ${students.map(s=>`
                <div class="stu-sel-item" id="srow_${sid(s)}" onclick="togStu('${sid(s)}')">
                  <input type="checkbox" class="stu-chk" id="schk_${sid(s)}" onclick="event.stopPropagation();togStu('${sid(s)}')">
                  <div style="flex:1">
                    <div class="stu-sel-name">${s.name}</div>
                    <div class="stu-sel-roll">Roll ${s.roll_no||'-'}</div>
                  </div>
                </div>`).join('')}
            </div>`}
      </div>
      <button class="send-btn" onclick="sendNotif()">${t('send_notif')}</button>
    </div>
  </div>`;
}
function togStu(id){
  selSet.has(id)?selSet.delete(id):selSet.add(id);
  const c=document.getElementById('schk_'+id);
  const r=document.getElementById('srow_'+id);
  if(c)c.checked=selSet.has(id);
  if(r)r.classList.toggle('on',selSet.has(id));
  const b=document.getElementById('selBadge');
  if(b)b.textContent=selSet.size+' '+t('selected');
}
function selAll(val){
  students.forEach(s=>{
    const id=sid(s);
    val?selSet.add(id):selSet.delete(id);
    const c=document.getElementById('schk_'+id);
    const r=document.getElementById('srow_'+id);
    if(c)c.checked=val;
    if(r)r.classList.toggle('on',val);
  });
  const b=document.getElementById('selBadge');
  if(b)b.textContent=selSet.size+' '+t('selected');
}
async function sendNotif(){
  const title=document.getElementById('ntitle')?.value.trim();
  const msg=document.getElementById('nmsg')?.value.trim();
  if(!title||!msg){showToast('Enter title and message');return;}
  if(!selSet.size){showToast('Select at least one student');return;}
  const ids=[...selSet];
  try{
    const res=await fetch(API+'/notifications',{method:'POST',headers:{Authorization:'Bearer '+activeToken,'Content-Type':'application/json'},body:JSON.stringify({title,message:msg,student_ids:ids,send_to_all:ids.length===students.length})});
    if(res.ok){showToast(t('notif_sent'));document.getElementById('ntitle').value='';document.getElementById('nmsg').value='';selAll(false);}
    else showToast('Failed. Try again.');
  }catch(_){showToast('Network error.');}
}

if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});})}
