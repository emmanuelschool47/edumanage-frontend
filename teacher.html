<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#800020">
<title>Teacher — EduManage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#fafafa;color:#000;min-height:100vh}
.login{min-height:100vh;background:linear-gradient(135deg,#3d0010,#800020,#a30027);display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:40px 30px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.logo{text-align:center;margin-bottom:30px}
.logo-box{width:60px;height:60px;background:#800020;color:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 15px;font-weight:700;font-size:24px}
.logo h1{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-bottom:5px}
.logo p{font-size:12px;color:#999}
.form{margin-bottom:20px}
.form label{display:block;font-size:12px;font-weight:600;color:#666;text-transform:uppercase;margin-bottom:8px;letter-spacing:1px}
.form input{width:100%;padding:12px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;outline:none;margin-bottom:16px;transition:border .3s}
.form input:focus{border-color:#800020;background:#fafafa}
.form button{width:100%;padding:13px;background:linear-gradient(135deg,#800020,#a30027);color:#fff;border:none;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;box-shadow:0 4px 15px rgba(128,0,32,.25)}
.form button:hover{transform:translateY(-2px)}
.form button:disabled{opacity:.6;cursor:not-allowed}
.error{background:#fdf0ef;color:#c0392b;padding:12px;border-radius:8px;font-size:13px;margin-bottom:15px;display:none}
.error.show{display:block}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.app{display:none;padding-bottom:80px}
.topbar{position:sticky;top:0;background:#fff;border-bottom:1px solid #eee;padding:15px 16px;display:flex;align-items:center;justify-content:space-between;z-index:100}
.top-left{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.top-mark{width:28px;height:28px;background:#800020;color:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.top-right button{background:none;border:1px solid #ddd;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;color:#666;cursor:pointer}
.top-right button:hover{border-color:#800020;color:#800020}
.content{max-width:600px;margin:20px auto;padding:0 16px}
.header{background:linear-gradient(135deg,#3d0010,#800020);color:#fff;padding:20px 16px 25px;border-radius:12px;position:relative;overflow:hidden;margin-bottom:20px}
.header::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px);background-size:32px 32px;pointer-events:none}
.header-content{position:relative;z-index:1}
.header-greeting{font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;font-weight:600}
.header-name{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;margin-bottom:8px}
.header-meta{display:flex;gap:8px;flex-wrap:wrap}
.chip{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);padding:4px 12px;border-radius:100px;font-size:11px;color:rgba(255,255,255,.8);font-weight:500}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-box{background:#fff;border:1px solid #eee;border-radius:12px;padding:15px;text-align:center}
.stat-val{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:#800020;margin-bottom:3px}
.stat-lbl{font-size:11px;color:#999;text-transform:uppercase;font-weight:600;letter-spacing:.5px}
.section-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;margin:20px 0 12px;padding:0 16px}
.card{background:#fff;border:1px solid #eee;border-radius:12px;padding:14px;margin-bottom:12px;margin-left:16px;margin-right:16px}
.card-title{font-weight:600;margin-bottom:8px}
.card-text{font-size:13px;color:#666;line-height:1.6}
.btn{width:calc(100% - 32px);margin:12px 16px;padding:12px;background:linear-gradient(135deg,#800020,#a30027);color:#fff;border:none;border-radius:10px;font-weight:600;cursor:pointer}
.btn:hover{opacity:.9}
.bn{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;display:flex;padding:8px 0;z-index:100}
.bn-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px;background:none;border:none;cursor:pointer;font-size:11px;color:#999;font-weight:600}
.bn-btn.active{color:#800020}
.bn-btn svg{width:20px;height:20px;stroke:currentColor;stroke-width:2}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="loginScreen">
  <div class="card">
    <div class="logo">
      <div class="logo-box">EM</div>
      <h1>EduManage</h1>
      <p>Teacher Portal</p>
    </div>
    <div class="error" id="errMsg"></div>
    <form class="form" onsubmit="login(event)">
      <label>Teacher Code</label>
      <input type="text" id="code" placeholder="e.g. TCH001" style="text-transform:uppercase" required>
      <label>Password</label>
      <input type="password" id="pass" placeholder="Enter password" required>
      <button type="submit" id="loginBtn">Sign In</button>
    </form>
  </div>
</div>

<!-- APP -->
<div class="app" id="appScreen">
  <div class="topbar">
    <div class="top-left"><div class="top-mark">E</div>EduManage</div>
    <div class="top-right"><button onclick="logout()">Logout</button></div>
  </div>
  <div class="content">
    <div class="header">
      <div class="header-content">
        <div class="header-greeting">Welcome</div>
        <div class="header-name" id="teacherName">Teacher</div>
        <div class="header-meta">
          <span class="chip" id="classChip">My Class</span>
          <span class="chip" id="stuChip">0 Students</span>
        </div>
      </div>
    </div>
    <div class="stats">
      <div class="stat-box"><div class="stat-val" id="statStu">0</div><div class="stat-lbl">Students</div></div>
      <div class="stat-box"><div class="stat-val" id="statAtt">0</div><div class="stat-lbl">Marked Today</div></div>
      <div class="stat-box"><div class="stat-val" id="statPost">0</div><div class="stat-lbl">Posts</div></div>
    </div>
    <div class="section-title">Your Students</div>
    <div id="studentsList"></div>
    <button class="btn" onclick="alert('Mark Attendance feature coming soon')">📋 Mark Attendance</button>
    <button class="btn" onclick="alert('Update Marks feature coming soon')">📊 Update Marks</button>
    <button class="btn" onclick="alert('Post in Group feature coming soon')">💬 Post in Group</button>
  </div>
  <nav class="bn">
    <button class="bn-btn active"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>Home</span></button>
    <button class="bn-btn"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>More</span></button>
  </nav>
</div>

<script>
const API='https://edumanage-backend-xi.vercel.app/api';
let token=null,teacher=null,students=[];

// BOOT
(function(){
  const saved=localStorage.getItem('tch_token');
  if(saved&&saved.length>20){
    token=saved;
    loadTeacher();
  }
})();

async function login(e){
  e.preventDefault();
  const code=document.getElementById('code').value.trim().toUpperCase();
  const pass=document.getElementById('pass').value.trim();
  const btn=document.getElementById('loginBtn');
  const err=document.getElementById('errMsg');
  
  err.classList.remove('show');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Signing in...';
  
  try{
    const r=await fetch(API+'/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code,password:pass,role:'teacher'})
    });
    const d=await r.json();
    
    if(d.token){
      localStorage.setItem('tch_token',d.token);
      token=d.token;
      loadTeacher();
    }else{
      err.textContent=d.message||'Invalid credentials';
      err.classList.add('show');
      btn.disabled=false;
      btn.textContent='Sign In';
    }
  }catch(ex){
    err.textContent='Network error';
    err.classList.add('show');
    btn.disabled=false;
    btn.textContent='Sign In';
  }
}

async function loadTeacher(){
  try{
    const h={Authorization:`Bearer ${token}`,'Content-Type':'application/json'};
    
    // Teacher info
    const tr=await fetch(API+'/teachers/me',{headers:h});
    if(tr.status===401){localStorage.removeItem('tch_token');location.reload();return;}
    if(tr.ok){teacher=await tr.json();teacher=teacher.teacher||teacher;}
    
    // Students
    const sr=await fetch(API+'/teachers/my-students',{headers:h});
    if(sr.ok){
      const d=await sr.json();
      students=Array.isArray(d)?d:(d.students||[]);
    }
    
    renderApp();
  }catch(e){
    console.error(e);
    alert('Failed to load data');
  }
}

function renderApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  
  const name=teacher?.name||'Teacher';
  const cls=teacher?.class_name||teacher?.assigned_class||teacher?.class||'My Class';
  
  document.getElementById('teacherName').textContent=name;
  document.getElementById('classChip').textContent='Class '+cls;
  document.getElementById('stuChip').textContent=students.length+' Students';
  document.getElementById('statStu').textContent=students.length;
  document.getElementById('statPost').textContent='0';
  
  const list=document.getElementById('studentsList');
  if(!students.length){
    list.innerHTML='<div class="card"><div class="card-text">No students found in your class.</div></div>';
  }else{
    list.innerHTML=students.map(s=>`
      <div class="card">
        <div class="card-title">${s.name}</div>
        <div class="card-text">Roll ${s.roll_no||'-'} | Parent: ${s.parent_phone||'-'}</div>
      </div>
    `).join('');
  }
}

function logout(){
  if(!confirm('Logout?'))return;
  localStorage.removeItem('tch_token');
  location.reload();
}
</script>
</body>
</html>
