<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#800020">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Teacher Panel — Emmanuel School</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --p:#800020;--dp:#3d0010;--ac:#a30027;
  --white:#fff;--black:#0a0a0a;
  --gray-50:#fafafa;--gray-100:#f5f5f5;--gray-200:#eee;
  --gray-300:#e0e0e0;--gray-400:#bdbdbd;--gray-500:#9e9e9e;
  --gray-600:#757575;--gray-700:#616161;
  --green:#1a7a4a;--green-light:#e8f5ee;
  --red:#c0392b;--red-light:#fdf0ef;
  --gold:#b8860b;--gold-light:#fdf8e8;
  --font-display:'Playfair Display',serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --radius:12px
}
body{font-family:var(--font-body);background:var(--gray-50);color:var(--black);padding-bottom:80px;min-height:100vh}

/* LOGIN */
.login-screen{min-height:100vh;background:linear-gradient(155deg,var(--dp),var(--p),var(--ac));display:flex;align-items:center;justify-content:center;padding:20px;position:relative}
.login-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.login-card{background:var(--white);border-radius:20px;padding:28px 22px;width:100%;max-width:360px;position:relative;z-index:1;box-shadow:0 25px 60px rgba(0,0,0,.4)}
.login-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px}
.login-lm{width:34px;height:34px;background:var(--p);color:var(--white);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px}
.login-name{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--dp)}
.login-sub{text-align:center;font-size:12px;color:var(--gray-400);margin-bottom:20px}
.login-label{display:block;font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.login-input{width:100%;padding:12px 14px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--radius);font-family:var(--font-body);font-size:14px;color:var(--black);outline:none;margin-bottom:12px}
.login-input:focus{border-color:var(--p);background:var(--white)}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--p),var(--ac));color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.login-err{background:var(--red-light);border:1px solid rgba(192,57,43,.15);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--red);margin-top:10px;display:none}
.login-err.show{display:block}
.login-sp{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:var(--white);border-radius:50%;animation:spin .7s linear infinite}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--gray-200);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.tl{font-family:var(--font-display);font-size:17px;font-weight:700;color:var(--dp);display:flex;align-items:center;gap:8px}
.lm{width:28px;height:28px;background:var(--p);color:var(--white);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.tr{display:flex;align-items:center;gap:6px}
.bell-wrap{position:relative;display:flex;align-items:center}
.bell-btn{background:none;border:none;cursor:pointer;padding:6px;border-radius:7px;display:flex;align-items:center;justify-content:center;transform-origin:top center}
.bell-btn svg{width:20px;height:20px;stroke:var(--gray-500);fill:none;stroke-width:2;stroke-linecap:round}
.bell-dot{position:absolute;top:2px;right:2px;width:8px;height:8px;background:var(--red);border-radius:50%;border:1.5px solid var(--white);display:none}
.bell-dot.on{display:block}
.ob{background:none;border:1px solid var(--gray-200);border-radius:7px;padding:5px 10px;font-size:11px;font-weight:600;color:var(--gray-500);cursor:pointer;font-family:var(--font-body)}

/* NOTIFICATION POPUP — slides from top */
.notif-pop{
  position:fixed;top:62px;left:50%;
  transform:translateX(-50%) translateY(-130px);
  width:calc(100% - 24px);max-width:520px;
  background:var(--white);border-radius:14px;
  box-shadow:0 8px 30px rgba(0,0,0,.18);
  z-index:9999;border-left:4px solid var(--p);
  padding:13px 14px;display:flex;align-items:flex-start;gap:11px;
  opacity:0;pointer-events:none;
  transition:all .4s cubic-bezier(.4,0,.2,1);
}
.notif-pop.show{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto}
.notif-pop-ic{width:36px;height:36px;background:rgba(128,0,32,.08);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.notif-pop-ic svg{width:17px;height:17px;stroke:var(--p);fill:none;stroke-width:2;stroke-linecap:round}

/* CONTENT */
.cnt{max-width:600px;margin:0 auto}

/* HERO */
.hdr{background:linear-gradient(135deg,var(--dp),var(--p));color:var(--white);padding:20px 16px 24px;position:relative;overflow:hidden}
.hg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:32px 32px}
.hc{position:relative;z-index:1}
.grt{font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:600}
.tnm{font-family:var(--font-display);font-size:22px;font-weight:700;line-height:1.1;margin-bottom:6px}
.cps{display:flex;gap:6px;flex-wrap:wrap}
.cp{padding:3px 10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);border-radius:100px;font-size:10px;color:rgba(255,255,255,.7);font-weight:500}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 16px}
.sc{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px;text-align:center}
.sv{font-family:var(--font-display);font-size:24px;font-weight:700;line-height:1;margin-bottom:2px;color:var(--p)}
.sl{font-size:10px;color:var(--gray-400);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.sec{padding:0 16px;margin-bottom:18px}
.stt{font-family:var(--font-display);font-size:16px;font-weight:600;margin-bottom:10px;color:var(--dp)}
.card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.si{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);margin-bottom:8px;cursor:pointer}
.sav{width:40px;height:40px;background:rgba(128,0,32,.08);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:16px;color:var(--p);flex-shrink:0;font-weight:700}
.snm{font-size:14px;font-weight:600;margin-bottom:2px}
.smeta{font-size:11px;color:var(--gray-400)}

/* ATTENDANCE */
.att-sheet{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden}
.att-date-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--gray-100)}
.att-dl{font-size:13px;font-weight:600;color:var(--dp)}
.di{padding:6px 10px;border:1.5px solid var(--gray-200);border-radius:8px;font-family:var(--font-mono);font-size:12px;color:var(--black);outline:none}
.di:focus{border-color:var(--p)}
.ar{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--gray-100);gap:10px}
.ar:last-child{border-bottom:none}
.aroll{font-family:var(--font-mono);font-size:12px;color:var(--gray-400);min-width:26px}
.anm{font-size:13px;font-weight:500;flex:1}
.atog{display:flex;border:1.5px solid var(--gray-200);border-radius:8px;overflow:hidden}
.atb{padding:7px 14px;border:none;font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--gray-400);touch-action:manipulation}
.atb.pa{background:var(--green);color:var(--white)}
.atb.aa{background:var(--red);color:var(--white)}
.save-btn{width:calc(100% - 28px);margin:14px;padding:12px;background:linear-gradient(135deg,var(--p),var(--ac));color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer}

/* MARKS */
.marks-sheet{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden}
.ms-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--gray-100)}
.ms-row:last-child{border-bottom:none}
.ms-roll{font-family:var(--font-mono);font-size:12px;color:var(--gray-400);min-width:26px;flex-shrink:0}
.ms-name{font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ms-inp{width:60px;padding:7px 8px;border:1.5px solid var(--gray-200);border-radius:8px;font-family:var(--font-mono);font-size:13px;color:var(--black);outline:none;text-align:center;background:var(--white);-webkit-appearance:none}
.ms-inp:focus{border-color:var(--p)}

/* STUDENT DETAIL */
.back-btn{display:inline-flex;align-items:center;gap:6px;background:var(--gray-100);border:none;border-radius:8px;padding:9px 14px;font-family:var(--font-body);font-size:13px;color:var(--gray-600);cursor:pointer;margin:14px 16px 10px}
.back-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2}
.det-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px;margin:0 16px 12px}
.il{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;margin-bottom:10px}
.ir{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--gray-100)}
.ir:last-child{border-bottom:none}
.irl{font-size:12px;color:var(--gray-400);font-weight:500}
.irv{font-size:13px;font-weight:600}
.mrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.mlbl{font-size:13px;font-weight:500;min-width:100px;color:var(--gray-700)}
.minput{flex:1;padding:7px 10px;border:1.5px solid var(--gray-200);border-radius:8px;font-family:var(--font-mono);font-size:13px;color:var(--black);outline:none;text-align:center;max-width:75px;-webkit-appearance:none}
.minput:focus{border-color:var(--p)}
.msave{width:100%;padding:9px;background:linear-gradient(135deg,var(--p),var(--ac));color:var(--white);border:none;border-radius:8px;font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;margin-top:6px}

/* GROUP */
.composer{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px}
.ctxt{width:100%;min-height:90px;padding:11px;border:1.5px solid var(--gray-200);border-radius:var(--radius);font-family:var(--font-body);font-size:14px;color:var(--black);resize:none;outline:none;margin-bottom:10px}
.ctxt:focus{border-color:var(--p)}
.post-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--p),var(--ac));color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer}
.pi{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:12px;margin-bottom:8px}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pau{font-size:12px;font-weight:700;color:var(--p)}
.ptm{font-size:10px;color:var(--gray-300)}
.ptxt{font-size:13px;color:var(--gray-700);line-height:1.6}
.del-btn{background:none;border:none;cursor:pointer;color:var(--gray-300);padding:2px}
.del-btn svg{width:13px;height:13px;stroke:currentColor}

/* TIMETABLE */
.tt-wrap{overflow-x:auto;border:1px solid var(--gray-200);border-radius:var(--radius);margin-bottom:12px}
.tt-table{width:100%;border-collapse:collapse;font-size:11px;min-width:400px}
.tt-table th{padding:8px 5px;background:rgba(128,0,32,.07);border:1px solid var(--gray-200);text-align:center;font-weight:700;color:var(--p);white-space:nowrap}
.tt-table td{padding:3px;border:1px solid var(--gray-200);text-align:center}
.tt-inp{width:72px;padding:5px 4px;border:1.5px solid var(--gray-200);border-radius:5px;font-size:11px;font-family:var(--font-body);color:var(--black);outline:none;text-align:center;background:var(--gray-50)}
.tt-inp:focus{border-color:var(--p);background:var(--white)}

/* NOTIFY */
.nf{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.fi{width:100%;padding:10px 13px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--radius);font-family:var(--font-body);font-size:13px;color:var(--black);outline:none}
.fi:focus{border-color:var(--p);background:var(--white)}
select.fi{-webkit-appearance:none}
.fita{width:100%;padding:10px 13px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--radius);font-family:var(--font-body);font-size:13px;color:var(--black);outline:none;resize:none;min-height:80px}
.fita:focus{border-color:var(--p);background:var(--white)}
.send-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--p),var(--ac));color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer}
/* Student checkboxes for multi-select notify */
.stu-list-wrap{max-height:220px;overflow-y:auto;border:1.5px solid var(--gray-200);border-radius:var(--radius);padding:6px 0;background:var(--white)}
.stu-chk-row{display:flex;align-items:center;gap:10px;padding:8px 13px;cursor:pointer;transition:background .12s}
.stu-chk-row:hover{background:var(--gray-50)}
.stu-chk-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--p);cursor:pointer;flex-shrink:0}
.stu-chk-label{font-size:13px;font-weight:500;cursor:pointer}
.stu-chk-meta{font-size:11px;color:var(--gray-400)}

/* BOTTOM NAV — 6 tabs */
.bn{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--gray-200);display:flex;padding:6px 0;padding-bottom:max(8px,env(safe-area-inset-bottom));z-index:100}
.bb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 2px;background:none;border:none;cursor:pointer}
.bi{width:19px;height:19px;stroke:var(--gray-300);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.bla{font-size:8px;font-weight:600;color:var(--gray-300);text-transform:uppercase;letter-spacing:.4px;font-family:var(--font-body)}
.bb.active .bi{stroke:var(--p)}
.bb.active .bla{color:var(--p)}

/* UTILS */
.ls2{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px}
.sp{width:26px;height:26px;border:2px solid var(--gray-200);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite}
.lt{font-size:13px;color:var(--gray-400);text-align:center}
.eb{text-align:center;padding:28px;color:var(--gray-300)}
.eb p{font-size:13px}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dp);color:var(--white);padding:9px 18px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.22);max-width:90vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bellRing{
  0%,100%{transform:rotate(0)}
  15%{transform:rotate(-22deg)}30%{transform:rotate(22deg)}
  45%{transform:rotate(-15deg)}60%{transform:rotate(15deg)}
  75%{transform:rotate(-7deg)}90%{transform:rotate(7deg)}
}
.bell-ring{animation:bellRing 1s ease both}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen" style="display:none">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-lm">E</div>
      <div class="login-name">Emmanuel School</div>
    </div>
    <div class="login-sub">Teacher Login</div>
    <label class="login-label">Teacher Code</label>
    <input type="text" class="login-input" id="lCode" placeholder="e.g. TCH001"
      autocomplete="off" spellcheck="false" style="text-transform:uppercase"
      onkeydown="if(event.key==='Enter')document.getElementById('lPass').focus()">
    <label class="login-label">Password</label>
    <input type="password" class="login-input" id="lPass" placeholder="Enter password"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" id="lBtn" onclick="doLogin()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Sign In
    </button>
    <div class="login-err" id="lErr"></div>
  </div>
</div>

<!-- NOTIFICATION POPUP -->
<div class="notif-pop" id="notifPop">
  <div class="notif-pop-ic">
    <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
  </div>
  <div style="flex:1;min-width:0">
    <div style="font-size:13px;font-weight:700;color:var(--black);margin-bottom:2px" id="npTitle">Notification</div>
    <div style="font-size:12px;color:var(--gray-500);line-height:1.4" id="npMsg"></div>
  </div>
  <button onclick="closeNPop()" style="background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:20px;line-height:1;padding:2px;flex-shrink:0;margin-left:6px">×</button>
</div>

<!-- MAIN APP -->
<div id="appScreen" style="display:none">
  <div class="topbar">
    <div class="tl"><div class="lm">E</div>Emmanuel School</div>
    <div class="tr">
      <div class="bell-wrap">
        <button class="bell-btn" id="bellBtn" onclick="toggleNotifList()">
          <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </button>
        <div class="bell-dot" id="bellDot"></div>
      </div>
      <button class="ob" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <!-- Notifications dropdown -->
  <div id="notifList" style="display:none;position:fixed;top:54px;right:8px;width:calc(100% - 16px);max-width:380px;background:var(--white);border:1px solid var(--gray-200);border-radius:14px;box-shadow:0 8px 28px rgba(0,0,0,.15);z-index:500;max-height:340px;overflow-y:auto">
    <div style="padding:12px 14px 8px;border-bottom:1px solid var(--gray-100);font-family:var(--font-display);font-size:15px;font-weight:700;color:var(--dp);display:flex;justify-content:space-between;align-items:center">
      Notifications
      <button onclick="toggleNotifList()" style="background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:20px;line-height:1">×</button>
    </div>
    <div id="notifItems"><div style="padding:20px;text-align:center;color:var(--gray-400);font-size:13px">No notifications yet</div></div>
  </div>
  <div class="cnt" id="mainContent">
    <div class="ls2"><div class="sp"></div><div class="lt">Loading...</div></div>
  </div>
  <nav class="bn">
    <button class="bb active" onclick="showPage('students',this)">
      <svg class="bi" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="bla">Students</span>
    </button>
    <button class="bb" onclick="showPage('attendance',this)">
      <svg class="bi" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>

/* Ding-dong tone */
function playTone() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [[523,.00],[659,.16],[784,.32],[1047,.48]].forEach(([freq, delay]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine'; o.frequency.value = freq;
      const t = ctx.currentTime + delay;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.35, t + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.30);
      o.start(t); o.stop(t + 0.32);
    });
  } catch(e) {}
}

/* Register push token with backend */
window._setupPush = async function() {
  try {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') return;
    const tok = await getToken(fbMsg, {
      vapidKey: 'BCHbNp4TNGBtB7j5IXbvlpWJ5LRTmEYfJTWTvFHnZD2k3VX4LgLfOhqSLBJGXLZ4lGJ4EJxZ9KAFQgGCxFhJkE'
    });
    if (!tok) return;
    localStorage.setItem('fcm_tch', tok);
    const at = localStorage.getItem('tch_token');

      fetch('https://edumanage-backend-xi.vercel.app/api/notifications/register-token', {

      }).catch(() => {});
    }
  } catch(e) { console.log('Push setup:', e.message); }
};

/* Foreground message — fires when app is open */
onMessage(fbMsg, payload => {
  const title = payload.notification?.title || 'Emmanuel School';
  const body  = payload.notification?.body  || '';

  /* 1. Play tone */
  playTone();

  /* 2. Bell ring animation */
  const bell = document.getElementById('bellBtn');
  if (bell) {
    bell.classList.remove('bell-ring');
    void bell.offsetWidth;
    bell.classList.add('bell-ring');
    setTimeout(() => bell.classList.remove('bell-ring'), 1000);
  }

  /* 3. Show slide-in popup */
  const pop = document.getElementById('notifPop');
  const npTitle = document.getElementById('npTitle');
  const npMsg   = document.getElementById('npMsg');
  if (pop && npTitle && npMsg) {
    npTitle.textContent = title;
    npMsg.textContent   = body;
    pop.classList.add('show');
    if (window._npopTimer) clearTimeout(window._npopTimer);
    window._npopTimer = setTimeout(() => pop.classList.remove('show'), 7000);
  }

  /* 4. System notification (Android status bar) */
  if (Notification.permission === 'granted') {
    navigator.serviceWorker?.ready.then(sw => {
      sw.showNotification(title, {
        body, icon: '/logo.webp', badge: '/logo.webp',
        vibrate: [300, 100, 300], tag: 'tch-' + Date.now()
      });
    }).catch(() => {
      try { new Notification(title, { body, icon: '/logo.webp' }); } catch(_) {}
    });
  }

  /* 5. Show red dot on bell */
  document.getElementById('bellDot')?.classList.add('on');

  /* 6. Add to notification list */
  window._addNotifItem && window._addNotifItem(title, body);
});

async function doLogin() {
  const code = document.getElementById('lCode').value.trim().toUpperCase();
  const pass = document.getElementById('lPass').value.trim();
  const errEl = document.getElementById('lErr');
  const btn   = document.getElementById('lBtn');
  if (!code || !pass) { errEl.textContent = 'Please enter code and password'; errEl.classList.add('show'); return; }
  errEl.classList.remove('show');
  btn.innerHTML = '<div class="login-sp"></div> Signing in...';
  btn.disabled  = true;
  try {
    const res  = await fetch(API + '/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, password: pass })
    });
    const data = await res.json();
    if ((data.success || res.ok) && data.token) {
      if (data.user && data.user.role && data.user.role !== 'teacher') {
        errEl.textContent = 'This login is for teachers only';
        errEl.classList.add('show'); btn.innerHTML = 'Sign In'; btn.disabled = false; return;
      }
      activeToken = data.token;
      localStorage.setItem('tch_token', data.token);
      localStorage.setItem('tch_user', JSON.stringify(data.user));
      showApp(); loadData();
    } else {
      errEl.textContent = data.error || 'Invalid code or password';
      errEl.classList.add('show'); btn.innerHTML = 'Sign In'; btn.disabled = false;
    }
  } catch(e) {
    errEl.textContent = 'Could not connect. Check internet.';
    errEl.classList.add('show'); btn.innerHTML = 'Sign In'; btn.disabled = false;

}

    await fetch(API + '/marks/update', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + activeToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ student_id: s.id, subject, marks_obtained: val, total_marks: total, exam_type: exam })
    });
    saved++;
  }
  toast(saved > 0 ? 'Saved for ' + saved + ' students!' : 'Enter at least one score');
  if (saved > 0) document.querySelectorAll('.ms-inp').forEach(el => el.value = '');
  btn.disabled = false; btn.textContent = 'Save Marks for All';
}

/* ── GROUP ── */
async function rGroup() {
  const c = document.getElementById('mainContent');
  c.innerHTML = `<div style="padding:16px"><div class="stt" style="margin-bottom:12px">Class Group</div>
  <div class="composer">
    <textarea class="ctxt" id="postTxt" placeholder="Write something for your class..."></textarea>
    <button class="post-btn" onclick="submitPost()">Post</button>
  </div>
  <div style="margin-top:16px"><div class="stt" style="margin-bottom:10px">Recent Posts</div>
  <div id="gpl"><div class="ls2" style="min-height:100px"><div class="sp"></div></div></div></div></div>`;
  loadPosts();
}

async function submitPost() {
  const txt = document.getElementById('postTxt')?.value.trim();
  if (!txt) { toast('Write something first'); return; }
  try {
    const r = await fetch(API + '/posts', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + activeToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ class_id: cd.id, text_content: txt, post_type: 'general' })
    });
    const d = await r.json();
    if (d.success || r.ok) { toast('Posted!'); document.getElementById('postTxt').value = ''; loadPosts(); }
    else toast(d.error || 'Error');
  } catch(e) { toast('Could not post'); }
}

async function loadPosts() {
  const el = document.getElementById('gpl'); if (!el) return;
  try {
    const r = await fetch(API + '/posts/' + cd.id, { headers: { Authorization: 'Bearer ' + activeToken } });
    const d = await r.json(); const posts = d.posts || [];
    el.innerHTML = posts.length > 0 ? posts.map(p => `
      <div class="pi">
        <div class="ph">
          <span class="pau">${p.posted_by_name || 'Teacher'}</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="ptm">${fmtDate(p.created_at)}</span>
            <button class="del-btn" onclick="delPost('${p.id}')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button>
          </div>
        </div>
        ${p.text_content ? `<div class="ptxt">${p.text_content}</div>` : ''}
        ${p.video_link   ? `<a href="${p.video_link}" target="_blank" style="font-size:12px;color:var(--p);font-weight:600">▶ Watch Video</a>` : ''}
      </div>`).join('') : '<div class="eb"><p>No posts yet</p></div>';
  } catch(e) { if(el) el.innerHTML = '<div class="eb"><p>Could not load</p></div>'; }
}

async function delPost(id) {
  try { await fetch(API+'/posts/'+id,{method:'DELETE',headers:{Authorization:'Bearer '+activeToken}}); toast('Deleted'); loadPosts(); }
  catch(e) { toast('Error'); }
}

/* ── TIMETABLE — 7 periods ── */
async function loadTT() {
  let tt = [];
  try {
    const r = await fetch(API + '/timetable/' + cd.id, { headers: { Authorization: 'Bearer ' + activeToken } });
    if (r.ok) { const d = await r.json(); tt = d.timetable || []; }
  } catch(_) {}

  const days   = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const ttMap  = {};
  tt.forEach(row => ttMap[row.day] = row);
  const P = 7; /* 7 periods only */

  document.getElementById('mainContent').innerHTML = `
  <div class="hdr"><div class="hg"></div><div class="hc">
    <div class="grt">Timetable</div>
    <div class="tnm">Class ${cd.standard || ''}</div>
    <div class="cps"><span class="cp">7 Periods</span><span class="cp">Mon – Sat</span></div>
  </div></div>
  <div style="padding:13px 16px">
    <div style="font-size:12px;color:var(--gray-500);margin-bottom:10px">Fill subject names for each period and tap Save.</div>
    <div class="tt-wrap">
      <table class="tt-table">
        <thead><tr>
          <th style="min-width:50px;text-align:left;padding-left:10px">Day</th>
          ${Array.from({length:P}, (_,i) => `<th>P${i+1}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${days.map(day => {
            const row = ttMap[day] || {};
            return `<tr>
              <td style="padding:7px 10px;font-weight:700;color:var(--dp);white-space:nowrap;font-size:12px">${day.slice(0,3)}</td>
              ${Array.from({length:P}, (_,i) => `<td><input class="tt-inp" id="tt_${day}_${i+1}" value="${row['period_'+(i+1)] || ''}" placeholder="—"></td>`).join('')}
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <button class="save-btn" id="saveTTBtn" onclick="saveTT()" style="margin-top:0;width:calc(100% - 28px)">Save Timetable</button>
  </div>`;
}

async function saveTT() {
  const btn  = document.getElementById('saveTTBtn');
  btn.disabled = true; btn.textContent = 'Saving...';
  const days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const P    = 7;
  let ok = 0, fail = 0;
  for (const day of days) {
    const periods = Array.from({length:P}, (_,i) => document.getElementById(`tt_${day}_${i+1}`)?.value.trim() || '');
    try {
      const r = await fetch(API + '/timetable', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + activeToken, 'Content-Type': 'application/json' },
        body: JSON.stringify({ class_id: parseInt(cd.id), day, periods })
      });
      if (r.ok) ok++; else fail++;
    } catch(_) { fail++; }
  }
  toast(ok > 0 ? 'Timetable saved!' : 'Save failed');
  btn.disabled = false; btn.textContent = 'Save Timetable';
}

/* ── NOTIFY — class / all / multiple specific students ── */
function rNotify() {
  return `
  <div style="padding:16px">
    <div class="stt" style="margin-bottom:12px">Send Notification</div>
    <div class="nf">
      <div class="fg">
        <label>Send To</label>
        <select class="fi" id="nTgt" onchange="onTgtChange()">
          <option value="class">Entire Class (${cd.standard})</option>
          <option value="all">All Students — School Wide</option>
          <option value="students">Select Specific Students</option>
        </select>
      </div>

      <!-- Multi-student checkboxes -->
      <div id="nStuWrap" style="display:none">
        <div class="fg">
          <label>Choose Students (select one or more)</label>
          <div style="display:flex;gap:7px;margin-bottom:7px">
            <button type="button" onclick="checkAll(true)"  style="padding:5px 11px;background:rgba(128,0,32,.08);border:1px solid rgba(128,0,32,.2);border-radius:7px;font-size:12px;font-weight:600;color:var(--p);cursor:pointer;font-family:var(--font-body)">Select All</button>
            <button type="button" onclick="checkAll(false)" style="padding:5px 11px;background:var(--gray-100);border:1px solid var(--gray-200);border-radius:7px;font-size:12px;font-weight:600;color:var(--gray-500);cursor:pointer;font-family:var(--font-body)">Clear</button>
          </div>
          <div class="stu-list-wrap">
            ${students.map(s => `
            <label class="stu-chk-row">
              <input type="checkbox" class="stu-chk" value="${s.id}">
              <div>
                <div class="stu-chk-label">${s.name}</div>
                <div class="stu-chk-meta">Roll ${s.roll_no || '-'} · ${s.parent_phone || 'No phone'}</div>
              </div>
            </label>`).join('')}
          </div>
        </div>
      </div>

      <div class="fg" style="margin-top:4px">
        <label>Title *</label>
        <input type="text" class="fi" id="ntit" placeholder="e.g. Holiday Tomorrow, Test on Monday">
      </div>
      <div class="fg">
        <label>Message *</label>
        <textarea class="fita" id="nmsg" placeholder="Write your message here..."></textarea>
      </div>
      <button class="send-btn" id="nSendBtn" onclick="sendNotif()">Send Notification</button>
    </div>
  </div>`;
}

function onTgtChange() {
  const val = document.getElementById('nTgt')?.value;
  document.getElementById('nStuWrap').style.display = val === 'students' ? 'block' : 'none';
}

function checkAll(state) {
  document.querySelectorAll('.stu-chk').forEach(cb => cb.checked = state);
}

async function sendNotif() {
  const title  = document.getElementById('ntit')?.value.trim();
  const msg    = document.getElementById('nmsg')?.value.trim();
  const tgt    = document.getElementById('nTgt')?.value || 'class';
  if (!title || !msg) { toast('Enter title and message'); return; }

  const btn = document.getElementById('nSendBtn');
  btn.disabled = true; btn.textContent = 'Sending...';

  try {
    if (tgt === 'students') {
      /* Send to each checked student individually */
      const checked = [...document.querySelectorAll('.stu-chk:checked')].map(cb => cb.value);
      if (checked.length === 0) { toast('Select at least one student'); btn.disabled = false; btn.textContent = 'Send Notification'; return; }
      let sent = 0;
      for (const sid of checked) {
        const r = await fetch(API + '/notifications/send', {
          method: 'POST',
          headers: { Authorization: 'Bearer ' + activeToken, 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, message: msg, target_type: 'student', target_id: String(sid) })
        });
        if (r.ok) sent++;
      }
      toast('Sent to ' + sent + ' student' + (sent !== 1 ? 's' : '') + '!');
    } else {
      /* class or all */
      const body = { title, message: msg };
      if (tgt === 'all')   { body.target_type = 'all'; }
      else                 { body.target_type = 'class'; body.target_id = String(cd?.id); }
      const r = await fetch(API + '/notifications/send', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + activeToken, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const d = await r.json();
      if (d.success || r.ok) toast('Notification sent!');
      else toast(d.error || 'Error');
    }
    document.getElementById('ntit').value = '';
    document.getElementById('nmsg').value = '';
    checkAll(false);
  } catch(e) { toast('Could not send'); }

  btn.disabled = false; btn.textContent = 'Send Notification';
}

/* UTILS */
function fmtDate(ts) {
  if (!ts) return '';
  try { return new Date(ts).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }); } catch(e) { return ''; }
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function doLogout() {
  activeToken = null;
  localStorage.removeItem('tch_token'); localStorage.removeItem('tch_user');
  localStorage.removeItem('ems_role');
  cd = null; students = [];
  showLogin();
  document.getElementById('lCode').value = '';
  document.getElementById('lPass').value = '';
  document.getElementById('lErr').classList.remove('show');
}

if ('serviceWorker' in navigator) { navigator.serviceWorker.register('firebase-messaging-sw.js').catch(() => {}); }
init();
</script>
</body>
</html>
