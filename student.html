<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Student Portal — EduManage</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--white:#fff;--black:#0a0a0a;--gray-50:#fafafa;--gray-100:#f5f5f5;--gray-200:#eee;--gray-300:#e0e0e0;--gray-400:#bdbdbd;--gray-500:#9e9e9e;--gray-600:#757575;--gray-700:#616161;--green:#1a7a4a;--green-light:#e8f5ee;--red:#c0392b;--red-light:#fdf0ef;--gold:#b8860b;--gold-light:#fdf8e8;--font-display:'Playfair Display',serif;--font-body:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;--radius:12px;--transition:all .3s cubic-bezier(.4,0,.2,1)}
body{font-family:var(--font-body);background:var(--gray-50);color:var(--black);padding-bottom:80px;min-height:100vh}
.topbar{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--gray-200);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.tl{font-family:var(--font-display);font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.lm{width:28px;height:28px;background:var(--black);color:var(--white);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.tr{display:flex;align-items:center;gap:8px}
.ls{display:flex;gap:2px;background:var(--gray-100);border-radius:100px;padding:2px}
.lb{padding:4px 9px;border-radius:100px;border:none;background:transparent;font-family:var(--font-body);font-size:10px;font-weight:700;color:var(--gray-400);cursor:pointer}
.lb.active{background:var(--white);color:var(--black);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.ob{background:none;border:1px solid var(--gray-200);border-radius:7px;padding:6px 10px;font-size:11px;font-weight:600;color:var(--gray-500);cursor:pointer;font-family:var(--font-body)}
.cnt{max-width:600px;margin:0 auto}
.hdr{background:var(--black);color:var(--white);padding:20px 16px 24px;position:relative;overflow:hidden}
.hg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:32px 32px}
.hc{position:relative;z-index:1}
.prow{display:flex;align-items:flex-start;gap:14px;margin-bottom:10px}
.sphoto{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:22px;color:rgba(255,255,255,.8);flex-shrink:0;overflow:hidden}
.sphoto img{width:100%;height:100%;object-fit:cover}
.grt{font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:600}
.snm{font-family:var(--font-display);font-size:24px;font-weight:700;line-height:1.1;margin-bottom:6px}
.cps{display:flex;gap:6px;flex-wrap:wrap}
.cp{padding:3px 10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);border-radius:100px;font-size:10px;color:rgba(255,255,255,.7);font-weight:500}
.qs-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:14px 16px}
.qs{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px;cursor:pointer;transition:var(--transition)}
.qs:active{transform:scale(.98)}
.qsi{width:30px;height:30px;background:var(--gray-100);border-radius:7px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.qsi svg{width:15px;height:15px;stroke:var(--black)}
.qsv{font-family:var(--font-display);font-size:24px;font-weight:700;line-height:1;margin-bottom:2px}
.qsl{font-size:10px;color:var(--gray-400);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.sec{padding:0 16px;margin-bottom:18px}
.stt{font-family:var(--font-display);font-size:16px;font-weight:600;margin-bottom:10px}
.card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.mr{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--gray-100)}
.mr:last-child{border-bottom:none}
.ms{font-size:13px;font-weight:600;min-width:80px}
.mb{flex:1;height:4px;background:var(--gray-100);border-radius:2px;overflow:hidden}
.mf{height:100%;background:var(--black);border-radius:2px;transition:width 1s ease}
.msc{font-family:var(--font-mono);font-size:12px;font-weight:600;min-width:45px;text-align:right;color:var(--gray-600)}
.ac{display:flex;align-items:center;gap:16px;padding:16px}
.ad{width:72px;height:72px;position:relative;flex-shrink:0}
.ad svg{transform:rotate(-90deg)}
.at{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ap{font-family:var(--font-mono);font-size:15px;font-weight:700;line-height:1}
.as2{font-size:8px;color:var(--gray-400);text-transform:uppercase}
.ar{display:flex;justify-content:space-between;font-size:13px;padding:4px 0}
.al{color:var(--gray-500)}
.av{font-weight:600}
.fc{padding:14px}
.fr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.fa{font-family:var(--font-display);font-size:22px;font-weight:700}
.fs2{font-size:11px;color:var(--gray-400)}
.pb{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;background:var(--black);color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer}
.pb svg{width:15px;height:15px;stroke:var(--white)}
.trow{display:flex;align-items:center;gap:12px}
.tav{width:40px;height:40px;background:var(--gray-100);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:16px;color:var(--gray-600);flex-shrink:0}
.tnm{font-size:14px;font-weight:600}
.ts{font-size:11px;color:var(--gray-400)}
.rmc{border-left:3px solid var(--black);border-radius:0 var(--radius) var(--radius) 0}
.rl{font-size:10px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:4px}
.rt{font-size:13px;color:var(--gray-700);line-height:1.6}
.ttc{overflow:hidden}
.ttr{display:flex;border-bottom:1px solid var(--gray-100)}
.ttr:last-child{border-bottom:none}
.ttd{width:72px;padding:8px 10px;font-size:10px;font-weight:700;color:var(--gray-500);text-transform:uppercase;background:var(--gray-50);border-right:1px solid var(--gray-100);display:flex;align-items:center;flex-shrink:0}
.ttp{display:flex;flex:1;overflow-x:auto;padding:6px;gap:5px}
.ttpi{flex-shrink:0;padding:5px 9px;background:var(--gray-50);border:1px solid var(--gray-100);border-radius:6px;font-size:11px;font-weight:500;color:var(--gray-700);white-space:nowrap}
.ni{display:flex;gap:10px;padding:12px 0;border-bottom:1px solid var(--gray-100)}
.ni:last-child{border-bottom:none}
.nd{width:7px;height:7px;background:var(--black);border-radius:50%;flex-shrink:0;margin-top:4px}
.ntl{font-size:13px;font-weight:600;margin-bottom:2px}
.nm{font-size:12px;color:var(--gray-500);line-height:1.5}
.nti{font-size:10px;color:var(--gray-300);margin-top:3px}
.pi{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:12px;margin-bottom:8px}
.ph{display:flex;justify-content:space-between;margin-bottom:6px}
.pau{font-size:12px;font-weight:700}
.ptm{font-size:10px;color:var(--gray-300)}
.ptxt{font-size:13px;color:var(--gray-700);line-height:1.6}
.pimg{width:100%;border-radius:8px;margin-top:8px;max-height:220px;object-fit:cover}
.vb{display:flex;align-items:center;gap:6px;margin-top:8px;padding:8px 12px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:8px;font-size:12px;color:var(--black);text-decoration:none;font-weight:500}
.vb svg{width:14px;height:14px;stroke:var(--black)}
.pfhd{background:var(--black);color:var(--white);border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:12px;position:relative;overflow:hidden}
.pfg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:32px 32px}
.pfav{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:26px;overflow:hidden;position:relative;z-index:1}
.pfav img{width:100%;height:100%;object-fit:cover}
.pfnm{font-family:var(--font-display);font-size:22px;font-weight:700;position:relative;z-index:1}
.pfcd{font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,.4);margin-top:2px;position:relative;z-index:1}
.pfcp{display:flex;gap:6px;justify-content:center;margin-top:8px;position:relative;z-index:1}
.pfcpi{background:rgba(255,255,255,.1);padding:3px 10px;border-radius:100px;font-size:10px}
.il{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;margin-bottom:10px}
.ir{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--gray-100)}
.ir:last-child{border-bottom:none}
.irlab{font-size:12px;color:var(--gray-400);font-weight:500}
.irval{font-size:13px;font-weight:600;text-align:right;max-width:60%}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end}
.mo.show{display:flex}
.msh{background:var(--white);border-radius:20px 20px 0 0;padding:20px 16px 40px;width:100%;animation:su .3s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{width:36px;height:4px;background:var(--gray-200);border-radius:2px;margin:0 auto 16px}
.mttl{font-family:var(--font-display);font-size:20px;font-weight:700;margin-bottom:4px}
.msub{font-size:13px;color:var(--gray-400);margin-bottom:16px}
.ub{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px}
.ul{font-size:10px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:3px}
.uv{font-family:var(--font-mono);font-size:15px;font-weight:700}
.ua{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.uab{padding:11px 6px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--radius);font-family:var(--font-body);font-size:12px;font-weight:700;color:var(--black);cursor:pointer;text-align:center;display:block;text-decoration:none}
.uab:active{background:var(--black);color:var(--white)}
.dv{display:flex;align-items:center;gap:10px;color:var(--gray-300);font-size:11px;margin-bottom:14px}
.dv::before,.dv::after{content:'';flex:1;height:1px;background:var(--gray-200)}
.fi{width:100%;padding:11px 13px;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:var(--radius);font-family:var(--font-body);font-size:13px;color:var(--black);outline:none;margin-bottom:12px}
.fi:focus{border-color:var(--black);background:var(--white)}
.sbt{width:100%;padding:13px;background:var(--black);color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px}
.cbt{width:100%;padding:11px;background:none;border:1px solid var(--gray-200);border-radius:var(--radius);font-family:var(--font-body);font-size:13px;color:var(--gray-500);cursor:pointer}
.bn{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--gray-200);display:flex;padding:6px 0 8px;z-index:100}
.bb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;background:none;border:none;cursor:pointer}
.bi{width:21px;height:21px;stroke:var(--gray-300)}
.bla{font-size:9px;font-weight:600;color:var(--gray-300);text-transform:uppercase;letter-spacing:.5px}
.bb.active .bi{stroke:var(--black)}
.bb.active .bla{color:var(--black)}
.ls2{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px}
.sp{width:26px;height:26px;border:2px solid var(--gray-200);border-top-color:var(--black);border-radius:50%;animation:spin .8s linear infinite}
.lt{font-size:13px;color:var(--gray-400);text-align:center}
.eb{text-align:center;padding:28px;color:var(--gray-300)}
.eb svg{width:32px;height:32px;stroke:var(--gray-200);margin:0 auto 8px;display:block}
.eb p{font-size:13px}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--black);color:var(--white);padding:9px 18px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.retry-btn{margin-top:12px;padding:10px 20px;background:var(--black);color:var(--white);border:none;border-radius:8px;cursor:pointer;font-family:var(--font-body);font-weight:600;font-size:13px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="topbar">
  <div class="tl"><div class="lm">E</div>EduManage</div>
  <div class="tr">
    <div class="ls">
      <button class="lb active" onclick="setLang('en')">EN</button>
      <button class="lb" onclick="setLang('hi')">HI</button>
      <button class="lb" onclick="setLang('mr')">MR</button>
    </div>
    <button class="ob" onclick="doLogout()">Logout</button>
  </div>
</div>
<div class="cnt" id="mainContent">
  <div class="ls2"><div class="sp"></div><div class="lt">Loading...</div></div>
</div>
<nav class="bn">
  <button class="bb active" onclick="showPage('home',this)">
    <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span class="bla">Home</span>
  </button>
  <button class="bb" onclick="showPage('marks',this)">
    <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    <span class="bla">Marks</span>
  </button>
  <button class="bb" onclick="showPage('group',this)">
    <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span class="bla">Group</span>
  </button>
  <button class="bb" onclick="showPage('notifications',this)">
    <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    <span class="bla">Alerts</span>
  </button>
  <button class="bb" onclick="showPage('profile',this)">
    <svg class="bi" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span class="bla">Profile</span>
  </button>
</nav>
<div class="mo" id="payModal">
  <div class="msh">
    <div class="mh"></div>
    <div class="mttl">Pay Fees</div>
    <div class="msub" id="payTxt">Amount due: Rs. 0</div>
    <div class="ub"><div class="ul">School UPI ID</div><div class="uv" id="upiId">Loading...</div></div>
    <div class="ua">
      <a class="uab" id="ppBtn" href="#">PhonePe</a>
      <a class="uab" id="gpBtn" href="#">GPay</a>
      <a class="uab" id="ptBtn" href="#">Paytm</a>
    </div>
    <div class="dv">After payment enter details</div>
    <label style="font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px">UPI Transaction ID</label>
    <input type="text" class="fi" id="upiRef" placeholder="e.g. 123456789012">
    <button class="sbt" onclick="submitPay()">Submit Payment</button>
    <button class="cbt" onclick="closePay()">Cancel</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
// HARDCODED API URL - DO NOT CHANGE
const API = 'https://edumanage-backend-xi.vercel.app/api';

function getToken(){
  return localStorage.getItem('edu_token') ||
         sessionStorage.getItem('edu_token');
}
function getUser(){
  try{
    const u = localStorage.getItem('edu_user') ||
              sessionStorage.getItem('edu_user');
    return u ? JSON.parse(u) : {};
  }catch(e){return{}}
}

// Auth check
const token = getToken();
if(!token){window.location.href='login.html';}
const user = getUser();

const T={
  en:{greeting:'Good day,',avg:'Average',grade:'Grade',att:'Attendance',fees:'Fees',teacher:'Class Teacher',remarks:'Remarks',timetable:'Timetable',paid:'Paid',pending:'Pending',partial:'Partial',present:'Present',absent:'Absent',total:'Total Days',no_marks:'No marks yet',no_posts:'No posts yet',no_notif:'No notifications yet',pay:'Pay Fees',fees_paid:'Fees fully paid',pay_ok:'Payment submitted!',bus_yes:'Bus',bus_no:'No Bus',due:'Amount Due',paid2:'Amount Paid'},
  hi:{greeting:'नमस्ते,',avg:'औसत',grade:'ग्रेड',att:'उपस्थिति',fees:'फीस',teacher:'कक्षा शिक्षक',remarks:'टिप्पणी',timetable:'टाइमटेबल',paid:'भुगतान हुआ',pending:'बाकी है',partial:'आंशिक',present:'उपस्थित',absent:'अनुपस्थित',total:'कुल दिन',no_marks:'अभी कोई अंक नहीं',no_posts:'अभी कोई पोस्ट नहीं',no_notif:'कोई सूचना नहीं',pay:'फीस भरें',fees_paid:'फीस पूरी तरह भुगतान हुई',pay_ok:'भुगतान जमा हुआ!',bus_yes:'बस',bus_no:'बस नहीं',due:'बाकी राशि',paid2:'भुगतान राशि'},
  mr:{greeting:'नमस्कार,',avg:'सरासरी',grade:'श्रेणी',att:'हजेरी',fees:'शुल्क',teacher:'वर्ग शिक्षक',remarks:'टिप्पणी',timetable:'वेळापत्रक',paid:'भरले',pending:'बाकी आहे',partial:'अंशतः',present:'उपस्थित',absent:'अनुपस्थित',total:'एकूण दिवस',no_marks:'अद्याप गुण नाहीत',no_posts:'अद्याप पोस्ट नाही',no_notif:'सूचना नाही',pay:'शुल्क भरा',fees_paid:'शुल्क पूर्णपणे भरले',pay_ok:'पेमेंट सबमिट झाले!',bus_yes:'बस',bus_no:'बस नाही',due:'बाकी रक्कम',paid2:'भरलेली रक्कम'}
};
let lang=localStorage.getItem('edu-lang')||'en';
function t(k){return T[lang][k]||T.en[k]||k}
function setLang(l){lang=l;localStorage.setItem('edu-lang',l);document.querySelectorAll('.lb').forEach(b=>{b.classList.toggle('active',b.textContent.toLowerCase()===l)});showPage(cp)}
setLang(lang);

let sd=null,cp='home';

async function load(){
  document.getElementById('mainContent').innerHTML='<div class="ls2"><div class="sp"></div><div class="lt">Loading your data...</div></div>';
  try{
    const res=await fetch(API+'/students/me',{
      headers:{
        'Authorization':'Bearer '+getToken(),
        'Content-Type':'application/json'
      }
    });
    if(res.status===401){
      localStorage.clear();sessionStorage.clear();
      window.location.href='login.html';return;
    }
    const data=await res.json();
    if(data.error){
      document.getElementById('mainContent').innerHTML='<div class="ls2"><div class="lt">'+data.error+'</div><button class="retry-btn" onclick="load()">Retry</button></div>';
      return;
    }
    sd=data;
    showPage('home');
  }catch(e){
    document.getElementById('mainContent').innerHTML='<div class="ls2"><div class="lt">Could not load.<br>Check internet.</div><button class="retry-btn" onclick="load()">Retry</button></div>';
  }
}

function showPage(p,btn){
  cp=p;
  if(btn){document.querySelectorAll('.bb').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
  if(!sd){load();return}
  const c=document.getElementById('mainContent');
  if(p==='home')c.innerHTML=rHome();
  else if(p==='marks')c.innerHTML=rMarks();
  else if(p==='group'){rGroup();return}
  else if(p==='notifications'){rNotifs();return}
  else if(p==='profile')c.innerHTML=rProfile();
  setTimeout(()=>{document.querySelectorAll('.mf[data-w]').forEach(b=>{b.style.width=b.dataset.w+'%'})},150);
}

function rHome(){
  const s=sd.student,marks=sd.marks||[],att=sd.attendance||{},fees=sd.fees,tt=sd.timetable||[];
  const avg=marks.length?Math.round(marks.reduce((a,m)=>a+parseFloat(m.marks_obtained||0),0)/marks.length):0;
  const tot=parseInt(att.total||0),pres=parseInt(att.present||0);
  const ap=tot>0?Math.round((pres/tot)*100):0;
  const fs=fees?fees.status:'not set';
  const fc=fs==='paid'?'var(--green)':fs==='partial'?'var(--gold)':'var(--red)';
  const fl=fs==='paid'?t('paid'):fs==='partial'?t('partial'):t('pending');
  const ac=ap>=75?'var(--black)':'var(--red)';
  setTimeout(()=>{if(s.id)loadPh(s.id,'hpel')},300);
  return`
  <div class="hdr"><div class="hg"></div><div class="hc">
    <div class="prow">
      <div class="sphoto" id="hpel">${s.name?s.name[0].toUpperCase():'S'}</div>
      <div>
        <div class="grt">${t('greeting')}</div>
        <div class="snm">${s.name}</div>
        <div class="cps">
          <span class="cp">${s.standard||(isNaN(s.standard)?s.standard:'Class '+s.standard)||'N/A'}</span>
          <span class="cp">Roll ${s.roll_no||'N/A'}</span>
          ${s.has_bus?'<span class="cp">'+t('bus_yes')+'</span>':''}
        </div>
      </div>
    </div>
  </div></div>

  <div class="qs-grid">
    <div class="qs" onclick="showPage('marks',document.querySelectorAll('.bb')[1])">
      <div class="qsi"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
      <div class="qsv" style="color:${avg>=75?'var(--green)':avg>=50?'var(--gold)':'var(--red)'}">${avg}%</div>
      <div class="qsl">${t('avg')}</div>
    </div>
    <div class="qs">
      <div class="qsi"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      <div class="qsv">${grade(avg)}</div>
      <div class="qsl">${t('grade')}</div>
    </div>
    <div class="qs">
      <div class="qsi"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
      <div class="qsv" style="color:${ac}">${ap}%</div>
      <div class="qsl">${t('att')}</div>
    </div>
    <div class="qs" onclick="${fs!=='paid'?'openPay()':''}">
      <div class="qsi"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>
      <div class="qsv" style="font-size:14px;margin-top:4px;color:${fc}">${fl}</div>
      <div class="qsl">${t('fees')}</div>
    </div>
  </div>

  ${s.teacher_name?`<div class="sec"><div class="stt">${t('teacher')}</div><div class="card"><div class="trow"><div class="tav">${s.teacher_name[0]}</div><div><div class="tnm">${s.teacher_name}</div><div class="ts">${s.teacher_phone||''}</div></div></div></div></div>`:''}

  ${marks.length>0?`<div class="sec"><div class="stt">${t('marks')}</div><div class="card">${marks.slice(0,4).map(m=>`<div class="mr"><div class="ms">${m.subject}</div><div class="mb"><div class="mf" data-w="${m.marks_obtained}" style="width:0%;background:${m.marks_obtained>=75?'var(--black)':m.marks_obtained>=50?'var(--gold)':'var(--red)'}"></div></div><div class="msc">${m.marks_obtained}/${m.total_marks}</div></div>`).join('')}</div></div>`:''}

  ${fees?`<div class="sec"><div class="stt">${t('fees')}</div><div class="card fc">
    <div class="fr">
      <div><div class="fa" style="color:${fc}">Rs. ${parseInt(fees.remaining_amount||0).toLocaleString('en-IN')}</div><div class="fs2">${t('due')}</div></div>
      <div style="text-align:right"><div style="font-size:14px;font-weight:600;color:var(--green)">Rs. ${parseInt(fees.paid_amount||0).toLocaleString('en-IN')}</div><div style="font-size:11px;color:var(--gray-400)">${t('paid2')}</div></div>
    </div>
    ${fees.status!=='paid'?`<button class="pb" onclick="openPay()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>${t('pay')}</button>`:`<div style="text-align:center;padding:8px;font-size:13px;color:var(--green);font-weight:600">${t('fees_paid')}</div>`}
  </div></div>`:''}

  ${tt.length>0?`<div class="sec"><div class="stt">${t('timetable')}</div><div class="card ttc" style="padding:0">${tt.slice(0,3).map(x=>`<div class="ttr"><div class="ttd">${x.day?.slice(0,3)||''}</div><div class="ttp">${[x.period_1,x.period_2,x.period_3,x.period_4,x.period_5,x.period_6,x.period_7].filter(Boolean).map(p=>`<div class="ttpi">${p}</div>`).join('')}</div></div>`).join('')}</div></div>`:''}
  `;
}

function rMarks(){
  const marks=sd.marks||[],att=sd.attendance||{};
  const avg=marks.length?Math.round(marks.reduce((a,m)=>a+parseFloat(m.marks_obtained||0),0)/marks.length):0;
  const tot=parseInt(att.total||0),pres=parseInt(att.present||0);
  const ap=tot>0?Math.round((pres/tot)*100):0;
  const R=34,C=2*Math.PI*R,D=(ap/100)*C,ac=ap>=75?'var(--black)':'var(--red)';
  return`<div style="padding:16px">
  <div class="stt" style="margin-bottom:12px">${t('marks')}</div>
  <div style="background:var(--black);color:var(--white);border-radius:var(--radius);padding:18px;text-align:center;margin-bottom:14px">
    <div style="font-family:var(--font-display);font-size:44px;font-weight:700;line-height:1">${avg}%</div>
    <div style="font-size:12px;color:rgba(255,255,255,.4);margin-top:4px">Average — Grade ${grade(avg)}</div>
  </div>
  <div class="card">
    ${marks.length>0?marks.map(m=>`<div class="mr">
      <div style="min-width:90px"><div class="ms">${m.subject}</div><div style="font-size:10px;color:var(--gray-400)">${m.exam_type||''}</div></div>
      <div class="mb"><div class="mf" data-w="${m.marks_obtained}" style="width:0%;background:${m.marks_obtained>=75?'var(--black)':m.marks_obtained>=50?'var(--gold)':'var(--red)'}"></div></div>
      <div><div class="msc">${m.marks_obtained}/${m.total_marks}</div><div style="font-size:10px;text-align:right;color:${m.marks_obtained>=75?'var(--green)':m.marks_obtained>=50?'var(--gold)':'var(--red)'}">${grade(parseInt(m.marks_obtained))}</div></div>
    </div>`).join(''):`<div class="eb"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><p>${t('no_marks')}</p></div>`}
  </div>
  <div class="stt" style="margin:14px 0 10px">${t('att')}</div>
  <div class="card ac">
    <div class="ad">
      <svg width="72" height="72" viewBox="0 0 72 72">
        <circle cx="36" cy="36" r="${R}" fill="none" stroke="var(--gray-100)" stroke-width="7"/>
        <circle cx="36" cy="36" r="${R}" fill="none" stroke="${ac}" stroke-width="7" stroke-dasharray="${D} ${C}" stroke-linecap="round"/>
      </svg>
      <div class="at"><div class="ap" style="color:${ac}">${ap}%</div><div class="as2">att.</div></div>
    </div>
    <div style="flex:1">
      <div class="ar"><span class="al">${t('present')}</span><span class="av" style="color:var(--green)">${pres}</span></div>
      <div class="ar"><span class="al">${t('absent')}</span><span class="av" style="color:var(--red)">${att.absent||0}</span></div>
      <div class="ar"><span class="al">${t('total')}</span><span class="av">${tot}</span></div>
      <div style="margin-top:6px;font-size:12px;font-weight:600;color:${ap>=75?'var(--green)':'var(--red)'}">${ap>=75?'Good Standing':'Below 75%'}</div>
    </div>
  </div>
  </div>`;
}

async function rGroup(){
  const s=sd.student,c=document.getElementById('mainContent');
  c.innerHTML=`<div style="padding:16px"><div class="stt" style="margin-bottom:12px">Class Group</div><div id="pl"><div class="ls2" style="min-height:150px"><div class="sp"></div></div></div></div>`;
  if(!s.class_id){document.getElementById('pl').innerHTML=`<div class="eb"><p>${t('no_posts')}</p></div>`;return}
  try{
    const r=await fetch(API+'/posts/'+s.class_id,{headers:{Authorization:'Bearer '+getToken()}});
    const d=await r.json();const posts=d.posts||[];
    document.getElementById('pl').innerHTML=posts.length>0?posts.map(p=>`<div class="pi"><div class="ph"><span class="pau">${p.posted_by_name||'Teacher'}</span><span class="ptm">${fmtDate(p.created_at)}</span></div>${p.text_content?`<div class="ptxt">${p.text_content}</div>`:''} ${p.file_url&&p.file_type?.startsWith('image')?`<img class="pimg" src="${p.file_url}" loading="lazy">`:''} ${p.video_link?`<a class="vb" href="${p.video_link}" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>Watch Video</a>`:''}</div>`).join(''):`<div class="eb"><p>${t('no_posts')}</p></div>`;
  }catch(e){document.getElementById('pl').innerHTML=`<div class="eb"><p>Could not load</p></div>`}
}

async function rNotifs(){
  const c=document.getElementById('mainContent');
  c.innerHTML=`<div style="padding:16px"><div class="stt" style="margin-bottom:12px">Notifications</div><div id="nl"><div class="ls2" style="min-height:150px"><div class="sp"></div></div></div></div>`;
  try{
    const r=await fetch(API+'/notifications',{headers:{Authorization:'Bearer '+getToken()}});
    const d=await r.json();const notifs=d.notifications||[];
    document.getElementById('nl').innerHTML=notifs.length>0?`<div class="card" style="padding:0 14px">${notifs.map(n=>`<div class="ni"><div class="nd"></div><div><div class="ntl">${n.title}</div><div class="nm">${n.message}</div><div class="nti">${fmtDate(n.created_at)}</div></div></div>`).join('')}</div>`:`<div class="eb"><p>${t('no_notif')}</p></div>`;
  }catch(e){document.getElementById('nl').innerHTML=`<div class="eb"><p>Could not load</p></div>`}
}

function rProfile(){
  const s=sd.student;
  setTimeout(()=>{if(s.id)loadPh(s.id,'pfav')},200);
  return`<div style="padding:16px">
  <div class="pfhd">
    <div class="pfg"></div>
    <div class="pfav" id="pfav">${s.name?s.name[0].toUpperCase():'S'}</div>
    <div class="pfnm">${s.name}</div>
    <div class="pfcd">${user.code||s.code||''}</div>
    <div class="pfcp">
      <span class="pfcpi">${s.standard||'N/A'}</span>
      <span class="pfcpi">Roll ${s.roll_no||'N/A'}</span>
    </div>
  </div>
  <div class="il">
    ${irow('Date of Birth',s.dob?s.dob.split('T')[0]:'N/A')}
    ${irow('Gender',s.gender||'N/A')}
    ${irow('Parent',s.parent_name||'N/A')}
    ${irow('Parent Phone',s.parent_phone||'N/A')}
    ${irow('Address',s.address||'N/A')}
    ${irow('Blood Group',s.blood_group||'N/A')}
    ${irow('Bus',s.has_bus?t('bus_yes'):t('bus_no'))}
    ${irow('Teacher',s.teacher_name||'N/A')}
  </div>
  <button onclick="doLogout()" style="width:100%;padding:12px;background:var(--white);border:1.5px solid var(--gray-200);border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:600;color:var(--red);cursor:pointer">Logout</button>
  </div>`;
}

function irow(l,v){return`<div class="ir"><span class="irlab">${l}</span><span class="irval">${v}</span></div>`}

async function loadPh(sid,eid){
  try{
    const r=await fetch(API+'/upload/photo/'+sid,{headers:{Authorization:'Bearer '+getToken()}});
    if(r.ok){const d=await r.json();if(d.url){const el=document.getElementById(eid);if(el)el.innerHTML=`<img src="${d.url}" alt="">`;}}
  }catch(e){}
}

async function openPay(){
  let upi=null;
  try{const r=await fetch(API+'/fees/upi-details',{headers:{Authorization:'Bearer '+getToken()}});upi=await r.json()}catch(e){}
  const fees=sd.fees,amt=parseInt(fees?.remaining_amount||0);
  document.getElementById('payTxt').textContent='Amount due: Rs. '+amt.toLocaleString('en-IN');
  document.getElementById('payTxt').setAttribute('data-amt',amt);
  if(upi?.upi_id){
    document.getElementById('upiId').textContent=upi.upi_id;
    const base=`upi://pay?pa=${upi.upi_id}&pn=${encodeURIComponent(upi.name||'School')}&am=${amt}&cu=INR`;
    document.getElementById('ppBtn').href=base;
    document.getElementById('gpBtn').href=base;
    document.getElementById('ptBtn').href=base;
  }
  document.getElementById('payModal').classList.add('show');
}

function closePay(){document.getElementById('payModal').classList.remove('show');document.getElementById('upiRef').value=''}

async function submitPay(){
  const ref=document.getElementById('upiRef').value.trim();
  const amt=parseFloat(document.getElementById('payTxt').getAttribute('data-amt')||0);
  if(!ref){toast('Please enter UPI Transaction ID');return}
  try{
    const r=await fetch(API+'/fees/submit-payment',{method:'POST',headers:{Authorization:'Bearer '+getToken(),'Content-Type':'application/json'},body:JSON.stringify({amount:amt,upi_ref:ref})});
    const d=await r.json();
    if(d.success){closePay();toast(t('pay_ok'));setTimeout(()=>load(),1000)}
    else toast(d.error||'Error')
  }catch(e){toast('Could not submit')}
}

document.getElementById('payModal').addEventListener('click',e=>{if(e.target===document.getElementById('payModal'))closePay()});

function grade(s){if(s>=90)return'A+';if(s>=80)return'A';if(s>=70)return'B+';if(s>=60)return'B';if(s>=50)return'C';return'F'}
function fmtDate(ts){if(!ts)return'';try{return new Date(ts).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}catch(e){return''}}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3000)}
function doLogout(){localStorage.clear();sessionStorage.clear();window.location.href='login.html'}

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}

// INIT
load();
</script>
</body>
</html>
