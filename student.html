<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#800020">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Student Portal — Emmanuel School</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --p:#800020;--dp:#3d0010;--ac:#a30027;--plt:rgba(128,0,32,.08);
  --w:#fff;--bg:#fafafa;
  --g1:#f5f5f5;--g2:#eeeeee;--g3:#e0e0e0;--g4:#bdbdbd;--g5:#9e9e9e;--g6:#757575;
  --green:#1a7a4a;--gl:#e8f5ee;
  --red:#c0392b;--rl:#fdf0ef;
  --gold:#b8860b;--goldl:#fdf8e8;
  --ff:'Playfair Display',serif;--fb:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
  --r:12px;
}
html,body{font-family:var(--fb);background:var(--bg);color:var(--g6);min-height:100vh;overflow-x:hidden}
.login-screen{min-height:100vh;background:linear-gradient(155deg,var(--dp),var(--p),var(--ac));display:flex;align-items:center;justify-content:center;padding:20px;position:relative}
.login-screen::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:32px 32px;pointer-events:none}
.login-card{background:var(--w);border-radius:20px;padding:28px 22px;width:100%;max-width:380px;position:relative;z-index:1;box-shadow:0 25px 60px rgba(0,0,0,.38)}
.login-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px}
.login-lm{width:34px;height:34px;background:var(--p);color:var(--w);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px}
.login-name{font-family:var(--ff);font-size:20px;font-weight:700;color:var(--dp)}
.login-sub{text-align:center;font-size:12px;color:var(--g5);margin-bottom:20px}
.login-label{display:block;font-size:11px;font-weight:600;color:var(--g5);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.login-input{width:100%;padding:12px 14px;background:var(--g1);border:1.5px solid var(--g2);border-radius:var(--r);font-family:var(--fb);font-size:14px;color:#1a1a1a;outline:none;margin-bottom:12px;-webkit-appearance:none}
.login-input:focus{border-color:var(--p);background:var(--w)}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--p),var(--ac));color:var(--w);border:none;border-radius:var(--r);font-family:var(--fb);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.login-btn:disabled{opacity:.6}
.login-err{background:var(--rl);border:1px solid rgba(192,57,43,.15);border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--red);margin-top:10px;display:none}
.login-err.show{display:block}
.login-sp{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:var(--w);border-radius:50%;animation:spin .7s linear infinite}
.topbar{position:sticky;top:0;z-index:100;background:var(--w);border-bottom:1px solid var(--g2);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between}
.tl{font-family:var(--ff);font-size:17px;font-weight:700;color:var(--dp);display:flex;align-items:center;gap:8px}
.lm{width:28px;height:28px;background:var(--p);color:var(--w);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.tr{display:flex;align-items:center;gap:6px}
.bell-btn{position:relative;background:none;border:none;cursor:pointer;padding:6px;border-radius:7px;display:flex;align-items:center;transform-origin:top center}
.bell-btn svg{width:20px;height:20px;stroke:var(--g5);fill:none;stroke-width:2;stroke-linecap:round}
.bell-dot{position:absolute;top:2px;right:2px;width:8px;height:8px;background:var(--red);border-radius:50%;border:1.5px solid var(--w);display:none}
.bell-dot.on{display:block}
.ob{background:none;border:1px solid var(--g2);border-radius:7px;padding:5px 10px;font-size:11px;font-weight:600;color:var(--g5);cursor:pointer;font-family:var(--fb)}
.notif-pop{position:fixed;top:62px;left:50%;transform:translateX(-50%) translateY(-130px);width:calc(100% - 20px);max-width:500px;background:var(--w);border-radius:14px;box-shadow:0 8px 28px rgba(0,0,0,.18);z-index:9999;border-left:4px solid var(--p);padding:13px 14px;display:flex;align-items:flex-start;gap:11px;opacity:0;pointer-events:none;transition:all .4s cubic-bezier(.4,0,.2,1)}
.notif-pop.show{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto}
.np-ic{width:36px;height:36px;background:var(--plt);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.np-ic svg{width:17px;height:17px;stroke:var(--p);fill:none;stroke-width:2;stroke-linecap:round}
.cnt{max-width:600px;margin:0 auto;padding-bottom:80px}
.hero{background:linear-gradient(135deg,var(--dp),var(--p));color:var(--w);padding:20px 16px 24px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:32px 32px}
.hi{position:relative;z-index:1;display:flex;align-items:flex-start;gap:13px}
.hav{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-family:var(--ff);font-size:18px;color:var(--w);flex-shrink:0;font-weight:700}
.hin{flex:1}
.hgrt{font-size:11px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;font-weight:600}
.hnm{font-family:var(--ff);font-size:20px;font-weight:700;line-height:1.15;margin-bottom:7px}
.hchips{display:flex;gap:6px;flex-wrap:wrap}
.hchip{padding:3px 10px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:100px;font-size:10px;color:rgba(255,255,255,.85);font-weight:500}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px}
.stile{background:var(--w);border:1px solid var(--g2);border-radius:var(--r);padding:13px;cursor:pointer}
.stic{width:28px;height:28px;background:var(--plt);border-radius:6px;display:flex;align-items:center;justify-content:center;margin-bottom:7px}
.stic svg{width:14px;height:14px;stroke:var(--p);fill:none;stroke-width:2;stroke-linecap:round}
.stv{font-family:var(--ff);font-size:22px;font-weight:700;color:var(--p);line-height:1;margin-bottom:3px}
.stl{font-size:10px;color:var(--g4);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.sec{padding:0 16px;margin-bottom:16px}
.sectitle{font-family:var(--ff);font-size:15px;font-weight:700;color:var(--dp);margin-bottom:10px}
.bOK{background:var(--gl);color:var(--green);padding:2px 9px;border-radius:100px;font-size:11px;font-weight:600;display:inline-block}
.bNO{background:var(--rl);color:var(--red);padding:2px 9px;border-radius:100px;font-size:11px;font-weight:600;display:inline-block}
.bHO{background:var(--goldl);color:var(--gold);padding:2px 9px;border-radius:100px;font-size:11px;font-weight:600;display:inline-block}
.ilist{background:var(--w);border:1px solid var(--g2);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.irow{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--g1)}
.irow:last-child{border-bottom:none}
.il{font-size:12px;color:var(--g4);font-weight:500}
.iv{font-size:13px;font-weight:600;color:#1a1a1a;text-align:right;max-width:58%;word-break:break-word}
.mgrp{background:var(--w);border:1px solid var(--g2);border-radius:var(--r);padding:13px;margin-bottom:12px}
.mgrpt{font-size:12px;font-weight:700;color:var(--dp);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--g1)}
.mrow2{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--g1)}
.mrow2:last-child{border-bottom:none}
.msub{font-size:13px;font-weight:600;min-width:110px;color:#1a1a1a}
.mbar{flex:1;height:5px;background:var(--g1);border-radius:3px;overflow:hidden}
.mfil{height:100%;background:linear-gradient(90deg,var(--p),var(--ac));border-radius:3px;width:0;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.msco{font-family:var(--fm);font-size:12px;font-weight:600;color:var(--g6);min-width:52px;text-align:right}
.mpct{font-size:10px;font-weight:700;min-width:34px;text-align:right}
.tt-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--g2);margin-bottom:12px}
.tt-t{width:100%;border-collapse:collapse;font-size:11px;min-width:360px}
.tt-t th{padding:8px 5px;background:var(--plt);border:1px solid var(--g2);text-align:center;font-weight:700;color:var(--p);white-space:nowrap}
.tt-t td{padding:8px 5px;border:1px solid var(--g2);text-align:center;color:var(--g6);font-size:11px}
.tt-t tr:nth-child(even) td{background:var(--g1)}
.pcard{background:var(--w);border:1px solid var(--g2);border-radius:13px;margin-bottom:11px;overflow:hidden}
.phead{display:flex;align-items:center;gap:9px;padding:11px 13px 0}
.pav{width:34px;height:34px;border-radius:50%;background:var(--plt);display:flex;align-items:center;justify-content:center;font-family:var(--ff);font-size:13px;color:var(--p);font-weight:700;flex-shrink:0}
.pbody{padding:9px 13px 13px}
.ptxt{font-size:13px;color:#1a1a1a;line-height:1.6}
.fi{width:100%;padding:10px 12px;background:var(--g1);border:1.5px solid var(--g2);border-radius:var(--r);font-family:var(--fb);font-size:13px;color:#1a1a1a;outline:none;margin-bottom:10px;-webkit-appearance:none}
.fi:focus{border-color:var(--p);background:var(--w)}
.upibox{background:var(--plt);border:1px solid rgba(128,0,32,.15);border-radius:var(--r);padding:12px 13px;margin-bottom:12px}
.upiapps{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.upiapp{padding:10px 5px;background:var(--g1);border:1.5px solid var(--g2);border-radius:var(--r);font-family:var(--fb);font-size:11px;font-weight:700;color:var(--p);cursor:pointer;text-align:center;display:block;text-decoration:none}
.dvdr{display:flex;align-items:center;gap:9px;color:var(--g3);font-size:12px;margin-bottom:12px}
.dvdr::before,.dvdr::after{content:'';flex:1;height:1px;background:var(--g2)}
.ssarea{border:2px dashed var(--g2);border-radius:var(--r);padding:18px;text-align:center;cursor:pointer;position:relative;overflow:hidden;margin-bottom:10px;transition:border-color .2s}
.ssarea.hasimg{border-color:var(--p);border-style:solid}
.ssarea svg{width:28px;height:28px;stroke:var(--g3);fill:none;stroke-width:1.5;stroke-linecap:round;margin:0 auto 7px;display:block}
.ssarea.hasimg svg{display:none}
.sstxt{font-size:12px;color:var(--g4);font-weight:500}
.ssarea.hasimg .sstxt{display:none}
.ssinput{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.ssprev{display:none;width:100%;max-height:180px;object-fit:cover;border-radius:8px}
.ssarea.hasimg .ssprev{display:block}
.subbtn{width:100%;padding:12px;background:linear-gradient(135deg,var(--p),var(--ac));color:var(--w);border:none;border-radius:var(--r);font-family:var(--fb);font-size:14px;font-weight:700;cursor:pointer}
.subbtn:disabled{opacity:.6}
.crd{background:var(--w);border:1px solid var(--g2);border-radius:var(--r);padding:14px;margin-bottom:12px}
.profhero{background:linear-gradient(135deg,var(--dp),var(--p));border-radius:var(--r);padding:20px;text-align:center;margin-bottom:12px;position:relative;overflow:hidden}
.profhero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:32px 32px}
.profav{width:58px;height:58px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.25);margin:0 auto 9px;display:flex;align-items:center;justify-content:center;font-family:var(--ff);font-size:22px;color:var(--w);position:relative;z-index:1;font-weight:700}
.profnm{font-family:var(--ff);font-size:19px;font-weight:700;color:var(--w);position:relative;z-index:1}
.profcd{font-family:var(--fm);font-size:11px;color:rgba(255,255,255,.45);margin-top:3px;position:relative;z-index:1}
.bn{position:fixed;bottom:0;left:0;right:0;background:var(--w);border-top:1px solid var(--g2);display:flex;padding:6px 0;padding-bottom:max(8px,env(safe-area-inset-bottom));z-index:100}
.bb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 2px;background:none;border:none;cursor:pointer;position:relative}
.bi{width:20px;height:20px;stroke:var(--g3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.bla{font-size:8px;font-weight:700;color:var(--g3);text-transform:uppercase;letter-spacing:.4px;font-family:var(--fb)}
.bb.active .bi{stroke:var(--p)}
.bb.active .bla{color:var(--p)}
.btab-dot{position:absolute;top:3px;right:calc(50% - 14px);width:7px;height:7px;background:var(--red);border-radius:50%;border:1.5px solid var(--w);display:none}
.btab-dot.on{display:block}
.spin2{display:flex;align-items:center;justify-content:center;min-height:40vh;flex-direction:column;gap:11px}
.sp{width:24px;height:24px;border:2px solid var(--g2);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite}
.empty{text-align:center;padding:36px 20px;color:var(--g4);font-size:13px;line-height:1.6}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dp);color:var(--w);padding:9px 18px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:8000;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.25);max-width:92vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.tok{background:var(--green)}
.toast.terr{background:var(--red)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bellRing{0%,100%{transform:rotate(0) scale(1)}10%{transform:rotate(-22deg) scale(1.1)}20%{transform:rotate(22deg) scale(1.1)}30%{transform:rotate(-16deg)}40%{transform:rotate(16deg)}50%{transform:rotate(-10deg)}60%{transform:rotate(10deg)}70%{transform:rotate(-5deg)}80%{transform:rotate(5deg)}}
.bellring{animation:bellRing 1s ease both}
</style>
</head>
<body>

<!-- LOGIN — visible by default so blank page never happens -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-lm">E</div>
      <div class="login-name">Emmanuel School</div>
    </div>
    <div class="login-sub">Student Portal</div>
    <label class="login-label">Student Code</label>
    <input type="text" class="login-input" id="lCode" placeholder="e.g. STU001"
      autocomplete="off" style="text-transform:uppercase"
      oninput="this.value=this.value.toUpperCase()"
      onkeydown="if(event.key==='Enter')document.getElementById('lPass').focus()">
    <label class="login-label">Password</label>
    <input type="password" class="login-input" id="lPass" placeholder="Enter password"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" id="lBtn" onclick="doLogin()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Sign In
    </button>
    <div class="login-err" id="lErr"></div>
  </div>
</div>

<!-- NOTIFICATION POPUP -->
<div class="notif-pop" id="notifPop">
  <div class="np-ic"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
  <div style="flex:1;min-width:0">
    <div style="font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:2px" id="npTitle">Notification</div>
    <div style="font-size:12px;color:var(--g5);line-height:1.4" id="npMsg"></div>
  </div>
  <button onclick="closeNPop()" style="background:none;border:none;cursor:pointer;color:var(--g4);font-size:20px;padding:2px;flex-shrink:0;margin-left:6px;line-height:1">×</button>
</div>

<!-- APP — hidden by default -->
<div id="appScreen" style="display:none">
  <div class="topbar">
    <div class="tl"><div class="lm">E</div>Emmanuel School</div>
    <div class="tr">
      <button class="bell-btn" id="bellBtn" onclick="gTab('alerts')">
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <div class="bell-dot" id="bellDot"></div>
      </button>
      <button class="ob" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="cnt" id="mainContent">
    <div class="spin2"><div class="sp"></div></div>
  </div>
  <nav class="bn">
    <button class="bb active" onclick="gTab('home',this)">
      <svg class="bi" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="bla">Home</span>
    </button>
    <button class="bb" onclick="gTab('marks',this)">
      <svg class="bi" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span class="bla">Marks</span>
    </button>
    <button class="bb" onclick="gTab('fees',this)">
      <svg class="bi" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      <span class="bla">Fees</span>
    </button>
    <button class="bb" onclick="gTab('group',this)">
      <svg class="bi" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="bla">Group</span>
    </button>
    <button class="bb" onclick="gTab('alerts',this)">
      <svg class="bi" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="bla">Alerts</span>
      <div class="btab-dot" id="alertDot"></div>
    </button>
    <button class="bb" onclick="gTab('profile',this)">
      <svg class="bi" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span class="bla">Profile</span>
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<!-- FIREBASE -->
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getMessaging,getToken,onMessage}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js';
const fbApp=initializeApp({
  apiKey:"AIzaSyA21lqBYdpcsUQCDOvc7Y1ZtIvy5j1VPVw",
  authDomain:"edumanage-notificationn.firebaseapp.com",
  projectId:"edumanage-notificationn",
  messagingSenderId:"956207309076",
  appId:"1:956207309076:web:6432e350c3536aa49f6201"
});
const fbMsg=getMessaging(fbApp);
function playTone(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[523,.00],[659,.16],[784,.32],[1047,.48]].forEach(([f,d])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=f;
      const t=ctx.currentTime+d;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.35,t+.03);g.gain.exponentialRampToValueAtTime(.001,t+.3);
      o.start(t);o.stop(t+.32);
    });
  }catch(e){}
}
window._setupPush=async function(){
  try{
    if(Notification.permission!=='granted'){const p=await Notification.requestPermission();if(p!=='granted')return;}

<script>
const API='https://edumanage-backend-xi.vercel.app/api';
let TOK=null,SD=null,MARKS=[],FEES=null,ATT={},TT=[],POSTS=[],NOTIFS=[],PAYS=[],UPI='';
let ssB64=null,ssMime=null,cTab='home';

function H(){return{'Content-Type':'application/json','Authorization':'Bearer '+TOK};}
function ini(n){if(!n)return'?';return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function ago(d){if(!d)return'';const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
function Rs(n){return'Rs. '+parseInt(n||0).toLocaleString('en-IN');}
function avgP(){if(!MARKS.length)return 0;return Math.round(MARKS.reduce((a,m)=>a+(m.marks_obtained/m.total_marks*100),0)/MARKS.length);}
function grade(p){return p>=90?'A+':p>=80?'A':p>=70?'B+':p>=60?'B':p>=50?'C':'D';}
function fD(ts){if(!ts)return'';try{return new Date(ts).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}catch(e){return'';}}

let toastT;
function toast(msg,type){
  const e=document.getElementById('toast');
  e.textContent=msg;e.className='toast show'+(type?' '+type:'');
  clearTimeout(toastT);toastT=setTimeout(()=>e.className='toast',3500);
}
function closeNPop(){if(window._npT)clearTimeout(window._npT);document.getElementById('notifPop').classList.remove('show');}

/* BOOT — check saved token */
(function(){
  const t=localStorage.getItem('edu_token');
  const r=localStorage.getItem('edu_role');
  if(t&&t.length>20&&r==='student'){
    TOK=t;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appScreen').style.display='block';
    loadMe();
  }
  /* else: loginScreen stays visible (default) */
})();

async function doLogin(){
  const code=document.getElementById('lCode').value.trim().toUpperCase();
  const pass=document.getElementById('lPass').value;
  const err=document.getElementById('lErr');
  const btn=document.getElementById('lBtn');
  if(!code||!pass){err.textContent='Enter code and password';err.classList.add('show');return;}
  err.classList.remove('show');
  btn.innerHTML='<div class="login-sp"></div> Signing in...';
  btn.disabled=true;
  try{
    const res=await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,password:pass})});
    const data=await res.json();
    if((res.ok||data.success)&&data.token){
      if(data.user&&data.user.role&&data.user.role!=='student'){
        err.textContent='This login is for students only';err.classList.add('show');
        btn.innerHTML='Sign In';btn.disabled=false;return;
      }
      TOK=data.token;
      localStorage.setItem('edu_token',TOK);
      localStorage.setItem('edu_role','student');
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('appScreen').style.display='block';
      loadMe();
    }else{
      err.textContent=data.error||'Invalid credentials';err.classList.add('show');
      btn.innerHTML='Sign In';btn.disabled=false;
    }
  }catch(e){
    err.textContent='Network error: '+e.message;err.classList.add('show');
    btn.innerHTML='Sign In';btn.disabled=false;
  }
}

async function loadMe(){
  document.getElementById('mainContent').innerHTML='<div class="spin2"><div class="sp"></div></div>';
  try{
    const res=await fetch(API+'/students/me',{headers:H()});
    if(res.status===401){doLogout();return;}
    const d=await res.json();
    SD=d.student||null;MARKS=d.marks||[];FEES=d.fees||null;ATT=d.attendance||{};TT=d.timetable||[];
    if(SD&&SD.class_id){
      try{const r=await fetch(API+'/posts/'+SD.class_id,{headers:H()});if(r.ok){const pd=await r.json();POSTS=pd.posts||[];}}catch(_){}
    }
    await loadNotifs();
    try{const r=await fetch(API+'/fees/upi-details',{headers:H()});if(r.ok){const ud=await r.json();UPI=ud.upi_id||'';}}catch(_){}
    try{const r=await fetch(API+'/fees/me',{headers:H()});if(r.ok){const fd=await r.json();PAYS=fd.payments||[];}}catch(_){}
    if(Notification.permission==='granted'){setTimeout(()=>window._setupPush&&window._setupPush(),500);}
    else if(Notification.permission==='default'){setTimeout(askPush,3000);}
    gTab(cTab);
  }catch(e){
    document.getElementById('mainContent').innerHTML='<div class="spin2"><div style="color:var(--red);font-size:13px;text-align:center">Error loading.<br><button onclick="loadMe()" style="margin-top:10px;padding:8px 16px;background:var(--p);color:var(--w);border:none;border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--fb)">Retry</button></div></div>';
  }
}

function askPush(){
  if(localStorage.getItem('push_asked'))return;
  localStorage.setItem('push_asked','1');
  const mc=document.getElementById('mainContent');if(!mc)return;
  const b=document.createElement('div');
  b.style.cssText='margin:12px 16px 0;background:var(--plt);border:1px solid rgba(128,0,32,.15);border-radius:var(--r);padding:12px 13px;display:flex;align-items:center;gap:10px';
  b.innerHTML='<div style="flex:1;font-size:12px;color:var(--dp);font-weight:500;line-height:1.5">🔔 Enable notifications to get alerts from school instantly!</div><button style="padding:7px 13px;background:var(--p);color:var(--w);border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--fb);flex-shrink:0" onclick="window._setupPush&&window._setupPush();this.parentNode.remove()">Allow</button>';
  mc.prepend(b);
}

async function loadNotifs(){
  try{
    const r=await fetch(API+'/notifications',{headers:H()});
    if(r.ok){const d=await r.json();NOTIFS=d.notifications||[];}
    if(window._FG_NOTIFS&&window._FG_NOTIFS.length){NOTIFS=[...window._FG_NOTIFS,...NOTIFS];window._FG_NOTIFS=[];}
    if(NOTIFS.length){document.getElementById('bellDot')?.classList.add('on');document.getElementById('alertDot')?.classList.add('on');}
  }catch(_){}
}

function gTab(tab,btn){
  cTab=tab;
  document.querySelectorAll('.bb').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  else{const idx={home:0,marks:1,fees:2,group:3,alerts:4,profile:5}[tab]??0;document.querySelectorAll('.bb')[idx]?.classList.add('active');}
  const mc=document.getElementById('mainContent');

  else if(tab==='alerts'){mc.innerHTML=rAlerts();document.getElementById('alertDot')?.classList.remove('on');document.getElementById('bellDot')?.classList.remove('on');}

  window.scrollTo(0,0);
}

      <div style="margin-bottom:10px">
        <label style="font-size:11px;font-weight:700;color:var(--g5);text-transform:uppercase;letter-spacing:.7px;display:block;margin-bottom:5px">Amount (Rs) *</label>
        <input type="number" class="fi" id="payAmt" placeholder="Amount" value="${rem||''}">
      </div>
      <div style="margin-bottom:10px">
        <label style="font-size:11px;font-weight:700;color:var(--g5);text-transform:uppercase;letter-spacing:.7px;display:block;margin-bottom:5px">UPI Transaction ID *</label>
        <input type="text" class="fi" id="upiRef" placeholder="e.g. 123456789012">
      </div>
      <div style="margin-bottom:10px">
        <label style="font-size:11px;font-weight:700;color:var(--g5);text-transform:uppercase;letter-spacing:.7px;display:block;margin-bottom:5px">Payment Screenshot (optional)</label>
        <div class="ssarea" id="ssArea">
          <input type="file" accept="image/*" class="ssinput" onchange="handleSS(this)">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <div class="sstxt">Tap to upload screenshot</div>
          <img class="ssprev" id="ssPrev" src="" alt="">
        </div>
      </div>
      <button class="subbtn" id="subBtn" onclick="submitPay()">Submit Payment</button>
    </div>`:
    `<div style="background:var(--gl);border-radius:var(--r);padding:14px;text-align:center;color:var(--green);font-weight:700;font-size:14px;margin-bottom:12px">✅ All fees paid! Thank you.</div>`}
    ${PAYS.length?`
    <div>
      <div style="font-family:var(--ff);font-size:15px;font-weight:700;color:var(--dp);margin-bottom:10px">Payment History</div>
      ${PAYS.map(p=>`
      <div class="crd" style="margin-bottom:8px;padding:13px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
          <div style="font-family:var(--fm);font-size:15px;font-weight:700;color:var(--dp)">${Rs(p.amount)}</div>
          <span class="${p.status==='verified'?'bOK':p.status==='rejected'?'bNO':'bHO'}">${p.status==='verified'?'✓ Verified':p.status==='rejected'?'✗ Rejected':'⏳ Pending'}</span>
        </div>
        <div style="font-size:12px;color:var(--g5)">Ref: ${p.upi_ref||'-'}</div>
        ${p.screenshot_url?`<img src="${p.screenshot_url}" style="width:100%;max-height:110px;object-fit:cover;border-radius:7px;margin-top:8px;border:1px solid var(--g2);cursor:pointer" onclick="window.open('${p.screenshot_url}','_blank')" onerror="this.style.display='none'">`:''}
        <div style="font-size:11px;color:var(--g3);margin-top:4px">${fD(p.submitted_at)}</div>
      </div>`).join('')}
    </div>`:''}
  </div>`;
}

function handleSS(input){
  const file=input.files[0];if(!file)return;
  ssMime=file.type;
  const reader=new FileReader();
  reader.onload=e=>{
    ssB64=e.target.result.split(',')[1];
    const prev=document.getElementById('ssPrev'),area=document.getElementById('ssArea');
    if(prev&&area){prev.src=e.target.result;area.classList.add('hasimg');}
  };
  reader.readAsDataURL(file);
}

function openUPI(app,e){
  e.preventDefault();
  if(!UPI){toast('UPI ID not available','terr');return;}
  const amt=document.getElementById('payAmt')?.value||'';
  const upi=encodeURIComponent(UPI),am=encodeURIComponent(amt),pn=encodeURIComponent('Emmanuel School');
  const urls={phonepe:`phonepe://pay?pa=${upi}&pn=${pn}&am=${am}&cu=INR`,gpay:`tez://upi/pay?pa=${upi}&pn=${pn}&am=${am}&cu=INR`,paytm:`paytmmp://pay?pa=${upi}&pn=${pn}&am=${am}&cu=INR`};
  window.location.href=urls[app];
  setTimeout(()=>{const fb={phonepe:'https://phon.pe/',gpay:'https://pay.google.com/',paytm:'https://paytm.com/'};try{window.open(fb[app],'_blank');}catch(_){}},2000);
}

async function submitPay(){
  const ref=document.getElementById('upiRef')?.value.trim();
  const amt=document.getElementById('payAmt')?.value;
  if(!ref){toast('Enter UPI Transaction ID','terr');return;}
  if(!amt||parseFloat(amt)<=0){toast('Enter amount','terr');return;}
  const btn=document.getElementById('subBtn');
  btn.disabled=true;btn.textContent='Submitting...';
  try{
    const payload={upi_ref:ref,amount:parseFloat(amt)};
    if(ssB64){payload.screenshot_base64=ssB64;payload.screenshot_mime=ssMime||'image/jpeg';}
    const res=await fetch(API+'/fees/submit-payment',{method:'POST',headers:H(),body:JSON.stringify(payload)});
    if(res.ok){
      toast('Payment submitted! Admin will verify soon.','tok');
      ssB64=null;ssMime=null;
      try{const r=await fetch(API+'/fees/me',{headers:H()});if(r.ok){const fd=await r.json();PAYS=fd.payments||[];}}catch(_){}
      gTab('fees');
    }else{
      const d=await res.json().catch(()=>({}));
      toast(d.error||'Submission failed','terr');
    }
  }catch(e){toast('Network error','terr');}
  btn.disabled=false;btn.textContent='Submit Payment';
}

    ${!POSTS.length?'<div class="empty">No posts yet<br><small>Teacher will post updates here</small></div>':POSTS.map(p=>mkPost(p)).join('')}

/* PROFILE */
function rProfile(){
  if(!SD)return'<div class="spin2"><div class="sp"></div></div>';
  const total=parseFloat(FEES?.total_amount)||0;
  const paid=parseFloat(FEES?.paid_amount)||0;
  const rem=parseFloat(FEES?.remaining_amount)||Math.max(0,total-paid);
  const fs=FEES?.status||'pending';
  const attPct=ATT.total>0?Math.round((parseInt(ATT.present)||0)/(parseInt(ATT.total)||1)*100):0;
  return`
  <div style="padding:14px 16px">
    <div class="profhero">
      <div class="profav">${ini(SD.name)}</div>
      <div class="profnm">${SD.name}</div>
      <div class="profcd">${SD.code||''}</div>
      <div style="display:flex;gap:6px;justify-content:center;margin-top:8px;position:relative;z-index:1;flex-wrap:wrap">
        <span style="background:rgba(255,255,255,.12);padding:3px 10px;border-radius:100px;font-size:10px;color:rgba(255,255,255,.8)">${SD.standard||''}</span>
        <span style="background:rgba(255,255,255,.12);padding:3px 10px;border-radius:100px;font-size:10px;color:rgba(255,255,255,.8)">Roll ${SD.roll_no||'-'}</span>
      </div>
    </div>
    <div class="ilist">
      ${SD.dob?`<div class="irow"><span class="il">Date of Birth</span><span class="iv">${new Date(SD.dob).toLocaleDateString('en-IN')}</span></div>`:''}
      ${SD.gender?`<div class="irow"><span class="il">Gender</span><span class="iv">${SD.gender}</span></div>`:''}
      ${SD.blood_group?`<div class="irow"><span class="il">Blood Group</span><span class="iv">${SD.blood_group}</span></div>`:''}
      ${SD.parent_name?`<div class="irow"><span class="il">Parent</span><span class="iv">${SD.parent_name}</span></div>`:''}
      ${SD.parent_phone?`<div class="irow"><span class="il">Parent Phone</span><span class="iv">${SD.parent_phone}</span></div>`:''}
      ${SD.address?`<div class="irow"><span class="il">Address</span><span class="iv" style="font-size:12px">${SD.address}</span></div>`:''}
      <div class="irow"><span class="il">Bus</span><span class="iv">${SD.has_bus?(SD.bus_route?'Yes — '+SD.bus_route:'Yes'):'No'}</span></div>
      ${SD.teacher_name?`<div class="irow"><span class="il">Class Teacher</span><span class="iv">${SD.teacher_name}</span></div>`:''}
    </div>
    ${FEES?`<div class="ilist">
      <div class="irow"><span class="il">Total Fees</span><span class="iv" style="font-family:var(--fm)">${Rs(total)}</span></div>
      <div class="irow"><span class="il">Paid</span><span class="iv" style="color:var(--green);font-family:var(--fm)">${Rs(paid)}</span></div>
      <div class="irow"><span class="il">Remaining</span><span class="iv" style="color:${rem>0?'var(--red)':'var(--green)'};font-family:var(--fm)">${Rs(rem)}</span></div>
      <div class="irow"><span class="il">Status</span><span class="iv"><span class="${fs==='paid'?'bOK':fs==='partial'?'bHO':'bNO'}">${fs}</span></span></div>
    </div>`:''}
    ${ATT.total?`<div class="ilist">
      <div class="irow"><span class="il">Present Days</span><span class="iv" style="color:var(--green)">${ATT.present||0}</span></div>
      <div class="irow"><span class="il">Absent Days</span><span class="iv" style="color:var(--red)">${ATT.absent||0}</span></div>
      <div class="irow"><span class="il">Total Days</span><span class="iv">${ATT.total||0}</span></div>
      <div class="irow"><span class="il">Attendance %</span><span class="iv">${attPct}%</span></div>
    </div>`:''}
    <button style="width:100%;padding:11px;background:none;border:1px solid var(--g2);border-radius:var(--r);font-family:var(--fb);font-size:13px;color:var(--g5);cursor:pointer;margin-top:4px" onclick="doLogout()">Logout</button>
  </div>`;
}

function doLogout(){
  TOK=null;SD=null;MARKS=[];FEES=null;ATT={};TT=[];POSTS=[];NOTIFS=[];PAYS=[];
  localStorage.removeItem('edu_token');localStorage.removeItem('edu_role');localStorage.removeItem('ems_role');localStorage.removeItem('push_asked');
  document.getElementById('appScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('lCode').value='';
  document.getElementById('lPass').value='';
  document.getElementById('lErr').classList.remove('show');
}

if('serviceWorker'in navigator){navigator.serviceWorker.register('firebase-messaging-sw.js').catch(()=>{});}
