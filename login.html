<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#800020">
<title>Admin Login — Emmanuel School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#800020;--dk:#5c0018;--dp:#3d0010;--w:#fff}
html,body{height:100%;font-family:'Inter',sans-serif}
body{
  background:linear-gradient(135deg,var(--dp),var(--p),#a30027);
  display:flex;align-items:center;justify-content:center;
  padding:20px;min-height:100vh;
}
.card{
  background:#fff;border-radius:24px;
  padding:42px 34px 36px;
  width:100%;max-width:400px;
  box-shadow:0 28px 72px rgba(0,0,0,.32);
}
.logo-wrap{text-align:center;margin-bottom:28px}
.logo-box{
  width:76px;height:76px;
  border-radius:20px;
  margin:0 auto 14px;
  overflow:hidden;
  border:2.5px solid rgba(128,0,32,.15);
  box-shadow:0 6px 20px rgba(128,0,32,.2);
  background:#f9f0f2;
  display:flex;align-items:center;justify-content:center;
}
.logo-box img{width:100%;height:100%;object-fit:cover}
.logo-box .fallback{
  font-family:'Playfair Display',serif;
  font-size:28px;font-weight:700;color:var(--p);
  display:none;
}
.app-title{
  font-family:'Playfair Display',serif;
  font-size:24px;font-weight:700;
  color:#1a1a1a;margin-bottom:4px;
}
.app-sub{font-size:13px;color:#aaa}
.err{
  display:none;
  background:#fdf0ef;color:#c0392b;
  padding:10px 14px;border-radius:9px;
  font-size:13px;font-weight:500;
  margin-bottom:16px;
  border:1px solid rgba(192,57,43,.18);
}
.err.show{display:block}
.field{margin-bottom:16px}
.field label{
  display:block;font-size:11px;font-weight:700;
  color:#999;text-transform:uppercase;
  letter-spacing:.9px;margin-bottom:7px;
}
.field .inp-wrap{position:relative}
.field input{
  width:100%;padding:13px 44px 13px 14px;
  background:#f8f8f8;border:2px solid #eee;
  border-radius:11px;font-size:14px;
  font-family:'Inter',sans-serif;color:#1a1a1a;
  outline:none;transition:border-color .2s,background .2s;
}
.field input:focus{border-color:var(--p);background:#fff}
.field input::placeholder{color:#ccc}
.eye-btn{
  position:absolute;right:13px;top:50%;
  transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:#bbb;display:flex;padding:2px;
  transition:color .18s;
}
.eye-btn:hover{color:var(--p)}
.eye-btn svg{width:19px;height:19px}
.login-btn{
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--p),#a30027);
  color:#fff;border:none;border-radius:11px;
  font-size:15px;font-weight:700;
  font-family:'Inter',sans-serif;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:opacity .2s,transform .15s;
  margin-top:4px;
}
.login-btn:hover{opacity:.9}
.login-btn:active{transform:scale(.98)}
.login-btn:disabled{opacity:.6;cursor:not-allowed}
.spin{
  display:none;width:18px;height:18px;
  border:2.5px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.back-link{
  display:block;text-align:center;
  margin-top:18px;font-size:13px;
  color:#bbb;text-decoration:none;
  transition:color .18s;
}
.back-link:hover{color:var(--p)}
</style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-box">
      <img src="logo.webp" alt="Emmanuel School"
        onerror="this.style.display='none';this.nextElementSibling.style.display='block'"/>
      <span class="fallback">E</span>
    </div>
    <div class="app-title">EduManage Pro</div>
    <div class="app-sub">Emmanuel School &middot; Admin Panel</div>
  </div>

  <div class="err" id="err"></div>

  <div class="field">
    <label>Admin Code</label>
    <div class="inp-wrap">
      <input type="text" id="aCode" placeholder="e.g. ADMIN47"
        autocomplete="off" spellcheck="false"
        oninput="this.value=this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter')document.getElementById('aPass').focus()"/>
    </div>
  </div>

  <div class="field">
    <label>Password</label>
    <div class="inp-wrap">
      <input type="password" id="aPass" placeholder="Enter password"
        autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()"/>
      <button class="eye-btn" onclick="togglePw()" type="button" id="eyeBtn">
        <svg id="eyeShow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <svg id="eyeHide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </button>
    </div>
  </div>

  <button class="login-btn" id="lBtn" onclick="doLogin()">
    <span id="lTxt">Login to Admin Panel</span>
    <div class="spin" id="lSpin"></div>
  </button>

  <a href="index.html" class="back-link">Back to Home</a>
</div>

<script>
  // If already logged in this session, go straight to admin
  if(sessionStorage.getItem('admin_token')){
    window.location.replace('admin.html');
  }

  function togglePw(){
    const inp=document.getElementById('aPass');
    const show=document.getElementById('eyeShow');
    const hide=document.getElementById('eyeHide');
    if(inp.type==='password'){
      inp.type='text';show.style.display='none';hide.style.display='block';
    } else {
      inp.type='password';show.style.display='block';hide.style.display='none';
    }
  }

  function showErr(msg){
    const e=document.getElementById('err');
    e.textContent=msg;e.classList.add('show');
  }
  function hideErr(){document.getElementById('err').classList.remove('show')}

  async function doLogin(){
    hideErr();
    const code=document.getElementById('aCode').value.trim().toUpperCase();
    const pass=document.getElementById('aPass').value;
    if(!code){showErr('Admin Code daalo');return}
    if(!pass){showErr('Password daalo');return}

    document.getElementById('lTxt').style.display='none';
    document.getElementById('lSpin').style.display='block';
    document.getElementById('lBtn').disabled=true;

    try{
      const res=await fetch('https://edumanage-backend-xi.vercel.app/api/auth/login',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({code,password:pass,role:'admin'})
      });
      const data=await res.json();
      if(res.ok && data.token){
        sessionStorage.setItem('admin_token',data.token);
        sessionStorage.setItem('admin_code',code);
        sessionStorage.setItem('admin_name',data.user?.name||'Administrator');
        window.location.replace('admin.html');
      } else {
        showErr(data.message||'Invalid admin code or password');
      }
    } catch(e){
      showErr('Network error. Check your connection.');
    }
    document.getElementById('lTxt').style.display='block';
    document.getElementById('lSpin').style.display='none';
    document.getElementById('lBtn').disabled=false;
  }
</script>
</body>
