<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#800020">
<title>Admin Login — Emmanuel School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --p:#800020;--dk:#5c0018;--dp:#3d0010;--ac:#a30027;
  --w:#fff;--bg:#fdf5f7;--border:#eedde0;
  --text:#1a1a1a;--muted:#888;
  --red:#c0001a;--green:#1a7a3e;
  --ff:'Playfair Display',serif;
  --fb:'Inter',sans-serif;
  --fm:'JetBrains Mono',monospace;
}
html,body{
  height:100%;min-height:100vh;min-height:100dvh;
  font-family:var(--fb);
  background:linear-gradient(155deg,var(--dp) 0%,var(--p) 55%,var(--ac) 100%);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;
  padding-top:max(20px,env(safe-area-inset-top));
  padding-bottom:max(20px,env(safe-area-inset-bottom));
  overflow-y:auto;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);
  background-size:32px 32px;
}

.wrap{
  width:100%;max-width:400px;
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  align-items:center;gap:0;
}

/* BRAND */
.brand{text-align:center;margin-bottom:24px;width:100%}
.logo-wrap{
  width:80px;height:80px;
  border-radius:20px;
  margin:0 auto 12px;
  overflow:hidden;
  border:2.5px solid rgba(255,255,255,.25);
  box-shadow:0 8px 28px rgba(0,0,0,.25);
  background:rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
}
.logo-wrap img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
}
.logo-fb{
  font-family:var(--ff);font-size:30px;
  font-weight:700;color:var(--w);
  display:none;
}
.brand-name{
  font-family:var(--ff);font-size:20px;
  font-weight:700;color:var(--w);
  margin-bottom:3px;
  text-shadow:0 2px 8px rgba(0,0,0,.2);
}
.brand-sub{font-size:13px;color:rgba(255,255,255,.55)}

/* CARD */
.card{
  background:var(--w);
  border-radius:24px;
  padding:28px 24px 24px;
  width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.28);
}
.card-title{
  font-family:var(--ff);font-size:20px;
  font-weight:700;color:var(--dp);
  margin-bottom:3px;
}
.card-sub{font-size:13px;color:var(--muted);margin-bottom:20px}

.err{
  display:none;
  background:#fff0f2;border:1.5px solid #ffc8d0;
  color:var(--red);font-size:13px;font-weight:500;
  padding:10px 14px;border-radius:10px;
  margin-bottom:14px;
}
.err.show{display:block}

.field{margin-bottom:16px}
.field label{
  display:block;font-size:11px;font-weight:700;
  color:var(--muted);text-transform:uppercase;
  letter-spacing:.9px;margin-bottom:6px;
}
.inp-w{position:relative}
.inp-w input{
  width:100%;
  padding:12px 44px 12px 14px;
  background:#f8f8f8;border:2px solid #eeeeee;
  border-radius:11px;font-size:14px;
  font-family:var(--fb);color:var(--text);
  outline:none;transition:border-color .2s,background .2s;
}
.inp-w input:focus{border-color:var(--p);background:var(--w)}
.inp-w input::placeholder{color:#ccc}
.eye{
  position:absolute;right:12px;top:50%;
  transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:#bbb;display:flex;padding:4px;
  transition:color .18s;
}
.eye:hover{color:var(--p)}
.eye svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}

.login-btn{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--p),var(--ac));
  color:var(--w);border:none;border-radius:12px;
  font-size:15px;font-weight:700;
  font-family:var(--fb);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 5px 18px rgba(128,0,32,.25);
  transition:opacity .18s,transform .15s;
}
.login-btn:hover{opacity:.9}
.login-btn:active{transform:scale(.98)}
.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.spin{
  display:none;width:17px;height:17px;
  border:2.5px solid rgba(255,255,255,.3);
  border-top-color:var(--w);border-radius:50%;
  animation:spin .7s linear infinite;
}

.divider{
  display:flex;align-items:center;gap:10px;
  margin:18px 0;color:#ddd;font-size:12px;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#eee}

/* DOWNLOAD */
.dl-box{
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:14px;padding:16px;
}
.dl-box-title{
  font-family:var(--ff);font-size:14px;
  font-weight:700;color:var(--dp);margin-bottom:4px;
}
.dl-box-sub{
  font-size:12px;color:var(--muted);
  margin-bottom:12px;line-height:1.5;
}
.dl-btn{
  width:100%;padding:11px;
  background:var(--dp);color:var(--w);
  border:none;border-radius:10px;
  font-size:13px;font-weight:700;
  font-family:var(--fb);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:opacity .18s;
}
.dl-btn:hover{opacity:.88}
.dl-btn:disabled{opacity:.5;cursor:not-allowed}
.dl-btn svg{width:15px;height:15px;stroke:var(--w);fill:none;stroke-width:2;stroke-linecap:round}

.dl-prog{display:none;margin-top:10px}
.dl-prog.show{display:block}
.dl-prog-lbl{font-size:12px;font-weight:600;color:var(--dp);margin-bottom:6px}
.dl-prog-track{background:#e0d0d4;border-radius:6px;height:8px;overflow:hidden;margin-bottom:4px}
.dl-prog-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--ac));border-radius:6px;width:0%;transition:width .35s ease}
.dl-prog-pct{font-size:11px;color:var(--muted);text-align:right;font-family:var(--fm)}

.dl-done{display:none;gap:8px;margin-top:10px}
.dl-done.show{display:flex}
.dl-done-open{flex:1;padding:10px;border-radius:9px;background:var(--p);color:var(--w);border:none;font-size:13px;font-weight:700;font-family:var(--fb);cursor:pointer}
.dl-done-later{flex:1;padding:10px;border-radius:9px;background:var(--bg);color:var(--muted);border:1.5px solid var(--border);font-size:13px;font-weight:600;font-family:var(--fb);cursor:pointer}

.back-link{
  display:block;text-align:center;
  margin-top:18px;font-size:13px;
  color:rgba(255,255,255,.45);text-decoration:none;
  position:relative;z-index:1;
  transition:color .18s;
}
.back-link:hover{color:rgba(255,255,255,.85)}

@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:360px){
  .card{padding:22px 16px 18px}
  .brand-name{font-size:17px}
}
</style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <div class="logo-wrap">
      <img src="logo.webp" alt="Emmanuel School"
        onerror="this.style.display='none';document.getElementById('logoFb').style.display='block'">
      <span class="logo-fb" id="logoFb"></span>
    </div>
    <div class="brand-name">Emmanuel School</div>
    <div class="brand-sub">EduManage — Admin Panel</div>
  </div>

  <div class="card">
    <div class="card-title">Admin Login</div>
    <div class="card-sub">Enter your admin credentials</div>

    <div class="err" id="err"></div>

    <div class="field">
      <label>Admin Code</label>
      <div class="inp-w">
        <input type="text" id="aCode" placeholder="e.g. ADMIN47"
          autocomplete="off" spellcheck="false"
          oninput="this.value=this.value.toUpperCase()"
          onkeydown="if(event.key==='Enter')document.getElementById('aPass').focus()">
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="inp-w">
        <input type="password" id="aPass" placeholder="Enter password"
          autocomplete="current-password"
          onkeydown="if(event.key==='Enter')doLogin()">
        <button class="eye" type="button" onclick="togglePw()">
          <svg id="eyeS" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="eyeH" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>

    <button class="login-btn" id="lBtn" onclick="doLogin()">
      <span id="lTxt">Login to Admin Panel</span>
      <div class="spin" id="lSpin"></div>
    </button>

    <div class="divider">or</div>

    <div class="dl-box">
      <div class="dl-box-title">Download Admin App</div>
      <div class="dl-box-sub">Install for quick access. Works offline too.</div>
      <button class="dl-btn" id="dlBtn" onclick="startDL()">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download App
      </button>
      <div class="dl-prog" id="dlProg">
        <div class="dl-prog-lbl" id="dlLbl">Preparing...</div>
        <div class="dl-prog-track"><div class="dl-prog-fill" id="dlFill"></div></div>
        <div class="dl-prog-pct" id="dlPct">0%</div>
      </div>
      <div class="dl-done" id="dlDone">
        <button class="dl-done-open" onclick="location.href='login.html'">Open App</button>
        <button class="dl-done-later" onclick="resetDL()">Later</button>
      </div>
    </div>
  </div>

  <a href="index.html" class="back-link">Back to Home</a>
</div>

<script>
if(sessionStorage.getItem('admin_token')){
  window.location.replace('admin.html');
}
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

const API='https://edumanage-backend-xi.vercel.app/api';

function togglePw(){
  const i=document.getElementById('aPass');
  const s=document.getElementById('eyeS');
  const h=document.getElementById('eyeH');
  if(i.type==='password'){i.type='text';s.style.display='none';h.style.display='block';}
  else{i.type='password';s.style.display='block';h.style.display='none';}
}

function showErr(m){const e=document.getElementById('err');e.textContent=m;e.classList.add('show')}
function hideErr(){document.getElementById('err').classList.remove('show')}

async function doLogin(){
  hideErr();
  const code=document.getElementById('aCode').value.trim().toUpperCase();
  const pass=document.getElementById('aPass').value;
  if(!code){showErr('Admin code enter karo');return}
  if(!pass){showErr('Password enter karo');return}
  const btn=document.getElementById('lBtn');
  const txt=document.getElementById('lTxt');
  const spin=document.getElementById('lSpin');
  btn.disabled=true;txt.style.display='none';spin.style.display='block';
  try{
    const res=await fetch(API+'/auth/login',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code,password:pass,role:'admin'})
    });
    const data=await res.json();
    if(res.ok&&data.token){
      sessionStorage.setItem('admin_token',data.token);
      sessionStorage.setItem('admin_code',code);
      sessionStorage.setItem('admin_name',data.user?.name||'Administrator');
      window.location.replace('admin.html');
    }else{
      showErr(data.message||'Invalid admin code or password');
      btn.disabled=false;txt.style.display='block';spin.style.display='none';
    }
  }catch(e){
    showErr('Network error. Check connection.');
    btn.disabled=false;txt.style.display='block';spin.style.display='none';
  }
}

let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
});
window.addEventListener('appinstalled',()=>{deferredPrompt=null;showDLDone();});

const STEPS=['Preparing...','Downloading...','Installing...','Setting up...','Almost done...','Done!'];
const PCTS=[5,25,50,72,90,100];
let dlInt=null;

function startDL(){
  document.getElementById('dlBtn').disabled=true;
  showDLProg();
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(r=>{
      deferredPrompt=null;
      if(r.outcome==='accepted')finishDL();
      else{hideDLProg();document.getElementById('dlBtn').disabled=false;}
    });
  }else{
    setTimeout(finishDL,3200);
  }
}
function showDLProg(){
  document.getElementById('dlProg').classList.add('show');
  document.getElementById('dlFill').style.width='0%';
  document.getElementById('dlPct').textContent='0%';
  let i=0;
  dlInt=setInterval(()=>{
    if(i<STEPS.length){
      document.getElementById('dlLbl').textContent=STEPS[i];
      document.getElementById('dlFill').style.width=PCTS[i]+'%';
      document.getElementById('dlPct').textContent=PCTS[i]+'%';
      i++;
    }else clearInterval(dlInt);
  },550);
}
function finishDL(){
  clearInterval(dlInt);
  document.getElementById('dlFill').style.width='100%';
  document.getElementById('dlPct').textContent='100%';
  document.getElementById('dlLbl').textContent='Done!';
  setTimeout(showDLDone,400);
}
function hideDLProg(){clearInterval(dlInt);document.getElementById('dlProg').classList.remove('show')}
function showDLDone(){hideDLProg();document.getElementById('dlBtn').style.display='none';document.getElementById('dlDone').classList.add('show')}
function resetDL(){document.getElementById('dlDone').classList.remove('show');document.getElementById('dlBtn').style.display='flex';document.getElementById('dlBtn').disabled=false;}
</script>
</body>
</html>
