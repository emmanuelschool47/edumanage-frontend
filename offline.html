<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#800020">
<title>Offline — EduManage</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#3d0010,#800020);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:40px 32px;max-width:360px;width:100%;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.3)}
.icon{width:64px;height:64px;background:#800020;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px}
h1{font-size:22px;font-weight:700;margin-bottom:8px;color:#800020}
p{font-size:14px;color:#9e9e9e;line-height:1.6;margin-bottom:24px}
button{width:100%;padding:13px;background:#800020;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>No Internet</h1>
  <p>EduManage ko internet chahiye data load karne ke liye. Please internet se connect karo aur try karo.</p>
  <button onclick="location.reload()">🔄 Try Again</button>
</div>
</body>
</html>
